  ----------------------------------------------------------------- */
  function renderSeasonTabs(container, item, activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    container.dataset.activeSeasonIdx = String(activeIdx)
    container.dataset.activeArcIdx = ''
    // Tab row with arrow buttons
    var navRow = document.createElement('div')
    navRow.className = 'detail-season-tabs'
    // Hide arrow buttons for anime and show types
    var hideArrows = (item.type === 'anime' || item.type === 'show')
    var prevBtn = null
    if (!hideArrows) {
      prevBtn = document.createElement('button')
      prevBtn.className = 'btn-ghost'
      prevBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
      prevBtn.textContent = '\u2190'
      prevBtn.disabled = activeIdx === 0
      prevBtn.style.opacity = activeIdx === 0 ? '0.3' : '1'
      prevBtn.addEventListener('click', function() {
        if (activeIdx > 0) {
          container.innerHTML = ''
          renderSeasonTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      })
      navRow.appendChild(prevBtn)
    }

    item.seasons.forEach(function(season, i) {
      var tab = document.createElement('button')
      tab.className = 'detail-season-tab' + (i === activeIdx ? ' active' : '')
      tab.textContent = season.name
      tab.dataset.seasonIdx = i
      tab.addEventListener('click', function() {
        var seasonIdx = parseInt(this.dataset.seasonIdx, 10)
        if (selectMode && seasonIdx === activeIdx) {
          var nums = (season.episodes || []).map(function(ep) { return makeEpKey(seasonIdx, ep.number) })
          nums.forEach(function(n) { if (selectedEps.indexOf(n) === -1) selectedEps.push(n) })
          selectCountBadge.style.display = 'none'
          updateSelectBar(true, selectedEps, item.id, item.title, selectBtn, selectCountBadge, startTimer, season)
          container.innerHTML = ''
          renderSeasonTabs(container, item, seasonIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
          return
        }
        container.innerHTML = ''
        renderSeasonTabs(container, item, seasonIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      })
      navRow.appendChild(tab)
    })

    var selectInlineWrap = document.createElement('div')
    selectInlineWrap.style.cssText = 'margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:var(--space-2);flex-shrink:0;'
    selectInlineWrap.appendChild(selectBtn)
    selectInlineWrap.appendChild(selectCountBadge)
    navRow.appendChild(selectInlineWrap)

    if (!hideArrows) {
      var nextBtn = document.createElement('button')
      nextBtn.className = 'btn-ghost'
      nextBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
      nextBtn.textContent = '\u2192'
      nextBtn.disabled = activeIdx === item.seasons.length - 1
      nextBtn.style.opacity = activeIdx === item.seasons.length - 1 ? '0.3' : '1'
      nextBtn.addEventListener('click', function() {
        if (activeIdx < item.seasons.length - 1) {
          container.innerHTML = ''
          renderSeasonTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      })
      navRow.appendChild(nextBtn)
    }

    container.appendChild(navRow)

    // Keyboard navigation for seasons (ensure only one handler exists)
    if (container._seasonKeyHandler) container.removeEventListener('keydown', container._seasonKeyHandler)
    container.tabIndex = 0
    container._seasonKeyHandler = function(e) {
      if (e.key === 'ArrowLeft' && activeIdx > 0) {
        container.innerHTML = ''
        renderSeasonTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      } else if (e.key === 'ArrowRight' && activeIdx < item.seasons.length - 1) {
        container.innerHTML = ''
        renderSeasonTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      }
    }
    container.addEventListener('keydown', container._seasonKeyHandler)
    if (getAppSettings().autoFocusDetailNav) setTimeout(function() { try { container.focus() } catch (e) {} }, 100)

    // Active season
    var season = item.seasons[activeIdx]
    if (!season) return

    // Episode grid
    var gridWrap = buildFilmstrip(item, season.episodes || [], activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, season)
    container.appendChild(gridWrap)

    // Season panel
    var panel = buildSeasonPanel(item, season, activeIdx, container, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
    container.appendChild(panel)
  }

  /* -----------------------------------------------------------------
     PART 4: ARC ACCORDION RENDERER
  ----------------------------------------------------------------- */
  function renderArcAccordion(container, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    renderArcTabs(container, item, 0, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
  }

  function renderArcTabs(container, item, activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    container.dataset.activeArcIdx = String(activeIdx)
    container.dataset.activeSeasonIdx = ''
    // Use tab row for ≤6 arcs, dropdown select for more (e.g. manhwa with 31 arcs)
    var useDropdown = item.arcs.length > 6
    var hideArrows = (item.type === 'anime' || item.type === 'show')

    if (useDropdown) {
      var navRow = document.createElement('div')
      navRow.style.cssText = 'display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-5);border-bottom:1px solid var(--border);padding-bottom:var(--space-4);'

      var prevBtn = null
      if (!hideArrows) {
        prevBtn = document.createElement('button')
        prevBtn.className = 'btn-ghost'
        prevBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        prevBtn.textContent = '\u2190'
        prevBtn.disabled = activeIdx === 0
        prevBtn.style.opacity = activeIdx === 0 ? '0.3' : '1'
      }

      var sel = document.createElement('select')
      sel.className = 'arc-nav-select'
      sel.style.flex = '1 1 360px'
      sel.tabIndex = -1; // Prevent select from stealing focus
      item.arcs.forEach(function(arc, i) {
        var opt = document.createElement('option')
        opt.value = i
        opt.textContent = arc.name + '  (Ch. ' + arc.chapterStart + '\u2013' + arc.chapterEnd + ')'
        if (i === activeIdx) opt.selected = true
        sel.appendChild(opt)
      })

      var nextBtn = null
      if (!hideArrows) {
        nextBtn = document.createElement('button')
        nextBtn.className = 'btn-ghost'
        nextBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        nextBtn.textContent = '\u2192'
        nextBtn.disabled = activeIdx === item.arcs.length - 1
        nextBtn.style.opacity = activeIdx === item.arcs.length - 1 ? '0.3' : '1'
      }

      sel.addEventListener('change', function() {
        container.innerHTML = ''
        renderArcTabs(container, item, parseInt(sel.value, 10), selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      })
      if (prevBtn) {
        prevBtn.addEventListener('click', function() {
          if (activeIdx > 0) { container.innerHTML = ''; renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) }
        })
      }
      if (nextBtn) {
        nextBtn.addEventListener('click', function() {
          if (activeIdx < item.arcs.length - 1) { container.innerHTML = ''; renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) }
        })
      }

      if (prevBtn) navRow.appendChild(prevBtn)
      navRow.appendChild(sel)
      if (nextBtn) navRow.appendChild(nextBtn)
      var selectInlineWrap = document.createElement('div')
      selectInlineWrap.style.cssText = 'margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:var(--space-2);min-width:0;'
      selectInlineWrap.appendChild(selectBtn)
      selectInlineWrap.appendChild(selectCountBadge)
      navRow.appendChild(selectInlineWrap)
      container.appendChild(navRow)

      // Keyboard navigation for arcs (dropdown mode) — single handler
      if (container._arcKeyHandler) container.removeEventListener('keydown', container._arcKeyHandler)
      container.tabIndex = 0
      container._arcKeyHandler = function(e) {
        if (e.key === 'ArrowLeft' && activeIdx > 0) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        } else if (e.key === 'ArrowRight' && activeIdx < item.arcs.length - 1) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      }
      container.addEventListener('keydown', container._arcKeyHandler)
      if (getAppSettings().autoFocusDetailNav) setTimeout(function() { try { container.focus() } catch (e) {} }, 100)
    } else {
      // Tab row for small arc counts with arrow buttons
      var navRow = document.createElement('div')
      navRow.className = 'detail-season-tabs'

      if (!hideArrows) {
        var prevBtn = document.createElement('button')
        prevBtn.className = 'btn-ghost'
        prevBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        prevBtn.textContent = '\u2190'
        prevBtn.disabled = activeIdx === 0
        prevBtn.style.opacity = activeIdx === 0 ? '0.3' : '1'
        prevBtn.addEventListener('click', function() {
          if (activeIdx > 0) {
            container.innerHTML = ''
            renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
          }
        })
        navRow.appendChild(prevBtn)
      }

      item.arcs.forEach(function(arc, i) {
        var tab = document.createElement('button')
        tab.className = 'detail-season-tab' + (i === activeIdx ? ' active' : '')
        tab.textContent = arc.name
        tab.title = 'Ch. ' + arc.chapterStart + '\u2013' + arc.chapterEnd
        tab.style.cssText = 'white-space:nowrap;flex-shrink:0;'
        tab.dataset.arcIdx = i
        tab.addEventListener('click', function() {
          var arcIdx = parseInt(this.dataset.arcIdx, 10)
          if (selectMode && arcIdx === activeIdx) {
            var nums = []
            for (var n = arc.chapterStart; n <= arc.chapterEnd; n++) nums.push(n)
            nums.forEach(function(v) { if (selectedEps.indexOf(v) === -1) selectedEps.push(v) })
            selectCountBadge.style.display = 'none'
            // Create arc info object with episodes array for detection
            var arcInfo = {
              name: arc.name,
              episodes: nums.map(function(n) { return { number: n } })
            }
            updateSelectBar(true, selectedEps, item.id, item.title, selectBtn, selectCountBadge, startTimer, arcInfo)
            container.innerHTML = ''
            renderArcTabs(container, item, arcIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
            return
          }
          container.innerHTML = ''
          renderArcTabs(container, item, arcIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        })
        navRow.appendChild(tab)
      })

      var selectInlineWrap = document.createElement('div')
      selectInlineWrap.style.cssText = 'margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:var(--space-2);min-width:0;'
      selectInlineWrap.appendChild(selectBtn)
      selectInlineWrap.appendChild(selectCountBadge)
      navRow.appendChild(selectInlineWrap)

      if (!hideArrows) {
        var nextBtn = document.createElement('button')
        nextBtn.className = 'btn-ghost'
        nextBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        nextBtn.textContent = '\u2192'
        nextBtn.disabled = activeIdx === item.arcs.length - 1
        nextBtn.style.opacity = activeIdx === item.arcs.length - 1 ? '0.3' : '1'
        nextBtn.addEventListener('click', function() {
          if (activeIdx < item.arcs.length - 1) {
            container.innerHTML = ''
            renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
          }
        })
        navRow.appendChild(nextBtn)
      }

      container.appendChild(navRow)

      // Keyboard navigation for arcs (tab mode) — single handler
      if (container._arcKeyHandler) container.removeEventListener('keydown', container._arcKeyHandler)
      container.tabIndex = 0
      container._arcKeyHandler = function(e) {
        if (e.key === 'ArrowLeft' && activeIdx > 0) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        } else if (e.key === 'ArrowRight' && activeIdx < item.arcs.length - 1) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      }
      container.addEventListener('keydown', container._arcKeyHandler)
      if (getAppSettings().autoFocusDetailNav) setTimeout(function() { try { container.focus() } catch (e) {} }, 100)
    }

    var arc = item.arcs[activeIdx]
    if (!arc) return

    // Chapter grid
    var chapters = []
    for (var n = arc.chapterStart; n <= arc.chapterEnd; n++) {
      // Check if this chapter has a saved rating
      var savedRating = 0
      if (arc.chapters) {
        var savedCh = arc.chapters.find(function(c) { return c.number === n })
        if (savedCh) savedRating = savedCh.rating || 0
      }
      chapters.push({ number: n, title: 'Ch. ' + n, rating: savedRating, isChapter: true })
    }
    // Create arc info object for select bar
    var arcInfo = {
      name: arc.name,
      episodes: chapters
    }
    var gridWrap = buildFilmstrip(item, chapters, activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, arcInfo)
    container.appendChild(gridWrap)

    // Reuse exact season panel: mark all watched + stats cards
    var arcAsSeason = { episodes: chapters, name: arc.name }
    var panel = buildSeasonPanel(item, arcAsSeason, activeIdx, container, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
    container.appendChild(panel)
  }

  /* -----------------------------------------------------------------
     PART 4: FLAT EPISODE GRID (no seasons, no arcs)
  ----------------------------------------------------------------- */
  function renderFlatGrid(container, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    if (!item.totalEpisodes || item.totalEpisodes === 0) {
      // Empty episode state
      var emptyDiv = document.createElement('div')
      emptyDiv.className = 'detail-ep-empty'
      emptyDiv.innerHTML =
        '<div class="detail-ep-empty-title">NO EPISODE DATA ON FILE</div>' +
        '<div class="detail-ep-empty-sub">Set total count to track progress:</div>' +
        '<div class="detail-ep-empty-row">' +
          '<input class="detail-ep-set-input" id="ep-total-input" type="number" min="1" placeholder="0"/>' +
          '<button class="btn-ghost" id="ep-total-set">Set Total</button>' +
        '</div>'
      container.appendChild(emptyDiv)
      setTimeout(function() {
        var setBtn = document.getElementById('ep-total-set')
        var setIn  = document.getElementById('ep-total-input')
        if (setBtn && setIn) {
          setBtn.addEventListener('click', function() {
            var n = parseInt(setIn.value, 10)
            if (!n || n < 1) return
            var lib = loadData(KEYS.library, [])
            var it  = lib.find(function(i) { return i.id === item.id })
            if (it) { it.totalEpisodes = n; item.totalEpisodes = n; saveData(KEYS.library, lib) }
            container.innerHTML = ''
            renderFlatGrid(container, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
          })
        }
      }, 0)
      return
    }

    // Build episode list from totalEpisodes
    var episodes = []
    for (var n = 1; n <= item.totalEpisodes; n++) {
      episodes.push({ number: n, title: 'Episode ' + n, rating: 0 })
    }
    var gridWrap = buildFilmstrip(item, episodes, null, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, null)
    container.appendChild(gridWrap)
  }

  /* -----------------------------------------------------------------
     PART 4: EPISODE KEY HELPER
     Season-qualified keys prevent S1E1 and S2E1 from colliding.
  ----------------------------------------------------------------- */
  function makeEpKey(seasonIdx, epNum) {
    return (seasonIdx !== null && seasonIdx !== undefined) ? ('s' + seasonIdx + '_' + epNum) : epNum
  }

  /* -----------------------------------------------------------------
     PART 4: FILMSTRIP + EPISODE GRID BUILDER
     Returns the full filmstrip wrapper DOM element.
  ----------------------------------------------------------------- */
  function buildFilmstrip(item, episodes, seasonId, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, seasonInfo) {
    var filmstrip = document.createElement('div')
    filmstrip.className = 'detail-filmstrip'

    var grid = document.createElement('div')
    grid.className = 'detail-ep-grid'

    episodes.forEach(function(ep) {
      var tile = buildEpTile(item, ep, seasonId, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, seasonInfo)
      grid.appendChild(tile)
    })

    filmstrip.appendChild(grid)
    return filmstrip
  }

  /* -----------------------------------------------------------------
     PART 4: SINGLE EPISODE TILE BUILDER
  ----------------------------------------------------------------- */
  function buildEpTile(item, ep, seasonIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, seasonInfo) {
    var tile = document.createElement('div')
    tile.className = 'ep-tile'
    if (ep.isChapter) tile.classList.add('chapter-tile')
    if (selectMode) tile.classList.add('select-mode')

    var epKey = makeEpKey(seasonIdx, ep.number)
    var isWatched = item.watchedEpisodes && item.watchedEpisodes.includes(epKey)
    if (isWatched) tile.classList.add('watched')
    
    // Add class if no platform ratings exist
    var hasPlatformRatings = ep.ratingIMDb || ep.ratingMAL
    if (!hasPlatformRatings && ep.rating) tile.classList.add('personal-only')

    // Build ratings container
    var ratingsHTML = ''
    if (ep.ratingIMDb || ep.ratingMAL || ep.rating) {
      // Check if only one platform rating exists (IMDb XOR MAL)
      var hasOnlyOnePlatform = (ep.ratingIMDb && !ep.ratingMAL) || (!ep.ratingIMDb && ep.ratingMAL)
      var noPersonalClass = !ep.rating ? ' no-personal' : ''
      var onlyOneClass = hasOnlyOnePlatform ? ' only-one' : ''
      ratingsHTML = '<div class="ep-ratings-bar' + noPersonalClass + onlyOneClass + '">'
      if (ep.ratingIMDb) ratingsHTML += '<span class="ep-badge-imdb">' + Number(ep.ratingIMDb).toFixed(1) + '</span>'
      if (ep.ratingMAL) ratingsHTML += '<span class="ep-badge-mal">' + Number(ep.ratingMAL).toFixed(1) + '</span>'
      if (ep.rating) ratingsHTML += '<span class="ep-rating-badge">' + ep.rating + '</span>'
      ratingsHTML += '</div>'
    }

    // Set episode title as data attribute for CSS tooltip
    if (ep.title && ep.title !== 'Episode ' + ep.number && ep.title !== 'Ch. ' + ep.number) {
      tile.dataset.title = ep.title
    }
    tile.innerHTML =
      ratingsHTML +
      '<span class="ep-num">' + ep.number + '</span>' +
      '<span class="ep-check">\u2713</span>' +
      '<button class="ep-rate-btn" aria-label="Rate this episode">\u2605</button>' +
      '<button class="ep-timer-btn" aria-label="Start timer for this episode">\u23f1</button>'

    // Rate button — opens star popup
    var rateBtn = tile.querySelector('.ep-rate-btn')
    if (rateBtn) {
      rateBtn.addEventListener('click', function(e) {
        e.stopPropagation()
        // Remove any existing popups
        document.querySelectorAll('.ep-rate-popup').forEach(function(p) { p.remove() })
        var popup = document.createElement('div')
        popup.className = 'ep-rate-popup'
        for (var s = 1; s <= 5; s++) {
          var star = document.createElement('button')
          star.className = 'ep-rate-star' + (ep.rating >= s ? ' filled' : '')
          star.textContent = '\u2605'
          star.dataset.val = s
          star.addEventListener('click', function(ev) {
            ev.stopPropagation()
            var val = parseInt(this.dataset.val)
            ep.rating = val
            // Save to localStorage
            var lib = loadData(KEYS.library, [])
            var it = lib.find(function(i) { return i.id === item.id })
            if (it) {
              // Find this ep in seasons or arcs
              var found = false
              ;(it.seasons || []).forEach(function(season) {
                ;(season.episodes || []).forEach(function(e) {
                  if (e.number === ep.number) { e.rating = val; found = true }
                })
              })
              // Check arcs for chapters (reading content)
              if (!found && ep.isChapter) {
                ;(it.arcs || []).forEach(function(arc) {
                  // Initialize chapters array if it doesn't exist
                  if (!arc.chapters) arc.chapters = []
                  // Find or create chapter entry
                  var ch = arc.chapters.find(function(c) { return c.number === ep.number })
                  if (ch) {
                    ch.rating = val
                    found = true
                  } else if (ep.number >= arc.chapterStart && ep.number <= arc.chapterEnd) {
                    // Chapter is in this arc's range, add it
                    arc.chapters.push({ number: ep.number, rating: val })
                    found = true
                  }
                })
              }
              if (!found) {
                // flat episodes — create in first season
                if (it.seasons && it.seasons.length > 0) {
                  var sEp = it.seasons[0].episodes.find(function(e) { return e.number === ep.number })
                  if (sEp) sEp.rating = val
                }
              }
              saveData(KEYS.library, lib)
            }
            popup.remove()
            // Update ratings bar on tile
            var existingBar = tile.querySelector('.ep-ratings-bar')
            if (existingBar) {
              var existingBadge = existingBar.querySelector('.ep-rating-badge')
              if (existingBadge) {
                existingBadge.textContent = val
              } else {
                var badge = document.createElement('span')
                badge.className = 'ep-rating-badge'
                badge.textContent = val
                existingBar.appendChild(badge)
              }
              // Update classes for proper width
              existingBar.classList.remove('no-personal')
              var hasIMDb = existingBar.querySelector('.ep-badge-imdb')
              var hasMAL = existingBar.querySelector('.ep-badge-mal')
              var hasOnlyOne = (hasIMDb && !hasMAL) || (!hasIMDb && hasMAL)
              if (hasOnlyOne) {
                existingBar.classList.remove('only-one')
              }
              // Add personal-only class if no platform ratings
              if (!hasIMDb && !hasMAL) {
                tile.classList.add('personal-only')
              }
            } else {
              // Create new ratings bar if it doesn't exist
              var newBar = document.createElement('div')
              newBar.className = 'ep-ratings-bar'
              var badge = document.createElement('span')
              badge.className = 'ep-rating-badge'
              badge.textContent = val
              newBar.appendChild(badge)
              tile.insertBefore(newBar, tile.firstChild)
              // Add personal-only class since no platform ratings exist
              tile.classList.add('personal-only')
            }
            // Refresh stats to update personal average
            if (typeof refreshStats === 'function') refreshStats(item.watchedEpisodes)
          })
          popup.appendChild(star)
        }
        // Clear button
        if (ep.rating) {
          var clearBtn = document.createElement('button')
          clearBtn.className = 'ep-rate-star clear-btn'
          clearBtn.textContent = '\u2715'
          clearBtn.title = 'Clear rating'
          clearBtn.addEventListener('click', function(ev) {
            ev.stopPropagation()
            ep.rating = 0
            var lib = loadData(KEYS.library, [])
            var it = lib.find(function(i) { return i.id === item.id })
            if (it) {
              ;(it.seasons || []).forEach(function(season) {
                ;(season.episodes || []).forEach(function(e) {
                  if (e.number === ep.number) e.rating = 0
                })
              })
              // Clear from arcs for chapters (reading content)
              if (ep.isChapter) {
                ;(it.arcs || []).forEach(function(arc) {
                  if (arc.chapters) {
                    var ch = arc.chapters.find(function(c) { return c.number === ep.number })
                    if (ch) ch.rating = 0
                  }
                })
              }
              saveData(KEYS.library, lib)
            }
            popup.remove()
            // Remove personal rating badge from ratings bar
            var existingBar = tile.querySelector('.ep-ratings-bar')
            if (existingBar) {
              var existingBadge = existingBar.querySelector('.ep-rating-badge')
              if (existingBadge) existingBadge.remove()
              // Update classes for proper width
              var hasIMDb = existingBar.querySelector('.ep-badge-imdb')
              var hasMAL = existingBar.querySelector('.ep-badge-mal')
              if (hasIMDb || hasMAL) {
                existingBar.classList.add('no-personal')
                var hasOnlyOne = (hasIMDb && !hasMAL) || (!hasIMDb && hasMAL)
                if (hasOnlyOne) {
                  existingBar.classList.add('only-one')
                }
              } else {
                // If ratings bar is now empty, remove it
                existingBar.remove()
              }
            }
            // Refresh stats to update personal average
            if (typeof refreshStats === 'function') refreshStats(item.watchedEpisodes)
          })
          popup.appendChild(clearBtn)
        }
        // Position fixed relative to rateBtn, append to body to escape tile opacity
        var tileRect = tile.getBoundingClientRect()
        popup.style.position = 'fixed'
        popup.style.top = 'auto'
        popup.style.zIndex = '9999'
        document.body.appendChild(popup)
        // Clamp horizontally after append so we know popup width
        requestAnimationFrame(function() {
          var pw = popup.offsetWidth
          var cx = tileRect.left + tileRect.width / 2
          var left = Math.max(12, Math.min(window.innerWidth - pw - 12, cx - pw / 2))
          var bottom = window.innerHeight - tileRect.top + 3
          // If would go off top, flip below tile
          if (tileRect.top - popup.offsetHeight - 3 < 0) {
            popup.style.bottom = 'auto'
            popup.style.top = (tileRect.bottom + 3) + 'px'
          } else {
            popup.style.bottom = bottom + 'px'
          }
          popup.style.left = left + 'px'
          popup.style.transform = 'none'
        })
        // Close on outside click
        setTimeout(function() {
          document.addEventListener('click', function closePopup() {
            popup.remove()
            document.removeEventListener('click', closePopup)
          }, { once: true })
        }, 10)
      })
    }

    // Click: select mode vs toggle watched
    tile.addEventListener('click', function(e) {
      if (e.target.classList.contains('ep-timer-btn')) return
      if (e.target.classList.contains('ep-rate-btn')) return
      if (e.target.classList.contains('ep-rate-star')) return
      if (e.target.closest('.ep-rate-popup')) return

      if (selectMode) {
        tile.classList.toggle('tile-selected')
        var idx = selectedEps.indexOf(epKey)
        if (idx === -1) selectedEps.push(epKey)
        else selectedEps.splice(idx, 1)
        selectCountBadge.style.display = 'none'
        updateSelectBar(true, selectedEps, item.id, item.title, selectBtn, selectCountBadge, startTimer, seasonInfo)
        return
      }

      // Toggle watched
      tile.classList.add('tile-flash')
      setTimeout(function() { tile.classList.remove('tile-flash') }, 420)

      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (!it) return

      var wasWatched    = it.watchedEpisodes && it.watchedEpisodes.includes(epKey)
      var beforeCount   = it.watchedEpisodes ? it.watchedEpisodes.length : 0

      if (!it.watchedEpisodes) it.watchedEpisodes = []
      if (wasWatched) {
        it.watchedEpisodes = it.watchedEpisodes.filter(function(n) { return n !== epKey })
        tile.classList.remove('watched')
        logEvent((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel' ? 'Unread ch ' : 'Unwatched ep ') + ep.number + ' of ' + item.title)
      } else {
        it.watchedEpisodes.push(epKey)
        tile.classList.add('watched')
        // Auto-promote upcoming → watching when first episode is marked watched
        if (it.status === 'upcoming') {
          it.status = 'watching'
          item.status = 'watching'
          logEvent('Status updated: ' + item.title + ' → watching')
        }
        logEvent((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel' ? 'Read ch ' : 'Watched ep ') + ep.number + ' of ' + item.title)
      }

      // Sync back to the live item reference
      item.watchedEpisodes = it.watchedEpisodes.slice()
      touchLibraryItemActivity(it)
      saveData(KEYS.library, lib)

      // If just marked watched, auto-clear any past schedule entry for this episode
      if (!wasWatched) {
        var sched = loadData(KEYS.schedule, {})
        var todayKey = localDateStr()
        var epNum = ep.number
        var isReading = (it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel')
        var epLabelVariants = [
          (isReading ? 'Ch. ' : 'Ep. ') + epNum,
          (isReading ? 'Ch.' : 'Ep.') + epNum,
          String(epNum)
        ]
        var schedChanged = false
        Object.keys(sched).forEach(function(dk) {
          if (dk >= todayKey) return // only past entries
          var before = sched[dk].length
          sched[dk] = sched[dk].filter(function(e) {
            if (e.id !== it.id) return true
            return !epLabelVariants.some(function(v) { return e.eps === v })
          })
          if (sched[dk].length !== before) {
            schedChanged = true
            if (sched[dk].length === 0) delete sched[dk]
          }
        })
        if (schedChanged) {
          saveData(KEYS.schedule, sched)
          if (window.__refreshMissed) window.__refreshMissed()
        }
      }

      // Update hero progress bar live (no re-render)
      var fill       = document.getElementById('detail-prog-fill')
      var progLabel  = document.querySelector('.detail-progress-label')
      var newWatched = it.watchedEpisodes.length
      var newPct     = it.totalEpisodes > 0
        ? Math.min((newWatched / it.totalEpisodes) * 100, 100) : 0
      if (fill)      fill.style.width = newPct + '%'
      if (progLabel) {
        var _isRead = (it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel')
        var _pctStr = it.totalEpisodes > 0 ? ' — ' + Math.round(newPct) + '%' : ''
        progLabel.textContent = newWatched + '/' + it.totalEpisodes + ' ' + (_isRead ? 'chapters read' : 'eps watched') + _pctStr
      }
      // Update library card progress bar live if it exists in the grid
      var libCard = document.querySelector('.library-card[data-title="' + it.title.toLowerCase() + '"]')
      if (libCard) {
        var libFill = libCard.querySelector('.progress-bar-fill')
        var libProg = libCard.querySelector('.lib-card-progress-text')
        var unit2 = (it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'ch' : 'eps'
        if (libFill) libFill.style.width = newPct + '%'
        if (libProg) libProg.textContent = newWatched + ' of ' + it.totalEpisodes + ' ' + unit2 + (it.timerMinutes && it.timerMinutes >= 1 ? ' · \u23f1 ' + fmtMins(it.timerMinutes) : '')
      }
      checkSeasonCompletion(it, beforeCount, tile)
      // AUTO-COMPLETE: check if entire series is now done
      if (!wasWatched && it.status !== 'completed') {
        var totalUnits = libraryTotalUnits(it)
        var watchedNow = libraryWatchedCount(it)
        if (totalUnits > 0 && watchedNow >= totalUnits) {
          setTimeout(function() { phubFireSeriesComplete(it) }, 350)
        }
      }
      // Re-order library grid if using activity sort (latest watching)
      var libGrid = document.getElementById('lib-grid')
      if (libGrid) {
        var currentSortMode = normalizeLibrarySortMode(getAppSettings().librarySortMode)
        if (currentSortMode === 'activity') {
          orderLibraryCardsInGrid(libGrid, currentSortMode)
        }
      }
      // Notify season panel to refresh its stat cards
      document.dispatchEvent(new CustomEvent('ep-toggled', { detail: { itemId: item.id, watchedEpisodes: it.watchedEpisodes } }))
    })

    // Timer button on tile
    var timerBtn = tile.querySelector('.ep-timer-btn')
    if (timerBtn) {
      timerBtn.addEventListener('click', function(e) {
        e.stopPropagation()
        var label = ((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'Ch.' : 'Ep.') + ' ' + ep.number
        startTimer(label)
      })
    }

    return tile
  }

  /* -----------------------------------------------------------------
     PART 4: SEASON PANEL (mark all + stats + ratings table)
  ----------------------------------------------------------------- */
  function buildSeasonPanel(item, season, seasonIdx, container, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    var panel = document.createElement('div')
    panel.className = 'detail-season-panel'

    var eps     = season.episodes || []
    var epNums  = eps.map(function(e) { return makeEpKey(seasonIdx, e.number) })
    var watched = item.watchedEpisodes ? item.watchedEpisodes.filter(function(n) { return epNums.includes(n) }).length : 0
    var isReadingType = (item.type && ['manga','manhwa','novel'].includes(String(item.type).toLowerCase()))
    // MAL episode ratings are 0-5 scale; overall/movie MAL ratings are 0-10.
    // Rule: if ratingMAL > 5 it is already on the 0-10 scale (movie/overall) — use as-is.
    //       if ratingMAL <= 5 it is an episode rating on the 0-5 scale — multiply by 2.
    function normalizeMALEpRating(val) { var v = Number(val); return v > 5 ? v : v * 2 }

    var completePct = eps.length > 0 ? Math.round((watched / eps.length) * 100) : 0

    // Mark all watched button
    var markAllBtn = document.createElement('button')
    markAllBtn.className = 'btn-ghost'
    markAllBtn.dataset.sfx = 'success'
    markAllBtn.style.cssText = 'flex:1;'
    markAllBtn.textContent = isReadingType ? 'MARK ALL READ' : 'MARK ALL WATCHED'
    markAllBtn.addEventListener('click', function() {
      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (!it) return
      if (!it.watchedEpisodes) it.watchedEpisodes = []
      var beforeCount  = it.watchedEpisodes.length
      var allInSeason  = epNums.filter(function(n) { return !it.watchedEpisodes.includes(n) })
      it.watchedEpisodes = it.watchedEpisodes.concat(allInSeason)
      item.watchedEpisodes = it.watchedEpisodes.slice()
      touchLibraryItemActivity(it)
      saveData(KEYS.library, lib)

      // Cascade flash on tiles
      var tiles = container.querySelectorAll('.ep-tile')
      tiles.forEach(function(tile, i) {
        setTimeout(function() {
          tile.classList.add('watched', 'tile-flash')
          setTimeout(function() { tile.classList.remove('tile-flash') }, 420)
        }, i * 50)
      })

      // Update progress bar
      var fill      = document.getElementById('detail-prog-fill')
      var progLabel = document.querySelector('.detail-progress-label')
      var newPct    = it.totalEpisodes > 0
        ? Math.min((it.watchedEpisodes.length / it.totalEpisodes) * 100, 100) : 0
      if (fill) fill.style.width = newPct + '%'
      if (progLabel) {
        var _isReadMA = (it.type==='manga'||it.type==='manhwa'||it.type==='novel')
        progLabel.textContent = it.watchedEpisodes.length + '/' + it.totalEpisodes + ' ' + (_isReadMA?'chapters read':'eps watched') + (it.totalEpisodes>0?' — '+Math.round(newPct)+'%':'')
      }

      checkSeasonCompletion(it, beforeCount, markAllBtn)
      refreshStats(it.watchedEpisodes)
    })

    // Mark all unwatched button
    var unmarkAllBtn = document.createElement('button')
    unmarkAllBtn.className = 'btn-danger'
    unmarkAllBtn.dataset.sfx = 'toggle'
    unmarkAllBtn.style.cssText = 'flex:1;'
    unmarkAllBtn.textContent = isReadingType ? 'MARK ALL UNREAD' : 'MARK ALL UNWATCHED'
    unmarkAllBtn.addEventListener('click', function() {
      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (!it) return
      // Remove all episodes in this season from watchedEpisodes
      it.watchedEpisodes = (it.watchedEpisodes || []).filter(function(n) { return !epNums.includes(n) })
      item.watchedEpisodes = it.watchedEpisodes.slice()
      touchLibraryItemActivity(it)
      saveData(KEYS.library, lib)

      // Cascade unflash on tiles
      var tiles = container.querySelectorAll('.ep-tile')
      tiles.forEach(function(tile, i) {
        setTimeout(function() {
          tile.classList.remove('watched')
          tile.classList.add('tile-flash')
          setTimeout(function() { tile.classList.remove('tile-flash') }, 420)
        }, i * 40)
      })

      // Update progress bar
      var fill      = document.getElementById('detail-prog-fill')
      var progLabel = document.querySelector('.detail-progress-label')
      var newPct    = it.totalEpisodes > 0
        ? Math.min((it.watchedEpisodes.length / it.totalEpisodes) * 100, 100) : 0
      if (fill) fill.style.width = newPct + '%'
      if (progLabel) progLabel.textContent = it.watchedEpisodes.length + ' of ' + it.totalEpisodes +
        ' ' + ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'chapters' : 'eps') + ' ' + ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'read' : 'watched')

      logEvent((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel' ? 'Unread all of ' : 'Unwatched all of ') + item.title)
      refreshStats(it.watchedEpisodes)
    })

    // Wrap both buttons in a flex row
    var btnRow = document.createElement('div')
    btnRow.style.cssText = 'display:flex;gap:8px;width:100%;'
    btnRow.appendChild(markAllBtn)
    btnRow.appendChild(unmarkAllBtn)
    panel.appendChild(btnRow)

    // Season stats
    var stats = document.createElement('div')
    stats.className = 'detail-season-stats'
    stats.id = 'season-stats-' + (season.id || seasonIdx)
    function getAvgRatingDisplay() {
      if (!eps.length) return null
      var ratedEps = eps.filter(function(e) { return e.rating })
      if (!ratedEps.length) return null
      // Episode ratings are out of 5, convert to 10 scale
      var sum = ratedEps.reduce(function(s, e) { return s + (Number(e.rating) * 2) }, 0)
      return (sum / ratedEps.length).toFixed(1)
    }
    function statFontSize(str) {
      var len = String(str).length
      if (len <= 3) return '52px'
      if (len <= 5) return '40px'
      if (len <= 7) return '32px'
      return '28px'
    }
    function refreshStats(watchedEps) {
      var newWatched = watchedEps ? watchedEps.filter(function(n) { return epNums.includes(n) }).length : 0
      var newPct = eps.length > 0 ? Math.round((newWatched / eps.length) * 100) : 0
      var isReadingType = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel')
      
      // Calculate personal average from episode ratings
      var personalAvg = getAvgRatingDisplay()
      
      // Calculate season averages from episodes
      var seasonIMDb = null, seasonMAL = null
      var imdbEps = eps.filter(function(e) { return e.ratingIMDb })
      var malEps = eps.filter(function(e) { return e.ratingMAL })
      if (imdbEps.length > 0) {
        seasonIMDb = (imdbEps.reduce(function(s, e) { return s + Number(e.ratingIMDb) }, 0) / imdbEps.length).toFixed(1)
      }
      if (malEps.length > 0) {
        seasonMAL = (malEps.reduce(function(s, e) { return s + Number(e.ratingMAL) }, 0) / malEps.length).toFixed(1)
      }
      
      // Use season-level rating if set, otherwise use calculated average
      // Track MAL scale: season.ratingMAL is /10, episode avg is /5
      var seasonRatingIMDb = season.ratingIMDb ? Number(season.ratingIMDb).toFixed(1) : seasonIMDb
      var seasonRatingMALRaw = season.ratingMAL ? Number(season.ratingMAL) : (seasonMAL ? Number(seasonMAL) : null)
      var seasonRatingMALIsBase10 = !!season.ratingMAL // explicit season rating is /10; episode avg is /5
      var seasonRatingMAL = seasonRatingMALRaw !== null ? seasonRatingMALRaw.toFixed(seasonRatingMALIsBase10 ? 2 : 1) : null
      var seasonRatingMALMax = seasonRatingMALIsBase10 ? 10 : 5
      var seasonPersonalRating = season.personalRating ? Number(season.personalRating).toFixed(1) : personalAvg
      
      // Calculate overall average — 3-way average: IMDb avg + MAL avg (normalised to /10) + season personal rating
      // Each component counts as 1 slot. MAL ep avg is /5 so ×2 to normalise.
      // Personal rating only counts when a season-level rating has been explicitly set.
      var overallAvg = null
      var _imdbVal   = seasonRatingIMDb ? Number(seasonRatingIMDb) : null
      var _malVal    = seasonRatingMALRaw !== null ? (seasonRatingMALIsBase10 ? seasonRatingMALRaw : seasonRatingMALRaw * 2) : null
      var _myVal     = personalAvg ? Number(personalAvg) : null  // avg of per-episode ratings each ×2, already on /10 scale
      var _avgParts  = [_imdbVal, _malVal, _myVal].filter(function(v) { return v !== null })
      if (_avgParts.length > 0) {
        overallAvg = (_avgParts.reduce(function(s, v) { return s + v }, 0) / _avgParts.length).toFixed(1)
      }
      
      // Build rating display with bars inside the card
      var ratingHTML = ''
      if (true) { // show rating cards for ALL types including reading
        // Card 1: clean Avg Rating (no chips inside)
        ratingHTML = '<div class="stat-card" style="border-bottom:2px solid rgba(168,85,247,0.5);">' +
          '<div class="stat-card-number" style="font-size:' + statFontSize(overallAvg || '-') + ';white-space:nowrap;color:#a855f7;text-shadow:0 0 24px rgba(168,85,247,0.35);">' + (overallAvg || '\u2014') + '</div>' +
          '<div class="stat-card-label">Avg Rating</div>' +
          '</div>'

        // Card 4: Ratings breakdown — IMDb, MAL, MY RATING as rows
        var ratingsCardInner = ''
        var ratingsRowCount = 0  // count of real data rows (not placeholders)
        var divider = '<div style="height:1px;background:rgba(100,120,255,0.1);width:100%;"></div>'

        if (seasonRatingIMDb) {
          ratingsCardInner +=
            '<div class="season-imdb-chip" style="display:flex;align-items:center;justify-content:space-between;width:100%;cursor:pointer;" onmouseover="this.style.opacity=\'0.75\'" onmouseout="this.style.opacity=\'1\'">' +
              '<span style="font:600 11px var(--font-mono);color:rgba(245,197,24,0.55);letter-spacing:0.12em;">IMDB<span style=\"font-size:8px;opacity:0.45;margin-left:3px;letter-spacing:0.04em;\">(Avg)</span>' + (season.imdbUrl ? ' ↗' : '') + '</span>' +
              '<span style="font:700 22px var(--font-display);color:#F5C518;letter-spacing:0.04em;">' + seasonRatingIMDb + '</span>' +
            '</div>'
          ratingsRowCount++
        }
        if (seasonRatingMAL) {
          var malLinkIcon = season.malUrl ? ' ↗' : ''
          ratingsCardInner +=
            (ratingsRowCount > 0 ? divider : '') +
            '<div class="season-mal-chip" style="display:flex;align-items:center;justify-content:space-between;width:100%;cursor:pointer;" onmouseover="this.style.opacity=\'0.75\'" onmouseout="this.style.opacity=\'1\'">' +
              '<span style="font:600 11px var(--font-mono);color:rgba(95,143,219,0.55);letter-spacing:0.12em;">MAL' + malLinkIcon + '</span>' +
              '<span style="font:700 22px var(--font-display);color:#5f8fdb;letter-spacing:0.04em;">' + seasonRatingMAL + '</span>' +
            '</div>'
          ratingsRowCount++
        }
        if (seasonPersonalRating) {
          ratingsCardInner +=
            (ratingsRowCount > 0 ? divider : '') +
            '<div class="season-personal-rating-btn" style="display:flex;align-items:center;justify-content:space-between;width:100%;cursor:pointer;" onmouseover="this.style.opacity=\'0.75\'" onmouseout="this.style.opacity=\'1\'">' +
              '<span style="font:600 11px var(--font-mono);color:rgba(255,138,76,0.55);letter-spacing:0.12em;">MY</span>' +
              '<span style="font:700 22px var(--font-display);color:#ff8a4c;letter-spacing:0.04em;">' + seasonPersonalRating + '</span>' +
            '</div>'
          ratingsRowCount++
        } else {
          // Only show divider above placeholder if there are 2+ real rows above it
          ratingsCardInner +=
            (ratingsRowCount >= 2 ? divider : '') +
            '<div class="season-personal-rating-btn" style="display:flex;align-items:center;justify-content:space-between;width:100%;cursor:pointer;opacity:0.45;" onmouseover="this.style.opacity=\'0.75\'" onmouseout="this.style.opacity=\'0.45\'">' +
              '<span style="font:600 11px var(--font-mono);color:rgba(255,138,76,0.55);letter-spacing:0.12em;">MY</span>' +
              '<span style="font:600 13px var(--font-mono);color:#ff8a4c;">\u2605 Rate</span>' +
            '</div>'
        }

        var ratingsCard = ratingsCardInner
          ? '<div class="stat-card" style="display:flex;flex-direction:column;justify-content:center;gap:8px;border-bottom:2px solid rgba(255,138,76,0.45);">' +
              ratingsCardInner +
              '<div class="stat-card-label" style="margin-top:4px;text-align:center;">Ratings</div>' +
            '</div>'
          : ''

        ratingHTML = ratingHTML + (ratingsCard || '')
      }
      
      var unitLabel = isReadingType ? 'Read' : 'Watched'
      if (!ratingHTML) {
        stats.style.cssText = 'display:grid;gap:16px;'
        stats.classList.remove('detail-stat-grid-4col', 'detail-stat-grid-3col')
        stats.classList.add('detail-stat-grid-2col')
        stats.innerHTML =
          '<div class="stat-card"><div class="stat-card-number" style="font-size:' + statFontSize(newWatched + ' / ' + eps.length) + ';white-space:nowrap;">' + newWatched + ' / ' + eps.length + '</div><div class="stat-card-label">' + unitLabel + '</div></div>' +
          '<div class="stat-card"><div class="stat-card-number" style="font-size:' + statFontSize(newPct + '%') + ';white-space:nowrap;">' + newPct + '%</div><div class="stat-card-label">Complete</div></div>'
      } else {
        stats.style.cssText = 'display:grid;gap:16px;'
        stats.classList.remove('detail-stat-grid-2col', 'detail-stat-grid-3col')
        stats.classList.add('detail-stat-grid-4col')
        stats.innerHTML =
          ratingHTML +
          '<div class="stat-card" style="border-bottom:2px solid rgba(0,229,255,0.5);"><div class="stat-card-number" style="font-size:' + statFontSize(newWatched + ' / ' + eps.length) + ';white-space:nowrap;">' + newWatched + ' / ' + eps.length + '</div><div class="stat-card-label">' + unitLabel + '</div></div>' +
          '<div class="stat-card" style="border-bottom:2px solid rgba(0,255,170,0.5);"><div class="stat-card-number" style="font-size:' + (function(s){var fs=parseInt(statFontSize(s));return Math.max(fs-12,20)+'px';})(newPct + '%') + ';white-space:nowrap;color:#00ffaa;text-shadow:0 0 20px rgba(0,255,170,0.3);">' + newPct + '%</div><div class="stat-card-label">Complete</div></div>'
        
        // Add click handler for season rating
        var ratingBtn = stats.querySelector('.season-personal-rating-btn')
        if (ratingBtn) {
          ratingBtn.addEventListener('click', function(e) {
            e.stopPropagation()
            showSeasonRatingPopup(season, ratingBtn, function(newRating) {
              season.personalRating = newRating
              var lib = loadData(KEYS.library, [])
              var libItem = lib.find(function(i) { return i.id === item.id })
              if (libItem && libItem.seasons) {
                var libSeason = libItem.seasons.find(function(s) { return s.id === season.id })
                if (libSeason) {
                  libSeason.personalRating = newRating
                  saveData(KEYS.library, lib)
                  refreshStats(item.watchedEpisodes)
                }
              }
            })
          })
        }
        
        // Add click handlers for MAL chip only (IMDb has no per-season link)
        var malChip = stats.querySelector('.season-mal-chip')
        if (malChip) {
          malChip.addEventListener('click', function(e) {
            e.stopPropagation()
            if (season.malUrl) {
              window.open(season.malUrl, '_blank')
            } else {
              showInputModal('Add MAL Link', 'Enter MyAnimeList URL for ' + (season.name || '').trim(), malChip, function(url, rating) {
                season.malUrl = url
                if (rating !== null) season.ratingMAL = rating
                var lib = loadData(KEYS.library, [])
                var libItem = lib.find(function(i) { return i.id === item.id })
                if (libItem && libItem.seasons) {
                  var libSeason = libItem.seasons.find(function(s) { return s.id === season.id })
                  if (libSeason) {
                    libSeason.malUrl = url
                    if (rating !== null) libSeason.ratingMAL = rating
                    saveData(KEYS.library, lib)
                    refreshStats(item.watchedEpisodes)
                  }
                }
              }, { ratingLabel: 'MAL /10', ratingPlaceholder: 'e.g. 8.32', ratingMax: 10, currentRating: season.ratingMAL || '', accentColor: 'rgba(95,143,219,0.8)' })
            }
          })
        }

        var imdbChip = stats.querySelector('.season-imdb-chip')
        if (imdbChip) {
          imdbChip.addEventListener('click', function(e) {
            e.stopPropagation()
            if (season.imdbUrl) {
              window.open(season.imdbUrl, '_blank')
            } else {
              showInputModal('Add IMDb Link', 'Enter IMDb URL for ' + (season.name || '').trim(), imdbChip, function(url) {
                season.imdbUrl = url
                var lib = loadData(KEYS.library, [])
                var libItem = lib.find(function(i) { return i.id === item.id })
                if (libItem && libItem.seasons) {
                  var libSeason = libItem.seasons.find(function(s) { return s.id === season.id })
                  if (libSeason) {
                    libSeason.imdbUrl = url
                    saveData(KEYS.library, lib)
                    refreshStats(item.watchedEpisodes)
                  }
                }
              })
            }
          })
        }
      }
    }
    refreshStats(item.watchedEpisodes)
    panel.appendChild(stats)

    // Refresh stats when any tile is toggled
    function onEpToggled(e) {
      if (e.detail.itemId === item.id) refreshStats(e.detail.watchedEpisodes)
    }
    document.addEventListener('ep-toggled', onEpToggled)
    // Clean up listener when panel is removed from DOM
    var observer = new MutationObserver(function() {
      if (!panel.isConnected) { document.removeEventListener('ep-toggled', onEpToggled); observer.disconnect() }
    })
    observer.observe(document.body, { childList: true, subtree: true })

    // Episode ratings are now inline on each tile — no separate table needed

    return panel
  }

  // Custom input modal (replaces browser prompt) - small inline popup
  // opts (optional): { ratingLabel, ratingPlaceholder, ratingMax, currentRating, accentColor }
  function showInputModal(title, placeholder, buttonEl, onSubmit, opts) {
    // Remove any existing modals
    document.querySelectorAll('.custom-input-modal').forEach(function(m) { m.remove() })
    opts = opts || {}

    var popup = document.createElement('div')
    popup.className = 'custom-input-modal'
    var isMobile = window.innerWidth <= 600
    var estimatedWidth = isMobile

  /* -----------------------------------------------------------------
     PART 4: SEASON / SERIES COMPLETION CHECK + CELEBRATIONS
  ----------------------------------------------------------------- */
  function checkSeasonCompletion(item, beforeCount, triggerEl) {
    var allWatched = item.watchedEpisodes ? item.watchedEpisodes.length : 0

    // Series complete?
    if (item.totalEpisodes > 0 && allWatched >= item.totalEpisodes && item.status !== 'completed') {
      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (it) {
        it.status = 'completed'
        item.status = 'completed'
        saveData(KEYS.library, lib)
        logEvent('Completed ' + item.title)
        // Update dashboard stats and library card status live
        if (typeof window.__refreshDashboard === 'function') window.__refreshDashboard()
        // Update the library card's data-status so filterCards hides it from graveyard filter
        var libCard = document.querySelector('.library-card[data-title="' + item.title.toLowerCase() + '"]')
        if (libCard) {
          libCard.dataset.status = 'completed'
          var statusDot = libCard.querySelector('.lib-status-dot')
          var statusLbl = libCard.querySelector('.lib-status-label')
          if (statusDot) { statusDot.className = 'lib-status-dot completed' }
          if (statusLbl) { statusLbl.className = 'lib-status-label completed'; statusLbl.textContent = 'DONE' }
        }
      }
      fireCompletionCelebration(item.title)
      return
    }

    // Season complete check — look for a newly-completed season
    if (!item.seasons || item.seasons.length === 0) return
    item.seasons.forEach(function(season, sIdx) {
      var epNums  = (season.episodes || []).map(function(e) { return makeEpKey(sIdx, e.number) })
      if (epNums.length === 0) return
      var nowComplete   = epNums.every(function(n) { return item.watchedEpisodes && item.watchedEpisodes.includes(n) })
      var hadAllBefore  = epNums.every(function(n) {
        // Approximate: if count before >= all in season AND all nums ≤ beforeCount
        return n <= beforeCount
      })
      if (nowComplete && !hadAllBefore) {
        fireSeasonCelebration(season.name, item.title, triggerEl)
      }
    })
  }

  function fireSeasonCelebration(seasonName, title, triggerEl) {
    logEvent('Completed ' + seasonName + ' of ' + title)
    // Play season complete sound
    if (typeof P6SFX !== 'undefined') P6SFX.UI_SUCCESS()
    // Burst ring from trigger element
    var rect = triggerEl ? triggerEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 }
    var ring = document.createElement('div')
    ring.className = 'season-burst-ring'
    ring.style.cssText = 'width:60px;height:60px;left:' + (rect.left + rect.width/2) + 'px;top:' + (rect.top + rect.height/2) + 'px;'
    document.body.appendChild(ring)
    setTimeout(function() { ring.remove() }, 650)
    // Shine on any active tab
    var activeTab = document.querySelector('.detail-season-tab.active')
    if (activeTab) {
      activeTab.classList.add('season-shine')
      setTimeout(function() { activeTab.classList.remove('season-shine') }, 900)
    }
  }

  function fireCompletionCelebration(title) {
    // Play cinematic completion sound
    if (typeof P6SFX !== 'undefined') P6SFX.UI_COMPLETE()
    // Canvas confetti
    var canvas = document.createElement('canvas')
    canvas.style.cssText = 'position:fixed;inset:0;z-index:9000;pointer-events:none;'
    canvas.width  = window.innerWidth
    canvas.height = window.innerHeight
    document.body.appendChild(canvas)
    var ctx = canvas.getContext('2d')
    var COLORS = ['#00d4ff','#ff6b35','#00ff88','#ff3355','#ffd700','#9b59ff']
    var particles = []
    for (var i = 0; i < 200; i++) {
      particles.push({
        x:  Math.random() * canvas.width,
        y: -Math.random() * 200,
        vx: (Math.random() - 0.5) * 4,
        vy:  Math.random() * 3 + 1,
        size: Math.random() * 6 + 3,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: 1
      })
    }
    var startTs = performance.now()
    var DURATION = 3000
    function confettiFrame(ts) {
      var elapsed = ts - startTs
      ctx.clearRect(0, 0, canvas.width, canvas.height)
      particles.forEach(function(p) {
        p.x  += p.vx
        p.y  += p.vy
        p.vy += 0.3
        p.vx += (Math.random() - 0.5) * 0.2
        p.alpha = Math.max(0, 1 - (elapsed / DURATION))
        ctx.globalAlpha = p.alpha
        ctx.fillStyle = p.color
        ctx.fillRect(p.x, p.y, p.size, p.size * 0.6)
      })
      ctx.globalAlpha = 1
      if (elapsed < DURATION) requestAnimationFrame(confettiFrame)
      else canvas.remove()
    }
    requestAnimationFrame(confettiFrame)

    // Banner
    var banner = document.createElement('div')
    banner.className = 'completion-banner'
    banner.textContent = 'YOU FINISHED ' + title.toUpperCase() + '. RESPECT.'
    document.body.appendChild(banner)
    setTimeout(function() { banner.classList.add('visible') }, 50)
    setTimeout(function() {
      banner.classList.remove('visible')
      setTimeout(function() { banner.remove() }, 450)
    }, 4000)
  }

  /* -----------------------------------------------------------------
     PART 4: MULTI-SELECT ACTION BAR
  ----------------------------------------------------------------- */
  
  function getSmartSelectionText(selectedEps, item) {
    if (!selectedEps || selectedEps.length === 0) return '0 selected'
    
    // Parse keys to extract season index and episode number
    var parsedEps = selectedEps.map(function(key) {
      if (typeof key === 'string' && key.indexOf('_') > 0) {
        var parts = key.split('_')
        return { seasonIdx: parseInt(parts[0].substring(1), 10), epNum: parseInt(parts[1], 10), key: key }
      }
      return { seasonIdx: null, epNum: parseInt(key, 10) || key, key: key }
    })
    
    var hasSeasonsData = item.seasons && item.seasons.length > 0
    var hasArcsData = item.arcs && item.arcs.length > 0
    var isReading = item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel'
    var unitLabel = isReading ? 'ch' : 'ep'
    var unitLabelPlural = isReading ? 'chs' : 'eps'
    
    if (hasSeasonsData) {
      // Analyze which seasons are selected
      var seasonStats = []
      item.seasons.forEach(function(season, idx) {
        var selectedInSeason = parsedEps.filter(function(p) { return p.seasonIdx === idx })
        if (selectedInSeason.length > 0) {
          seasonStats.push({
            name: season.name || ('Season ' + (idx + 1)),
            selected: selectedInSeason.length,
            total: (season.episodes || []).length,
            isComplete: selectedInSeason.length === (season.episodes || []).length
          })
        }
      })
      
      if (seasonStats.length === 0) return selectedEps.length + ' ' + (selectedEps.length === 1 ? unitLabel : unitLabelPlural) + ' selected'
      if (seasonStats.length === 1) {
        var s = seasonStats[0]
        return s.name + ' · ' + s.selected + ' ' + (s.selected === 1 ? unitLabel : unitLabelPlural) + ' selected'
      }
      // Multiple seasons - show S01E14-S02E02 format
      var totalEps = seasonStats.reduce(function(sum, s) { return sum + s.selected }, 0)
      // Get first and last episodes with season numbers
      var firstSeason = seasonStats[0]
      var lastSeason = seasonStats[seasonStats.length - 1]
      var firstSeasonNum = firstSeason.name.match(/Season\s+(\d+)/i)
      var lastSeasonNum = lastSeason.name.match(/Season\s+(\d+)/i)
      var s1 = String(firstSeasonNum ? firstSeasonNum[1] : '1').padStart(2, '0')
      var s2 = String(lastSeasonNum ? lastSeasonNum[1] : seasonStats.length).padStart(2, '0')
      
      // Get actual episode numbers from parsed data
      var firstSeasonEps = parsedEps.filter(function(p) { return p.seasonIdx === 0 }).map(function(p) { return p.epNum }).sort(function(a,b){return a-b})
      var lastSeasonEps = parsedEps.filter(function(p) { return p.seasonIdx === seasonStats.length - 1 }).map(function(p) { return p.epNum }).sort(function(a,b){return a-b})
      var e1 = String(firstSeasonEps[0]).padStart(2, '0')
      var e2 = String(lastSeasonEps[lastSeasonEps.length - 1]).padStart(2, '0')
      var count = String(totalEps).padStart(2, '0')
      
      return 'S' + s1 + 'E' + e1 + '-S' + s2 + 'E' + e2 + ' (' + count + ' ' + unitLabelPlural + ' selected)'
    } else if (hasArcsData) {
      // Analyze which arcs are selected
      var arcStats = []
      item.arcs.forEach(function(arc) {
        var arcChapters = []
        for (var n = arc.chapterStart; n <= arc.chapterEnd; n++) arcChapters.push(n)
        var selectedInArc = arcChapters.filter(function(n) { return selectedEps.indexOf(n) >= 0 })
        if (selectedInArc.length > 0) {
          arcStats.push({
            name: arc.name || 'Arc',
            selected: selectedInArc.length,
            total: arcChapters.length,
            isComplete: selectedInArc.length === arcChapters.length
          })
        }
      })
      
      if (arcStats.length === 0) return selectedEps.length + ' ' + (selectedEps.length === 1 ? unitLabel : unitLabelPlural) + ' selected'
      if (arcStats.length === 1) {
        var a = arcStats[0]
        return a.name + ' · ' + a.selected + ' ' + (a.selected === 1 ? unitLabel : unitLabelPlural) + ' selected'
      }
      // Multiple arcs
      var totalChs = arcStats.reduce(function(sum, a) { return sum + a.selected }, 0)
      return arcStats.length + ' arcs · ' + totalChs + ' ' + unitLabelPlural + ' selected'
    }
    
    // Flat episodes/chapters
    return selectedEps.length + ' ' + (selectedEps.length === 1 ? unitLabel : unitLabelPlural) + ' selected'
  }
