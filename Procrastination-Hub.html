      bulkAllBtn.className = 'btn-ghost'
      bulkAllBtn.style.cssText = 'font-size:10px;padding:6px 10px;border-style:dashed;'
      bulkAllBtn.textContent = '+ ALL SEASONS'
      bulkAllBtn.addEventListener('click', function() {
        if (window.__bulkSelectAll) window.__bulkSelectAll()
      })
      bar.appendChild(bulkAllBtn)
    }

    if (n > 0) {
      var schedBtn = document.createElement('button')
      schedBtn.className = 'btn-primary'
      schedBtn.style.cssText = 'font-size:11px;padding:7px 16px;'
      schedBtn.textContent = '+ Schedule'
      schedBtn.addEventListener('click', function() {
        var sorted   = selectedEps.slice().sort(function(a,b){return a-b})
        var epLabel  = 'ep ' + sorted.join(', ')
        // Open schedule modal but lock it to current item (no content dropdown)
        openSchedModalForSelectedEps(itemId, title, epLabel, function(dateVal) {
          bar.innerHTML = '<div style="font:600 13px var(--font-mono);color:var(--success);flex:1;text-align:center;">✓ SCHEDULED FOR ' + dateVal + '</div>'
          setTimeout(function() { bar.classList.remove('visible'); setTimeout(function() { bar.remove() }, 350) }, 1500)
          if (selectBtn) { selectBtn.textContent = 'SELECT'; selectBtn.className = 'btn-ghost' }
          if (selectCountBadge) selectCountBadge.style.display = 'none'
          document.querySelectorAll('.ep-tile.tile-selected').forEach(function(t) { t.classList.remove('tile-selected') })
        })
      })
      bar.appendChild(schedBtn)

      var recurBtn = document.createElement('button')
      recurBtn.className = 'btn-ghost'
      recurBtn.style.cssText = 'font-size:11px;padding:7px 16px;border-color:rgba(0,229,255,0.3);color:var(--accent-cool);'
      recurBtn.textContent = '⚡ Weekly'
      recurBtn.addEventListener('click', function() {
        var sorted = selectedEps.slice().sort(function(a,b){return a-b})
        openWeeklyForSelectedEps(itemId, title, sorted, function() {
          bar.innerHTML = '<div style="font:600 13px var(--font-mono);color:var(--success);flex:1;text-align:center;">✓ WEEKLY SCHEDULE SET</div>'
          setTimeout(function() { bar.classList.remove('visible'); setTimeout(function() { bar.remove() }, 350) }, 1500)
          if (selectBtn) { selectBtn.textContent = 'SELECT'; selectBtn.className = 'btn-ghost' }
          if (selectCountBadge) selectCountBadge.style.display = 'none'
          document.querySelectorAll('.ep-tile.tile-selected').forEach(function(t) { t.classList.remove('tile-selected') })
        })
      })
      bar.appendChild(recurBtn)

      var sessionBtn = document.createElement('button')
      sessionBtn.className = 'btn-primary'
      sessionBtn.style.cssText = 'font-size:11px;padding:7px 16px;background:var(--accent-warm);border-color:var(--accent-warm);'
      sessionBtn.textContent = '▶ Start Session'
      sessionBtn.addEventListener('click', function() {
        // Parse keys to extract season index and episode number
        var parsedEps = selectedEps.map(function(key) {
          if (typeof key === 'string' && key.indexOf('_') > 0) {
            var parts = key.split('_')
            return { seasonIdx: parseInt(parts[0].substring(1), 10), epNum: parseInt(parts[1], 10), key: key }
          }
          return { seasonIdx: null, epNum: parseInt(key, 10) || key, key: key }
        })
        
        var sorted = parsedEps.map(function(p) { return p.epNum }).sort(function(a,b){return a-b})
        
        // Get item to analyze seasons/arcs
        var lib = loadData(KEYS.library, [])
        var item = lib.find(function(i) { return i.id === itemId })
        
        // Format episode label with smart detection
        var epLabel = ''
        if (item) {
          var hasSeasonsData = item.seasons && item.seasons.length > 0
          var hasArcsData = item.arcs && item.arcs.length > 0
          var isReading = item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel'
          var unitLabel = isReading ? 'Ch.' : 'Ep.'
          var unitLabelPlural = isReading ? 'Chs' : 'Eps'
          
          if (hasSeasonsData) {
            // Analyze which seasons are selected
            var seasonStats = []
            item.seasons.forEach(function(season, sIdx) {
              var seasonKeys = (season.episodes || []).map(function(e) { return makeEpKey(sIdx, e.number) })
              var selectedInSeason = parsedEps.filter(function(p) { return p.seasonIdx === sIdx })
              if (selectedInSeason.length > 0) {
                seasonStats.push({
                  name: season.name || ('Season ' + (sIdx + 1)),
                  episodes: selectedInSeason.map(function(p) { return p.epNum }).sort(function(a,b){return a-b})
                })
              }
            })
            
            if (seasonStats.length === 1) {
              var s = seasonStats[0]
              // Shorten season name for display (e.g., "Season 1" instead of full name)
              var shortName = s.name
              if (s.name.length > 15) {
                // Try to extract just "Season X" or "S1" pattern
                var match = s.name.match(/Season\s+(\d+)/i)
                if (match) {
                  shortName = 'S' + match[1]
                } else {
                  shortName = s.name.substring(0, 12) + '...'
                }
              }
              
              if (s.episodes.length === 1) {
                epLabel = shortName + ' · ' + unitLabel + ' ' + s.episodes[0]
              } else if (s.episodes.length <= 4) {
                epLabel = shortName + ' · ' + unitLabelPlural + ' ' + s.episodes.join(', ')
              } else {
                // Check if consecutive
                var isConsecutive = true
                for (var i = 1; i < s.episodes.length; i++) {
                  if (s.episodes[i] !== s.episodes[i-1] + 1) {
                    isConsecutive = false
                    break
                  }
                }
                if (isConsecutive) {
                  epLabel = shortName + ' · ' + unitLabelPlural + ' ' + s.episodes[0] + '-' + s.episodes[s.episodes.length - 1]
                } else {
                  epLabel = shortName + ' · ' + s.episodes.length + ' ' + unitLabelPlural.toLowerCase()
                }
              }
            } else if (seasonStats.length > 1) {
              // Multiple seasons - show first and last episode with season numbers
              var totalEps = seasonStats.reduce(function(sum, s) { return sum + s.episodes.length }, 0)
              var firstSeason = seasonStats[0]
              var lastSeason = seasonStats[seasonStats.length - 1]
              var firstSeasonNum = firstSeason.name.match(/Season\s+(\d+)/i)
              var lastSeasonNum = lastSeason.name.match(/Season\s+(\d+)/i)
              var s1 = String(firstSeasonNum ? firstSeasonNum[1] : '1').padStart(2, '0')
              var s2 = String(lastSeasonNum ? lastSeasonNum[1] : seasonStats.length).padStart(2, '0')
              var e1 = String(firstSeason.episodes[0]).padStart(2, '0')
              var e2 = String(lastSeason.episodes[lastSeason.episodes.length - 1]).padStart(2, '0')
              var count = String(totalEps).padStart(2, '0')
              epLabel = 'S' + s1 + 'E' + e1 + '-S' + s2 + 'E' + e2 + ' (' + count + ' ' + unitLabelPlural.toLowerCase() + ')'
            }
          } else if (hasArcsData) {
            // Analyze which arcs are selected
            var arcStats = []
            item.arcs.forEach(function(arc) {
              var arcChapters = []
              for (var n = arc.chapterStart; n <= arc.chapterEnd; n++) arcChapters.push(n)
              var selectedInArc = arcChapters.filter(function(n) { return sorted.indexOf(n) >= 0 })
              if (selectedInArc.length > 0) {
                arcStats.push({
                  name: arc.name || 'Arc',
                  chapters: selectedInArc
                })
              }
            })
            
            if (arcStats.length === 1) {
              var a = arcStats[0]
              // Shorten arc name for display
              var shortName = a.name
              if (a.name.length > 15) {
                // Try to extract just "Arc X" pattern
                var match = a.name.match(/Arc\s+(\d+)/i)
                if (match) {
                  shortName = 'Arc ' + match[1]
                } else {
                  shortName = a.name.substring(0, 12) + '...'
                }
              }
              
              if (a.chapters.length === 1) {
                epLabel = shortName + ' · ' + unitLabel + ' ' + a.chapters[0]
              } else if (a.chapters.length <= 4) {
                epLabel = shortName + ' · ' + unitLabelPlural + ' ' + a.chapters.join(', ')
              } else {
                // Check if consecutive
                var isConsecutive = true
                for (var i = 1; i < a.chapters.length; i++) {
                  if (a.chapters[i] !== a.chapters[i-1] + 1) {
                    isConsecutive = false
                    break
                  }
                }
                if (isConsecutive) {
                  epLabel = shortName + ' · ' + unitLabelPlural + ' ' + a.chapters[0] + '-' + a.chapters[a.chapters.length - 1]
                } else {
                  epLabel = shortName + ' · ' + a.chapters.length + ' ' + unitLabelPlural.toLowerCase()
                }
              }
            } else if (arcStats.length > 1) {
              // Multiple arcs - show range across all
              epLabel = unitLabelPlural + ' ' + sorted[0] + '-' + sorted[sorted.length - 1] + ' (' + arcStats.length + ' arcs)'
            }
          }
        }
        
        // Fallback if no label was generated
        if (!epLabel) {
          var unitLabel = 'Ep.'
          var unitLabelPlural = 'Eps'
          if (sorted.length === 1) {
            epLabel = unitLabel + ' ' + sorted[0]
          } else if (sorted.length <= 3) {
            epLabel = unitLabelPlural + ' ' + sorted.join(', ')
          } else {
            epLabel = unitLabelPlural + ' ' + sorted[0] + '-' + sorted[sorted.length - 1]
          }
        }
        
        // Find the startTimer function from parent scope
        if (typeof startTimer === 'function') {
          startTimer(epLabel)
        }
        bar.innerHTML = '<div style="font:600 13px var(--font-mono);color:var(--success);flex:1;text-align:center;">✓ SESSION STARTED</div>'
        setTimeout(function() { bar.classList.remove('visible'); setTimeout(function() { bar.remove() }, 350) }, 1500)
        if (selectBtn) { selectBtn.textContent = 'SELECT'; selectBtn.className = 'btn-ghost' }
        if (selectCountBadge) selectCountBadge.style.display = 'none'
        document.querySelectorAll('.ep-tile.tile-selected').forEach(function(t) { t.classList.remove('tile-selected') })
      })
      bar.appendChild(sessionBtn)
    }

    var clearBtn = document.createElement('button')
    clearBtn.className = 'btn-ghost'
    clearBtn.style.cssText = 'font-size:11px;padding:4px 10px;'
    clearBtn.textContent = '✕ Cancel'
    clearBtn.addEventListener('click', function() {
      bar.classList.remove('visible')
      setTimeout(function() { bar.remove() }, 350)
      if (selectBtn) { selectBtn.textContent = 'SELECT'; selectBtn.className = 'btn-ghost' }
      if (selectCountBadge) selectCountBadge.style.display = 'none'
      document.querySelectorAll('.ep-tile.tile-selected').forEach(function(t) { t.classList.remove('tile-selected') })
    })
    bar.appendChild(clearBtn)
  }
  /* =================================================================
     PART 5: TASKS — renderTasks()
     System process queue. Active jobs. Each task is a PID.
  ================================================================= */
  function renderTasks() {
    var main  = document.getElementById('app-main')
    var tasks = loadData(KEYS.tasks, [])

    // Module-level timer state for tasks section
    var taskTimerInterval = null
    var taskTimerStart    = null
    var taskTimerItemId   = null

    function stopTaskTimer() {
      if (!taskTimerInterval) return
      clearInterval(taskTimerInterval)
      taskTimerInterval = null
      var elapsed = (Date.now() - taskTimerStart) / 60000
      taskTimerStart  = null
      var tid = taskTimerItemId
      taskTimerItemId = null
      var ts = loadData(KEYS.tasks, [])
      var t  = ts.find(function(x) { return x.id === tid })
      if (t) { t.timerMinutes = (t.timerMinutes || 0) + elapsed; saveData(KEYS.tasks, ts) }
      addTimerMinutes(elapsed)
      logEvent('Timed ' + Math.round(elapsed) + ' min on task: ' + (t ? t.name : 'unknown'))
      // Update the task card's time display live
      var dispEl = document.getElementById('task-timer-' + tid)
      if (dispEl && t && t.timerMinutes >= 1) {
        dispEl.textContent = '\u23f1 ' + fmtMins(t.timerMinutes)
        dispEl.style.color = 'var(--accent-cool)'
      } else if (dispEl) {
        dispEl.textContent = ''
      }
    }

    function startTaskTimer(taskId) {
      if (taskTimerInterval) stopTaskTimer()
      taskTimerStart  = Date.now()
      taskTimerItemId = taskId
      var dispEl = document.getElementById('task-timer-' + taskId)
      taskTimerInterval = setInterval(function() {
        var el = document.getElementById('task-timer-' + taskId)
        if (!el) { clearInterval(taskTimerInterval); taskTimerInterval = null; return }
        var s = Math.floor((Date.now() - taskTimerStart) / 1000)
        var h = Math.floor(s / 3600)
        var m = Math.floor((s % 3600) / 60)
        var sec = s % 60
        el.textContent = '\u25b6 ' + (h > 0 ? String(h).padStart(2,'0') + ':' : '') +
          String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0')
      }, 1000)
    }

    // Header
    var today     = getTodayName()
    var activeCnt = tasks.filter(function(t) { return !t.completed }).length
    var _totalTaskTime = tasks.reduce(function(s,t){return s+(t.timerMinutes||0)},0)
    var headerRow = document.createElement('div')
    headerRow.className = 'tasks-header-row'
    headerRow.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">PROCESS QUEUE</div>' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span class="tasks-active-badge">[' + activeCnt + ' ACTIVE]</span>' +
        (_totalTaskTime >= 1 ? '<span style="font:500 10px var(--font-mono);color:var(--text-3);letter-spacing:0.08em;">⏱ ' + fmtMins(_totalTaskTime) + ' total</span>' : '') +
      '</div>'
    main.appendChild(headerRow)

    // Separator
    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-4);'
    main.appendChild(sep)

    // Add bar
    var addBar = document.createElement('div')
    addBar.className = 'tasks-add-bar'
    var nameIn  = document.createElement('input')
    nameIn.className   = 'tasks-name-input'
    nameIn.placeholder = 'New process name...'
    nameIn.type        = 'text'
    nameIn.autocomplete = 'off'
    var durIn = document.createElement('input')
    durIn.className   = 'tasks-dur-input'
    durIn.placeholder = 'e.g. ' + (getAppSettings().tasksDefaultDurationMin || 45)
    durIn.type        = 'number'
    durIn.min         = '1'
    durIn.title       = 'Duration in minutes'
    durIn.value       = String(getAppSettings().tasksDefaultDurationMin || 45)
    // Wrap the dur input to add MIN suffix
    var durWrap = document.createElement('div')
    durWrap.style.cssText = 'position:relative;display:inline-flex;align-items:center;'
    var minLabel = document.createElement('span')
    minLabel.textContent = 'MIN'
    minLabel.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);font:700 10px var(--font-mono);color:var(--text-3);pointer-events:none;letter-spacing:0.1em;'
    var daySelect = document.createElement('select')
    daySelect.className = 'tasks-day-select'
    var DAYS_OPT = ['Any day','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']
    DAYS_OPT.forEach(function(d) {
      var opt = document.createElement('option')
      opt.value = d === 'Any day' ? '' : d
      opt.textContent = d
      daySelect.appendChild(opt)
    })
    var prioritySelect = document.createElement('select')
    prioritySelect.className = 'tasks-day-select'
    prioritySelect.title = 'Priority level'
    ;[['','NORM'],['high','HIGH'],['critical','CRIT']].forEach(function(p) {
      var opt = document.createElement('option')
      opt.value = p[0]; opt.textContent = p[1]; prioritySelect.appendChild(opt)
    })
    var spawnBtn = document.createElement('button')
    spawnBtn.className   = 'btn-primary btn-spawn'
    spawnBtn.textContent = '+ SPAWN'
    durWrap.appendChild(durIn)
    durWrap.appendChild(minLabel)
    addBar.appendChild(nameIn)
    addBar.appendChild(durWrap)
    addBar.appendChild(prioritySelect)
    addBar.appendChild(daySelect)
    addBar.appendChild(spawnBtn)
    main.appendChild(addBar)

    function spawnTask() {
      var name = nameIn.value.trim()
      if (!name) { nameIn.classList.add('flash-error'); setTimeout(function() { nameIn.classList.remove('flash-error') }, 450); return }
      var dur = parseInt(durIn.value, 10) || null
      var day = daySelect.value || null
      var pri = prioritySelect.value || ''
      var newTask = {
        id: generateId(name), name: name, duration: dur,
        priority: pri,
        scheduledDay: day, completed: false, completedDate: null,
        timerMinutes: 0, addedDate: new Date().toISOString().split('T')[0]
      }
      var ts = loadData(KEYS.tasks, [])
      ts.unshift(newTask)
      saveData(KEYS.tasks, ts)
      logEvent('Spawned process: ' + name)
      nameIn.value = ''; durIn.value = String(getAppSettings().tasksDefaultDurationMin || 45); daySelect.value = ''; prioritySelect.value = ''
      tasks = loadData(KEYS.tasks, [])
      refreshActiveList()
    }
    spawnBtn.addEventListener('click', spawnTask)
    nameIn.addEventListener('keydown', function(e) { if (e.key === 'Enter') spawnTask() })

    // Active list container
    var activeWrap = document.createElement('div')
    activeWrap.id = 'tasks-active-wrap'
    main.appendChild(activeWrap)

    // Completed section
    var completedWrap = document.createElement('div')
    completedWrap.id = 'tasks-completed-wrap'
    main.appendChild(completedWrap)

    function refreshActiveList() {
      tasks = loadData(KEYS.tasks, [])
      activeCnt = tasks.filter(function(t) { return !t.completed }).length
      var badge = main.querySelector('.tasks-active-badge')
      if (badge) badge.textContent = '[' + activeCnt + ' ACTIVE]'
      renderActiveList()
      renderCompletedSection()
    }

    function renderActiveList() {
      var wrap   = document.getElementById('tasks-active-wrap')
      wrap.innerHTML = ''
      var _priOrder = { critical: 0, high: 1, '': 2 }
      var active = tasks.filter(function(t) { return !t.completed })
        .sort(function(a,b) {
          var pa = _priOrder[a.priority||''] ?? 2
          var pb = _priOrder[b.priority||''] ?? 2
          if (pa !== pb) return pa - pb
          var aToday = (a.scheduledDay === today) ? 0 : 1
          var bToday = (b.scheduledDay === today) ? 0 : 1
          if (aToday !== bToday) return aToday - bToday
          return new Date(b.addedDate) - new Date(a.addedDate)
        })
      if (active.length === 0) {
        wrap.innerHTML =
          '<div class="tasks-empty">' +
            '<div class="tasks-empty-title">NO ACTIVE PROCESSES</div>' +
            '<div class="tasks-idle-line">SYSTEM IDLE&nbsp;<span class="idle-cursor"></span></div>' +
            '<span class="tasks-terminal-prompt">&gt;_</span>' +
          '</div>'
        return
      }
      var frag = document.createDocumentFragment()
      active.forEach(function(task) {
        frag.appendChild(buildTaskCard(task, false, today, startTaskTimer, stopTaskTimer, refreshActiveList))
      })
      wrap.appendChild(frag)
    }

    function renderCompletedSection() {
      var wrap = document.getElementById('tasks-completed-wrap')
      wrap.innerHTML = ''
      var done = tasks.filter(function(t) { return t.completed })
        .sort(function(a,b) { return new Date(b.completedDate||b.addedDate) - new Date(a.completedDate||a.addedDate) })
      if (done.length === 0) return
      var isExpanded = done.length <= 5
      var header = document.createElement('div')
      header.className = 'tasks-completed-header'
      var chevron = document.createElement('span')
      chevron.className = 'tasks-completed-chevron' + (isExpanded ? ' open' : '')
      chevron.textContent = '\u25be'
      header.innerHTML =
        '<span class="tasks-completed-title">COMPLETED PROCESSES</span>' +
        '<span class="tasks-completed-count">[' + done.length + ']</span>'
      header.appendChild(chevron)
      var list = document.createElement('div')
      list.className = 'tasks-completed-list' + (isExpanded ? ' open' : '')
      var frag = document.createDocumentFragment()
      done.forEach(function(task) {
        frag.appendChild(buildTaskCard(task, true, today, null, null, refreshActiveList))
      })
      list.appendChild(frag)
      header.addEventListener('click', function() {
        var open = list.classList.toggle('open')
        chevron.classList.toggle('open', open)
      })
      wrap.appendChild(header)
      wrap.appendChild(list)
    }

    renderActiveList()
    renderCompletedSection()
  }

  /* Build a single task card */
  function buildTaskCard(task, isCompleted, today, startTaskTimer, stopTaskTimer, onRefresh) {
    var card = document.createElement('div')
    card.className = 'task-card'
    if (isCompleted) { card.style.opacity = '0.45'; card.style.pointerEvents = 'none' }
    // Priority left border + badge
    var _priColor = task.priority === 'critical' ? '#ff3b6b' : task.priority === 'high' ? '#f97316' : 'rgba(100,130,255,0.3)'
    card.style.borderLeftColor = _priColor

    // Status col
    var statusCol = document.createElement('div')
    statusCol.className = 'task-status-col'
    var dotCls = isCompleted ? 'lib-status-dot completed' : 'lib-status-dot watching'
    var labelText = isCompleted ? 'TERMINATED' : 'ACTIVE'
    statusCol.innerHTML =
      '<span class="' + dotCls + '"></span>' +
      '<span class="task-status-label' + (isCompleted ? ' terminated' : '') + '">' + labelText + '</span>'
    card.appendChild(statusCol)

    // Center
    var center = document.createElement('div')
    center.className = 'task-center'
    var nameEl = document.createElement('div')
    nameEl.className = 'task-name' + (isCompleted ? ' done' : '')
    nameEl.textContent = task.name
    center.appendChild(nameEl)
    var metaEl = document.createElement('div')
    metaEl.className = 'task-meta'
    if (task.duration) {
      var durSpan = document.createElement('span')
      durSpan.className = 'task-duration'
      durSpan.textContent = '~' + task.duration + ' min'
      metaEl.appendChild(durSpan)
    }
    if (task.priority === 'critical' || task.priority === 'high') {
      var priPill = document.createElement('span')
      priPill.className = 'task-day-pill'
      priPill.textContent = task.priority === 'critical' ? '⚡ CRIT' : '↑ HIGH'
      priPill.style.cssText = 'background:' + (task.priority==='critical'?'rgba(255,59,107,0.12)':'rgba(249,115,22,0.12)') + ';border-color:' + (task.priority==='critical'?'rgba(255,59,107,0.3)':'rgba(249,115,22,0.3)') + ';color:' + (task.priority==='critical'?'#ff3b6b':'#f97316') + ';'
      metaEl.appendChild(priPill)
    }
    if (task.scheduledDay) {
      var DAYS_ORD = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
      var todayIdx  = new Date().getDay()
      var taskIdx   = DAYS_ORD.indexOf(task.scheduledDay)
      var isOverdue = taskIdx >= 0 && taskIdx < todayIdx
      var dayPill = document.createElement('span')
      dayPill.className = 'task-day-pill'
      dayPill.textContent = isOverdue ? '⚠ ' + task.scheduledDay : task.scheduledDay
      if (isOverdue) dayPill.style.cssText = 'background:rgba(255,59,107,0.1);border-color:rgba(255,59,107,0.3);color:#ff3b6b;'
      metaEl.appendChild(dayPill)
    }
    if (isCompleted && task.completedDate) {
      var doneDate = document.createElement('span')
      doneDate.className = 'task-done-date'
      var d = new Date(task.completedDate)
      doneDate.textContent = 'Done ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
      metaEl.appendChild(doneDate)
    }
    if (task.timerMinutes && task.timerMinutes >= 1) {
      var timeSpan = document.createElement('span')
      timeSpan.className = 'task-duration'
      timeSpan.style.color = 'var(--accent-cool)'
      timeSpan.textContent = '⏱ ' + fmtMins(task.timerMinutes)
      metaEl.appendChild(timeSpan)
    }
    center.appendChild(metaEl)
    // Timer display
    var timerDisp = document.createElement('div')
    timerDisp.className = 'task-timer-display'
    timerDisp.id = 'task-timer-' + task.id
    center.appendChild(timerDisp)
    card.appendChild(center)

    // Actions
    if (!isCompleted) {
      var actions = document.createElement('div')
      actions.className = 'task-actions'
      actions.style.pointerEvents = 'all'

      // Timer btn
      var timerBtn = document.createElement('button')
      timerBtn.className = 'task-btn'
      timerBtn.textContent = '\u23f1'
      timerBtn.title = 'Start timer'
      timerBtn.addEventListener('click', function() {
        var running = timerBtn.classList.contains('timer-running')
        if (running) {
          stopTaskTimer && stopTaskTimer()
          timerBtn.classList.remove('timer-running')
          timerBtn.textContent = '\u23f1'
          timerDisp.textContent = ''
        } else {
          startTaskTimer && startTaskTimer(task.id)
          timerBtn.classList.add('timer-running')
          timerBtn.textContent = '\u25a0'
        }
      })

      // Complete btn
      var completeBtn = document.createElement('button')
      completeBtn.className = 'task-btn complete-btn'
      completeBtn.textContent = '\u2713 Done'
      completeBtn.addEventListener('click', function() {
        if (timerBtn.classList.contains('timer-running')) {
          stopTaskTimer && stopTaskTimer()
        }
        var ts = loadData(KEYS.tasks, [])
        var t  = ts.find(function(x) { return x.id === task.id })
        if (t) {
          t.completed    = true
          t.completedDate = localDateStr()
          saveData(KEYS.tasks, ts)
          var mins = t.timerMinutes ? ' (' + Math.round(t.timerMinutes) + ' min)' : ''
          logEvent('Completed task: ' + t.name + mins)
          if (typeof window.__refreshDashboard === 'function') window.__refreshDashboard()
        }
        card.classList.add('completing')
        setTimeout(function() { if (onRefresh) onRefresh() }, 320)
      })

      // Delete btn (with inline confirm)
      var deleteBtn = document.createElement('button')
      deleteBtn.className = 'task-btn delete-btn'
      deleteBtn.textContent = '\u2715'
      deleteBtn.title = 'Delete'
      deleteBtn.addEventListener('click', function() {
        actions.innerHTML = ''
        var conf = document.createElement('div')
        conf.className = 'task-delete-confirm'
        conf.innerHTML = 'Delete?&nbsp;'
        var yesBtn = document.createElement('button')
        yesBtn.className = 'task-btn delete-btn'
        yesBtn.textContent = 'Yes'
        var noBtn = document.createElement('button')
        noBtn.className = 'task-btn'
        noBtn.textContent = 'No'
        yesBtn.addEventListener('click', function() {
          var ts = loadData(KEYS.tasks, [])
          saveData(KEYS.tasks, ts.filter(function(x) { return x.id !== task.id }))
          logEvent('Deleted task: ' + task.name)
          card.classList.add('removing')
          setTimeout(function() { card.remove(); if (onRefresh) onRefresh() }, 320)
        })
        noBtn.addEventListener('click', function() {
          actions.innerHTML = ''
          actions.appendChild(timerBtn)
          actions.appendChild(completeBtn)
          actions.appendChild(deleteBtn)
        })
        conf.appendChild(yesBtn)
        conf.appendChild(noBtn)
        actions.appendChild(conf)
      })

      actions.appendChild(timerBtn)
      actions.appendChild(completeBtn)
      actions.appendChild(deleteBtn)
      card.appendChild(actions)
    } else {
      // Completed — only delete
      var actions2 = document.createElement('div')
      actions2.className = 'task-actions'
      actions2.style.pointerEvents = 'all'
      var delBtn2 = document.createElement('button')
      delBtn2.className = 'task-btn delete-btn'
      delBtn2.textContent = '\u2715'
      delBtn2.addEventListener('click', function() {
        var ts = loadData(KEYS.tasks, [])
        saveData(KEYS.tasks, ts.filter(function(x) { return x.id !== task.id }))
        logEvent('Deleted task: ' + task.name)
        card.classList.add('removing')
        setTimeout(function() { card.remove(); if (onRefresh) onRefresh() }, 320)
      })
      actions2.appendChild(delBtn2)
      card.appendChild(actions2)
    }
    return card
  }

  /* =================================================================
     MANAGE SEASONS MODAL — openManageSeasonsModal(item, id, onDone)
  ================================================================= */
  function openManageSeasonsModal(item, id, onDone) {
    var overlay = document.createElement('div')
    overlay.className = 'sched-modal-overlay'
    overlay.style.zIndex = '10001'
    var box = document.createElement('div')
    box.className = 'sched-modal'
    box.style.cssText = 'width:min(560px,calc(100% - 40px));'

    var seasons = (item.seasons || []).slice()
    if (!seasons.length) {
      alert('No seasons found. Add a season first.')
      return
    }

    var rowsHtml = seasons.map(function(s, i) {
      var count = (s.episodes || []).length
      return '<div style="display:grid;grid-template-columns:1fr 120px;gap:8px;margin-bottom:8px;">' +
        '<input class="sched-modal-input" data-sidx="' + i + '" data-field="name" value="' + (s.name || ('Season ' + (i + 1))) + '" autocomplete="off"/>' +
        '<input class="sched-modal-input" data-sidx="' + i + '" data-field="count" type="number" min="0" value="' + count + '" autocomplete="off"/>' +
      '</div>'
    }).join('')

    box.innerHTML =
      '<div class="sched-modal-title">Manage Seasons</div>' +
      '<div class="sched-modal-subtitle">' + item.title + '</div>' +
      '<div style="font:500 10px var(--font-mono);color:var(--text-3);margin-bottom:8px;">Edit name and episode count for each season.</div>' +
      rowsHtml +
      '<div class="sched-modal-btns"><button class="sched-modal-cancel" id="ms-cancel">CANCEL</button><button class="sched-modal-save" id="ms-save">SAVE CHANGES</button></div>'

    overlay.appendChild(box)
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'
    requestAnimationFrame(function() { overlay.classList.add('visible') })

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 180)
      if (onDone) onDone()
    }
    box.querySelector('#ms-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })

    box.querySelector('#ms-save').addEventListener('click', function() {
      var lib = loadData(KEYS.library, [])
      var it = lib.find(function(x) { return x.id === id })
      if (!it) return
      var rows = box.querySelectorAll('[data-sidx]')
      var nextByIndex = {}
      rows.forEach(function(el) {
        var idx = parseInt(el.dataset.sidx, 10)
        if (!nextByIndex[idx]) nextByIndex[idx] = { name: '', count: 0 }
        if (el.dataset.field === 'name') nextByIndex[idx].name = (el.value || '').trim() || ('Season ' + (idx + 1))
        if (el.dataset.field === 'count') nextByIndex[idx].count = Math.max(0, parseInt(el.value, 10) || 0)
      })

      var watchedSet = new Set(it.watchedEpisodes || [])
      var newSeasons = []
      var newWatched = []
      var epNum = 1
      ;(it.seasons || []).forEach(function(s, idx) {
        var spec = nextByIndex[idx] || { name: s.name || ('Season ' + (idx + 1)), count: (s.episodes || []).length }
        var eps = []
        for (var i = 0; i < spec.count; i++) {
          var oldEp = (s.episodes || [])[i]
          var oldKey = makeEpKey(idx, oldEp ? oldEp.number : (i + 1))
          var nextEp = { number: epNum, title: oldEp && oldEp.title ? oldEp.title : '' }
          eps.push(nextEp)
          var newKey = makeEpKey(idx, epNum)
          if (watchedSet.has(oldKey)) newWatched.push(newKey)
          epNum++
        }
        newSeasons.push({ id: 's' + (idx + 1), name: spec.name, episodes: eps })
      })
      it.seasons = newSeasons
      it.totalEpisodes = epNum - 1
      it.watchedEpisodes = Array.from(new Set(newWatched))
      saveData(KEYS.library, lib)
      logEvent('Updated seasons for ' + item.title)
      closeModal()
    })
  }

      </div>

        <div class="sched-modal-label">Status of this season</div>
        <select class="sched-modal-input" id="asm-status">
          <option value="watching">Watching / Active</option>
          <option value="upcoming">Upcoming</option>
        </select>
      </div>

      <div id="asm-release-wrap" style="display:none;" class="sched-modal-field">
        <div class="sched-modal-label">Release / Air Date</div>

        <div style="font:400 10px var(--font-mono);color:var(--text-3);margin-top:4px;">Will auto-schedule to that date in Overview calendar.</div>
      </div>

        <div style="font:700 10px var(--font-mono);color:var(--accent-cool);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;">⚡ Auto-Schedule Weekly Episodes</div>

          <div>
            <div class="sched-modal-label">Airs every</div>
            <select class="sched-modal-input" id="asm-rec-day">
              <option value="">— Pick day —</option>
              ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(function(d){return '<option>'+d+'</option>'}).join('')}

          </div>
          <div>

          </div>

            <div class="sched-modal-label">First episode #</div>
            <input class="sched-modal-input" id="asm-rec-ep-start" type="number" min="1" value="${lastEpNum + 1}" placeholder="1" autocomplete="off"/>

          <input type="checkbox" id="asm-show-recurring" style="accent-color:var(--accent-cool);width:14px;height:14px;cursor:none;"/>

    // Preset buttons

      btn.addEventListener('click', function() {
        var inp = box.querySelector('#asm-name')
        if (inp) { inp.value = btn.dataset.preset; inp.focus() }
      })
    })

    // Status toggle for release date
    var statusSel = box.querySelector('#asm-status')
    var releaseWrap = box.querySelector('#asm-release-wrap')
    statusSel.addEventListener('change', function() {
      releaseWrap.style.display = statusSel.value === 'upcoming' ? 'block' : 'none'
    })

    // Recurring checkbox
    var recurChk = box.querySelector('#asm-show-recurring')
    var recurSection = box.querySelector('#asm-recurring-section')
    recurChk.addEventListener('change', function() {
      recurSection.style.display = recurChk.checked ? 'block' : 'none'
    })

    // Live preview for recurring
    function updateRecurPreview() {
      var preview = box.querySelector('#asm-rec-preview')
      var day   = box.querySelector('#asm-rec-day').value
      var start = box.querySelector('#asm-rec-start').value
      var end   = box.querySelector('#asm-rec-end').value
      var epS   = parseInt(box.querySelector('#asm-rec-ep-start').value, 10) || 1
      if (!day || !start || !end) { preview.textContent = 'Fill in all fields to preview.'; preview.style.color = 'var(--text-3)'; return }
      var dates = getWeeklyDates(day, start, end)
      if (dates.length === 0) { preview.textContent = 'No dates found. Check start/end.'; preview.style.color = 'var(--accent-warm)'; return }
      preview.innerHTML = '<span style="color:var(--accent-green)">✓ Will schedule <strong>' + dates.length + ' episodes</strong> (ep ' + epS + '–' + (epS + dates.length - 1) + ') every ' + day + ' from ' + formatDateShort(dates[0]) + ' to ' + formatDateShort(dates[dates.length-1]) + '</span>'
    }
    ;['#asm-rec-day','#asm-rec-start','#asm-rec-end','#asm-rec-ep-start'].forEach(function(sel) {
      var el = box.querySelector(sel)
      if (el) el.addEventListener('change', updateRecurPreview)
      if (el) el.addEventListener('input', updateRecurPreview)

      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 250)
    }

    box.querySelector('#asm-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    })

    box.querySelector('#asm-save').addEventListener('click', function() {
      var name = (box.querySelector('#asm-name').value || '').trim()
      if (!name) { box.querySelector('#asm-name').style.borderColor = 'var(--danger)'; box.querySelector('#asm-name').focus(); return }
      var epCount = parseInt(box.querySelector('#asm-eps').value, 10) || 0
      var newStatus = box.querySelector('#asm-status').value
      var relDate = box.querySelector('#asm-release-date').value

      var lib6 = loadData(KEYS.library, [])
      var it6  = lib6.find(function(i) { return i.id === id })
      if (!it6) return
      if (!it6.seasons) it6.seasons = []

      // Build episodes array - each season starts at episode 1
      var newEps = []
      for (var ei = 0; ei < epCount; ei++) newEps.push({ number: ei + 1, title: '' })

      var newSeason = { id: 's' + (it6.seasons.length + 1), name: name, episodes: newEps }
      if (newStatus === 'upcoming') newSeason.upcoming = true
      it6.seasons.push(newSeason)
      it6.totalEpisodes = (it6.totalEpisodes || 0) + epCount
      if (newStatus === 'upcoming') it6.status = 'upcoming'
      saveData(KEYS.library, lib6)
      logEvent('Added season "' + name + '" to ' + item.title)

      // Auto-schedule release date if upcoming
      if (newStatus === 'upcoming' && relDate) {
        var sched = loadData(KEYS.schedule, {})
        if (!sched[relDate]) sched[relDate] = []
        var alreadyIdx = sched[relDate].findIndex(function(x) { return x.id === id })
        var entry = { id: id, title: item.title + ' · ' + name, type: item.type, eps: 'Releases' }
        if (alreadyIdx >= 0) sched[relDate][alreadyIdx] = entry
        else sched[relDate].push(entry)
        saveData(KEYS.schedule, sched)
        logEvent('Scheduled release of ' + item.title + ' · ' + name + ' on ' + relDate)
      }

      // Auto-schedule recurring weekly episodes
      if (recurChk.checked) {
        var recDay   = box.querySelector('#asm-rec-day').value
        var recStart = box.querySelector('#asm-rec-start').value
        var recEnd   = box.querySelector('#asm-rec-end').value
        var recEpS   = parseInt(box.querySelector('#asm-rec-ep-start').value, 10) || 1
        if (recDay && recStart && recEnd) {
          var dates = getWeeklyDates(recDay, recStart, recEnd)
          var sched2 = loadData(KEYS.schedule, {})
          dates.forEach(function(dk, idx) {
            if (!sched2[dk]) sched2[dk] = []
            var epLabel = isReading ? 'Ch. ' + (recEpS + idx) : 'Ep. ' + (recEpS + idx)
            var alreadyI = sched2[dk].findIndex(function(x) { return x.id === id })
            var ent = { id: id, title: item.title, type: item.type, eps: epLabel }
            if (alreadyI >= 0) sched2[dk][alreadyI] = ent
            else sched2[dk].push(ent)
          })
          saveData(KEYS.schedule, sched2)
          logEvent('Auto-scheduled ' + dates.length + ' ' + unitLabel + ' of ' + item.title + ' every ' + recDay)
        }
      }

      closeModal()
      if (onDone) onDone()
    })
  }

  /* Helper: get all dates for a given weekday between start and end (inclusive) */
  function getWeeklyDates(dayName, startDateStr, endDateStr) {
    var dayMap = { Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6, Sunday:0 }
    var targetDay = dayMap[dayName]
    if (targetDay === undefined) return []
    var cur = new Date(startDateStr + 'T00:00:00')
    var end = new Date(endDateStr + 'T00:00:00')
    var results = []
    // Advance to first occurrence of target day
    while (cur.getDay() !== targetDay && cur <= end) cur.setDate(cur.getDate() + 1)
    while (cur <= end) {
      var y = cur.getFullYear()
      var m = String(cur.getMonth() + 1).padStart(2, '0')
      var day = String(cur.getDate()).padStart(2, '0')
      results.push(y + '-' + m + '-' + day)
      cur.setDate(cur.getDate() + 7)
    }
    return results
  }

      if (a.chapterEnd > lastChapter) lastChapter = a.chapterEnd
    })
    var nextArcNum = existingArcs.length + 1
    var suggestedName = 'Arc ' + nextArcNum
    var suggestedStart = lastChapter + 1

    var box = document.createElement('div')
    box.className = 'sched-modal'
    box.style.cssText = 'width:min(460px,calc(100% - 48px));'
    box.innerHTML = `
      <div class="sched-modal-title">+ Add New Arc</div>
      <div class="sched-modal-subtitle" style="margin-bottom:16px;">${item.title}</div>

      <div class="sched-modal-field">
        <div class="sched-modal-label">Arc Name</div>
        <input class="sched-modal-input" id="aa-name" type="text" value="${suggestedName}" placeholder="e.g. Arc 2, Tournament Arc" autocomplete="off"/>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="sched-modal-field">
          <div class="sched-modal-label">Start Chapter</div>
          <input class="sched-modal-input" id="aa-start" type="number" min="1" value="${suggestedStart}" placeholder="1" autocomplete="off"/>
        </div>
        <div class="sched-modal-field">
          <div class="sched-modal-label">End Chapter</div>
          <input class="sched-modal-input" id="aa-end" type="number" min="1" value="${suggestedStart + 9}" placeholder="10" autocomplete="off"/>
        </div>
      </div>

      <div class="sched-modal-btns">
        <button class="sched-modal-cancel" id="aa-cancel">CANCEL</button>
        <button class="sched-modal-save" id="aa-save">ADD ARC</button>
      </div>
    `

    overlay.appendChild(box)
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'
    requestAnimationFrame(function() { overlay.classList.add('visible') })

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 180)
    }
    box.querySelector('#aa-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })

    box.querySelector('#aa-save').addEventListener('click', function() {
      var name = box.querySelector('#aa-name').value.trim() || suggestedName
      var start = Math.max(1, parseInt(box.querySelector('#aa-start').value, 10) || 1)
      var end = Math.max(start, parseInt(box.querySelector('#aa-end').value, 10) || start)

      var lib = loadData(KEYS.library, [])
      var it = lib.find(function(x) { return x.id === id })
      if (!it) return

      if (!it.arcs) it.arcs = []
      var newArc = {
        id: 'arc-' + (it.arcs.length + 1),
        name: name,
        chapterStart: start,
        chapterEnd: end,
        chapters: []
      }
      it.arcs.push(newArc)
      saveData(KEYS.library, lib)
      logEvent('Added arc "' + name + '" to ' + item.title)
      closeModal()
      if (onDone) onDone(it)
    })
  }

  /* Format minutes into "Xh Ym" or "Ym" string */
  function fmtMins(mins) {
    if (!mins || mins < 1) return null
    var h = Math.floor(mins / 60)
    var m = Math.round(mins % 60)
    if (h > 0 && m > 0) return h + 'h ' + m + 'm'
    if (h > 0) return h + 'h'
    return m + 'm'
  }

  function formatDateShort(dateStr) {
    if (!dateStr) return ''
    var d = new Date(dateStr + 'T00:00:00')
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' })
  }

  /* Opens a focused recurring-schedule modal pre-locked to a specific item */
  function openRecurringSchedForItem(id, item, onDone) {
    var isReading = (item.type==='manga'||item.type==='manhwa'||item.type==='novel')
    var unitLabel = isReading ? 'chapters' : 'episodes'
    var unitShort = isReading ? 'Ch.' : 'Ep.'

    // Compute next unwatched episode
    var watched = item.watchedEpisodes || []
    var maxWatched = 0
    watched.forEach(function(x) {
      var n = parseInt(String(x).match(/(\d+)$/)?.[1] || x, 10)
      if (!isNaN(n) && n > maxWatched) maxWatched = n
    })
    var nextEp = maxWatched + 1

    var overlay = document.createElement('div')
    overlay.className = 'sched-modal-overlay'
    overlay.style.zIndex = '10001'

    var isReading = item.arcs && item.arcs.length > 0
    var contentType = isReading ? 'Chapters' : 'Episodes'
    
    var box = document.createElement('div')
    box.className = 'sched-modal'
    box.style.cssText = 'width:min(460px,calc(100% - 48px));'
    box.innerHTML = `
      <div class="sched-modal-title">⚡ Auto-Schedule Weekly ${contentType}</div>
      <div class="sched-modal-subtitle" style="margin-bottom:16px;">${item.title}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="sched-modal-field" style="margin-bottom:0;">
          <div class="sched-modal-label">${isReading ? 'Releases' : 'Airs'} every</div>
          <select class="sched-modal-input" id="rfi-day">
            <option value="">— Pick day —</option>
            ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(function(d){return '<option>'+d+'</option>'}).join('')}
          </select>
        </div>
        <div class="sched-modal-field" style="margin-bottom:0;">
          <div class="sched-modal-label">Starting from</div>
          <input class="sched-modal-input" id="rfi-start" type="date" autocomplete="off"/>
        </div>
        <div class="sched-modal-field" style="margin-bottom:0;">
          <div class="sched-modal-label">First episode # to schedule</div>
          <input class="sched-modal-input" id="rfi-ep-start" type="number" min="1" value="${nextEp}" placeholder="1" autocomplete="off"/>
        </div>
        <div class="sched-modal-field" style="margin-bottom:0;">
          <div class="sched-modal-label">Until date</div>
          <input class="sched-modal-input" id="rfi-end" type="date" autocomplete="off"/>
        </div>
      </div>
      <div style="font:400 10px var(--font-mono);color:var(--text-3);margin:12px 0 4px;" id="rfi-preview">Fill in the fields above to preview.</div>
      <div class="sched-modal-btns" style="margin-top:14px;">
        <button class="sched-modal-cancel" id="rfi-cancel">ABORT</button>
        <button class="sched-modal-save" id="rfi-save">SCHEDULE ALL →</button>
      </div>`

    overlay.appendChild(box)
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'
    requestAnimationFrame(function() { requestAnimationFrame(function() { overlay.classList.add('visible') }) })
    setTimeout(function() { var d = box.querySelector('#rfi-day'); if (d) d.focus() }, 260)

    function updatePreview() {
      var preview = box.querySelector('#rfi-preview')
      var day   = box.querySelector('#rfi-day').value
      var start = box.querySelector('#rfi-start').value
      var end   = box.querySelector('#rfi-end').value
      var epS   = parseInt(box.querySelector('#rfi-ep-start').value, 10) || 1
      if (!day || !start || !end) { preview.textContent = 'Fill in all fields to preview.'; preview.style.color = 'var(--text-3)'; return }
      var dates = getWeeklyDates(day, start, end)
      if (dates.length === 0) { preview.textContent = 'No dates in range. Check start/end.'; preview.style.color = 'var(--accent-warm)'; return }
      preview.innerHTML = '<span style="color:var(--accent-green)">✓ Will schedule <strong>' + dates.length + ' ' + unitLabel + '</strong> (' + unitShort + ' ' + epS + '–' + (epS + dates.length - 1) + ') every ' + day + ' · ' + formatDateShort(dates[0]) + ' → ' + formatDateShort(dates[dates.length-1]) + '</span>'
    }
    ;['#rfi-day','#rfi-start','#rfi-end','#rfi-ep-start'].forEach(function(s) {
      var el = box.querySelector(s)
      if (el) { el.addEventListener('change', updatePreview); el.addEventListener('input', updatePreview) }
    })

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 250)
    }

    box.querySelector('#rfi-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    })

    box.querySelector('#rfi-save').addEventListener('click', function() {
      var day   = box.querySelector('#rfi-day').value
      var start = box.querySelector('#rfi-start').value
      var end   = box.querySelector('#rfi-end').value
      var epS   = parseInt(box.querySelector('#rfi-ep-start').value, 10) || 1
      if (!day || !start || !end) { alert('Please fill in day, start date, and end date.'); return }
      var dates = getWeeklyDates(day, start, end)
      if (dates.length === 0) { alert('No matching dates. Check the date range.'); return }
      var sched2 = loadData(KEYS.schedule, {})
      dates.forEach(function(dk, idx) {
        if (!sched2[dk]) sched2[dk] = []
        var epLabel = unitShort + ' ' + (epS + idx)
        var alreadyI = sched2[dk].findIndex(function(x) { return x.id === id })
        var ent = { id: id, title: item.title, type: item.type, eps: epLabel }
        if (alreadyI >= 0) sched2[dk][alreadyI] = ent
        else sched2[dk].push(ent)
      })
      saveData(KEYS.schedule, sched2)
      logEvent('Recurring: scheduled ' + dates.length + ' ' + unitLabel + ' of ' + item.title + ' every ' + day)
      closeModal()
      if (onDone) onDone()
    })
  }

  /* =================================================================
     SCHEDULE MODAL FOR SELECTED EPISODES
     Opens a simplified modal to schedule specific episodes of a specific item
  ================================================================= */
  function openSchedModalForSelectedEps(itemId, itemTitle, epLabel, onSave) {
    var overlay = document.createElement('div')
    overlay.className = 'sched-modal-overlay'

    var box = document.createElement('div')
    box.className = 'sched-modal'
    
    var modalHtml = `
      <div class="sched-modal-title" style="margin-bottom:4px;">Schedule Episodes</div>
      <div class="sched-modal-subtitle" style="margin-bottom:16px;">${itemTitle} · ${epLabel}</div>
      <div class="sched-modal-field">
        <div class="sched-modal-label">Date</div>
        <select class="sched-modal-input" id="sched-sel-eps-date"></select>
      </div>
      <div class="sched-modal-btns">
        <button class="sched-modal-cancel" id="sched-sel-eps-cancel">ABORT</button>
        <button class="sched-modal-save" id="sched-sel-eps-save">SCHEDULE →</button>
      </div>`

    box.innerHTML = modalHtml

    // Populate date select
    var dSel = box.querySelector('#sched-sel-eps-date')
    var lookaheadDays = Math.max(7, parseInt(getAppSettings().overviewDateLookaheadDays, 10) || 14)
    for (var i = 0; i < lookaheadDays; i++) {
      var d = new Date()
      d.setDate(d.getDate() + i)
      var dk = localDateStr(d)
      var opt = document.createElement('option')
      opt.value = dk
      var lbl = (i === 0 ? 'Today, ' : '') + d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' })
      if (i === 7) lbl = '── Next week ── ' + d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' })
      opt.textContent = lbl
      dSel.appendChild(opt)
    }
    var sepOpt = document.createElement('option')
    sepOpt.disabled = true
    sepOpt.textContent = '──────────────────'
    dSel.appendChild(sepOpt)
    var customOpt = document.createElement('option')
    customOpt.value = '__custom__'
    customOpt.textContent = 'Pick a custom date...'
    dSel.appendChild(customOpt)

    var customWrap = document.createElement('div')
    customWrap.id = 'sched-custom-date-wrap-sel'
    customWrap.style.cssText = 'display:none;margin-top:8px;'
    var todayStr = localDateStr()
    customWrap.innerHTML = '<input type="date" id="sched-custom-date-inp-sel" min="' + todayStr + '" style="width:100%;background:var(--surface-2);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text-1);font:14px var(--font-mono);padding:8px 10px;outline:none;cursor:default;" />'
    dSel.parentNode.appendChild(customWrap)

    dSel.addEventListener('change', function() {
      if (dSel.value === '__custom__') {
        customWrap.style.display = 'block'
        setTimeout(function() { customWrap.querySelector('#sched-custom-date-inp-sel').focus() }, 50)
      } else {
        customWrap.style.display = 'none'
      }
    })

    overlay.appendChild(box)
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { overlay.classList.add('visible') })
    })
    
    setTimeout(function() { dSel.focus() }, 260)

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 250)
    }

    box.querySelector('#sched-sel-eps-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    })

    box.querySelector('#sched-sel-eps-save').addEventListener('click', function() {
      var finalDateKey
      var dSelVal = dSel.value
      if (dSelVal === '__custom__') {
        var customInp = box.querySelector('#sched-custom-date-inp-sel')
        finalDateKey = customInp ? customInp.value : ''
        if (!finalDateKey) { alert('Please pick a date.'); return }
      } else {
        finalDateKey = dSelVal
      }

      var library = loadData(KEYS.library, [])
      var item = library.find(function(i) { return i.id === itemId })
      if (!item) return

      var sched = loadData(KEYS.schedule, {})
      if (!sched[finalDateKey]) sched[finalDateKey] = []
      var already = sched[finalDateKey].findIndex(function(x) { return x.id === itemId })
      
      if (already >= 0) sched[finalDateKey][already].eps = epLabel
      else sched[finalDateKey].push({ id: item.id, title: item.title, type: item.type, eps: epLabel })
      
      saveData(KEYS.schedule, sched)
      logEvent('Scheduled ' + itemTitle + ' (' + epLabel + ') on ' + finalDateKey)
      closeModal()
      if (onSave) onSave(finalDateKey)
    })
  }

  /* =================================================================
     WEEKLY SCHEDULE FOR SELECTED EPISODES
     Spreads selected episodes one-per-week starting from a chosen day
  ================================================================= */
  function openWeeklyForSelectedEps(itemId, itemTitle, sortedEps, onDone) {
    var library = loadData(KEYS.library, [])
    var item = library.find(function(i) { return i.id === itemId })
    var isReading = item && (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel')
    var unitShort = isReading ? 'Ch.' : 'Ep.'

    var overlay = document.createElement('div')
    overlay.className = 'sched-modal-overlay'
    overlay.style.zIndex = '10001'

    var box = document.createElement('div')
    box.className = 'sched-modal'
    box.style.cssText = 'width:min(460px,calc(100% - 48px));'
    box.innerHTML = `
      <div class="sched-modal-title">⚡ Weekly Schedule</div>
      <div class="sched-modal-subtitle" style="margin-bottom:16px;">${itemTitle} · ${sortedEps.length} episodes selected (${unitShort} ${sortedEps[0]}–${sortedEps[sortedEps.length-1]})</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="sched-modal-field" style="margin-bottom:0;">
          <div class="sched-modal-label">Airs every</div>
          <select class="sched-modal-input" id="wse-day">
            <option value="">— Pick day —</option>
            ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(function(d){return '<option>'+d+'</option>'}).join('')}
          </select>
        </div>
        <div class="sched-modal-field" style="margin-bottom:0;">
          <div class="sched-modal-label">Starting from</div>
          <input class="sched-modal-input" id="wse-start" type="date" autocomplete="off"/>
        </div>
      </div>
      <div style="font:400 10px var(--font-mono);color:var(--text-3);margin:12px 0 4px;" id="wse-preview">Fill in the fields above to preview.</div>
      <div class="sched-modal-btns" style="margin-top:14px;">
        <button class="sched-modal-cancel" id="wse-cancel">ABORT</button>
        <button class="sched-modal-save" id="wse-save">SCHEDULE ALL →</button>
      </div>`

    overlay.appendChild(box)
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'
    requestAnimationFrame(function() { requestAnimationFrame(function() { overlay.classList.add('visible') }) })
    setTimeout(function() { var d = box.querySelector('#wse-day'); if (d) d.focus() }, 260)

    function getWeeklyDatesFromStart(day, startDate, count) {
      var dates = []
      var d = new Date(startDate + 'T00:00:00')
      var targetDay = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(day)
      // Advance to first occurrence of target day on or after start
      while (d.getDay() !== targetDay) d.setDate(d.getDate() + 1)
      for (var i = 0; i < count; i++) {
        // Use local date parts to avoid UTC timezone shift
        var y = d.getFullYear()
        var m = String(d.getMonth() + 1).padStart(2, '0')
        var day2 = String(d.getDate()).padStart(2, '0')
        dates.push(y + '-' + m + '-' + day2)
        d.setDate(d.getDate() + 7)
      }
      return dates
    }

    function updatePreview() {
      var preview = box.querySelector('#wse-preview')
      var day   = box.querySelector('#wse-day').value
      var start = box.querySelector('#wse-start').value
      if (!day || !start) { preview.textContent = 'Fill in all fields to preview.'; preview.style.color = 'var(--text-3)'; return }
      var dates = getWeeklyDatesFromStart(day, start, sortedEps.length)
      if (dates.length === 0) { preview.textContent = 'No dates generated.'; preview.style.color = 'var(--accent-warm)'; return }
      preview.innerHTML = '<span style="color:var(--accent-green)">✓ Will schedule <strong>' + sortedEps.length + ' episodes</strong> every ' + day + ' · ' + formatDateShort(dates[0]) + ' → ' + formatDateShort(dates[dates.length-1]) + '</span>'
    }

    ;['#wse-day','#wse-start'].forEach(function(s) {
      var el = box.querySelector(s)
      if (el) { el.addEventListener('change', updatePreview); el.addEventListener('input', updatePreview) }
    })

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 250)
    }

    box.querySelector('#wse-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    })

    box.querySelector('#wse-save').addEventListener('click', function() {
      var day   = box.querySelector('#wse-day').value
      var start = box.querySelector('#wse-start').value
      if (!day || !start) { alert('Please fill in day and start date.'); return }
      var dates = getWeeklyDatesFromStart(day, start, sortedEps.length)
      if (dates.length === 0) { alert('No dates generated.'); return }

      var sched = loadData(KEYS.schedule, {})
      dates.forEach(function(dk, idx) {
        if (!sched[dk]) sched[dk] = []
        var epLabel = unitShort + ' ' + sortedEps[idx]
        var alreadyI = sched[dk].findIndex(function(x) { return x.id === itemId })
        var ent = { id: itemId, title: itemTitle, type: item ? item.type : '', eps: epLabel }
        if (alreadyI >= 0) sched[dk][alreadyI] = ent
        else sched[dk].push(ent)
      })
      saveData(KEYS.schedule, sched)
      logEvent('Weekly: scheduled ' + sortedEps.length + ' episodes of ' + itemTitle + ' every ' + day + ' from ' + start)
      closeModal()
      if (onDone) onDone()
    })
  }
