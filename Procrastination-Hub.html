    .detail-bulk-select-btn {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-2);
      border-radius: var(--radius-pill);
      font: 600 10px var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 10px;
      cursor: none;
      transition: all 140ms var(--ease-snap);
    }
    .detail-bulk-select-btn:hover {
      border-color: var(--accent-cool);
      color: var(--accent-cool);
    }
    .detail-season-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-3);
      font: 500 12px var(--font-mono);
      padding: var(--space-2) var(--space-3);
      cursor: none;
      transition: all 150ms var(--ease-snap);
      margin-bottom: -1px;
      letter-spacing: 0.04em;
    }
    .detail-season-tab:hover { color: var(--text-2); background: var(--surface); }
    .detail-season-tab.active {
      color: var(--accent-cool);
      border-bottom-color: var(--accent-cool);
      text-shadow: 0 0 12px rgba(0,229,255,0.3);

    /* Arc accordion */
    .detail-arc-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
      overflow: hidden;
    }
    .detail-arc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      cursor: none;
      background: var(--surface);
      transition: background 150ms var(--ease-snap);
    }
    .detail-arc-header:hover { background: var(--surface-2); }
    .detail-arc-name {
      font: 600 var(--text-sm) var(--font-mono);
      color: var(--text-1);
    }
    .detail-arc-range {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }

    /* Arc navigation dropdown */
    .arc-nav-select {
      flex: 1;
      min-width: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: 500 var(--text-sm) var(--font-mono);
      padding: 6px 10px;
      width: 100%;
      cursor: pointer;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 150ms var(--ease-snap);
    }
    .arc-nav-select:focus { border-color: var(--border-bright); }
    .arc-nav-select option { background: #0d0d1a; }

    /* Chapter tiles — compact when no ratings */
    .ep-tile.chapter-tile { height: 66px; }

    /* Film strip wrapper */
    .detail-filmstrip {
      position: relative;
      padding: var(--space-4) 0;
      margin: var(--space-4) 0;
    }
    .detail-filmstrip::before,
    .detail-filmstrip::after {
      content: '';
      display: block;
      height: 18px;
      background-image: radial-gradient(circle, rgba(0,229,255,0.15) 4px, transparent 4px);
      background-size: 26px 18px;
      background-repeat: repeat-x;
      border: 1px solid var(--border);
      border-radius: 3px;
      opacity: 0.7;
    }
    .detail-filmstrip::before { margin-bottom: var(--space-3); }
    .detail-filmstrip::after  { margin-top: var(--space-3); }

    /* Episode grid */
    .detail-ep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      overflow: visible;
    }

    /* Episode tile */
    .ep-tile {
      width: 100%;
      height: 80px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: none;
      transition: border-color 180ms var(--ease-snap), background 180ms var(--ease-snap), transform 180ms var(--ease-spring), box-shadow 180ms var(--ease-snap);
      -webkit-user-select: none;
      user-select: none;
    }
    .ep-tile:hover {
      border-color: var(--border-bright);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 12px rgba(0,229,255,0.08);
      z-index: 2;
    }
    .ep-tile.watched {
      background: linear-gradient(135deg, rgba(0,229,255,0.14) 0%, rgba(0,229,255,0.06) 100%);
      border-color: rgba(0,212,255,0.42);
      box-shadow: inset 0 1px 0 rgba(0,229,255,0.18);
    }
    .ep-tile.watched:hover {
      background: linear-gradient(135deg, rgba(0,229,255,0.22) 0%, rgba(0,229,255,0.10) 100%);
      border-color: rgba(0,212,255,0.65);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 20px rgba(0,229,255,0.18), inset 0 1px 0 rgba(0,229,255,0.25);
    }
    .ep-tile.watched .ep-num { color: var(--accent-cool); }
    .ep-num {
      font: 700 16px var(--font-mono);
      color: var(--text-3);
      pointer-events: none;
      transition: transform 180ms var(--ease-spring), opacity 180ms;
    }
    .ep-tile:hover .ep-num { transform: scale(0.85); opacity: 0.6; }
    .ep-check {
      position: absolute;
      bottom: 5px;
      right: 6px;
      font-size: 14px;
      color: var(--accent-cool);
      opacity: 0;
      transition: opacity 150ms;
      pointer-events: none;
      display: none;
    }
    .ep-tile.watched .ep-check { opacity: 1; }
    /* Watched diagonal slash decoration */
    .ep-tile.watched:not([data-title])::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(0,229,255,0.06) 100%);
      pointer-events: none;
    }
    /* Timer icon – appears on hover */
    .ep-timer-btn {
      position: absolute;
      top: 4px;
      left: 5px;
      font-size: 15px;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
      color: var(--text-3);
      cursor: none;
      padding: 0;
      opacity: 0;
      transition: opacity 100ms;
      line-height: 1;
      z-index: 3;
    }
    .ep-tile:hover .ep-timer-btn { opacity: 1; }
    .ep-tile:hover .ep-timer-btn:hover { color: var(--accent-cool); }
    
    /* Custom tooltip */
    /* Flash animation on toggle */
    .ep-tile.tile-flash {
      animation: epFlash 400ms var(--ease-out) both;
    }
    @keyframes epFlash {
      0%   { background: rgba(0,212,255,0.8); }
      100% { background: var(--accent-cool-dim); }
    }
    /* Select mode ring */
    .ep-tile.select-mode { cursor: none; }
    .ep-tile.tile-selected {
      border-color: var(--accent-warm);
      box-shadow: inset 0 0 0 2px var(--accent-warm);
    }

    /* Season panel under episode grid */
    .detail-season-panel {
      margin-top: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .detail-season-stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 16px;
      min-width: 0;
    }

    /* Celebration burst ring */
    .season-burst-ring {
      position: fixed;
      border-radius: 50%;
      border: 2px solid var(--accent-cool);
      pointer-events: none;
      z-index: 8000;
      animation: burstRing 600ms var(--ease-out) forwards;
    }
    @keyframes burstRing {
      from { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      to   { transform: translate(-50%,-50%) scale(3); opacity: 0; }
    }
    /* Season header shine sweep */
    .season-shine {
      position: relative;
      overflow: hidden;
    }
    .season-shine::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.25), transparent);
      transform: translateX(-100%);
      animation: shineSwep 800ms var(--ease-out) forwards;
    }
    @keyframes shineSwep {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Completion banner */
    .completion-banner {
      position: fixed;
      top: 0;
      left: 220px;
      right: 0;
      background: var(--accent-cool-dim);
      border-bottom: 1px solid var(--accent-cool);
      text-align: center;
      padding: var(--space-3);
      font: 600 var(--text-md) var(--font-mono);
      color: var(--accent-cool);
      letter-spacing: 0.08em;
      z-index: 8500;
      transform: translateY(-100%);
      transition: transform 400ms var(--ease-spring);
    }
    .completion-banner.visible { transform: translateY(0); }

    /* Multi-select action bar */
    .detail-select-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8, 8, 22, 0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--border-bright);
      box-shadow: 0 -4px 40px rgba(0,229,255,0.08), 0 -1px 0 rgba(0,229,255,0.15);
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      z-index: 9996;
      transform: translateY(100%);
      transition: transform 300ms var(--ease-spring);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap;
      scrollbar-width: none;
    }
    .detail-select-bar::-webkit-scrollbar { display: none; }
    .detail-select-bar.visible { transform: translateY(0); }
    .detail-select-bar button { flex-shrink: 0; white-space: nowrap; }
    .detail-select-count {
      font: 600 var(--text-sm) var(--font-mono);
      color: var(--text-2);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* Empty episode state */
    .detail-ep-empty {
      text-align: center;
      padding: var(--space-10) var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }
    .detail-ep-empty-title {
      font: 600 var(--text-md) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.08em;
    }
    .detail-ep-empty-sub {
      font: var(--text-sm) var(--font-ui);
      color: var(--text-3);
    }
    .detail-ep-empty-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .detail-ep-set-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: var(--text-sm) var(--font-mono);
      padding: var(--space-2) var(--space-3);
      width: 96px;
      outline: none;
      text-align: center;
      transition: border-color 150ms var(--ease-snap);
    }
    .detail-ep-set-input:focus { border-color: var(--accent-cool); }

    /* Error state */
    .detail-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
      gap: var(--space-4);
      text-align: center;
    }
    .detail-error-title {
      font: 600 var(--text-xl) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.08em;
    }


    /* ── PART 5: FINAL SECTIONS STYLES ── */

    /* ── TASKS ── */
    .tasks-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }
        .tasks-active-badge {
      font: 700 10px var(--font-mono);
      color: var(--accent-cool);
      letter-spacing: 0.14em;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: var(--radius-pill);
      padding: 2px 10px;
    }
    .tasks-add-bar {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      align-items: center;
    }
    .tasks-name-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: var(--text-sm) var(--font-mono);
      padding: var(--space-2) var(--space-3);
      outline: none;
      transition: border-color 150ms var(--ease-snap);
    }
    .tasks-name-input::placeholder { color: var(--text-3); }
    .tasks-name-input:focus { border-color: var(--border-bright); }
    .tasks-name-input.flash-error { border-color: var(--danger) !important; animation: flashError 400ms var(--ease-snap); }
    .tasks-dur-input {
      width: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: var(--text-sm) var(--font-mono);
      padding: var(--space-2) var(--space-2);
      outline: none;
      text-align: center;
      transition: border-color 150ms var(--ease-snap);
    }
    .tasks-dur-input::placeholder { color: var(--text-3); }
    .tasks-dur-input:focus { border-color: var(--border-bright); }
    .tasks-day-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font: var(--text-xs) var(--font-mono);
      padding: var(--space-2) var(--space-2);
      outline: none;
      cursor: none;
      transition: border-color 150ms var(--ease-snap);
      appearance: none;
      -webkit-appearance: none;
    }
    .tasks-day-select:focus { border-color: var(--border-bright); }

    /* Task card */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent-violet);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-2);
      
      box-shadow: var(--glow-card);
      transition: all 250ms var(--ease-snap);
    }
    .task-card:hover { border-color: rgba(255,255,255,0.1); box-shadow: var(--glow-card), 0 8px 40px rgba(0,0,0,0.6); }
    .task-card.completing { opacity: 0.35; transform: translateY(4px); }
    .task-card.removing { opacity: 0; transform: translateX(-16px); max-height: 0; margin: 0; padding-top: 0; padding-bottom: 0; overflow: hidden; }
    .task-status-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; width: 40px; }
    .task-status-label { font: 400 11px var(--font-mono); color: var(--success); text-transform: uppercase; letter-spacing: 0.1em; }
    .task-status-label.terminated { color: var(--text-3); }
    .task-center { flex: 1; min-width: 0; }
    .task-name { font: 500 17px var(--font-ui); color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-name.done { text-decoration: line-through; color: var(--text-3); }
    .task-meta { display: flex; align-items: center; gap: var(--space-2); margin-top: 3px; }
    .task-duration { font: 400 13px var(--font-mono); color: var(--text-3); }
    .task-day-pill {
      font: 600 12px var(--font-mono);
      color: var(--accent-cool);
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: var(--radius-pill);
      padding: 1px 8px;
      letter-spacing: 0.08em;
    }
    .task-done-date { font: 400 13px var(--font-mono); color: var(--text-3); }
    .task-timer-display { font: 400 13px var(--font-mono); color: var(--accent-cool); margin-top: 3px; }
    .task-actions { display: flex; gap: var(--space-2); align-items: center; flex-shrink: 0; }
    .task-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-3);
      font: 500 12px var(--font-mono);
      padding: 5px 12px;
      cursor: none;
      white-space: nowrap;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 200ms var(--ease-snap);
    }
    .task-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text-1); }
    .task-btn.timer-running { border-color: rgba(0,200,255,0.4); color: var(--accent-cool); background: rgba(0,200,255,0.06); }
    .task-btn.complete-btn:hover { border-color: rgba(0,255,170,0.4); color: var(--success); background: rgba(0,255,170,0.06); }
    .task-btn.delete-btn:hover { border-color: rgba(255,59,107,0.4); color: var(--danger); background: rgba(255,59,107,0.06); }
    .task-delete-confirm { display: flex; align-items: center; gap: var(--space-2); font: 400 13px var(--font-mono); color: var(--text-2); }

    /* Completed section toggle */
    .tasks-completed-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      cursor: none;
      border-top: 1px solid var(--border);
      margin-top: var(--space-4);
      -webkit-user-select: none;
      user-select: none;
    }
    .tasks-completed-header:hover .tasks-completed-title { color: var(--text-2); }
    .tasks-completed-title {
      font: 600 var(--text-xs) var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 150ms var(--ease-snap);
    }
    .tasks-completed-count {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }
    .tasks-completed-chevron {
      margin-left: auto;
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      transition: transform 200ms var(--ease-snap);
    }
    .tasks-completed-chevron.open { transform: rotate(180deg); }
    .tasks-completed-list {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms var(--ease-out);
    }
    .tasks-completed-list.open { max-height: 4000px; }

    /* Tasks empty state */
    .tasks-empty {
      text-align: center;
      padding: var(--space-12) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
    }
    .tasks-empty-title {
      font: 600 var(--text-md) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.12em;
    }
    .tasks-idle-line {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .idle-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--text-3);
      animation: bootBlink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    /* ── OVERVIEW / MANIFEST ── */
    .overview-filters {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }
    .overview-filter-row {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .overview-pill {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font: var(--text-xs) var(--font-mono);
      padding: 3px var(--space-3);
      cursor: none;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      transition: all 150ms var(--ease-snap);
      -webkit-user-select: none;
      user-select: none;
    }
    .overview-pill:hover { border-color: var(--border-bright); color: var(--text-1); }
    .overview-pill.active { background: var(--accent-cool-dim); border-color: var(--accent-cool); color: var(--accent-cool); }
    .overview-pill.task-pill.active { background: rgba(168,85,247,0.12); border-color: var(--accent-violet); color: var(--accent-violet); }
    .overview-filter-label {
      font: 700 9px var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      align-self: center;
      white-space: nowrap;
      padding-right: 4px;
    }
    /* Manifest table */
    .manifest-table {
      width: 100%;
      border-collapse: collapse;
    }
    .manifest-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-left: 2px solid transparent;
      cursor: none;
      transition: background 100ms var(--ease-snap), border-color 100ms var(--ease-snap);
      opacity: 0;
      transform: translateX(-8px);
    }
    .manifest-row:nth-child(even) { background: var(--surface); }
    .manifest-row:nth-child(odd)  { background: var(--surface-2); }
    .manifest-row:hover {
      background: var(--accent-cool-dim) !important;
      border-left-color: var(--accent-cool);
    }
    .manifest-row.row-entered {
      opacity: 1;
      transform: translateX(0);
      transition: opacity 150ms var(--ease-out), transform 150ms var(--ease-out),
                  background 100ms var(--ease-snap), border-color 100ms var(--ease-snap);
    }
    .manifest-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 90px;
      flex-shrink: 0;
    }
    .manifest-status-label {
      font: 12px var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .manifest-title-cell {
      flex: 1;
      font: var(--text-md) var(--font-ui);
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .manifest-title-cell.task-entry { color: var(--text-2); }
    .manifest-prog-cell {
      width: 96px;
      flex-shrink: 0;
    }
    .manifest-prog-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .manifest-prog-fill {
      height: 100%;
      background: var(--accent-cool);
      border-radius: 2px;
    }
    .manifest-left-cell {
      width: 72px;
      flex-shrink: 0;
      text-align: right;
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }
    .manifest-rating-cell {
      width: 48px;
      flex-shrink: 0;
      font: var(--text-xs) var(--font-mono);
      color: var(--accent-warm);
      text-align: right;
    }
    .manifest-day-cell {
      width: 72px;
      flex-shrink: 0;
      font: var(--text-xs) var(--font-mono);
      color: var(--accent-cool);
    }

    /* ── GRAVEYARD ── */
    .graveyard-section {
      --accent-cool: #4a8fa8;
      --accent-warm: #a06040;
      --text-2: #606080;
    }
    .graveyard-subtitle {
      font: italic var(--text-sm) var(--font-ui);
      color: var(--text-3);
      margin-bottom: var(--space-5);
    }
    .graveyard-header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .graveyard-count {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      opacity: 0.6;
    }
    .graveyard-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-4);
      opacity: 0.85;
      transition: filter 300ms var(--ease-snap), opacity 300ms, max-height 300ms var(--ease-out), margin 300ms;
    }
    .graveyard-card:hover { opacity: 1; }
    .graveyard-card.removing {
      opacity: 0;
      max-height: 0 !important;
      margin: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
    }
    .graveyard-card-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }
    .graveyard-title {
      font: 600 var(--text-lg) var(--font-ui);
      color: var(--text-2);
      flex: 1;
    }
    .graveyard-archived-pill {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1px var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .graveyard-progress-label {
      font: 700 16px var(--font-mono);
      color: var(--text-3);
      margin-bottom: var(--space-1);
      padding-bottom: 3px;
    }
    .graveyard-prog-wrap {
      opacity: 0.3;
      margin-bottom: var(--space-3);
    }
    .graveyard-dates {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      margin-bottom: var(--space-3);
    }
    .graveyard-note-text {
      font: italic var(--text-sm) var(--font-ui);
      color: var(--text-3);
      margin-bottom: var(--space-3);
    }
    .graveyard-note-prefix {
      font-style: normal;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
    }
    .graveyard-note-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-3);
      font: italic var(--text-sm) var(--font-ui);
      padding: var(--space-1) 0;
      outline: none;
      margin-bottom: var(--space-3);
      transition: border-color 150ms var(--ease-snap);
    }
    .graveyard-note-input::placeholder { color: var(--text-3); opacity: 0.5; }
    .graveyard-note-input:focus { border-color: var(--text-3); }
    .graveyard-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }
    .graveyard-delete-confirm {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }
    .graveyard-empty {
      text-align: center;
      padding: var(--space-12) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      position: relative;
    }
    .graveyard-empty-bg-deco {
      font-size: 120px;
      opacity: 0.04;
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }
    /* ── SPAWN button variant — violet to pink ── */
    .btn-spawn {
      background: linear-gradient(135deg, #a855f7, #ff2d95) !important;
      box-shadow: 0 0 24px rgba(168,85,247,0.4), 0 0 60px rgba(255,45,149,0.2), 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .btn-spawn:hover {
      box-shadow: 0 0 30px rgba(168,85,247,0.6), 0 0 90px rgba(255,45,149,0.3), 0 6px 20px rgba(0,0,0,0.5) !important;
    }
    /* ── WATCHING status chip for overview ── */
    .manifest-status-watch-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: var(--radius-pill);
      background: rgba(0,255,170,0.1);
      border: 1px solid rgba(0,255,170,0.3);
      font: 500 10px var(--font-mono);
      color: var(--accent-green);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .manifest-status-watch-chip .chip-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 6px var(--accent-green);
      flex-shrink: 0;
    }
    .manifest-status-watch-chip.not-started {
      background: rgba(255,225,77,0.1);
      border-color: rgba(255,225,77,0.3);
      color: var(--accent-yellow);
    }
    .manifest-status-watch-chip.not-started .chip-dot {
      background: var(--accent-yellow);
      box-shadow: 0 0 6px var(--accent-yellow);
    }
    .manifest-status-watch-chip.upcoming {
      background: rgba(0,229,255,0.1);
      border-color: rgba(0,229,255,0.3);
      color: var(--accent-cool);
    }
    .manifest-status-watch-chip.upcoming .chip-dot {
      background: var(--accent-cool);
      box-shadow: 0 0 6px var(--accent-cool);
      animation: upcomingChipPulse 2.5s ease-in-out infinite;
    }
    @keyframes upcomingChipPulse {
      0%,100% { box-shadow: 0 0 6px var(--accent-cool); }
      50%      { box-shadow: 0 0 10px var(--accent-cool), 0 0 16px rgba(0,229,255,0.4); }
    }
    /* ── RESPONSIVE BREAKPOINT ── */
    @media (max-width: 780px) {
      .detail-hero {
        grid-template-columns: 1fr;
      }
      .dash-stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .lib-grid {
        grid-template-columns: 1fr;
      }
    }
    .graveyard-empty-line {
      font: 700 16px var(--font-mono);
      color: var(--text-3);
      opacity: 0;
      transition: opacity 400ms var(--ease-out);
    }
    .graveyard-empty-line.visible { opacity: 1; }

    /* ── SESSION LOG ── */
    .log-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .log-sub {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      margin-bottom: var(--space-5);
      letter-spacing: 0.06em;
    }
    .log-feed { display: flex; flex-direction: column; gap: 0; }
    .log-group { margin-bottom: var(--space-4); }
    .log-group-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      cursor: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .log-group-header:hover .log-group-date { color: var(--text-2); }
    .log-group-date {
      font: 600 var(--text-xs) var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
      transition: color 150ms var(--ease-snap);
    }
    .log-group-sep {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .log-group-count {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      white-space: nowrap;
      opacity: 0.6;
    }
    .log-group-chevron {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      transition: transform 200ms var(--ease-snap);
    }
    .log-group-chevron.open { transform: rotate(180deg); }
    .log-events {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms var(--ease-out);
    }
    .log-events.open { max-height: 9999px; }
        .log-event-row {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      padding: 6px var(--space-3);
      border-radius: var(--radius-sm);
      transition: background 100ms, transform 100ms;
      border-left: 2px solid transparent;
    }
    .log-event-row:hover { background: var(--surface-2); }
        .log-time {
      font: 500 10px var(--font-mono);
      color: var(--text-3);
      min-width: 44px;
      flex-shrink: 0;
      opacity: 0.5;
      letter-spacing: 0.03em;
    }
    .log-text {
      font: var(--text-sm) var(--font-mono);
      color: var(--text-2);
      flex: 1;
      word-break: break-word;
    }
    .log-empty {
      text-align: center;
      padding: var(--space-12) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
    }
    .log-empty-title {
      font: 600 var(--text-md) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.12em;
    }


    /* ═══════════════════════════════════════════════════
       FINAL UPGRADE BLOCK — all remaining components
    ═══════════════════════════════════════════════════ */

    /* ── MODAL INPUTS — see Part 2 for full styles ── */
    .modal-title-row { font: 400 24px var(--font-display); color: var(--text-1); margin-bottom: var(--space-6); letter-spacing: 0.04em; }
    .modal-field-label { font: 700 12px var(--font-mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.18em; display: block; margin-bottom: var(--space-1); }
    .modal-input { width: 100%; background: rgba(0,229,255,0.03); border: 1px solid rgba(100,160,255,0.14); border-radius: var(--radius-sm); color: var(--text-1); font: 400 13px var(--font-ui); padding: 10px var(--space-3); outline: none; transition: all 200ms var(--ease-snap); margin-bottom: var(--space-4); }
    .modal-input:focus { border-color: rgba(0,200,255,0.35); box-shadow: 0 0 0 3px rgba(0,200,255,0.06); }
    .modal-input.field-error { border-color: rgba(255,59,107,0.5); }
    .modal-field-error { font: 400 13px var(--font-mono); color: var(--danger); margin-top: calc(-1 * var(--space-3)); margin-bottom: var(--space-3); display: none; }
    .modal-field-error.visible { display: block; }
    .modal-select { width: 100%; background: rgba(0,229,255,0.03); border: 1px solid rgba(100,160,255,0.14); border-radius: var(--radius-sm); color: var(--text-1); font: 400 13px var(--font-ui); padding: 10px var(--space-3); outline: none; cursor: none; margin-bottom: var(--space-4); appearance: none; -webkit-appearance: none; transition: all 200ms var(--ease-snap); }
    .modal-select:focus { border-color: rgba(0,200,255,0.35); }
    .modal-mood-grid { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-4); }
    .modal-mood-toggle { background: rgba(255,255,255,0.03); border: 1px solid rgba(100,160,255,0.15); border-radius: var(--radius-pill); color: var(--text-3); font: 500 14px var(--font-mono); padding: 5px 14px; cursor: none; letter-spacing: 0.1em; text-transform: uppercase; transition: all 200ms var(--ease-snap); }
    .modal-mood-toggle:hover { border-color: rgba(255,255,255,0.14); color: var(--text-1); }
    .modal-mood-toggle.active { background: rgba(0,200,255,0.08); border-color: rgba(0,200,255,0.35); color: var(--accent-cool); }
    .modal-footer { display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-2); }


    /* ── PRESERVED UNIQUE SELECTORS ── */
    .mq-mood-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(0,200,255,0.01) 100%); pointer-events: none; }

    /* ═══════════════════════════════════════════════════════════════
       VISUAL UPGRADE LAYER — Keypad → Smartphone transformation
    ═══════════════════════════════════════════════════════════════ */

    /* ── AMBIENT FLOATING PARTICLES ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* ── ENHANCED SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.015); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(0,229,255,0.25), rgba(168,85,247,0.25));
      border-radius: 99px;
      box-shadow: 0 0 10px rgba(0,229,255,0.15);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(0,229,255,0.5), rgba(168,85,247,0.5));
      box-shadow: 0 0 16px rgba(0,229,255,0.3);
    }

    /* ── SECTION HEADER GLOW LINE ── */
    .section-header::after {
      background: linear-gradient(90deg, rgba(0,200,255,0.4), rgba(139,92,246,0.3), transparent 70%);
    }

    /* ── HOLOGRAPHIC CARD SHEEN UPGRADE ── */
    /* Library card uses ::after for sheen (no conflict) */
    .library-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(168,85,247,0.04) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 300ms;
      pointer-events: none;
      z-index: 10;
    }
    .library-card:hover::after { opacity: 1; }
    /* Other cards: merge sheen into existing ::before via background layering */
    .dash-nav-card:hover::before,
    .mq-mood-card:hover::before,
    .graveyard-card:hover::before {
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(168,85,247,0.04) 0%, transparent 65%);
      opacity: 1;
    }
    /* Cards without ::before conflict — use ::after */
    .task-card::after,
    .ep-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(168,85,247,0.04) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 300ms;
      pointer-events: none;
      z-index: 10;
    }
    .task-card:hover::after,
    .ep-tile:hover::after { opacity: 1; }
    /* Stat card: subtle sheen — no blob, just a light edge shimmer */
    .stat-card:hover::before {
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.05) 0%, transparent 55%),
        linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 40%, rgba(0,229,255,0.03) 100%);
    }
    /* Bottom nav item: sheen on hover */
    .bn-item:not(.active):hover::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,229,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LIB CARD TITLE UPGRADE ── */
    .lib-card-title {
      font: 600 18px var(--font-display);
      color: var(--text-1);
      line-height: 1.25;
      letter-spacing: 0.06em;
    }

    /* ── SIDEBAR BUDGET BAR UPGRADE ── */
    .sidebar-budget-bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      background: linear-gradient(90deg, #00e5ff, #a855f7, #ff2d95, #00e5ff);
      background-size: 300% 100%;
      box-shadow: 0 0 10px rgba(0,229,255,0.6), 0 0 30px rgba(168,85,247,0.3);
      transition: width 800ms var(--ease-out);
      
    }

    /* ── MQ RESULT CARD UPGRADE ── */
    .mq-result-card {
      background: linear-gradient(160deg, rgba(80,100,255,0.09) 0%, rgba(0,229,255,0.03) 100%);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-cool);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      display: flex; align-items: flex-start; gap: var(--space-6);
      
      box-shadow: var(--glow-card), -6px 0 40px rgba(0,229,255,0.16), -6px 0 80px rgba(168,85,247,0.06);
    }
    .mq-result-title { font: 700 28px var(--font-display); color: var(--text-1); margin: var(--space-2) 0; letter-spacing: 0.06em; }

    /* ── TASK CARD UPGRADE ── */
    .task-card {
      background: linear-gradient(160deg, rgba(80,100,255,0.08) 0%, rgba(168,85,247,0.05) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-2);

      box-shadow: var(--glow-card), inset 0 1px 0 rgba(130,180,255,0.05);
      transition: all 300ms var(--ease-snap);
      position: relative;
      overflow: hidden;
    }
    .task-card:hover {
      border-color: rgba(0,229,255,0.2);
      box-shadow: var(--glow-card), 0 12px 48px rgba(0,0,0,0.7), 0 0 30px rgba(0,229,255,0.06);
      transform: translateX(3px);
    }

    /* ── GRAVEYARD UPGRADE ── */
    .graveyard-card {
      background: linear-gradient(160deg, rgba(100,80,130,0.05) 0%, rgba(255,59,107,0.02) 100%);
      border: 1px solid rgba(255,59,107,0.08);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
      opacity: 0.6;
      
      transition: all 400ms var(--ease-snap);
      position: relative;
      overflow: hidden;
    }
    .graveyard-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(255,59,107,0.012) 3px, rgba(255,59,107,0.012) 4px);
      pointer-events: none;
      opacity: 0.5;
    }
    .graveyard-card:hover {
      opacity: 1;
      box-shadow: var(--glow-card), 0 0 50px rgba(255,59,107,0.06), 0 0 100px rgba(168,85,247,0.04);
      border-color: rgba(255,59,107,0.2);
    }
    .graveyard-title { font: 700 22px var(--font-display); letter-spacing: 0.06em; }

/* ── COMPLETION BANNER UPGRADE ── */
    .completion-banner {
      background: linear-gradient(90deg, rgba(0,229,255,0.1), rgba(168,85,247,0.07), rgba(255,45,149,0.05), rgba(0,229,255,0.1));
      border-bottom: 1px solid rgba(0,229,255,0.3);
      font: 700 14px var(--font-display);
      letter-spacing: 0.15em;
      text-shadow: 0 1px 8px rgba(0,229,255,0.2);
    }

    /* ── MOOD PILL UPGRADE ── */
    .mood-pill {
      width: 100%; padding: 11px var(--space-4);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font: 500 11px var(--font-mono);
      text-align: left; cursor: none;
      opacity: 0; transform: translateX(-10px);
      transition: all 200ms var(--ease-snap);
      letter-spacing: 0.08em;
      position: relative;
      overflow: hidden;
    }
    .mood-pill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.06), rgba(168,85,247,0.04), transparent);
      transform: translateX(-100%);
      transition: transform 400ms var(--ease-out);
    }
    .mood-pill:hover::after { transform: translateX(100%); }
    .mood-pill:hover { border-color: rgba(0,229,255,0.35); color: var(--text-1); background: rgba(0,229,255,0.07); }
    .mood-pill.selected { background: linear-gradient(90deg, rgba(0,229,255,0.1), rgba(168,85,247,0.06)); border-color: rgba(0,229,255,0.45); color: var(--text-1); box-shadow: inset 0 0 24px rgba(0,229,255,0.06), 0 0 16px rgba(0,229,255,0.08); }

    /* ── FILTER PILL UPGRADE ── */
    .lib-filter-pill {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-3);
      font: 600 11px var(--font-mono);
      padding: 8px 20px;
      cursor: none;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      transition: all 250ms var(--ease-snap);
      -webkit-user-select: none; user-select: none;
    }
    .lib-filter-pill:hover { border-color: rgba(0,229,255,0.25); color: var(--text-1); background: rgba(0,229,255,0.06); }
    .lib-filter-pill.active {
      background: linear-gradient(135deg, rgba(0,229,255,0.16), rgba(168,85,247,0.08));
      border-color: rgba(0,229,255,0.45);
      color: var(--accent-cool);
      box-shadow: 0 0 20px rgba(0,229,255,0.15), 0 0 40px rgba(168,85,247,0.06), inset 0 0 16px rgba(0,229,255,0.05);
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    /* ── SEARCH INPUT UPGRADE ── */
    .lib-search-input:focus {
      border-color: rgba(0,200,255,0.35);
      box-shadow: 0 0 0 4px rgba(0,200,255,0.06), 0 0 20px rgba(0,200,255,0.05);
      background: rgba(255,255,255,0.06);
    }

    /* ── SECTION ENTER UPGRADE ── */
    .section-enter {
      animation: section-in-upgrade 300ms var(--ease-out) both;
    }
    @keyframes section-in-upgrade {
      from { opacity: 0; transform: translateX(20px) scale(0.99); filter: blur(4px); }
      to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    }

    /* ── LIB TOPBAR UPGRADE ── */
    .lib-topbar {
      position: relative;
      z-index: 50;
      padding: 0 0 var(--space-4) 0;
    }

    /* ── DETAIL TIMER CARD UPGRADE ── */
    .detail-timer-card {
      background: linear-gradient(160deg, rgba(80,100,255,0.09) 0%, rgba(0,229,255,0.03) 100%);
      border: 1px solid rgba(100,160,255,0.2);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      
      box-shadow: var(--glow-card), inset 0 1px 0 rgba(100,180,255,0.12);
    }
    .detail-timer-display {
      font: 700 26px var(--font-display);
      color: var(--accent-cool);
      margin-bottom: var(--space-3);
      letter-spacing: 0.1em;
      min-height: 36px;
      text-shadow: 0 1px 8px rgba(0,229,255,0.2);
    }

    /* ── OVERVIEW PILL UPGRADE ── */
    .overview-pill {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-2);
      font: 600 12px var(--font-mono);
      padding: 6px 16px;
      cursor: none;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      transition: all 250ms;
      -webkit-user-select: none; user-select: none;
    }
    .overview-pill.active {
      background: linear-gradient(135deg, rgba(0,229,255,0.16), rgba(168,85,247,0.07));
      border-color: rgba(0,229,255,0.45);
      color: var(--accent-cool);
      box-shadow: 0 0 20px rgba(0,229,255,0.15), 0 0 40px rgba(168,85,247,0.06);
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    /* ── MANIFEST ROW UPGRADE ── */
    .manifest-row:hover {
      background: linear-gradient(90deg, rgba(0,229,255,0.08), rgba(168,85,247,0.06)) !important;
      border-left-color: var(--accent-cool);
      box-shadow: inset 3px 0 16px rgba(0,229,255,0.06);
    }
    .manifest-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #a855f7);
      border-radius: 99px;
      box-shadow: 0 0 8px rgba(0,229,255,0.5);
    }

    /* ── SELECTION HIGHLIGHT ── */
    ::selection {
      background: rgba(168,85,247,0.35);
      color: #fff;
      text-shadow: 0 0 8px rgba(0,229,255,0.3);
    }

    /* ── INPUT FOCUS RING UPGRADE (GLOBAL) ── */
    input:focus, textarea:focus, select:focus {
      border-color: rgba(0,200,255,0.35) !important;
      box-shadow: 0 0 0 3px rgba(0,200,255,0.06), 0 0 16px rgba(0,200,255,0.04) !important;
    }

    /* ── DASH DATE UPGRADE ── */
    .dash-date {
      font: 500 13px var(--font-mono);
      color: var(--text-3);
      margin-top: var(--space-2);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* ── STATUS DOT UPGRADE ── */
    .lib-status-dot.watching {
      background: var(--success);
      box-shadow: 0 0 10px var(--success), 0 0 24px rgba(0,255,170,0.3);
      animation: statusPulseUpgrade 2s ease-in-out infinite;
    }
    @keyframes statusPulseUpgrade {
      0%,100% { box-shadow: 0 0 6px var(--success); }
      50% { box-shadow: 0 0 14px var(--success), 0 0 30px rgba(0,255,170,0.35); }
    }

    /* ── EP TILE INLINE RATING ── */
    .ep-ratings-bar {
      position: absolute;
      bottom: 5px;
      left: 4px;
      right: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
      min-height: 14px;
      padding: 0;
    }
    .ep-rating-badge {
      font: 700 10px var(--font-mono);
      color: var(--accent-warm);
      background: rgba(255,138,76,0.12);
      border: 1px solid rgba(255,138,76,0.25);
      border-radius: 3px;
      padding: 2px 4px;
      text-align: center;
      text-shadow: 0 0 8px rgba(255,96,64,0.4);
      opacity: 0.95;
      line-height: 1;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* When personal rating is the only rating, keep consistent spacing and make wider */
    .ep-tile.personal-only .ep-ratings-bar {
      bottom: 5px;
      left: 4px;
      right: 4px;
      padding: 0;
      justify-content: center;
    }
    .ep-tile.personal-only .ep-rating-badge {
      font-size: 11px;
      padding: 2px 8px;
      height: 15px;
      flex: 1;
      max-width: 100%;
    }
    /* Dual-source rating badges */
    .ep-badge-imdb {
      font: 700 10px var(--font-mono);
      color: #fbbf24;
      background: rgba(245,197,24,0.12);
      border: 1px solid rgba(245,197,24,0.25);
      border-radius: 3px;
      padding: 2px 4px;
      text-align: center;
      text-shadow: 0 0 8px rgba(251,191,36,0.6);
      opacity: 0.95;
      line-height: 1;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ep-badge-mal {
      font: 700 10px var(--font-mono);
      color: #00e5ff;
      background: rgba(95,143,219,0.12);
      border: 1px solid rgba(95,143,219,0.25);
      border-radius: 3px;
      padding: 2px 4px;
      text-align: center;
      text-shadow: 0 0 8px rgba(0,229,255,0.5);
      opacity: 0.88;
      line-height: 1;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* When no personal rating, make platform badges wider */
    .ep-ratings-bar.no-personal .ep-badge-imdb,
    .ep-ratings-bar.no-personal .ep-badge-mal {
      padding: 2px 8px;
      flex: 1;
    }
    /* When only one platform rating exists (IMDb OR MAL), make it even wider */
    .ep-ratings-bar.only-one .ep-badge-imdb,
    .ep-ratings-bar.only-one .ep-badge-mal {
      padding: 2px 8px;
      flex: 1;
    }
    /* When only one platform AND no personal, make it widest */
    .ep-ratings-bar.only-one.no-personal .ep-badge-imdb,
    .ep-ratings-bar.only-one.no-personal .ep-badge-mal {
      padding: 2px 8px;
      flex: 1;
    }
    /* Dual aggregate rating row in detail view */
    .detail-ratings-row {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-3);
      align-items: center;
    }
    .detail-rating-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
    }
    .detail-rating-chip .chip-label {
      font: 700 13px var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      opacity: 0.55;
    }
    .detail-rating-chip .chip-val {
      font: 700 20px var(--font-mono);
      line-height: 1;
    }
    .detail-rating-chip.chip-imdb .chip-label { color: #F5C518; font-size:10px; }
    .detail-rating-chip.chip-imdb .chip-val   { color: #F5C518; text-shadow: 0 0 16px rgba(245,197,24,0.5); }
    .detail-rating-chip.chip-mal  .chip-label { color: #5f8fdb; font-size:10px; }
    .detail-rating-chip.chip-mal  .chip-val   { color: #5f8fdb; text-shadow: 0 0 16px rgba(94,143,219,0.4); }
    #detail-series-imdb-chip:hover { opacity: 0.8; }
    #detail-series-mal-chip:hover  { opacity: 0.8; }
    .detail-rating-chip.chip-personal .chip-label { color: var(--accent-warm); font-size:10px; }
    .detail-rating-chip.chip-personal .chip-val   { color: var(--accent-warm); text-shadow: 0 0 16px rgba(255,96,64,0.4); }
    /* Small brand-colored IMDb/MAL labels in library cards */
    .lib-card-rating-chip.chip-imdb .lib-card-rating-label { color: #F5C518; }
    .lib-card-rating-chip.chip-mal  .lib-card-rating-label { color: #5f8fdb; }
    .lib-card-rating-chip.chip-personal .lib-card-rating-label { color: var(--accent-warm); }
    .ep-rate-btn {
      position: absolute;
      top: 4px;
      right: 5px;
      font-size: 14px;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
      color: var(--text-3);
      cursor: none;
      padding: 0;
      opacity: 0;
      transition: opacity 100ms;
      line-height: 1;
    }
    .ep-tile:hover .ep-rate-btn { opacity: 1; }
    .ep-tile:hover .ep-rate-btn:hover { color: var(--accent-warm); }
    @media (hover: none), (pointer: coarse) {
      .ep-rate-btn { opacity: 0.55; cursor: pointer; }
      .ep-rate-btn:active { opacity: 1; color: var(--accent-warm); }
    }
    .ep-rate-popup {
      position: fixed;
      background: rgba(12,10,30,1);
      border: 1px solid rgba(130,160,255,0.3);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      z-index: 9999;
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      animation: slideInResult 150ms var(--ease-spring) both;
      max-width: calc(100vw - 24px);
    }
    .ep-rate-star {
      background: none;
      border: none;
      color: rgba(180,190,220,0.55);
      font-size: 14px;
      cursor: none;
      padding: 4px;
      transition: color 100ms, transform 100ms;
      line-height: 1;
      position: relative;
      min-width: 28px;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (hover: none), (pointer: coarse) {
      .ep-rate-star { cursor: pointer; font-size: 18px; min-width: 36px; min-height: 36px; }
    }
    .ep-rate-star:hover { color: var(--accent-warm); transform: scale(1.3); }
    .ep-rate-star.filled { color: var(--accent-warm); text-shadow: 0 0 6px rgba(255,96,64,0.4); }
    .ep-rate-star.clear-btn { color: rgba(180,190,220,0.55); font-size: 13px; }
    .ep-rate-star.clear-btn:hover { color: var(--danger); }
    .ep-rate-star::after {
      content: attr(data-val);
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: var(--accent-warm);
      font: 700 11px var(--font-mono);
      padding: 2px 6px;
      border-radius: 3px;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 100ms;
    }
    .ep-rate-star:hover::after { opacity: 1; }

  /* ════════════════════════════════════════════════════════════════
     SERIES IMMERSIVE THEMES — each series owns its world
     Applied via body.theme-[name] when detail view opens.

     DESIGN RULE: The background stays near-black. Colour lives in
     atmospheric whispers (body::before at very low opacity) and in
     the accent details — tiles, progress bar, timer, tabs, strips.
     No full-page colour washes. Mood lighting, not paint.
  ════════════════════════════════════════════════════════════════ */

  /* ── SHARED TRANSITION — smooth world-swap ── */
  body::before { transition: all 700ms cubic-bezier(0.16,1,0.3,1); }
  #hex-grid polygon { transition: stroke 700ms ease, stroke-opacity 500ms ease; }

  /* ══════════════════════════════════════════════════════════════
     PARASYTE: THE MAXIM
     Something organic lives inside the dark. Green exists only
     where it should — in the infected details. The background
     stays black. Only the edges betray what's growing.
  ══════════════════════════════════════════════════════════════ */
  body.theme-parasyte {
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(57,255,20,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 0% 0%,   rgba(15,23,42,0.95)   0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 100% 50%, rgba(20,80,10,0.06)  0%, transparent 50%);
  }
  body.theme-parasyte::before {
    background:
      radial-gradient(ellipse 50% 40% at 8% 0%,   rgba(57,255,20,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 92% 90%,  rgba(30,160,10,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 30% 25% at 75% 8%,   rgba(57,255,20,0.04) 0%, transparent 50%),
      radial-gradient(ellipse 35% 30% at 15% 85%,  rgba(20,100,5,0.03)  0%, transparent 50%);
  }
  body.theme-parasyte #hex-grid polygon {
    fill: none !important;
    stroke: #39ff14 !important;
    stroke-opacity: 0.12 !important;
  }
  body.theme-parasyte .detail-title {
    text-shadow: 0 0 40px rgba(57,255,20,0.35), 0 0 90px rgba(57,255,20,0.10), 0 2px 4px rgba(0,0,0,0.9);
    color: #39ff14;
  }
  body.theme-parasyte .ep-tile.watched {
    background: rgba(57,255,20,0.09);
    border-color: rgba(57,255,20,0.40);
    box-shadow: inset 0 0 12px rgba(57,255,20,0.06), 0 0 6px rgba(57,255,20,0.10);
  }
  body.theme-parasyte .ep-tile.watched .ep-num   { color: #39ff14; }
  body.theme-parasyte .ep-tile.watched .ep-check { color: #39ff14; }
  body.theme-parasyte .ep-tile:hover             { border-color: rgba(57,255,20,0.22); }
  body.theme-parasyte .detail-timer-card {
    background: linear-gradient(155deg, rgba(12,45,6,0.55) 0%, rgba(6,22,3,0.28) 100%);
    border-color: rgba(57,255,20,0.12);
    box-shadow: 0 0 30px rgba(57,255,20,0.03), inset 0 1px 0 rgba(57,255,20,0.07);
  }
  body.theme-parasyte .detail-timer-display {
    color: #39ff14;
    text-shadow: 0 0 24px rgba(57,255,20,0.55), 0 0 60px rgba(57,255,20,0.15);
  }
  body.theme-parasyte .detail-notes-card {
    background: linear-gradient(155deg, rgba(10,36,5,0.45) 0%, rgba(5,18,2,0.22) 100%);
    border-color: rgba(57,255,20,0.10);
  }
  body.theme-parasyte .detail-filmstrip::before,
  body.theme-parasyte .detail-filmstrip::after {
    background-image: radial-gradient(circle, rgba(57,255,20,0.22) 4px, transparent 4px);
    border-color: rgba(57,255,20,0.16);
  }
  body.theme-parasyte .detail-season-tab.active { border-bottom-color: #39ff14; color: #39ff14; }
  body.theme-parasyte .detail-day-btn.active {
    background: rgba(57,255,20,0.07); border-color: rgba(57,255,20,0.32); color: #39ff14;
  }
  body.theme-parasyte .progress-bar-fill {
    background: linear-gradient(90deg, #1a8c0a, #39ff14, #57ff3a);
    box-shadow: 0 0 14px rgba(57,255,20,0.45);
  }
  body.theme-parasyte .detail-arc-item  { border-color: rgba(57,255,20,0.12); }
  body.theme-parasyte .detail-arc-header { background: rgba(57,255,20,0.03); }
  body.theme-parasyte .detail-arc-header:hover { background: rgba(57,255,20,0.06); }
  body.theme-parasyte .stat-card-number {
    color: #39ff14;
    text-shadow: none;
  }
  body.theme-parasyte .stat-card-number::after { background: linear-gradient(90deg, transparent, #39ff14, transparent); }
  body.theme-parasyte .stat-card:nth-child(1) { border-bottom-color: rgba(57,255,20,0.55); }
  body.theme-parasyte .stat-card:nth-child(2) { border-bottom-color: rgba(40,180,10,0.55); }
  body.theme-parasyte .stat-card:nth-child(3) { border-bottom-color: rgba(57,255,20,0.35); }
  body.theme-parasyte .btn-ghost { border-color: rgba(57,255,20,0.18); color: rgba(57,255,20,0.75); }
  body.theme-parasyte .btn-ghost:hover { border-color: rgba(57,255,20,0.45); color: #39ff14; background: rgba(57,255,20,0.08); box-shadow: 0 0 20px rgba(57,255,20,0.16), inset 0 0 20px rgba(57,255,20,0.04); }

  /* ══════════════════════════════════════════════════════════════
     BLACK LAGOON
     Gritty harbour noir. Crimson embers in industrial shadow.
     Violence has a texture. The darkness earns its red.
  ══════════════════════════════════════════════════════════════ */
  body.theme-blacklagoon {
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(192,57,43,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 0% 0%,   rgba(15,23,42,0.95)   0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 100% 50%, rgba(100,20,10,0.06)  0%, transparent 50%);
  }
  body.theme-blacklagoon::before {
    background:
      radial-gradient(ellipse 50% 38% at 10% 0%,   rgba(192,57,43,0.09) 0%, transparent 58%),
      radial-gradient(ellipse 40% 30% at 90% 92%,  rgba(140,20,15,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 28% 22% at 78% 8%,   rgba(192,57,43,0.04) 0%, transparent 50%),
      radial-gradient(ellipse 35% 28% at 20% 80%,  rgba(100,10,5,0.03)  0%, transparent 50%);
  }
  body.theme-blacklagoon #hex-grid polygon {
    fill: none !important;
    stroke: #c0392b !important;
    stroke-opacity: 0.12 !important;
  }
  body.theme-blacklagoon .detail-title {
    text-shadow: 0 0 35px rgba(192,57,43,0.40), 0 0 80px rgba(192,57,43,0.10), 0 2px 4px rgba(0,0,0,0.95);
    color: #e74c3c;
  }
  body.theme-blacklagoon .ep-tile.watched {
    background: rgba(192,57,43,0.11);
    border-color: rgba(192,57,43,0.42);
    box-shadow: inset 0 0 12px rgba(192,57,43,0.07), 0 0 6px rgba(192,57,43,0.11);
  }
  body.theme-blacklagoon .ep-tile.watched .ep-num   { color: #e05040; }
  body.theme-blacklagoon .ep-tile.watched .ep-check { color: #e05040; }
  body.theme-blacklagoon .ep-tile:hover             { border-color: rgba(192,57,43,0.20); }
  body.theme-blacklagoon .detail-timer-card {
    background: linear-gradient(155deg, rgba(60,10,6,0.55) 0%, rgba(30,5,3,0.28) 100%);
    border-color: rgba(192,57,43,0.12);
    box-shadow: 0 0 50px rgba(192,57,43,0.06), inset 0 1px 0 rgba(192,57,43,0.12);
  }
  body.theme-blacklagoon .detail-timer-display {
    color: #e05040;
    text-shadow: 0 0 22px rgba(192,57,43,0.60), 0 0 55px rgba(192,57,43,0.16);
  }
  body.theme-blacklagoon .detail-notes-card {
    background: linear-gradient(155deg, rgba(48,8,5,0.45) 0%, rgba(24,4,2,0.22) 100%);
    border-color: rgba(192,57,43,0.10);
  }
  body.theme-blacklagoon .detail-filmstrip::before,
  body.theme-blacklagoon .detail-filmstrip::after {
    background-image: radial-gradient(circle, rgba(192,57,43,0.24) 4px, transparent 4px);
    border-color: rgba(192,57,43,0.16);
  }
  body.theme-blacklagoon .detail-season-tab.active { border-bottom-color: #c0392b; color: #e05040; }
  body.theme-blacklagoon .detail-day-btn.active {
    background: rgba(192,57,43,0.07); border-color: rgba(192,57,43,0.30); color: #e05040;
  }
  body.theme-blacklagoon .progress-bar-fill {
    background: linear-gradient(90deg, #6b0a05, #c0392b, #e74c3c);
    box-shadow: 0 0 14px rgba(192,57,43,0.45);
  }
  body.theme-blacklagoon .detail-arc-item  { border-color: rgba(192,57,43,0.10); }
  body.theme-blacklagoon .detail-arc-header { background: rgba(192,57,43,0.03); }
  body.theme-blacklagoon .detail-arc-header:hover { background: rgba(192,57,43,0.06); }
  body.theme-blacklagoon::after { opacity: 0.06; }
  body.theme-blacklagoon .stat-card-number {
    color: #e05040;
    text-shadow: none;
  }
  body.theme-blacklagoon .stat-card-number::after { background: linear-gradient(90deg, transparent, #e05040, transparent); }
  body.theme-blacklagoon .stat-card:nth-child(1) { border-bottom-color: rgba(192,57,43,0.55); }
  body.theme-blacklagoon .stat-card:nth-child(2) { border-bottom-color: rgba(160,40,30,0.55); }
  body.theme-blacklagoon .stat-card:nth-child(3) { border-bottom-color: rgba(192,57,43,0.35); }
  body.theme-blacklagoon .btn-ghost { border-color: rgba(192,57,43,0.18); color: rgba(224,80,64,0.75); }
  body.theme-blacklagoon .btn-ghost:hover { border-color: rgba(192,57,43,0.45); color: #e05040; background: rgba(192,57,43,0.08); box-shadow: 0 0 20px rgba(192,57,43,0.16), inset 0 0 20px rgba(192,57,43,0.04); }

  /* ══════════════════════════════════════════════════════════════
     DEVILMAN CRYBABY
     Hell is a frequency. Deep demon-red bleeds into absolute
     black. The horror is in what you almost see.
  ══════════════════════════════════════════════════════════════ */
  body.theme-devilman {
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(220,30,60,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 0% 0%,   rgba(15,23,42,0.95)   0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 100% 50%, rgba(120,10,30,0.06)  0%, transparent 50%);
  }
  body.theme-devilman::before {
    background:
      radial-gradient(ellipse 48% 38% at 10% 2%,   rgba(220,30,60,0.09)  0%, transparent 60%),
      radial-gradient(ellipse 40% 32% at 88% 90%,  rgba(160,0,60,0.07)   0%, transparent 55%),
      radial-gradient(ellipse 30% 24% at 70% 6%,   rgba(220,30,60,0.04)  0%, transparent 50%),
      radial-gradient(ellipse 35% 28% at 18% 82%,  rgba(80,0,30,0.03)    0%, transparent 50%);
  }
  body.theme-devilman #hex-grid polygon {
    fill: none !important;
    stroke: #ff3b6b !important;
    stroke-opacity: 0.12 !important;
  }
  body.theme-devilman .detail-title {
    text-shadow: 0 0 38px rgba(220,30,60,0.45), 0 0 90px rgba(220,30,60,0.12), 0 2px 4px rgba(0,0,0,0.96);
    color: #ff3b6b;
  }
  body.theme-devilman .ep-tile.watched {
    background: rgba(220,30,60,0.10);
    border-color: rgba(220,30,60,0.42);
    box-shadow: inset 0 0 12px rgba(220,30,60,0.07), 0 0 6px rgba(220,30,60,0.10);
  }
  body.theme-devilman .ep-tile.watched .ep-num   { color: #ff3b6b; }
  body.theme-devilman .ep-tile.watched .ep-check { color: #ff3b6b; }
  body.theme-devilman .ep-tile:hover             { border-color: rgba(220,30,60,0.20); }
  body.theme-devilman .detail-timer-card {
    background: linear-gradient(155deg, rgba(70,6,18,0.55) 0%, rgba(35,3,9,0.28) 100%);
    border-color: rgba(220,30,60,0.12);
    box-shadow: 0 0 30px rgba(220,30,60,0.03), inset 0 1px 0 rgba(220,30,60,0.07);
  }

  /* ════════════════════════════════════════════════════════════════
     WEEKLY SCHEDULE CALENDAR — Overview
  ════════════════════════════════════════════════════════════════ */
  .sched-calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: var(--space-6);
  }
  .sched-day-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 120px;
  }
  .sched-day-header {
    font: 700 10px var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-3);
    text-align: center;
    padding: 6px 4px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .sched-day-header.today {
    color: var(--accent-cool);
    border-color: var(--accent-cool);
    background: var(--accent-cool-dim);
  }
  .sched-entry {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-cool);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    cursor: none;
    transition: border-color 200ms var(--ease-snap), background 200ms var(--ease-snap);
    position: relative;
  }
  .sched-entry:hover {
    background: var(--surface-3);
    border-color: var(--border-bright);
  }
  .sched-entry-title {
    font: 600 11px var(--font-mono);
    color: var(--text-1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    display: block;
    padding-bottom: 2px;
  }
  .sched-entry-meta {
    font: 400 10px var(--font-mono);
    color: var(--text-3);
    margin-top: 2px;
  }
  .sched-entry-eps {
    font: 500 10px var(--font-mono);
    color: var(--accent-warm);
    margin-top: 2px;
  }
  .sched-empty {
    font: 400 10px var(--font-mono);
    color: var(--text-3);
    text-align: center;
    padding: 10px 4px;
    opacity: 0.5;
  }
  /* Detail view — episode plan input */
  /* Schedule modal */
  .sched-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,4,12,0.80);
    backdrop-filter: blur(10px);
    z-index: 9998;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 250ms var(--ease-out);
  }
  .sched-modal-overlay.visible { opacity: 1; }
  .sched-modal {
    background: linear-gradient(160deg, rgba(18,16,40,0.98) 0%, rgba(10,9,26,0.99) 100%);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-lg);
    padding: 28px;
    width: min(420px, calc(100% - 48px));
    box-shadow: 0 24px 80px rgba(0,0,0,0.85), 0 0 60px rgba(0,229,255,0.06);
    transform: translateY(16px) scale(0.97);
    transition: transform 300ms var(--ease-spring);
  }
  .sched-modal-overlay.visible .sched-modal { transform: translateY(0) scale(1); }
  .sched-modal-title {
    font: 700 13px var(--font-mono);
    color: var(--accent-cool);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }
  .sched-modal-subtitle {
    font: 400 12px var(--font-mono);
    color: var(--text-3);
    margin-bottom: 20px;
  }
  .sched-modal-field { margin-bottom: 16px; }
  .sched-modal-label {

  /* Detail season stat grids — class-based so media queries can override */

  .detail-stat-grid-2col { grid-template-columns: repeat(2, 1fr); }

  /* Restore cursors on touch devices — custom cursor doesn't work on touch */
  @media (hover: none), (pointer: coarse) {
    /* Hide custom cursor elements */
    .cursor-dot, .cursor-ring, .cursor-trail-dot { display: none !important; }

    /* Restore default cursors */
    *, *::before, *::after { cursor: auto !important; }
    a, button, [role=button], .bn-item, .card,
    input, select, textarea, label,
    .btn-primary, .btn-ghost, .btn-danger,
    [onclick], [data-section], [data-tab] { cursor: pointer !important; }

    /* Ensure minimum touch target sizes */
    .bn-item { min-width: 44px; min-height: 44px; }
    .btn-primary, .btn-ghost, .btn-danger { min-height: 44px; }
    button { min-height: 44px; }

    /* Disable hover-only transforms that feel wrong on touch */
    .card:hover { transform: none; }
    .stat-card:hover { transform: none; }

  /* Small screen layout fixes */

  function mergeSettingsWithDefaults(raw) {
    return Object.assign({}, APP_SETTINGS_DEFAULTS, (raw && typeof raw === 'object') ? raw : {})
  }

  function getAppSettings() {
    return mergeSettingsWithDefaults(loadData(KEYS.settings, {}))
  }

  function saveAppSettings(next) {
    saveData(KEYS.settings, mergeSettingsWithDefaults(next))
  }

  function updateAppSetting(key, value) {
    var current = getAppSettings()
    current[key] = value
    saveAppSettings(current)
    return current

  /* ─────────────────────────────────────────────────────────────────
     CONTENT ITEM SCHEMA
     AI READING THIS: when adding a new content item,
     follow this exact structure. Every field matters.
  ─────────────────────────────────────────────────────────────────
    {
      id: string,           // slug+timestamp e.g. "oshi-no-ko-1712345678"
      title: string,
      type: string,         // "anime"|"manga"|"manhwa"|"show"|"movie"|"novel"
      totalEpisodes: number,// total episodes OR chapters
      watchedEpisodes: [],  // array of ep/ch numbers marked watched
      theme: string,        // descriptive name e.g. "idol-noir"
      themeStyles: {        // CSS var overrides for detail view
        '--accent-cool': '#color',
        '--accent-warm': '#color',
        // any other CSS vars to override
      },
      moodTags: [],         // "brain-off"|"hype"|"emotional damage"
                            // "cozy"|"chaos"|"slow-burn"
      rating: number,       // 0–10
      seasons: [{
        id: string,         // "s1", "s2", etc.
        name: string,       // "Season 1"
        episodes: [{ number, title, rating }]
      }],
      arcs: [{              // optional — manga/manhwa arc groupings
        id, name, chapterStart, chapterEnd
      }],
      scheduledDay: null,   // "Monday"…"Sunday" or null
      status: string,       // "watching"|"completed"|"graveyard"
      addedDate: string,    // ISO date "YYYY-MM-DD"
      lastActivityAt: string, // ISO timestamp — updated when watch/read progress changes
      graveyardDate: null,  // ISO date when dropped, or null
      graveyardNote: "",    // optional reason for dropping
      timerMinutes: 0,      // total minutes timed in this app
      notes: ""
    }
  */

     TASK SCHEMA
  ─────────────────────────────────────────────────────────────────
    {
      id, name,
      duration: null,       // estimated minutes, optional
      scheduledDay: null,   // "Monday"…"Sunday" or null
      completed: false,
      completedDate: null,  // ISO date
      timerMinutes: 0,
      addedDate: string
    }

  /* ─────────────────────────────────────────────────────────────────
     BUDGET SCHEMA
  ─────────────────────────────────────────────────────────────────
    { dailyHours: 4, usedMinutes: 0, resetDate: "YYYY-MM-DD" }
