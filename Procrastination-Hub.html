  /* =================================================================
     PART 5: TASKS — renderTasks()
     System process queue. Active jobs. Each task is a PID.
  ================================================================= */
  function renderTasks() {
    var main  = document.getElementById('app-main')
    var tasks = loadData(KEYS.tasks, [])

    // Module-level timer state for tasks section
    var taskTimerInterval = null
    var taskTimerStart    = null
    var taskTimerItemId   = null

    function stopTaskTimer() {
      if (!taskTimerInterval) return
      clearInterval(taskTimerInterval)
      taskTimerInterval = null
      var elapsed = (Date.now() - taskTimerStart) / 60000
      taskTimerStart  = null
      var tid = taskTimerItemId
      taskTimerItemId = null
      var ts = loadData(KEYS.tasks, [])
      var t  = ts.find(function(x) { return x.id === tid })
      if (t) { t.timerMinutes = (t.timerMinutes || 0) + elapsed; saveData(KEYS.tasks, ts) }
      addTimerMinutes(elapsed)
      logEvent('Timed ' + Math.round(elapsed) + ' min on task: ' + (t ? t.name : 'unknown'))
      return elapsed
    }

    function startTaskTimer(taskId) {
      if (taskTimerInterval) stopTaskTimer()
      taskTimerStart  = Date.now()
      taskTimerItemId = taskId
      var dispEl = document.getElementById('task-timer-' + taskId)
      taskTimerInterval = setInterval(function() {
        var el = document.getElementById('task-timer-' + taskId)
        if (!el) { clearInterval(taskTimerInterval); taskTimerInterval = null; return }
        var s = Math.floor((Date.now() - taskTimerStart) / 1000)
        var h = Math.floor(s / 3600)
        var m = Math.floor((s % 3600) / 60)
        var sec = s % 60
        el.textContent = '\u25b6 ' + (h > 0 ? String(h).padStart(2,'0') + ':' : '') +
          String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0')
      }, 1000)
    }

    // Header
    var today     = getTodayName()
    var activeCnt = tasks.filter(function(t) { return !t.completed }).length
    var headerRow = document.createElement('div')
    headerRow.className = 'tasks-header-row'
    headerRow.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">PROCESS QUEUE</div>' +
      '<span class="tasks-active-badge">[' + activeCnt + ' ACTIVE]</span>'
    main.appendChild(headerRow)

    // Separator
    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-4);'
    main.appendChild(sep)

    // Add bar
    var addBar = document.createElement('div')
    addBar.className = 'tasks-add-bar'
    var nameIn  = document.createElement('input')
    nameIn.className   = 'tasks-name-input'
    nameIn.placeholder = 'New process name...'
    nameIn.type        = 'text'
    nameIn.autocomplete = 'off'
    var durIn = document.createElement('input')
    durIn.className   = 'tasks-dur-input'
    durIn.placeholder = 'e.g. ' + (getAppSettings().tasksDefaultDurationMin || 45)
    durIn.type        = 'number'
    durIn.min         = '1'
    durIn.title       = 'Duration in minutes'
    durIn.value       = String(getAppSettings().tasksDefaultDurationMin || 45)
    // Wrap the dur input to add MIN suffix
    var durWrap = document.createElement('div')
    durWrap.style.cssText = 'position:relative;display:inline-flex;align-items:center;'
    var minLabel = document.createElement('span')
    minLabel.textContent = 'MIN'
    minLabel.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);font:700 10px var(--font-mono);color:var(--text-3);pointer-events:none;letter-spacing:0.1em;'
    var daySelect = document.createElement('select')
    daySelect.className = 'tasks-day-select'
    var DAYS_OPT = ['Any day','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']
    DAYS_OPT.forEach(function(d) {
      var opt = document.createElement('option')
      opt.value = d === 'Any day' ? '' : d
      opt.textContent = d
      daySelect.appendChild(opt)
    })
    var spawnBtn = document.createElement('button')
    spawnBtn.className   = 'btn-primary btn-spawn'
    spawnBtn.textContent = '+ SPAWN'
    durWrap.appendChild(durIn)
    durWrap.appendChild(minLabel)
    addBar.appendChild(nameIn)
    addBar.appendChild(durWrap)
    addBar.appendChild(daySelect)
    addBar.appendChild(spawnBtn)
    main.appendChild(addBar)

    function spawnTask() {
      var name = nameIn.value.trim()
      if (!name) { nameIn.classList.add('flash-error'); setTimeout(function() { nameIn.classList.remove('flash-error') }, 450); return }
      var dur = parseInt(durIn.value, 10) || null
      var day = daySelect.value || null
      var newTask = {
        id: generateId(name), name: name, duration: dur,
        scheduledDay: day, completed: false, completedDate: null,
        timerMinutes: 0, addedDate: new Date().toISOString().split('T')[0]
      }
      var ts = loadData(KEYS.tasks, [])
      ts.unshift(newTask)
      saveData(KEYS.tasks, ts)
      logEvent('Spawned process: ' + name)
      nameIn.value = ''; durIn.value = String(getAppSettings().tasksDefaultDurationMin || 45); daySelect.value = ''
      tasks = loadData(KEYS.tasks, [])
      refreshActiveList()
    }
    spawnBtn.addEventListener('click', spawnTask)
    nameIn.addEventListener('keydown', function(e) { if (e.key === 'Enter') spawnTask() })

    // Active list container
    var activeWrap = document.createElement('div')
    activeWrap.id = 'tasks-active-wrap'
    main.appendChild(activeWrap)

    // Completed section
    var completedWrap = document.createElement('div')
    completedWrap.id = 'tasks-completed-wrap'
    main.appendChild(completedWrap)

    function refreshActiveList() {
      tasks = loadData(KEYS.tasks, [])
      activeCnt = tasks.filter(function(t) { return !t.completed }).length
      var badge = main.querySelector('.tasks-active-badge')
      if (badge) badge.textContent = '[' + activeCnt + ' ACTIVE]'
      renderActiveList()
      renderCompletedSection()
    }

    function renderActiveList() {
      var wrap   = document.getElementById('tasks-active-wrap')
      wrap.innerHTML = ''
      var active = tasks.filter(function(t) { return !t.completed })
        .sort(function(a,b) {
          var aToday = (a.scheduledDay === today) ? 0 : 1
          var bToday = (b.scheduledDay === today) ? 0 : 1
          if (aToday !== bToday) return aToday - bToday
          return new Date(b.addedDate) - new Date(a.addedDate)
        })
      if (active.length === 0) {
        wrap.innerHTML =
          '<div class="tasks-empty">' +
            '<div class="tasks-empty-title">NO ACTIVE PROCESSES</div>' +
            '<div class="tasks-idle-line">SYSTEM IDLE&nbsp;<span class="idle-cursor"></span></div>' +
            '<span class="tasks-terminal-prompt">&gt;_</span>' +
          '</div>'
        return
      }
      var frag = document.createDocumentFragment()
      active.forEach(function(task) {
        frag.appendChild(buildTaskCard(task, false, today, startTaskTimer, stopTaskTimer, refreshActiveList))
      })
      wrap.appendChild(frag)
    }

    function renderCompletedSection() {
      var wrap = document.getElementById('tasks-completed-wrap')
      wrap.innerHTML = ''
      var done = tasks.filter(function(t) { return t.completed })
        .sort(function(a,b) { return new Date(b.completedDate||b.addedDate) - new Date(a.completedDate||a.addedDate) })
      if (done.length === 0) return
      var isExpanded = done.length <= 5
      var header = document.createElement('div')
      header.className = 'tasks-completed-header'
      var chevron = document.createElement('span')
      chevron.className = 'tasks-completed-chevron' + (isExpanded ? ' open' : '')
      chevron.textContent = '\u25be'
      header.innerHTML =
        '<span class="tasks-completed-title">COMPLETED PROCESSES</span>' +
        '<span class="tasks-completed-count">[' + done.length + ']</span>'
      header.appendChild(chevron)
      var list = document.createElement('div')
      list.className = 'tasks-completed-list' + (isExpanded ? ' open' : '')
      var frag = document.createDocumentFragment()
      done.forEach(function(task) {
        frag.appendChild(buildTaskCard(task, true, today, null, null, refreshActiveList))
      })
      list.appendChild(frag)
      header.addEventListener('click', function() {
        var open = list.classList.toggle('open')
        chevron.classList.toggle('open', open)
      })
      wrap.appendChild(header)
      wrap.appendChild(list)
    }

    renderActiveList()
    renderCompletedSection()
  }

  /* Build a single task card */
  function buildTaskCard(task, isCompleted, today, startTaskTimer, stopTaskTimer, onRefresh) {
    var card = document.createElement('div')
    card.className = 'task-card'
    if (isCompleted) { card.style.opacity = '0.45'; card.style.pointerEvents = 'none' }

    // Status col
    var statusCol = document.createElement('div')
    statusCol.className = 'task-status-col'
    var dotCls = isCompleted ? 'lib-status-dot completed' : 'lib-status-dot watching'
    var labelText = isCompleted ? 'TERMINATED' : 'ACTIVE'
    statusCol.innerHTML =
      '<span class="' + dotCls + '"></span>' +
      '<span class="task-status-label' + (isCompleted ? ' terminated' : '') + '">' + labelText + '</span>'
    card.appendChild(statusCol)

    // Center
    var center = document.createElement('div')
    center.className = 'task-center'
    var nameEl = document.createElement('div')
    nameEl.className = 'task-name' + (isCompleted ? ' done' : '')
    nameEl.textContent = task.name
    center.appendChild(nameEl)
    var metaEl = document.createElement('div')
    metaEl.className = 'task-meta'
    if (task.duration) {
      var durSpan = document.createElement('span')
      durSpan.className = 'task-duration'
      durSpan.textContent = '~' + task.duration + ' min'
      metaEl.appendChild(durSpan)
    }
    if (task.scheduledDay) {
      var dayPill = document.createElement('span')
      dayPill.className = 'task-day-pill'
      dayPill.textContent = task.scheduledDay
      metaEl.appendChild(dayPill)
    }
    if (isCompleted && task.completedDate) {
      var doneDate = document.createElement('span')
      doneDate.className = 'task-done-date'
      var d = new Date(task.completedDate)
      doneDate.textContent = 'Done ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
      metaEl.appendChild(doneDate)
    }
    center.appendChild(metaEl)
    // Timer display
    var timerDisp = document.createElement('div')
    timerDisp.className = 'task-timer-display'
    timerDisp.id = 'task-timer-' + task.id
    center.appendChild(timerDisp)
    card.appendChild(center)

    // Actions
    if (!isCompleted) {
      var actions = document.createElement('div')
      actions.className = 'task-actions'
      actions.style.pointerEvents = 'all'

      // Timer btn
      var timerBtn = document.createElement('button')
      timerBtn.className = 'task-btn'
      timerBtn.textContent = '\u23f1'
      timerBtn.title = 'Start timer'
      timerBtn.addEventListener('click', function() {
        var running = timerBtn.classList.contains('timer-running')
        if (running) {
          stopTaskTimer && stopTaskTimer()
          timerBtn.classList.remove('timer-running')
          timerBtn.textContent = '\u23f1'
          timerDisp.textContent = ''
        } else {
          startTaskTimer && startTaskTimer(task.id)
          timerBtn.classList.add('timer-running')
          timerBtn.textContent = '\u25a0'
        }
      })

      // Complete btn
      var completeBtn = document.createElement('button')
      completeBtn.className = 'task-btn complete-btn'
      completeBtn.textContent = '\u2713 Done'
      completeBtn.addEventListener('click', function() {
        if (timerBtn.classList.contains('timer-running')) {
          stopTaskTimer && stopTaskTimer()
        }
        var ts = loadData(KEYS.tasks, [])
        var t  = ts.find(function(x) { return x.id === task.id })
        if (t) {
          t.completed    = true
          t.completedDate = new Date().toISOString().split('T')[0]
          saveData(KEYS.tasks, ts)
          var mins = t.timerMinutes ? ' (' + Math.round(t.timerMinutes) + ' min)' : ''
          logEvent('Completed task: ' + t.name + mins)
        }
        card.classList.add('completing')
        setTimeout(function() { if (onRefresh) onRefresh() }, 320)
      })

      // Delete btn (with inline confirm)
      var deleteBtn = document.createElement('button')
      deleteBtn.className = 'task-btn delete-btn'
      deleteBtn.textContent = '\u2715'
      deleteBtn.title = 'Delete'
      deleteBtn.addEventListener('click', function() {
        actions.innerHTML = ''
        var conf = document.createElement('div')
        conf.className = 'task-delete-confirm'
        conf.innerHTML = 'Delete?&nbsp;'
        var yesBtn = document.createElement('button')
        yesBtn.className = 'task-btn delete-btn'
        yesBtn.textContent = 'Yes'
        var noBtn = document.createElement('button')
        noBtn.className = 'task-btn'
        noBtn.textContent = 'No'
        yesBtn.addEventListener('click', function() {
          var ts = loadData(KEYS.tasks, [])
          saveData(KEYS.tasks, ts.filter(function(x) { return x.id !== task.id }))
          logEvent('Deleted task: ' + task.name)
          card.classList.add('removing')
          setTimeout(function() { card.remove(); if (onRefresh) onRefresh() }, 320)
        })
        noBtn.addEventListener('click', function() {
          actions.innerHTML = ''
          actions.appendChild(timerBtn)
          actions.appendChild(completeBtn)
          actions.appendChild(deleteBtn)
        })
        conf.appendChild(yesBtn)
        conf.appendChild(noBtn)
        actions.appendChild(conf)
      })

      actions.appendChild(timerBtn)
      actions.appendChild(completeBtn)
      actions.appendChild(deleteBtn)
      card.appendChild(actions)
    } else {
      // Completed — only delete
      var actions2 = document.createElement('div')
      actions2.className = 'task-actions'
      actions2.style.pointerEvents = 'all'
      var delBtn2 = document.createElement('button')
      delBtn2.className = 'task-btn delete-btn'
      delBtn2.textContent = '\u2715'
      delBtn2.addEventListener('click', function() {
        var ts = loadData(KEYS.tasks, [])
        saveData(KEYS.tasks, ts.filter(function(x) { return x.id !== task.id }))
        logEvent('Deleted task: ' + task.name)
        card.classList.add('removing')
        setTimeout(function() { card.remove(); if (onRefresh) onRefresh() }, 320)
      })
      actions2.appendChild(delBtn2)
      card.appendChild(actions2)
    }
    return card
  }

  /* =================================================================
     MANAGE SEASONS MODAL — openManageSeasonsModal(item, id, onDone)
  ================================================================= */
  function openManageSeasonsModal(item, id, onDone) {
    var overlay = document.createElement('div')
    overlay.className = 'sched-modal-overlay'
    overlay.style.zIndex = '10001'
    var box = document.createElement('div')
    box.className = 'sched-modal'
    box.style.cssText = 'width:min(560px,calc(100% - 40px));'

    var seasons = (item.seasons || []).slice()
    if (!seasons.length) {
      alert('No seasons found. Add a season first.')
      return
    }

    var rowsHtml = seasons.map(function(s, i) {
      var count = (s.episodes || []).length
      return '<div style="display:grid;grid-template-columns:1fr 120px;gap:8px;margin-bottom:8px;">' +
        '<input class="sched-modal-input" data-sidx="' + i + '" data-field="name" value="' + (s.name || ('Season ' + (i + 1))) + '" autocomplete="off"/>' +
        '<input class="sched-modal-input" data-sidx="' + i + '" data-field="count" type="number" min="0" value="' + count + '" autocomplete="off"/>' +
      '</div>'
    }).join('')

    box.innerHTML =
      '<div class="sched-modal-title">Manage Seasons</div>' +
      '<div class="sched-modal-subtitle">' + item.title + '</div>' +
      '<div style="font:500 10px var(--font-mono);color:var(--text-3);margin-bottom:8px;">Edit name and episode count for each season.</div>' +
      rowsHtml +
      '<div class="sched-modal-btns"><button class="sched-modal-cancel" id="ms-cancel">CANCEL</button><button class="sched-modal-save" id="ms-save">SAVE CHANGES</button></div>'

    overlay.appendChild(box)
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'
    requestAnimationFrame(function() { overlay.classList.add('visible') })

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 180)
      if (onDone) onDone()
    }
    box.querySelector('#ms-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })

    box.querySelector('#ms-save').addEventListener('click', function() {
      var lib = loadData(KEYS.library, [])
      var it = lib.find(function(x) { return x.id === id })
      if (!it) return
      var rows = box.querySelectorAll('[data-sidx]')
      var nextByIndex = {}
      rows.forEach(function(el) {
        var idx = parseInt(el.dataset.sidx, 10)
        if (!nextByIndex[idx]) nextByIndex[idx] = { name: '', count: 0 }
        if (el.dataset.field === 'name') nextByIndex[idx].name = (el.value || '').trim() || ('Season ' + (idx + 1))
        if (el.dataset.field === 'count') nextByIndex[idx].count = Math.max(0, parseInt(el.value, 10) || 0)
      })

      var watchedSet = new Set(it.watchedEpisodes || [])
      var newSeasons = []
      var newWatched = []
      var epNum = 1
      ;(it.seasons || []).forEach(function(s, idx) {
        var spec = nextByIndex[idx] || { name: s.name || ('Season ' + (idx + 1)), count: (s.episodes || []).length }
        var eps = []
        for (var i = 0; i < spec.count; i++) {
          var oldEp = (s.episodes || [])[i]
          var oldKey = makeEpKey(idx, oldEp ? oldEp.number : (i + 1))
          var nextEp = { number: epNum, title: oldEp && oldEp.title ? oldEp.title : '' }
          eps.push(nextEp)
          var newKey = makeEpKey(idx, epNum)
          if (watchedSet.has(oldKey)) newWatched.push(newKey)
          epNum++
        }
        newSeasons.push({ id: 's' + (idx + 1), name: spec.name, episodes: eps })
      })
      it.seasons = newSeasons
      it.totalEpisodes = epNum - 1
      it.watchedEpisodes = Array.from(new Set(newWatched))
      saveData(KEYS.library, lib)
      logEvent('Updated seasons for ' + item.title)
      closeModal()
    })
  }

  /* =================================================================
     ADD SEASON MODAL — openAddSeasonModal(item, id, onDone)
     Smart modal to add a new season/part/movie to an existing entry.
     Replaces the old double-prompt UX.
  ================================================================= */
  function openAddSeasonModal(item, id, onDone) {
    var overlay = document.createElement('div')
    overlay.className = 'sched-modal-overlay'
    overlay.style.zIndex = '10001'

    var existingSeasons = (item.seasons || [])
    var lastEpNum = 0
    existingSeasons.forEach(function(s) {
      (s.episodes || []).forEach(function(e) {
        if (e.number > lastEpNum) lastEpNum = e.number
      })
    })
    var nextSeasonNum = existingSeasons.length + 1
    var suggestedName = item.type === 'movie' ? 'Sequel' : 'Season ' + nextSeasonNum

    // Detect unit type
    var isReading = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel')
    var unitLabel = isReading ? 'chapters' : 'episodes'

    var box = document.createElement('div')
    box.className = 'sched-modal'
    box.style.cssText = 'width:min(460px,calc(100% - 48px));'
    box.innerHTML = `
      <div class="sched-modal-title">+ Add New Season / Part</div>
      <div class="sched-modal-subtitle" style="margin-bottom:16px;">${item.title}</div>

      <div class="sched-modal-field">
        <div class="sched-modal-label">Season Name</div>
        <input class="sched-modal-input" id="asm-name" type="text" value="${suggestedName}" placeholder="e.g. Season 2, Part 2, Movie" autocomplete="off"/>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;" id="asm-presets">
          ${['Season '+nextSeasonNum,'Part '+nextSeasonNum,'Cour '+nextSeasonNum,'OVA','Movie','Special'].map(function(p){
            return '<button type="button" class="sched-modal-cancel" style="padding:4px 10px;font-size:10px;letter-spacing:0.08em;" data-preset="'+p+'">'+p+'</button>'
          }).join('')}
        </div>
      </div>

      <div class="sched-modal-field">
        <div class="sched-modal-label"># of ${unitLabel} <span style="color:var(--text-3);font-weight:400">(0 if unknown / airing)</span></div>
        <input class="sched-modal-input" id="asm-eps" type="number" min="0" value="" placeholder="e.g. 12" autocomplete="off"/>
      </div>

      <div class="sched-modal-field">
        <div class="sched-modal-label">Status of this season</div>
        <select class="sched-modal-input" id="asm-status">
          <option value="watching">Watching / Active</option>
          <option value="upcoming">Upcoming</option>
        </select>
      </div>

      <div id="asm-release-wrap" style="display:none;" class="sched-modal-field">
        <div class="sched-modal-label">Release / Air Date</div>
        <input class="sched-modal-input" id="asm-release-date" type="date" autocomplete="off"/>
        <div style="font:400 10px var(--font-mono);color:var(--text-3);margin-top:4px;">Will auto-schedule to that date in Overview calendar.</div>
      </div>

      <div id="asm-recurring-section" style="display:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:4px;background:var(--surface);">
        <div style="font:700 10px var(--font-mono);color:var(--accent-cool);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;">⚡ Auto-Schedule Weekly Episodes</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <div class="sched-modal-label">Airs every</div>
            <select class="sched-modal-input" id="asm-rec-day">
              <option value="">— Pick day —</option>
              ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(function(d){return '<option>'+d+'</option>'}).join('')}
            </select>
          </div>
          <div>
            <div class="sched-modal-label">Starting from</div>
            <input class="sched-modal-input" id="asm-rec-start" type="date" autocomplete="off"/>
          </div>
          <div>
            <div class="sched-modal-label">First episode #</div>
            <input class="sched-modal-input" id="asm-rec-ep-start" type="number" min="1" value="${lastEpNum + 1}" placeholder="1" autocomplete="off"/>
          </div>
          <div>
            <div class="sched-modal-label">Until date</div>
            <input class="sched-modal-input" id="asm-rec-end" type="date" autocomplete="off"/>
          </div>
        </div>
        <div style="font:400 10px var(--font-mono);color:var(--text-3);margin-top:8px;" id="asm-rec-preview">Fill in the fields above to preview the schedule.</div>
      </div>

      <div style="margin-top:8px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:none;font:500 11px var(--font-mono);color:var(--text-2);">
          <input type="checkbox" id="asm-show-recurring" style="accent-color:var(--accent-cool);width:14px;height:14px;cursor:none;"/>
          Auto-schedule weekly episodes (anime/shows airing on a fixed day)
        </label>
      </div>

      <div class="sched-modal-btns" style="margin-top:18px;">
        <button class="sched-modal-cancel" id="asm-cancel">ABORT</button>
        <button class="sched-modal-save" id="asm-save">ADD SEASON →</button>
      </div>`

    overlay.appendChild(box)
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'
    requestAnimationFrame(function() { requestAnimationFrame(function() { overlay.classList.add('visible') }) })
    setTimeout(function() { var n = box.querySelector('#asm-name'); if (n) { n.focus(); n.select() } }, 260)

    // Preset buttons
    box.querySelectorAll('[data-preset]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var inp = box.querySelector('#asm-name')
        if (inp) { inp.value = btn.dataset.preset; inp.focus() }
      })
    })

    // Status toggle for release date
    var statusSel = box.querySelector('#asm-status')
    var releaseWrap = box.querySelector('#asm-release-wrap')
    statusSel.addEventListener('change', function() {
      releaseWrap.style.display = statusSel.value === 'upcoming' ? 'block' : 'none'
    })

    // Recurring checkbox
    var recurChk = box.querySelector('#asm-show-recurring')
    var recurSection = box.querySelector('#asm-recurring-section')
    recurChk.addEventListener('change', function() {
      recurSection.style.display = recurChk.checked ? 'block' : 'none'
    })

    // Live preview for recurring
    function updateRecurPreview() {
      var preview = box.querySelector('#asm-rec-preview')
      var day   = box.querySelector('#asm-rec-day').value
      var start = box.querySelector('#asm-rec-start').value
      var end   = box.querySelector('#asm-rec-end').value
      var epS   = parseInt(box.querySelector('#asm-rec-ep-start').value, 10) || 1
      if (!day || !start || !end) { preview.textContent = 'Fill in all fields to preview.'; preview.style.color = 'var(--text-3)'; return }
      var dates = getWeeklyDates(day, start, end)
      if (dates.length === 0) { preview.textContent = 'No dates found. Check start/end.'; preview.style.color = 'var(--accent-warm)'; return }
      preview.innerHTML = '<span style="color:var(--accent-green)">✓ Will schedule <strong>' + dates.length + ' episodes</strong> (ep ' + epS + '–' + (epS + dates.length - 1) + ') every ' + day + ' from ' + formatDateShort(dates[0]) + ' to ' + formatDateShort(dates[dates.length-1]) + '</span>'
    }
    ;['#asm-rec-day','#asm-rec-start','#asm-rec-end','#asm-rec-ep-start'].forEach(function(sel) {
      var el = box.querySelector(sel)
      if (el) el.addEventListener('change', updateRecurPreview)
      if (el) el.addEventListener('input', updateRecurPreview)
    })

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 250)
    }

    box.querySelector('#asm-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    })

    box.querySelector('#asm-save').addEventListener('click', function() {
      var name = (box.querySelector('#asm-name').value || '').trim()
      if (!name) { box.querySelector('#asm-name').style.borderColor = 'var(--danger)'; box.querySelector('#asm-name').focus(); return }
      var epCount = parseInt(box.querySelector('#asm-eps').value, 10) || 0
      var newStatus = box.querySelector('#asm-status').value
      var relDate = box.querySelector('#asm-release-date').value

      var lib6 = loadData(KEYS.library, [])
      var it6  = lib6.find(function(i) { return i.id === id })
      if (!it6) return
      if (!it6.seasons) it6.seasons = []

      // Build episodes array
      var startNum = lastEpNum + 1
      var newEps = []
      for (var ei = 0; ei < epCount; ei++) newEps.push({ number: startNum + ei, title: '' })

      var newSeason = { id: 's' + (it6.seasons.length + 1), name: name, episodes: newEps }
      if (newStatus === 'upcoming') newSeason.upcoming = true
      it6.seasons.push(newSeason)
      it6.totalEpisodes = (it6.totalEpisodes || 0) + epCount
      if (newStatus === 'upcoming') it6.status = 'upcoming'
      saveData(KEYS.library, lib6)
      logEvent('Added season "' + name + '" to ' + item.title)

      // Auto-schedule release date if upcoming
      if (newStatus === 'upcoming' && relDate) {
        var sched = loadData(KEYS.schedule, {})
        if (!sched[relDate]) sched[relDate] = []
        var alreadyIdx = sched[relDate].findIndex(function(x) { return x.id === id })
        var entry = { id: id, title: item.title + ' · ' + name, type: item.type, eps: 'Releases' }
        if (alreadyIdx >= 0) sched[relDate][alreadyIdx] = entry
        else sched[relDate].push(entry)
        saveData(KEYS.schedule, sched)
        logEvent('Scheduled release of ' + item.title + ' · ' + name + ' on ' + relDate)
      }

      // Auto-schedule recurring weekly episodes
      if (recurChk.checked) {
        var recDay   = box.querySelector('#asm-rec-day').value
        var recStart = box.querySelector('#asm-rec-start').value
        var recEnd   = box.querySelector('#asm-rec-end').value
        var recEpS   = parseInt(box.querySelector('#asm-rec-ep-start').value, 10) || 1
        if (recDay && recStart && recEnd) {
          var dates = getWeeklyDates(recDay, recStart, recEnd)
          var sched2 = loadData(KEYS.schedule, {})
          dates.forEach(function(dk, idx) {
            if (!sched2[dk]) sched2[dk] = []
            var epLabel = isReading ? 'Ch. ' + (recEpS + idx) : 'Ep. ' + (recEpS + idx)
            var alreadyI = sched2[dk].findIndex(function(x) { return x.id === id })
            var ent = { id: id, title: item.title, type: item.type, eps: epLabel }
            if (alreadyI >= 0) sched2[dk][alreadyI] = ent
            else sched2[dk].push(ent)
          })
          saveData(KEYS.schedule, sched2)
          logEvent('Auto-scheduled ' + dates.length + ' ' + unitLabel + ' of ' + item.title + ' every ' + recDay)
        }
      }

      closeModal()
      if (onDone) onDone()
    })
  }

  /* Helper: get all dates for a given weekday between start and end (inclusive) */
  function getWeeklyDates(dayName, startDateStr, endDateStr) {
    var dayMap = { Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6, Sunday:0 }
    var targetDay = dayMap[dayName]
    if (targetDay === undefined) return []
    var cur = new Date(startDateStr + 'T00:00:00')
    var end = new Date(endDateStr + 'T00:00:00')
    var results = []
    // Advance to first occurrence of target day
    while (cur.getDay() !== targetDay && cur <= end) cur.setDate(cur.getDate() + 1)
    while (cur <= end) {
      var y = cur.getFullYear()
      var m = String(cur.getMonth() + 1).padStart(2, '0')
      var day = String(cur.getDate()).padStart(2, '0')
      results.push(y + '-' + m + '-' + day)
      cur.setDate(cur.getDate() + 7)
    }
    return results
  }

  function formatDateShort(dateStr) {
    if (!dateStr) return ''
    var d = new Date(dateStr + 'T00:00:00')
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' })
  }

  function openWeeklyForSelectedEps(itemId, itemTitle, sortedEps, onDone) {

    requestAnimationFrame(function() { requestAnimationFrame(function() { overlay.classList.add('visible') }) })
    setTimeout(function() { var d = box.querySelector('#wse-day'); if (d) d.focus() }, 260)

    function getWeeklyDatesFromStart(day, startDate, count) {
      var dates = []
      var d = new Date(startDate + 'T00:00:00')
      var targetDay = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(day)
      // Advance to first occurrence of target day on or after start
      while (d.getDay() !== targetDay) d.setDate(d.getDate() + 1)
      for (var i = 0; i < count; i++) {
        // Use local date parts to avoid UTC timezone shift
        var y = d.getFullYear()
        var m = String(d.getMonth() + 1).padStart(2, '0')
        var day2 = String(d.getDate()).padStart(2, '0')
        dates.push(y + '-' + m + '-' + day2)
        d.setDate(d.getDate() + 7)
      }
      return dates
    }

    }

    ;['#wse-day','#wse-start'].forEach(function(s) {
      var el = box.querySelector(s)
      if (el) { el.addEventListener('change', updatePreview); el.addEventListener('input', updatePreview) }
    })

    function closeModal() {
      overlay.classList.remove('visible')
      document.body.style.overflow = ''
      setTimeout(function() { overlay.remove() }, 250)
    }

    box.querySelector('#wse-cancel').addEventListener('click', closeModal)
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() })
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    })

    box.querySelector('#wse-save').addEventListener('click', function() {
      var day   = box.querySelector('#wse-day').value
      var start = box.querySelector('#wse-start').value
      if (!day || !start) { alert('Please fill in day and start date.'); return }
      var dates = getWeeklyDatesFromStart(day, start, sortedEps.length)
      if (dates.length === 0) { alert('No dates generated.'); return }

      var sched = loadData(KEYS.schedule, {})
      dates.forEach(function(dk, idx) {
        if (!sched[dk]) sched[dk] = []
        var epLabel = unitShort + ' ' + sortedEps[idx]
        var alreadyI = sched[dk].findIndex(function(x) { return x.id === itemId })
        var ent = { id: itemId, title: itemTitle, type: item ? item.type : '', eps: epLabel }
        if (alreadyI >= 0) sched[dk][alreadyI] = ent
        else sched[dk].push(ent)
      })
      saveData(KEYS.schedule, sched)
      logEvent('Weekly: scheduled ' + sortedEps.length + ' episodes of ' + itemTitle + ' every ' + day + ' from ' + start)
      closeModal()
      if (onDone) onDone()
    })
  }

      var unit = (item.type==='manga'||item.type==='manhwa'||item.type==='novel') ? 'ch' : 'ep';
      var left = item.totalEpisodes - (item.watchedEpisodes||[]).length;
      opt.textContent = item.title + '  [' + left + ' ' + unit + ' left]';
      recSel.appendChild(opt);
    });

    // ── Tab switching ──
    var tabSingle    = box.querySelector('#sched-tab-single');
    var tabRecurring = box.querySelector('#sched-tab-recurring');
    var panelSingle    = box.querySelector('#sched-panel-single');
    var panelRecurring = box.querySelector('#sched-panel-recurring');

    function switchTab(which) {
      var isRecurring = which === 'recurring';
      tabSingle.style.borderBottomColor    = isRecurring ? 'transparent' : 'var(--accent-cool)';
      tabSingle.style.color                = isRecurring ? 'var(--text-3)' : 'var(--accent-cool)';
      tabRecurring.style.borderBottomColor = isRecurring ? 'var(--accent-cool)' : 'transparent';
      tabRecurring.style.color             = isRecurring ? 'var(--accent-cool)' : 'var(--text-3)';
      panelSingle.style.display    = isRecurring ? 'none' : 'block';
      panelRecurring.style.display = isRecurring ? 'block' : 'none';
    }
    tabSingle.addEventListener('click', function() { switchTab('single') });
    tabRecurring.addEventListener('click', function() { switchTab('recurring') });

    // ── Recurring preview ──
    function updateSchedRecPreview() {
      var preview = box.querySelector('#sched-rec-preview');
      var day   = box.querySelector('#sched-rec-day').value;
      var start = box.querySelector('#sched-rec-start').value;
      var end   = box.querySelector('#sched-rec-end').value;
      var epS   = parseInt(box.querySelector('#sched-rec-ep-start').value, 10) || 1;
      var selItemId = recSel.value;
      var selItem = watching.find(function(i) { return i.id === selItemId });
      var isReading = selItem && (selItem.type==='manga'||selItem.type==='manhwa'||selItem.type==='novel');
      var unitShort = isReading ? 'Ch.' : 'Ep.';
      if (!day || !start || !end) { preview.textContent = 'Fill in all fields to preview.'; preview.style.color = 'var(--text-3)'; return; }
      var dates = getWeeklyDates(day, start, end);
      if (dates.length === 0) { preview.textContent = 'No dates in range. Check start/end.'; preview.style.color = 'var(--accent-warm)'; return; }
      preview.innerHTML = '<span style="color:var(--accent-green)">✓ Will schedule <strong>' + dates.length + ' entries</strong> (' + unitShort + ' ' + epS + '–' + (epS + dates.length - 1) + ') every ' + day + ' · ' + formatDateShort(dates[0]) + ' → ' + formatDateShort(dates[dates.length-1]) + '</span>';
    }
    ;['#sched-rec-day','#sched-rec-start','#sched-rec-end','#sched-rec-ep-start'].forEach(function(s) {
      var el = box.querySelector(s);
      if (el) { el.addEventListener('change', updateSchedRecPreview); el.addEventListener('input', updateSchedRecPreview); }
    });
    recSel.addEventListener('change', updateSchedRecPreview);

    if (isPickingDate) {
      var dSel = box.querySelector('#sched-modal-date-sel');
      // Quick options: today + configurable future days
      var lookaheadDays = Math.max(7, parseInt(getAppSettings().overviewDateLookaheadDays, 10) || 14)
      for (var i = 0; i < lookaheadDays; i++) {
        var d = new Date();
        d.setDate(d.getDate() + i);
        var dk = d.toISOString().split('T')[0];
        var opt = document.createElement('option');
        opt.value = dk;
        var lbl = (i === 0 ? 'Today, ' : '') + d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
        if (i === 7) lbl = '── Next week ── ' + d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
        opt.textContent = lbl;
        dSel.appendChild(opt);
      }
      var sepOpt = document.createElement('option');
      sepOpt.disabled = true;
      sepOpt.textContent = '──────────────────';
      dSel.appendChild(sepOpt);
      var customOpt = document.createElement('option');
      customOpt.value = '__custom__';
      customOpt.textContent = 'Pick a custom date...';
      dSel.appendChild(customOpt);

      var customWrap = document.createElement('div');
      customWrap.id = 'sched-custom-date-wrap';
      customWrap.style.cssText = 'display:none;margin-top:8px;';
      var todayStr = new Date().toISOString().split('T')[0];
      customWrap.innerHTML = '<input type="date" id="sched-custom-date-inp" min="' + todayStr + '" style="width:100%;background:var(--surface-2);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text-1);font:14px var(--font-mono);padding:8px 10px;outline:none;cursor:default;" />';
      dSel.parentNode.appendChild(customWrap);

      dSel.addEventListener('change', function() {
        if (dSel.value === '__custom__') {
          customWrap.style.display = 'block';
          setTimeout(function() { customWrap.querySelector('#sched-custom-date-inp').focus(); }, 50);
        } else {
          customWrap.style.display = 'none';
        }
      });
    }

    overlay.appendChild(box);
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { overlay.classList.add('visible') });
    });
    
    setTimeout(function() { 
      var focusEl = box.querySelector(isPickingDate ? '#sched-modal-date-sel' : '#sched-modal-eps'); 
      if (focusEl) focusEl.focus();
    }, 260);

    function closeModal() {
      overlay.classList.remove('visible');
      document.body.style.overflow = '';
      setTimeout(function() { overlay.remove() }, 250);
    }

    box.querySelector('#sched-modal-cancel').addEventListener('click', closeModal);
    box.querySelector('#sched-rec-cancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() });
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    });

    box.querySelector('#sched-modal-save').addEventListener('click', function() {
      var finalDateKey;
      if (isPickingDate) {
        var dSelVal = box.querySelector('#sched-modal-date-sel').value;
        if (dSelVal === '__custom__') {
          var customInp = box.querySelector('#sched-custom-date-inp');
          finalDateKey = customInp ? customInp.value : '';
          if (!finalDateKey) { alert('Please pick a date.'); return; }
        } else {
          finalDateKey = dSelVal;
        }
      } else {
        finalDateKey = dateKey;
      }
      var itemId = sel.value;
      var eps    = (box.querySelector('#sched-modal-eps').value || '').trim() || null;
      var item   = watching.find(function(i) { return i.id === itemId });
      if (!item) return;

      var sched = loadData(KEYS.schedule, {});
      if (!sched[finalDateKey]) sched[finalDateKey] = [];
      var already = sched[finalDateKey].findIndex(function(x) { return x.id === itemId });
      
      if (already >= 0) sched[finalDateKey][already].eps = eps;
      else sched[finalDateKey].push({ id: item.id, title: item.title, type: item.type, eps: eps });
      
      saveData(KEYS.schedule, sched);
      logEvent('Scheduled ' + item.title + (eps ? ' (' + eps + ')' : '') + ' for ' + finalDateKey);
      
      closeModal();
      if (onSave) onSave(finalDateKey, eps);
    });

    // ── Recurring save ──
    box.querySelector('#sched-rec-save').addEventListener('click', function() {
      var recDay   = box.querySelector('#sched-rec-day').value;
      var recStart = box.querySelector('#sched-rec-start').value;
      var recEnd   = box.querySelector('#sched-rec-end').value;
      var recEpS   = parseInt(box.querySelector('#sched-rec-ep-start').value, 10) || 1;
      if (!recDay || !recStart || !recEnd) { alert('Please fill in day, start date, and end date.'); return; }
      var dates = getWeeklyDates(recDay, recStart, recEnd);
      if (dates.length === 0) { alert('No matching dates found. Check the date range.'); return; }
      var itemId  = recSel.value;
      var recItem = watching.find(function(i) { return i.id === itemId });
      if (!recItem) return;
      var isReading2 = (recItem.type==='manga'||recItem.type==='manhwa'||recItem.type==='novel');
      var unitShort2 = isReading2 ? 'Ch.' : 'Ep.';
      var sched2 = loadData(KEYS.schedule, {});
      dates.forEach(function(dk, idx) {
        if (!sched2[dk]) sched2[dk] = [];
        var epLabel = unitShort2 + ' ' + (recEpS + idx);
        var alreadyI = sched2[dk].findIndex(function(x) { return x.id === itemId });
        var ent = { id: recItem.id, title: recItem.title, type: recItem.type, eps: epLabel };
        if (alreadyI >= 0) sched2[dk][alreadyI] = ent;
        else sched2[dk].push(ent);
      });
      saveData(KEYS.schedule, sched2);
      logEvent('Recurring: scheduled ' + dates.length + ' entries for ' + recItem.title + ' every ' + recDay);
      closeModal();
      if (onSave) onSave(null, null);
    });
  }

  /* =================================================================
     PART 5: OVERVIEW — renderOverview()
     Live operations manifest. Terminal intelligence feed.
  ================================================================= */
  function renderOverview() {
    var main    = document.getElementById('app-main')
    var library = loadData(KEYS.library, [])
    var tasks   = loadData(KEYS.tasks, [])

    var activeStatus = 'all'
    var activeType   = 'all'

    // ── WEEKLY CALENDAR ──
    // Week offset: 0 = current week, 1 = next week, etc.
    if (typeof window._schedWeekOffset === 'undefined') window._schedWeekOffset = 0
    var weekOffset = window._schedWeekOffset

    var calHeader = document.createElement('div')
    calHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);'

    var weekLabel = (function() {
      if (weekOffset === 0) return 'WEEKLY SCHEDULE'
      if (weekOffset === 1) return 'WEEKLY SCHEDULE · NEXT WEEK'
      return 'WEEKLY SCHEDULE · +' + weekOffset + ' WEEKS'
    })()

    calHeader.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">' + weekLabel + '</div>' +
      '<div style="display:flex;gap:6px;align-items:center;">' +
        (weekOffset > 0 ? '<button id="sched-prev-week" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font:600 11px var(--font-mono);padding:5px 12px;border-radius:var(--radius-pill);cursor:none;transition:border-color 200ms,color 200ms;" title="Previous week">◀ PREV</button>' : '') +
        '<button id="sched-next-week" style="background:var(--surface-2);border:1px solid var(--border);color:var(--accent-cool);font:600 11px var(--font-mono);padding:5px 12px;border-radius:var(--radius-pill);cursor:none;transition:border-color 200ms,color 200ms;" title="Next week">NEXT ▶</button>' +
        (weekOffset > 0 ? '<button id="sched-today-week" style="background:transparent;border:1px solid var(--border);color:var(--text-3);font:600 10px var(--font-mono);padding:5px 10px;border-radius:var(--radius-pill);cursor:none;transition:color 200ms;" title="Jump to today">TODAY</button>' : '') +
      '</div>'
    main.appendChild(calHeader)

    var calSep = document.createElement('div')
    calSep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-5);'
    main.appendChild(calSep)

    // Wire navigation buttons
    setTimeout(function() {
      var nxtBtn = document.getElementById('sched-next-week')
      if (nxtBtn) nxtBtn.addEventListener('click', function() { window._schedWeekOffset = (window._schedWeekOffset||0)+1; navigateTo('overview') })
      var prvBtn = document.getElementById('sched-prev-week')
      if (prvBtn) prvBtn.addEventListener('click', function() { window._schedWeekOffset = Math.max(0,(window._schedWeekOffset||0)-1); navigateTo('overview') })
      var todBtn = document.getElementById('sched-today-week')
      if (todBtn) todBtn.addEventListener('click', function() { window._schedWeekOffset = 0; navigateTo('overview') })
    }, 0)

    var schedule = loadData(KEYS.schedule, {}) // { 'YYYY-MM-DD': [ {id, title, type, eps} ] }

    // Show 7 days of the selected week
    var calGrid = document.createElement('div')
    calGrid.className = 'sched-calendar'

    for (var di = 0; di < 7; di++) {
      var d = new Date()
      d.setDate(d.getDate() + (weekOffset * 7) + di)
      var dateKey = d.toISOString().split('T')[0]
      var todayKey = new Date().toISOString().split('T')[0]
      var isToday = dateKey === todayKey
      var dayShort = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()
      var dateNum  = d.getDate()
      var monthShort = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase()

      var col = document.createElement('div')
      col.className = 'sched-day-col'

      var hdr = document.createElement('div')
      hdr.className = 'sched-day-header' + (isToday ? ' today' : '')
      hdr.innerHTML = dayShort + '<br><span style="font-size:13px;letter-spacing:0;">' + dateNum + '</span><br><span style="font-size:8px;opacity:0.7;">' + monthShort + '</span>'
      col.appendChild(hdr)

      var entries = schedule[dateKey] || []

      if (entries.length === 0) {
        var emp = document.createElement('div')
        emp.className = 'sched-empty'
        emp.textContent = '—'
        col.appendChild(emp)
      } else {
        entries.forEach(function(entry) {
          var libItem = library.find(function(i) { return i.id === entry.id })
          var accentCol = (libItem && libItem.themeStyles && libItem.themeStyles['--accent-cool'])
            ? libItem.themeStyles['--accent-cool'] : 'var(--accent-cool)'
          var unit = (libItem && (libItem.type==='manga'||libItem.type==='manhwa'||libItem.type==='novel')) ? 'ch' : 'ep'
          var remaining = libItem ? (libItem.totalEpisodes - (libItem.watchedEpisodes||[]).length) : null

          var card = document.createElement('div')
          card.className = 'sched-entry'
          card.style.borderLeftColor = accentCol
          card.style.cursor = 'none'
          card.innerHTML =
            '<span class="sched-entry-title">' + (entry.title || '—') + '</span>' +
            (entry.eps ? '<div class="sched-entry-eps">▸ ' + entry.eps + '</div>' : '') +
            (remaining !== null && remaining > 0 ? '<div class="sched-entry-meta">' + remaining + ' ' + unit + ' left</div>' : '')
          card.addEventListener('click', function() {
            if (libItem) navigateTo('detail', libItem.id)
          })
          // Delete button per entry
          var delBtn = document.createElement('button')
          delBtn.title = 'Remove from schedule'
          delBtn.textContent = '×'
          delBtn.style.cssText = 'position:absolute;top:3px;right:4px;background:transparent;border:none;color:var(--text-3);font-size:14px;cursor:none;padding:0 3px;transition:color 150ms;'
          delBtn.addEventListener('mouseenter', function() { delBtn.style.color = 'var(--danger)' })
          delBtn.addEventListener('mouseleave', function() { delBtn.style.color = 'var(--text-3)' })
          ;(function(ce, cdk) {
            delBtn.addEventListener('click', function(ev) {
              ev.stopPropagation()
              var sched = loadData(KEYS.schedule, {})
              if (sched[cdk]) {
                sched[cdk] = sched[cdk].filter(function(x) { return x.id !== ce.id })
                if (sched[cdk].length === 0) delete sched[cdk]
                saveData(KEYS.schedule, sched)
              }
              logEvent('Removed ' + ce.title + ' from schedule (' + cdk + ')')
              navigateTo('overview')
            })
          })(entry, dateKey)
          card.appendChild(delBtn)
          col.appendChild(card)
        })
      }

      // "+ schedule" add button per day
      ;(function(cdk, cdayShort) {
        var addBtn = document.createElement('button')
        addBtn.className = 'sched-add-btn'
        addBtn.textContent = '+ schedule'
        addBtn.addEventListener('click', function() {
          openSchedModal(cdk, cdayShort, library, function() { navigateTo('overview') })
        })
        col.appendChild(addBtn)
      })(dateKey, dayShort)

      calGrid.appendChild(col)
    }
    main.appendChild(calGrid)

    // ── MANIFEST HEADER ──
    var headerRow = document.createElement('div')
    headerRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);'
    headerRow.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">OPERATIONS MANIFEST</div>' +
      '<span style="font:var(--text-xs) var(--font-mono);color:var(--text-3);">[' +
        library.length + ' OPS + ' + tasks.filter(function(t){return !t.completed}).length + ' PROCESSES]</span>'
    main.appendChild(headerRow)

    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-5);'
    main.appendChild(sep)

    // Filters
    var filterWrap = document.createElement('div')
    filterWrap.className = 'overview-filters'

    // Status values: library items use watching/completed/graveyard
    //                tasks use active/done
    // Type values:   library content types + 'task' for task-only view
    var LIBRARY_STATUS_PILLS = ['all','watching','reading','not started','upcoming','completed','graveyard']
    var TASK_STATUS_PILLS    = ['active','done']
    var TYPE_PILLS           = ['all','anime','manga','manhwa','show','movie','novel']

    // Row 1: Library status (cyan accent)
    var row1 = document.createElement('div'); row1.className = 'overview-filter-row'
    var lbl1 = document.createElement('span'); lbl1.className = 'overview-filter-label'; lbl1.textContent = 'Library'
    row1.appendChild(lbl1)

    // Row 2: Task status (violet accent)
    var row2 = document.createElement('div'); row2.className = 'overview-filter-row'
    var lbl2 = document.createElement('span'); lbl2.className = 'overview-filter-label'; lbl2.textContent = 'Tasks'
    row2.appendChild(lbl2)

    // Row 3: Content type
    var row3 = document.createElement('div'); row3.className = 'overview-filter-row'
    var lbl3 = document.createElement('span'); lbl3.className = 'overview-filter-label'; lbl3.textContent = 'Type'
    row3.appendChild(lbl3)

    function makePill(label, isActive, extraClass, onClick) {
      var btn = document.createElement('button')
      btn.className = 'overview-pill' + (extraClass ? ' ' + extraClass : '') + (isActive ? ' active' : '')
      btn.textContent = label.toUpperCase()
      btn.addEventListener('click', function() { onClick(btn) })
      return btn
    }

    // All library-status pills reset task-status pills to neutral and vice versa
    // so you can only have one active status at a time across both groups
    function clearAllStatusPills() {
      row1.querySelectorAll('.overview-pill').forEach(function(p) { p.classList.remove('active') })
      row2.querySelectorAll('.overview-pill').forEach(function(p) { p.classList.remove('active') })
    }

    LIBRARY_STATUS_PILLS.forEach(function(s) {
      row1.appendChild(makePill(s, s === activeStatus, '', function(btn) {
        activeStatus = s
        clearAllStatusPills()
        btn.classList.add('active')
        renderManifest()
      }))
    })
    TASK_STATUS_PILLS.forEach(function(s) {
      row2.appendChild(makePill(s, s === activeStatus, 'task-pill', function(btn) {
        activeStatus = s
        clearAllStatusPills()
        btn.classList.add('active')
        renderManifest()
      }))
    })
    TYPE_PILLS.forEach(function(t) {
      row3.appendChild(makePill(t, t === activeType, '', function(btn) {
        activeType = t
        row3.querySelectorAll('.overview-pill').forEach(function(p) { p.classList.remove('active') })
        btn.classList.add('active')
        renderManifest()
      }))
    })
    filterWrap.appendChild(row1)
    filterWrap.appendChild(row2)
    filterWrap.appendChild(row3)
    main.appendChild(filterWrap)

    // Manifest container
    var manifestWrap = document.createElement('div')
    manifestWrap.id = 'manifest-wrap'
    main.appendChild(manifestWrap)

    function renderManifest() {
      var wrap = document.getElementById('manifest-wrap')
      wrap.innerHTML = ''

      // Build combined entries
      var entries = []
      library.forEach(function(item) {
        entries.push({ kind: 'library', item: item, sortStatus: item.status })
      })
      tasks.forEach(function(task) {
        entries.push({ kind: 'task', item: task, sortStatus: task.completed ? 'done' : 'active' })
      })

      // Filter
      var filtered = entries.filter(function(e) {
        var statusOk = true
        var typeOk   = true
        if (activeStatus !== 'all') {
          if (e.kind === 'library') {
            var w = (e.item.watchedEpisodes || []).length
            var isReadType = (e.item.type === 'manga' || e.item.type === 'manhwa' || e.item.type === 'novel')
            if (activeStatus === 'not started') statusOk = e.item.status === 'watching' && w === 0
            else if (activeStatus === 'watching') statusOk = e.item.status === 'watching' && w > 0 && !isReadType
            else if (activeStatus === 'reading') statusOk = e.item.status === 'watching' && w > 0 && isReadType
            else if (activeStatus === 'upcoming') statusOk = e.item.status === 'upcoming'
            else statusOk = e.item.status === activeStatus
          }
          else statusOk = activeStatus === 'active' ? !e.item.completed : activeStatus === 'done' ? e.item.completed : false
        }
        if (activeType !== 'all') {
          if (activeType === 'task') typeOk = e.kind === 'task'
          else typeOk = e.kind === 'library' && e.item.type === activeType
        }
        return statusOk && typeOk
      })

      if (filtered.length === 0) {
        wrap.innerHTML =
          '<div style="text-align:center;padding:var(--space-12) 0;">' +
            '<div style="font:600 var(--text-md) var(--font-mono);color:var(--text-3);letter-spacing:0.08em;">NO OPERATIONS ON RECORD</div>' +
            '<div style="font:var(--text-sm) var(--font-ui);color:var(--text-3);margin-top:var(--space-3);">Your manifest is empty. Add content to the library to begin.</div>' +
          '</div>'
        return
      }

      var frag = document.createDocumentFragment()
      filtered.forEach(function(e) {
        frag.appendChild(buildManifestRow(e))
      })
      wrap.appendChild(frag)

      // Stagger entrance: 20ms per row
      var rows = wrap.querySelectorAll('.manifest-row')
      rows.forEach(function(row, i) {
        setTimeout(function() {
          requestAnimationFrame(function() {
            row.style.transition = 'opacity 150ms ' + (i * 20) + 'ms var(--ease-out), transform 150ms ' + (i*20) + 'ms var(--ease-out), background 100ms var(--ease-snap), border-color 100ms var(--ease-snap)'
            row.classList.add('row-entered')
          })
        }, 0)
      })
    }

    renderManifest()
  }

  function buildManifestRow(entry) {
    var row = document.createElement('div')
    row.className = 'manifest-row'

    var isTask = entry.kind === 'task'
    var item   = entry.item

    // Status
    var statusWrap = document.createElement('div')
    statusWrap.className = 'manifest-status'
    var dotClass, labelText, labelColor
    if (isTask) {
      dotClass   = item.completed ? 'lib-status-dot completed' : 'lib-status-dot watching'
      labelText  = item.completed ? 'TERM' : 'RUN'
      labelColor = item.completed ? 'var(--text-3)' : 'var(--success)'
      statusWrap.innerHTML =
        '<span class="' + dotClass + '"></span>' +
        '<span class="manifest-status-label" style="color:' + labelColor + ';">' + labelText + '</span>'
    } else if (item.status === 'watching') {
      // Change 16: styled WATCHING pill
      var itemWatched = (item.watchedEpisodes || []).length
      var watchLabel = itemWatched === 0 ? 'NOT STARTED' : (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'READING' : 'WATCHING'
      statusWrap.innerHTML =
        '<span class="manifest-status-watch-chip' + (itemWatched === 0 ? ' not-started' : '') + '">' +
          '<span class="chip-dot"' + (itemWatched === 0 ? ' style="background:var(--text-3)"' : '') + '></span>' + watchLabel +
        '</span>'
    } else if (item.status === 'upcoming') {
      // Styled UPCOMING pill
      statusWrap.innerHTML =
        '<span class="manifest-status-watch-chip upcoming">' +
          '<span class="chip-dot" style="background:var(--accent-cool);box-shadow:0 0 8px var(--accent-cool);"></span>UPCOMING' +
        '</span>'
    } else {
      var S = { completed:['lib-status-dot completed','DONE','var(--text-3)'],
                graveyard:['lib-status-dot graveyard','DEAD','var(--danger)'],
                upcoming:['lib-status-dot upcoming','UPCOMING','var(--accent-cool)'] }
      var fallbackLabel = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'READ' : 'WATCH'
      var s = S[item.status] || ['lib-status-dot watching', fallbackLabel, 'var(--success)']
      dotClass = s[0]; labelText = s[1]; labelColor = s[2]
      statusWrap.innerHTML =
        '<span class="' + dotClass + '"></span>' +
        '<span class="manifest-status-label" style="color:' + labelColor + ';">' + labelText + '</span>'
    }
    row.appendChild(statusWrap)
    // Type badge
    var badgeWrap = document.createElement('div')
    if (isTask) {
      badgeWrap.innerHTML = '<span style="font:var(--text-xs) var(--font-mono);color:var(--text-3);background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:var(--radius-sm);">TASK</span>'
    } else {
      badgeWrap.innerHTML = '<span class="badge" data-type="' + item.type + '">' + item.type + '</span>'
    }
    row.appendChild(badgeWrap)

    // Title
    var titleCell = document.createElement('div')
    titleCell.className = 'manifest-title-cell' + (isTask ? ' task-entry' : '')
    titleCell.textContent = item.name || item.title || ''
    row.appendChild(titleCell)

    // Progress bar
    var progCell = document.createElement('div')
    progCell.className = 'manifest-prog-cell'
    var pct = 0
    if (isTask) {
      pct = item.completed ? 100 : 0
    } else {
      pct = item.totalEpisodes > 0
        ? Math.min(((item.watchedEpisodes||[]).length / item.totalEpisodes) * 100, 100) : 0
    }
    progCell.innerHTML =
      '<div class="manifest-prog-bar"><div class="manifest-prog-fill" style="width:' + pct + '%;"></div></div>'
    row.appendChild(progCell)

    // Left / remaining
    var leftCell = document.createElement('div')
    leftCell.className = 'manifest-left-cell'
    if (isTask) {
      leftCell.textContent = item.duration ? ('~' + item.duration + 'm') : '\u2014'
    } else {
      var rem = item.totalEpisodes - (item.watchedEpisodes||[]).length
      var unit = (item.type==='manga'||item.type==='manhwa'||item.type==='novel') ? 'ch' : 'ep'
      leftCell.textContent = rem > 0 ? (rem + ' ' + unit) : '\u2014'
    }
    row.appendChild(leftCell)

    // Rating
    var ratingCell = document.createElement('div')
    ratingCell.className = 'manifest-rating-cell'
    ratingCell.textContent = (!isTask && item.rating) ? ('\u2605' + Number(item.rating).toFixed(1)) : '\u2014'
    row.appendChild(ratingCell)

    // Day
    var dayCell = document.createElement('div')
    dayCell.className = 'manifest-day-cell'
    var day = item.scheduledDay
    dayCell.textContent = day ? ('\u25b8 ' + day.slice(0,3)) : '\u2014'
    if (!day) dayCell.style.color = 'var(--text-3)'
    row.appendChild(dayCell)

    // Click
    row.addEventListener('click', function() {
      if (isTask) navigateTo('tasks')
      else navigateTo('detail', item.id)
    })

    return row
  }

  /* =================================================================
     PART 5: GRAVEYARD — renderGraveyard()
     Honest archive. Memorial. Quiet, melancholy, no judgment.
  ================================================================= */
  function renderGraveyard() {
    var main    = document.getElementById('app-main')
    var library = loadData(KEYS.library, [])
    var dead    = library.filter(function(i) { return i.status === 'graveyard' })

    // Scoped section wrapper — CSS vars shift the feel
    var section = document.createElement('div')
    section.className = 'graveyard-section'
    main.appendChild(section)

    // Header
    var headerRow = document.createElement('div')
    headerRow.className = 'graveyard-header-row'
    headerRow.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">THE GRAVEYARD</div>' +
      '<span class="graveyard-count">[' + dead.length + ' BODIES]</span>'
    section.appendChild(headerRow)

    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-3);'
    section.appendChild(sep)

    var subtitle = document.createElement('div')
    subtitle.className = 'graveyard-subtitle'
    subtitle.textContent = 'What you started. What you stopped. No judgment.'
    section.appendChild(subtitle)

    if (dead.length === 0) {
      // Empty state — two lines with staggered appearance
      var emptyDiv = document.createElement('div')
      emptyDiv.className = 'graveyard-empty'
      // Background decoration
      var bgDeco = document.createElement('div')
      bgDeco.className = 'graveyard-empty-bg-deco'
      bgDeco.textContent = '🪦'
      emptyDiv.appendChild(bgDeco)
      var line1 = document.createElement('div')
      line1.className = 'graveyard-empty-line'
      line1.textContent = 'THE GRAVEYARD IS EMPTY.'
      line1.style.font = '600 var(--text-md) var(--font-mono)'
      var line2 = document.createElement('div')
      line2.className = 'graveyard-empty-line'
      line2.textContent = 'Everything you started, you finished.'
      var line3 = document.createElement('div')
      line3.className = 'graveyard-empty-line'
      line3.textContent = 'Or you haven\u2019t started yet.'
      emptyDiv.appendChild(line1)
      emptyDiv.appendChild(line2)
      emptyDiv.appendChild(line3)
      section.appendChild(emptyDiv)
      setTimeout(function() { line1.classList.add('visible') }, 100)
      setTimeout(function() { line2.classList.add('visible') }, 400)
      setTimeout(function() { line3.classList.add('visible') }, 900)
      return
    }

    // Cards
    dead.forEach(function(item) {
      var card = document.createElement('div')
      card.className = 'graveyard-card'
      card.style.maxHeight = '500px'

      var watched = (item.watchedEpisodes||[]).length
      var total   = item.totalEpisodes || 0
      var unit    = (item.type==='manga'||item.type==='manhwa'||item.type==='novel') ? 'chapters' : 'eps'
      var pct     = total > 0 ? Math.min((watched/total)*100,100) : 0

      var addedFmt   = item.addedDate   ? new Date(item.addedDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'
      var droppedFmt = item.graveyardDate ? new Date(item.graveyardDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'

      // Header
      var cardHeader = document.createElement('div')
      cardHeader.className = 'graveyard-card-header'
      cardHeader.innerHTML =
        '<span class="badge" data-type="' + item.type + '" style="filter:saturate(0.4);">' + item.type + '</span>' +
        '<div class="graveyard-title">' + item.title + '</div>' +
        '<span class="graveyard-archived-pill">ARCHIVED</span>'
      card.appendChild(cardHeader)

      // Progress
      var progLabel = document.createElement('div')
      progLabel.className = 'graveyard-progress-label'
      progLabel.textContent = 'Got to ' + watched + ' of ' + total + ' ' + unit
      card.appendChild(progLabel)
      var progWrap = document.createElement('div')
      progWrap.className = 'graveyard-prog-wrap'
      progWrap.innerHTML = '<div class="progress-bar"><div class="progress-bar-fill" style="width:' + pct + '%;"></div></div>'
      card.appendChild(progWrap)

      // Dates
      var dates = document.createElement('div')
      dates.className = 'graveyard-dates'
      dates.textContent = 'Added: ' + addedFmt + '  \u00b7  Dropped: ' + droppedFmt
      card.appendChild(dates)

      // Note
      if (item.graveyardNote) {
        var noteEl = document.createElement('div')
        noteEl.className = 'graveyard-note-text'
        noteEl.innerHTML = '<span class="graveyard-note-prefix">Why: </span>' + item.graveyardNote
        card.appendChild(noteEl)
      } else {
        var noteIn = document.createElement('input')
        noteIn.className = 'graveyard-note-input'
        noteIn.type = 'text'
        noteIn.placeholder = 'Why did you drop this? (optional)'
        noteIn.value = ''
        noteIn.addEventListener('blur', function() {
          var val = noteIn.value.trim()
          if (!val) return
          var lib = loadData(KEYS.library, [])
          var it  = lib.find(function(x) { return x.id === item.id })
          if (it) { it.graveyardNote = val; saveData(KEYS.library, lib) }
          // Swap input → styled text display immediately after save
          var noteTextEl = document.createElement('div')
          noteTextEl.className = 'graveyard-note-text'
          noteTextEl.innerHTML = '<span class="graveyard-note-prefix">Why: </span>' + val
          noteIn.replaceWith(noteTextEl)
        })
        card.appendChild(noteIn)
      }

      // Actions
      var actionsRow = document.createElement('div')
      actionsRow.className = 'graveyard-actions'

      var reviveBtn = document.createElement('button')
      reviveBtn.className = 'btn-ghost'
      reviveBtn.dataset.sfx = 'revive'
      reviveBtn.style.fontSize = 'var(--text-xs)'
      reviveBtn.textContent = '\u21a9 REVIVE'
      reviveBtn.addEventListener('click', function() {
        var lib = loadData(KEYS.library, [])
        var it  = lib.find(function(x) { return x.id === item.id })
        if (it) { it.status = 'watching'; it.graveyardDate = null; saveData(KEYS.library, lib) }
        logEvent('Revived ' + item.title + ' from the graveyard')
        navigateTo('library')
      })

      var deleteWrap = document.createElement('div')
      var deleteBtn  = document.createElement('button')
      deleteBtn.className = 'btn-danger'
      deleteBtn.style.fontSize = 'var(--text-xs)'
      deleteBtn.textContent = '\u2715 Delete Forever'
      deleteBtn.addEventListener('click', function() {
        deleteWrap.innerHTML = ''
        var conf = document.createElement('div')
        conf.className = 'graveyard-delete-confirm'
        conf.textContent = 'This removes all data. Sure?'
        var yesBtn = document.createElement('button')
        yesBtn.className = 'btn-danger'
        yesBtn.style.fontSize = 'var(--text-xs)'
        yesBtn.textContent = 'Yes, delete'
        var noBtn = document.createElement('button')
        noBtn.className = 'btn-ghost'
        noBtn.style.fontSize = 'var(--text-xs)'
        noBtn.textContent = 'Never mind'
        yesBtn.addEventListener('click', function() {
          var lib = loadData(KEYS.library, [])
          saveData(KEYS.library, lib.filter(function(x) { return x.id !== item.id }))
          logEvent('Permanently deleted ' + item.title)
          card.style.maxHeight = card.scrollHeight + 'px'
          requestAnimationFrame(function() {
            card.classList.add('removing')
            setTimeout(function() { card.remove() }, 320)
          })
        })
        noBtn.addEventListener('click', function() {
          deleteWrap.innerHTML = ''
          deleteWrap.appendChild(deleteBtn)
        })
        conf.appendChild(yesBtn)
        conf.appendChild(noBtn)
        deleteWrap.appendChild(conf)
      })
      deleteWrap.appendChild(deleteBtn)

      actionsRow.appendChild(reviveBtn)
      actionsRow.appendChild(deleteWrap)
      card.appendChild(actionsRow)
      section.appendChild(card)
    })
  }

  /* =================================================================
     PART 5: SESSION LOG — renderSessionLog()
     System event log. Actual procrastination history.
  ================================================================= */
  function renderSessionLog() {
    var main = document.getElementById('app-main')
    renderLogSection(main)
    // Expose global refresh so logEvent() can update live
    window.__refreshLog = function() {
      if (document.getElementById('log-feed-wrap')) {
        renderLogFeed(document.getElementById('log-feed-wrap'))
      }
    }
  }

  function renderLogSection(main) {
    var log = loadData(KEYS.log, [])

    // Header row
    var headerRow = document.createElement('div')
    headerRow.className = 'log-header-row'
    headerRow.innerHTML = '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">SYSTEM LOG</div>'

    var clearWrap = document.createElement('div')
    clearWrap.id = 'log-clear-wrap'
    var clearBtn = document.createElement('button')
    clearBtn.className = 'btn-ghost'
    clearBtn.style.fontSize = 'var(--text-xs)'
    clearBtn.textContent = 'CLEAR LOG'
    var clearConfirmTimeout = null
    var clearPending = false
    clearBtn.addEventListener('click', function() {
      if (!clearPending) {
        // First click — arm the button
        clearPending = true
        clearBtn.textContent = 'CONFIRM CLEAR?'
        clearBtn.style.borderColor = 'rgba(255,59,107,0.6)'
        clearBtn.style.color = '#ff3b6b'
        clearConfirmTimeout = setTimeout(function() {
          // Reset after 3s if not clicked again
          clearPending = false
          clearBtn.textContent = 'CLEAR LOG'
          clearBtn.style.borderColor = ''
          clearBtn.style.color = ''
        }, 3000)
      } else {
        // Second click — actually clear
        clearTimeout(clearConfirmTimeout)
        clearPending = false
        clearBtn.textContent = 'CLEAR LOG'
        clearBtn.style.borderColor = ''
        clearBtn.style.color = ''
        saveData(KEYS.log, [])
        var feed = document.getElementById('log-feed-wrap')
        if (feed) renderLogFeed(feed)
        var flash = document.createElement('span')
        flash.style.cssText = 'font:var(--text-xs) var(--font-mono);color:var(--success);margin-left:var(--space-3);'
        flash.textContent = 'LOG CLEARED.'
        clearWrap.appendChild(flash)
        setTimeout(function() { flash.remove() }, 2000)
      }
    })
    clearWrap.appendChild(clearBtn)
    headerRow.appendChild(clearWrap)
    main.appendChild(headerRow)

    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-2);'
    main.appendChild(sep)

    var sub = document.createElement('div')
    sub.className = 'log-sub'
    sub.textContent = 'EVERY ACTION. AUTOMATICALLY RECORDED.'
    main.appendChild(sub)

    var feedWrap = document.createElement('div')
    feedWrap.id = 'log-feed-wrap'
    main.appendChild(feedWrap)
    renderLogFeed(feedWrap)
  }

  function renderLogFeed(wrap) {
    wrap.innerHTML = ''
    var log = loadData(KEYS.log, [])
    if (log.length === 0) {
      wrap.innerHTML =
        '<div class="log-empty">' +
          '<div class="log-empty-title">NO EVENTS LOGGED</div>' +
          '<div class="tasks-idle-line" style="margin-top:var(--space-2);">Start watching something.&nbsp;<span class="idle-cursor"></span></div>' +
        '</div>'
      return
    }

    // Group by date (YYYY-MM-DD)
    var groups = {}
    var groupOrder = []
    var now = Date.now()
    var sevenDaysAgo = now - 7 * 24 * 3600 * 1000

    log.forEach(function(evt) {
      var dateKey = evt.timestamp.slice(0,10)
      if (!groups[dateKey]) { groups[dateKey] = []; groupOrder.push(dateKey) }
      groups[dateKey].push(evt)
    })

    // Sort groups newest first
    groupOrder.sort(function(a,b) { return b.localeCompare(a) })

    var feed = document.createElement('div')
    feed.className = 'log-feed'

    groupOrder.forEach(function(dateKey) {
      var events  = groups[dateKey]
      var dateObj = new Date(dateKey + 'T00:00:00')
      var label   = dateObj.toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'}).toUpperCase()
      var groupTs = new Date(dateKey).getTime()
      // Default: collapse groups older than 7 days
      var isOpen  = groupTs >= sevenDaysAgo

      var groupEl = document.createElement('div')
      groupEl.className = 'log-group'

      var headerEl = document.createElement('div')
      headerEl.className = 'log-group-header'
      var chevron = document.createElement('span')
      chevron.className = 'log-group-chevron' + (isOpen ? ' open' : '')
      chevron.textContent = '\u25be'
      headerEl.innerHTML =
        '<span class="log-group-date">' + label + '</span>' +
        '<div class="log-group-sep"></div>' +
        '<span class="log-group-count">[' + events.length + ' EVENT' + (events.length !== 1 ? 'S' : '') + ']</span>'
      headerEl.appendChild(chevron)

      var eventsEl = document.createElement('div')
      eventsEl.className = 'log-events' + (isOpen ? ' open' : '')

      // Lazy render: only build event rows when group is opened
      var eventsRendered = false
      function renderEvents() {
        if (eventsRendered) return
        eventsRendered = true
        var frag = document.createDocumentFragment()
        events.forEach(function(evt) {
          var row = document.createElement('div')
          row.className = 'log-event-row'
          // Change 18: Use actual stored timestamp (already ISO — parse correctly)
          var timeStr = new Date(evt.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
          var color = getLogEventColor(evt.text)
          var timeEl = document.createElement('span')
          timeEl.className = 'log-time'
          timeEl.textContent = timeStr
          var textEl = document.createElement('span')
          // Change 19: Color-coded classes based on text content
          var t = (evt.text || '').toLowerCase()
          var logClass = 'log-text'
          if (t.includes('watched ep') && !t.includes('unwatched')) logClass += ' log-watched'
          else if (t.includes('unwatched ep'))                       logClass += ' log-unwatched'
          else if (t.includes('system') || t.includes('initialized') || t.includes('added') || t.includes('welcome')) logClass += ' log-system'
          textEl.className = logClass
          textEl.style.color = color
          textEl.textContent = evt.text
          row.appendChild(timeEl)
          row.appendChild(textEl)
          frag.appendChild(row)
        })
        eventsEl.appendChild(frag)
      }

      if (isOpen) renderEvents()

      headerEl.addEventListener('click', function() {
        var open = eventsEl.classList.toggle('open')
        chevron.classList.toggle('open', open)
        if (open) renderEvents()
      })

      groupEl.appendChild(headerEl)
      groupEl.appendChild(eventsEl)
      feed.appendChild(groupEl)
    })

    wrap.appendChild(feed)
  }

  function getLogEventColor(text) {
    var t = text.toLowerCase()
    if (t.includes('watched ep') || t.includes('unwatched'))        return 'var(--accent-cool)'
    if (t.includes('completed task'))                                return 'var(--success)'
    if (t.includes('completed ') && !t.includes('task'))            return 'var(--success)'
    if (t.includes('added') || t.includes('spawned'))               return 'var(--accent-warm)'
    if (t.includes('graveyard') || t.includes('dropped') || t.includes('deleted')) return 'rgba(255,51,85,0.7)'
    if (t.includes('timed') || t.includes('min'))                   return 'var(--text-2)'
    if (t.includes('budget') || t.includes('set weekly'))           return 'rgba(255,107,53,0.7)'
    return 'var(--text-2)'
  }

  /* =================================================================

  =================================================================
   *
   * PROCRASTINATION HUB -- AI INSTRUCTIONS
   * ============================================================
   *
   * HOW TO ADD A CONTENT ITEM:
   *   1. Build a full object following the schema in CONTENT ITEM SCHEMA comment above
   *   2. Fill all fields -- especially seasons[], episodes[], and themeStyles{}
   *   3. Define a unique theme name that matches the show's visual identity
   *   4. themeStyles overrides CSS custom properties for the detail view:
   *      { '--accent-cool': '#hex', '--accent-warm': '#hex', '--accent-cool-dim': 'rgba(...)' }
   *   5. Push the object into the library array via:
   *      const lib = loadData(KEYS.library, [])
   *      lib.push(newItem)

   *   6. App re-renders from localStorage -- refresh the page
   *
   * HOW TO ADD A SECTION:

   *   2. Create function renderYourSection() { ... }
   *   3. Add to the renderers object in navigateTo()
   *   4. Add CSS under a new labeled comment block

   *   Call logEvent("Your message here") from anywhere.
   *   It prepends to KEYS.log array and calls window.__refreshLog() if defined.
   *   Format messages in past tense, lowercase, factual.
