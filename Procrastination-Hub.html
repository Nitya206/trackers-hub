        <div style="font:400 10px var(--font-mono);color:var(--text-3);margin:10px 0 4px;" id="sched-rec-preview">Fill in the fields above to preview.</div>
        <div class="sched-modal-btns">
          <button class="sched-modal-cancel" id="sched-rec-cancel">ABORT</button>
          <button class="sched-modal-save" id="sched-rec-save">SCHEDULE ALL →</button>
        </div>
      </div>`;

    box.innerHTML = modalHtml;

    // ── Populate single-entry content select ──
    var sel = box.querySelector('#sched-modal-item-sel');
    watching.forEach(function(item) {
      var opt = document.createElement('option');
      opt.value = item.id;
      var left = item.totalEpisodes - (item.watchedEpisodes||[]).length;
      var unit = (item.type==='manga'||item.type==='manhwa'||item.type==='novel') ? 'ch' : 'ep';
      opt.textContent = item.title + '  [' + left + ' ' + unit + ' left]';
      sel.appendChild(opt);
    });

    // ── Populate recurring content select ──
    var recSel = box.querySelector('#sched-rec-item-sel');
    watching.forEach(function(item) {
      var opt = document.createElement('option');
      opt.value = item.id;
      var unit = (item.type==='manga'||item.type==='manhwa'||item.type==='novel') ? 'ch' : 'ep';
      var left = item.totalEpisodes - (item.watchedEpisodes||[]).length;
      opt.textContent = item.title + '  [' + left + ' ' + unit + ' left]';
      recSel.appendChild(opt);
    });

    // ── Tab switching ──
    var tabSingle    = box.querySelector('#sched-tab-single');
    var tabRecurring = box.querySelector('#sched-tab-recurring');
    var panelSingle    = box.querySelector('#sched-panel-single');
    var panelRecurring = box.querySelector('#sched-panel-recurring');

    function switchTab(which) {
      var isRecurring = which === 'recurring';
      tabSingle.style.borderBottomColor    = isRecurring ? 'transparent' : 'var(--accent-cool)';
      tabSingle.style.color                = isRecurring ? 'var(--text-3)' : 'var(--accent-cool)';
      tabRecurring.style.borderBottomColor = isRecurring ? 'var(--accent-cool)' : 'transparent';
      tabRecurring.style.color             = isRecurring ? 'var(--accent-cool)' : 'var(--text-3)';
      panelSingle.style.display    = isRecurring ? 'none' : 'block';
      panelRecurring.style.display = isRecurring ? 'block' : 'none';
    }
    tabSingle.addEventListener('click', function() { switchTab('single') });
    tabRecurring.addEventListener('click', function() { switchTab('recurring') });

    // ── Recurring preview ──
    function updateSchedRecPreview() {
      var preview = box.querySelector('#sched-rec-preview');
      var day   = box.querySelector('#sched-rec-day').value;
      var start = box.querySelector('#sched-rec-start').value;
      var end   = box.querySelector('#sched-rec-end').value;
      var epS   = parseInt(box.querySelector('#sched-rec-ep-start').value, 10) || 1;
      var selItemId = recSel.value;
      var selItem = watching.find(function(i) { return i.id === selItemId });
      var isReading = selItem && (selItem.type==='manga'||selItem.type==='manhwa'||selItem.type==='novel');
      var unitShort = isReading ? 'Ch.' : 'Ep.';
      if (!day || !start || !end) { preview.textContent = 'Fill in all fields to preview.'; preview.style.color = 'var(--text-3)'; return; }
      var dates = getWeeklyDates(day, start, end);
      if (dates.length === 0) { preview.textContent = 'No dates in range. Check start/end.'; preview.style.color = 'var(--accent-warm)'; return; }
      preview.innerHTML = '<span style="color:var(--accent-green)">✓ Will schedule <strong>' + dates.length + ' entries</strong> (' + unitShort + ' ' + epS + '–' + (epS + dates.length - 1) + ') every ' + day + ' · ' + formatDateShort(dates[0]) + ' → ' + formatDateShort(dates[dates.length-1]) + '</span>';
    }
    ;['#sched-rec-day','#sched-rec-start','#sched-rec-end','#sched-rec-ep-start'].forEach(function(s) {
      var el = box.querySelector(s);
      if (el) { el.addEventListener('change', updateSchedRecPreview); el.addEventListener('input', updateSchedRecPreview); }
    });
    recSel.addEventListener('change', updateSchedRecPreview);

    if (isPickingDate) {
      var dSel = box.querySelector('#sched-modal-date-sel');
      // Quick options: today + configurable future days
      var lookaheadDays = Math.max(7, parseInt(getAppSettings().overviewDateLookaheadDays, 10) || 14)
      for (var i = 0; i < lookaheadDays; i++) {
        var d = new Date();
        d.setDate(d.getDate() + i);
        var dk = localDateStr(d);
        var opt = document.createElement('option');
        opt.value = dk;
        var lbl = (i === 0 ? 'Today, ' : '') + d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
        if (i === 7) lbl = '── Next week ── ' + d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
        opt.textContent = lbl;
        dSel.appendChild(opt);
      }
      var sepOpt = document.createElement('option');
      sepOpt.disabled = true;
      sepOpt.textContent = '──────────────────';
      dSel.appendChild(sepOpt);
      var customOpt = document.createElement('option');
      customOpt.value = '__custom__';
      customOpt.textContent = 'Pick a custom date...';
      dSel.appendChild(customOpt);

      var customWrap = document.createElement('div');
      customWrap.id = 'sched-custom-date-wrap';
      customWrap.style.cssText = 'display:none;margin-top:8px;';
      var todayStr = localDateStr();
      customWrap.innerHTML = '<input type="date" id="sched-custom-date-inp" min="' + todayStr + '" style="width:100%;background:var(--surface-2);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text-1);font:14px var(--font-mono);padding:8px 10px;outline:none;cursor:default;" />';
      dSel.parentNode.appendChild(customWrap);

      dSel.addEventListener('change', function() {
        if (dSel.value === '__custom__') {
          customWrap.style.display = 'block';
          setTimeout(function() { customWrap.querySelector('#sched-custom-date-inp').focus(); }, 50);
        } else {
          customWrap.style.display = 'none';
        }
      });
    }

    overlay.appendChild(box);
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { overlay.classList.add('visible') });
    });
    
    setTimeout(function() { 
      var focusEl = box.querySelector(isPickingDate ? '#sched-modal-date-sel' : '#sched-modal-eps'); 
      if (focusEl) focusEl.focus();
    }, 260);

    function closeModal() {
      overlay.classList.remove('visible');
      document.body.style.overflow = '';
      setTimeout(function() { overlay.remove() }, 250);
    }

    box.querySelector('#sched-modal-cancel').addEventListener('click', closeModal);
    box.querySelector('#sched-rec-cancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal() });
    document.addEventListener('keydown', function escH(e) {
      if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escH) }
    });

    box.querySelector('#sched-modal-save').addEventListener('click', function() {
      var finalDateKey;
      if (isPickingDate) {
        var dSelVal = box.querySelector('#sched-modal-date-sel').value;
        if (dSelVal === '__custom__') {
          var customInp = box.querySelector('#sched-custom-date-inp');
          finalDateKey = customInp ? customInp.value : '';
          if (!finalDateKey) { alert('Please pick a date.'); return; }
        } else {
          finalDateKey = dSelVal;
        }
      } else {
        finalDateKey = dateKey;
      }
      var itemId = sel.value;
      var eps    = (box.querySelector('#sched-modal-eps').value || '').trim() || null;
      var item   = watching.find(function(i) { return i.id === itemId });
      if (!item) return;

      var sched = loadData(KEYS.schedule, {});
      if (!sched[finalDateKey]) sched[finalDateKey] = [];
      var already = sched[finalDateKey].findIndex(function(x) { return x.id === itemId });
      
      if (already >= 0) sched[finalDateKey][already].eps = eps;
      else sched[finalDateKey].push({ id: item.id, title: item.title, type: item.type, eps: eps });
      
      saveData(KEYS.schedule, sched);
      logEvent('Scheduled ' + item.title + (eps ? ' (' + eps + ')' : '') + ' for ' + finalDateKey);
      
      closeModal();
      if (onSave) onSave(finalDateKey, eps);
    });

    // ── Recurring save ──
    box.querySelector('#sched-rec-save').addEventListener('click', function() {
      var recDay   = box.querySelector('#sched-rec-day').value;
      var recStart = box.querySelector('#sched-rec-start').value;
      var recEnd   = box.querySelector('#sched-rec-end').value;
      var recEpS   = parseInt(box.querySelector('#sched-rec-ep-start').value, 10) || 1;
      if (!recDay || !recStart || !recEnd) { alert('Please fill in day, start date, and end date.'); return; }
      var dates = getWeeklyDates(recDay, recStart, recEnd);
      if (dates.length === 0) { alert('No matching dates found. Check the date range.'); return; }
      var itemId  = recSel.value;
      var recItem = watching.find(function(i) { return i.id === itemId });
      if (!recItem) return;
      var isReading2 = (recItem.type==='manga'||recItem.type==='manhwa'||recItem.type==='novel');
      var unitShort2 = isReading2 ? 'Ch.' : 'Ep.';
      var sched2 = loadData(KEYS.schedule, {});
      dates.forEach(function(dk, idx) {
        if (!sched2[dk]) sched2[dk] = [];
        var epLabel = unitShort2 + ' ' + (recEpS + idx);
        var alreadyI = sched2[dk].findIndex(function(x) { return x.id === itemId });
        var ent = { id: recItem.id, title: recItem.title, type: recItem.type, eps: epLabel };
        if (alreadyI >= 0) sched2[dk][alreadyI] = ent;
        else sched2[dk].push(ent);
      });
      saveData(KEYS.schedule, sched2);
      logEvent('Recurring: scheduled ' + dates.length + ' entries for ' + recItem.title + ' every ' + recDay);
      closeModal();
      if (onSave) onSave(null, null);
    });
  }

  /* =================================================================
     PART 5: OVERVIEW — renderOverview()
     Live operations manifest. Terminal intelligence feed.
  ================================================================= */
  function renderOverview() {
    var main    = document.getElementById('app-main')
    var library = loadData(KEYS.library, [])
    var tasks   = loadData(KEYS.tasks, [])

    var activeStatus = 'all'
    var activeType   = 'all'

    // ── WEEKLY CALENDAR ──
    // Week offset: 0 = current week, 1 = next week, etc.
    if (typeof window._schedWeekOffset === 'undefined') window._schedWeekOffset = 0
    var weekOffset = window._schedWeekOffset

    var calHeader = document.createElement('div')
    calHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);'

    var weekLabel = (function() {
      if (weekOffset === 0) return 'WEEKLY SCHEDULE'
      if (weekOffset === 1) return 'WEEKLY SCHEDULE · NEXT WEEK'
      return 'WEEKLY SCHEDULE · +' + weekOffset + ' WEEKS'
    })()

    calHeader.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">' + weekLabel + '</div>' +
      '<div style="display:flex;gap:6px;align-items:center;">' +
        (weekOffset > 0 ? '<button id="sched-prev-week" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font:600 11px var(--font-mono);padding:5px 12px;border-radius:var(--radius-pill);cursor:none;transition:border-color 200ms,color 200ms;" title="Previous week">◀ PREV</button>' : '') +
        '<button id="sched-next-week" style="background:var(--surface-2);border:1px solid var(--border);color:var(--accent-cool);font:600 11px var(--font-mono);padding:5px 12px;border-radius:var(--radius-pill);cursor:none;transition:border-color 200ms,color 200ms;" title="Next week">NEXT ▶</button>' +
        (weekOffset > 0 ? '<button id="sched-today-week" style="background:transparent;border:1px solid var(--border);color:var(--text-3);font:600 10px var(--font-mono);padding:5px 10px;border-radius:var(--radius-pill);cursor:none;transition:color 200ms;" title="Jump to today">TODAY</button>' : '') +
      '</div>'
    main.appendChild(calHeader)

    var calSep = document.createElement('div')
    calSep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-5);'
    main.appendChild(calSep)

    // Wire navigation buttons
    setTimeout(function() {
      var nxtBtn = document.getElementById('sched-next-week')
      if (nxtBtn) nxtBtn.addEventListener('click', function() { window._schedWeekOffset = (window._schedWeekOffset||0)+1; navigateTo('overview') })
      var prvBtn = document.getElementById('sched-prev-week')
      if (prvBtn) prvBtn.addEventListener('click', function() { window._schedWeekOffset = Math.max(0,(window._schedWeekOffset||0)-1); navigateTo('overview') })
      var todBtn = document.getElementById('sched-today-week')
      if (todBtn) todBtn.addEventListener('click', function() { window._schedWeekOffset = 0; navigateTo('overview') })
    }, 0)

    var schedule = loadData(KEYS.schedule, {}) // { 'YYYY-MM-DD': [ {id, title, type, eps} ] }

    // Show 7 days of the selected week
    var calGrid = document.createElement('div')
    calGrid.className = 'sched-calendar'

    for (var di = 0; di < 7; di++) {
      var d = new Date()
      d.setDate(d.getDate() + (weekOffset * 7) + di)
      // Use local date (not UTC) to avoid timezone shift
      var dateKey = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
      var todayKey = (function(){ var t=new Date(); return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); })()
      var isToday = dateKey === todayKey
      var dayShort = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()
      var dateNum  = d.getDate()
      var monthShort = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase()

      var col = document.createElement('div')
      col.className = 'sched-day-col'
      var isPastDay = dateKey < todayKey && !isToday
      if (isPastDay) col.style.cssText = 'opacity:0.45;filter:saturate(0.4);'

      var hdr = document.createElement('div')
      hdr.className = 'sched-day-header' + (isToday ? ' today' : '')
      hdr.innerHTML = dayShort + '<br><span style="font-size:13px;letter-spacing:0;">' + dateNum + '</span><br><span style="font-size:8px;opacity:0.7;">' + monthShort + '</span>'
      col.appendChild(hdr)

      var entries = schedule[dateKey] || []

      if (entries.length === 0) {
        var emp = document.createElement('div')
        emp.className = 'sched-empty'
        emp.textContent = '—'
        col.appendChild(emp)
      } else {
        entries.forEach(function(entry) {
          var libItem = library.find(function(i) { return i.id === entry.id })
          // Skip entries for graveyard or deleted items
          if (!libItem || libItem.status === 'graveyard') return
          var accentCol = (libItem && libItem.themeStyles && libItem.themeStyles['--accent-cool'])
            ? libItem.themeStyles['--accent-cool'] : 'var(--accent-cool)'
          var unit = (libItem && (libItem.type==='manga'||libItem.type==='manhwa'||libItem.type==='novel')) ? 'ch' : 'ep'
          var remaining = libItem ? (libItem.totalEpisodes - (libItem.watchedEpisodes||[]).length) : null

          var card = document.createElement('div')
          card.className = 'sched-entry'
          card.style.borderLeftColor = accentCol
          card.style.cursor = 'none'
          card.innerHTML =
            '<span class="sched-entry-title">' + (entry.title || '—') + '</span>' +
            (entry.eps ? '<div class="sched-entry-eps">▸ ' + entry.eps + '</div>' : '') +
            (libItem && libItem.timerMinutes && libItem.timerMinutes >= 1 ? '<div class="sched-entry-meta">⏱ ' + fmtMins(libItem.timerMinutes) + ' timed</div>' : '') +
            (remaining !== null && remaining > 0 ? '<div class="sched-entry-meta">' + remaining + ' ' + unit + ' left</div>' : '')
          // Quick-done tick (marks next episode watched without leaving overview)
          ;(function(litem, ent, cdk2) {
            if (litem && litem.status === 'watching') {
              var doneBtn = document.createElement('button')
              doneBtn.title = 'Mark as watched'
              doneBtn.textContent = '✓'
              doneBtn.style.cssText = 'position:absolute;bottom:4px;right:22px;background:transparent;border:none;color:var(--text-3);font-size:12px;cursor:none;padding:0 3px;transition:color 150ms;font-weight:700;'
              doneBtn.addEventListener('mouseenter', function() { doneBtn.style.color='var(--accent-green)' })
              doneBtn.addEventListener('mouseleave', function() { doneBtn.style.color='var(--text-3)' })
              doneBtn.addEventListener('click', function(ev) {
                ev.stopPropagation()
                var lib9 = loadData(KEYS.library,[])
                var it9  = lib9.find(function(x){return x.id===litem.id})
                if (!it9) return
                // Find next unwatched episode number
                var watched9 = it9.watchedEpisodes || []
                var nextEp = 1
                for (var ni=1; ni<=it9.totalEpisodes; ni++) {
                  var key9 = String(ni)
                  if (!watched9.includes(ni) && !watched9.includes(key9) && !watched9.includes('s0_'+ni)) { nextEp=ni; break }
                }
                it9.watchedEpisodes = watched9.concat([nextEp])
                touchLibraryItemActivity(it9)
                saveData(KEYS.library, lib9)
                logEvent('Watched ep ' + nextEp + ' of ' + litem.title + ' (from overview)')
                // Visual feedback — flash card green then remove entry if fully done
                card.style.transition='background 200ms'
                card.style.background='rgba(0,255,170,0.12)'
                doneBtn.style.color='var(--accent-green)'
                setTimeout(function(){
                  card.style.background=''
                  // Remove past schedule entry
                  if (cdk2 < localDateStr()) {
                    var sched9=loadData(KEYS.schedule,{})
                    if(sched9[cdk2]) {
                      sched9[cdk2]=sched9[cdk2].filter(function(x){return x.id!==ent.id})
                      if(!sched9[cdk2].length) delete sched9[cdk2]
                      saveData(KEYS.schedule,sched9)
                    }
                    card.style.opacity='0.4'
                  }
                  if(window.__refreshMissed) window.__refreshMissed()
                  if(window.__refreshDashboard) window.__refreshDashboard()
                },600)
              })
              card.appendChild(doneBtn)
            }
          })(libItem, entry, dateKey)
          card.addEventListener('click', function() {
            if (libItem) navigateTo('detail', libItem.id)
          })
          // Delete button per entry
          var delBtn = document.createElement('button')
          delBtn.title = 'Remove from schedule'
          delBtn.textContent = '×'
          delBtn.style.cssText = 'position:absolute;top:3px;right:4px;background:transparent;border:none;color:var(--text-3);font-size:14px;cursor:none;padding:0 3px;transition:color 150ms;'
          delBtn.addEventListener('mouseenter', function() { delBtn.style.color = 'var(--danger)' })
          delBtn.addEventListener('mouseleave', function() { delBtn.style.color = 'var(--text-3)' })
          ;(function(ce, cdk) {
            delBtn.addEventListener('click', function(ev) {
              ev.stopPropagation()
              var sched = loadData(KEYS.schedule, {})
              if (sched[cdk]) {
                sched[cdk] = sched[cdk].filter(function(x) { return x.id !== ce.id })
                if (sched[cdk].length === 0) delete sched[cdk]
                saveData(KEYS.schedule, sched)
              }
              logEvent('Removed ' + ce.title + ' from schedule (' + cdk + ')')
              navigateTo('overview')
            })
          })(entry, dateKey)
          card.appendChild(delBtn)
          col.appendChild(card)
        })
      }

      // "+ schedule" add button per day
      ;(function(cdk, cdayShort) {
        var addBtn = document.createElement('button')
        addBtn.className = 'sched-add-btn'
        addBtn.textContent = '+ schedule'
        addBtn.addEventListener('click', function() {
          openSchedModal(cdk, cdayShort, library, function() { navigateTo('overview') })
        })
        col.appendChild(addBtn)
      })(dateKey, dayShort)

      calGrid.appendChild(col)
    }
    main.appendChild(calGrid)

    // ── MANIFEST HEADER ──
    var headerRow = document.createElement('div')
    headerRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);'
    headerRow.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">OPERATIONS MANIFEST</div>' +
      '<span style="font:var(--text-xs) var(--font-mono);color:var(--text-3);">[' +
        library.length + ' OPS + ' + tasks.filter(function(t){return !t.completed}).length + ' PROCESSES]</span>'
    main.appendChild(headerRow)

    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-5);'
    main.appendChild(sep)

    // Filters
    var filterWrap = document.createElement('div')
    filterWrap.className = 'overview-filters'

    // Status values: library items use watching/completed/graveyard
    //                tasks use active/done
    // Type values:   library content types + 'task' for task-only view
    var LIBRARY_STATUS_PILLS = ['all','watching','reading','not started','upcoming','completed','on hold','graveyard']
    var TASK_STATUS_PILLS    = ['active','done']
    var TYPE_PILLS           = ['all','anime','manga','manhwa','show','movie','novel','social']

    // Row 1: Library status (cyan accent)
    var row1 = document.createElement('div'); row1.className = 'overview-filter-row'
    var lbl1 = document.createElement('span'); lbl1.className = 'overview-filter-label'; lbl1.textContent = 'Library'
    row1.appendChild(lbl1)

    // Row 2: Task status (violet accent)
    var row2 = document.createElement('div'); row2.className = 'overview-filter-row'
    var lbl2 = document.createElement('span'); lbl2.className = 'overview-filter-label'; lbl2.textContent = 'Tasks'
    row2.appendChild(lbl2)

    // Row 3: Content type
    var row3 = document.createElement('div'); row3.className = 'overview-filter-row'
    var lbl3 = document.createElement('span'); lbl3.className = 'overview-filter-label'; lbl3.textContent = 'Type'
    row3.appendChild(lbl3)

    function makePill(label, isActive, extraClass, onClick) {
      var btn = document.createElement('button')
      btn.className = 'overview-pill' + (extraClass ? ' ' + extraClass : '') + (isActive ? ' active' : '')
      btn.textContent = label.toUpperCase()
      btn.addEventListener('click', function() { onClick(btn) })
      return btn
    }

    // All library-status pills reset task-status pills to neutral and vice versa
    // so you can only have one active status at a time across both groups
    function clearAllStatusPills() {
      row1.querySelectorAll('.overview-pill').forEach(function(p) { p.classList.remove('active') })
      row2.querySelectorAll('.overview-pill').forEach(function(p) { p.classList.remove('active') })
    }

    LIBRARY_STATUS_PILLS.forEach(function(s) {
      row1.appendChild(makePill(s, s === activeStatus, '', function(btn) {
        activeStatus = s
        clearAllStatusPills()
        btn.classList.add('active')
        renderManifest()
      }))
    })
    TASK_STATUS_PILLS.forEach(function(s) {
      row2.appendChild(makePill(s, s === activeStatus, 'task-pill', function(btn) {
        activeStatus = s
        clearAllStatusPills()
        btn.classList.add('active')
        renderManifest()
      }))
    })
    TYPE_PILLS.forEach(function(t) {
      row3.appendChild(makePill(t, t === activeType, '', function(btn) {
        activeType = t
        row3.querySelectorAll('.overview-pill').forEach(function(p) { p.classList.remove('active') })
        btn.classList.add('active')
        renderManifest()
      }))
    })
    filterWrap.appendChild(row1)
    filterWrap.appendChild(row2)
    filterWrap.appendChild(row3)
    main.appendChild(filterWrap)

    // Manifest container
    var manifestWrap = document.createElement('div')
    manifestWrap.id = 'manifest-wrap'
    main.appendChild(manifestWrap)

    function renderManifest() {
      var wrap = document.getElementById('manifest-wrap')
      wrap.innerHTML = ''

      // Build combined entries
      var entries = []
      library.forEach(function(item) {
        entries.push({ kind: 'library', item: item, sortStatus: item.status })
      })
      tasks.forEach(function(task) {
        entries.push({ kind: 'task', item: task, sortStatus: task.completed ? 'done' : 'active' })
      })

      // Filter — "all" excludes graveyard and on-hold (they live in separate sections)
      var filtered = entries.filter(function(e) {
        var statusOk = true
        var typeOk   = true
        if (e.kind === 'library' && e.item.status === 'graveyard' && activeStatus === 'all') return false
        if (e.kind === 'library' && e.item.status === 'on-hold' && activeStatus === 'all') return false
        if (activeStatus !== 'all') {
          if (e.kind === 'library') {
            var w = (e.item.watchedEpisodes || []).length
            var isReadType = (e.item.type === 'manga' || e.item.type === 'manhwa' || e.item.type === 'novel')
            if (activeStatus === 'not started') statusOk = e.item.status === 'watching' && w === 0
            else if (activeStatus === 'watching') statusOk = e.item.status === 'watching' && w > 0 && !isReadType
            else if (activeStatus === 'reading') statusOk = e.item.status === 'watching' && w > 0 && isReadType
            else if (activeStatus === 'upcoming') statusOk = e.item.status === 'upcoming'
            else if (activeStatus === 'on hold') statusOk = e.item.status === 'on-hold'
            else statusOk = e.item.status === activeStatus
          }
          else statusOk = activeStatus === 'active' ? !e.item.completed : activeStatus === 'done' ? e.item.completed : false
        }
        if (activeType !== 'all') {
          if (activeType === 'task') typeOk = e.kind === 'task'
          else typeOk = e.kind === 'library' && e.item.type === activeType
        }
        return statusOk && typeOk
      })

      if (filtered.length === 0) {
        wrap.innerHTML =
          '<div style="text-align:center;padding:var(--space-12) 0;">' +
            '<div style="font:600 var(--text-md) var(--font-mono);color:var(--text-3);letter-spacing:0.08em;">NO OPERATIONS ON RECORD</div>' +
            '<div style="font:var(--text-sm) var(--font-ui);color:var(--text-3);margin-top:var(--space-3);">Your manifest is empty. Add content to the library to begin.</div>' +
          '</div>'
        return
      }

      var frag = document.createDocumentFragment()
      filtered.forEach(function(e) {
        frag.appendChild(buildManifestRow(e))
      })
      wrap.appendChild(frag)

      // Stagger entrance: 20ms per row
      var rows = wrap.querySelectorAll('.manifest-row')
      rows.forEach(function(row, i) {
        setTimeout(function() {
          requestAnimationFrame(function() {
            row.style.transition = 'opacity 150ms ' + (i * 20) + 'ms var(--ease-out), transform 150ms ' + (i*20) + 'ms var(--ease-out), background 100ms var(--ease-snap), border-color 100ms var(--ease-snap)'
            row.classList.add('row-entered')
          })
        }, 0)
      })
    }

    renderManifest()
  }

  function buildManifestRow(entry) {
    var row = document.createElement('div')
    row.className = 'manifest-row'

    var isTask = entry.kind === 'task'
    var item   = entry.item

    // Status
    var statusWrap = document.createElement('div')
    statusWrap.className = 'manifest-status'
    var dotClass, labelText, labelColor
    if (isTask) {
      dotClass   = item.completed ? 'lib-status-dot completed' : 'lib-status-dot watching'
      labelText  = item.completed ? 'TERM' : 'RUN'
      labelColor = item.completed ? 'var(--text-3)' : 'var(--success)'
      statusWrap.innerHTML =
        '<span class="' + dotClass + '"></span>' +
        '<span class="manifest-status-label" style="color:' + labelColor + ';">' + labelText + '</span>'
    } else if (item.status === 'watching') {
      // Change 16: styled WATCHING pill
      var itemWatched = (item.watchedEpisodes || []).length
      var watchLabel = itemWatched === 0 ? 'NOT STARTED' : (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'READING' : 'WATCHING'
      statusWrap.innerHTML =
        '<span class="manifest-status-watch-chip' + (itemWatched === 0 ? ' not-started' : '') + '">' +
          '<span class="chip-dot"' + (itemWatched === 0 ? ' style="background:var(--text-3)"' : '') + '></span>' + watchLabel +
        '</span>'
    } else if (item.status === 'on-hold') {
      // Styled ON HOLD pill
      statusWrap.innerHTML =
        '<span class="manifest-status-watch-chip" style="background:rgba(255,225,77,0.1);border:1px solid rgba(255,225,77,0.3);color:var(--accent-yellow);">' +
          '<span class="chip-dot" style="background:#f97316;box-shadow:0 0 8px #f97316;"></span>ON HOLD' +
        '</span>'
    } else if (item.status === 'upcoming') {
      // Styled UPCOMING pill
      statusWrap.innerHTML =
        '<span class="manifest-status-watch-chip upcoming">' +
          '<span class="chip-dot" style="background:var(--accent-cool);box-shadow:0 0 8px var(--accent-cool);"></span>UPCOMING' +
        '</span>'
    } else {
      var S = { completed:['lib-status-dot completed','DONE','var(--text-3)'],
                graveyard:['lib-status-dot graveyard','DEAD','var(--danger)'],
                upcoming:['lib-status-dot upcoming','UPCOMING','var(--accent-cool)'] }
      var fallbackLabel = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'READ' : 'WATCH'
      var s = S[item.status] || ['lib-status-dot watching', fallbackLabel, 'var(--success)']
      dotClass = s[0]; labelText = s[1]; labelColor = s[2]
      statusWrap.innerHTML =
        '<span class="' + dotClass + '"></span>' +
        '<span class="manifest-status-label" style="color:' + labelColor + ';">' + labelText + '</span>'
    }
    row.appendChild(statusWrap)
    // Type badge
    var badgeWrap = document.createElement('div')
    if (isTask) {
      badgeWrap.innerHTML = '<span style="font:var(--text-xs) var(--font-mono);color:var(--text-3);background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:var(--radius-sm);">TASK</span>'
    } else {
      badgeWrap.innerHTML = '<span class="badge" data-type="' + item.type + '">' + item.type + '</span>'
    }
    row.appendChild(badgeWrap)

    // Title
    var titleCell = document.createElement('div')
    titleCell.className = 'manifest-title-cell' + (isTask ? ' task-entry' : '')
    titleCell.textContent = item.name || item.title || ''
    row.appendChild(titleCell)

    // Progress bar
    var progCell = document.createElement('div')
    progCell.className = 'manifest-prog-cell'
    var pct = 0
    if (isTask) {
      pct = item.completed ? 100 : 0
    } else {
      pct = item.totalEpisodes > 0
        ? Math.min(((item.watchedEpisodes||[]).length / item.totalEpisodes) * 100, 100) : 0
    }
    progCell.innerHTML =
      '<div class="manifest-prog-bar"><div class="manifest-prog-fill" style="width:' + pct + '%;"></div></div>'
    row.appendChild(progCell)

    // Left / remaining
    var leftCell = document.createElement('div')
    leftCell.className = 'manifest-left-cell'
    if (isTask) {
      leftCell.textContent = item.duration ? ('~' + item.duration + 'm') : '\u2014'
    } else {
      var rem = item.totalEpisodes - (item.watchedEpisodes||[]).length
      var unit = (item.type==='manga'||item.type==='manhwa'||item.type==='novel') ? 'ch' : 'ep'
      leftCell.textContent = rem > 0 ? (rem + ' ' + unit) : '\u2014'
    }
    row.appendChild(leftCell)

    // Rating
    var ratingCell = document.createElement('div')
    ratingCell.className = 'manifest-rating-cell'
    ratingCell.textContent = (!isTask && item.rating) ? ('\u2605' + Number(item.rating).toFixed(1)) : '\u2014'
    row.appendChild(ratingCell)

    // Day
    var dayCell = document.createElement('div')
    dayCell.className = 'manifest-day-cell'
    var day = item.scheduledDay
    dayCell.textContent = day ? ('\u25b8 ' + day.slice(0,3)) : '\u2014'
    if (!day) dayCell.style.color = 'var(--text-3)'
    row.appendChild(dayCell)

    // Click
    row.addEventListener('click', function() {
      if (isTask) navigateTo('tasks')
      else navigateTo('detail', item.id)
    })

    return row
  }

  /* =================================================================
     PART 5: GRAVEYARD — renderGraveyard()
     Honest archive. Memorial. Quiet, melancholy, no judgment.
  ================================================================= */
  function renderGraveyard() {
    var main    = document.getElementById('app-main')
    var library = loadData(KEYS.library, [])
    var dead    = library.filter(function(i) { return i.status === 'graveyard' }).sort(function(a,b){ return (b.graveyardDate||b.addedDate||'') > (a.graveyardDate||a.addedDate||'') ? 1 : -1 })

    // Scoped section wrapper — CSS vars shift the feel
    var section = document.createElement('div')
    section.className = 'graveyard-section'
    main.appendChild(section)

    // Header
    var headerRow = document.createElement('div')
    headerRow.className = 'graveyard-header-row'
    headerRow.innerHTML =
      '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">THE GRAVEYARD <span style="font:400 9px var(--font-mono);color:var(--text-3);letter-spacing:0.1em;opacity:0.7;">[' + dead.length + ' ENTRIES]</span></div>' +
      '<span class="graveyard-count">[' + dead.length + ' BODIES]</span>'
    section.appendChild(headerRow)

    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-3);'
    section.appendChild(sep)

    var subtitle = document.createElement('div')
    subtitle.className = 'graveyard-subtitle'
    subtitle.textContent = 'What you started. What you stopped. No judgment.'
    section.appendChild(subtitle)

    if (dead.length === 0) {
      // Empty state — two lines with staggered appearance
      var emptyDiv = document.createElement('div')
      emptyDiv.className = 'graveyard-empty'
      // Background decoration
      var bgDeco = document.createElement('div')
      bgDeco.className = 'graveyard-empty-bg-deco'
      bgDeco.textContent = '🪦'
      emptyDiv.appendChild(bgDeco)
      var line1 = document.createElement('div')
      line1.className = 'graveyard-empty-line'
      line1.textContent = 'THE GRAVEYARD IS EMPTY.'
      line1.style.font = '600 var(--text-md) var(--font-mono)'
      var line2 = document.createElement('div')
      line2.className = 'graveyard-empty-line'
      line2.textContent = 'Everything you started, you finished.'
      var line3 = document.createElement('div')
      line3.className = 'graveyard-empty-line'
      line3.textContent = 'Or you haven\u2019t started yet.'
      emptyDiv.appendChild(line1)
      emptyDiv.appendChild(line2)
      emptyDiv.appendChild(line3)
      section.appendChild(emptyDiv)
      setTimeout(function() { line1.classList.add('visible') }, 100)
      setTimeout(function() { line2.classList.add('visible') }, 400)
      setTimeout(function() { line3.classList.add('visible') }, 900)
      return
    }

    // Cards
    dead.forEach(function(item) {
      var card = document.createElement('div')
      card.className = 'graveyard-card'
      card.style.maxHeight = '500px'

      var watched = (item.watchedEpisodes||[]).length
      var total   = item.totalEpisodes || 0
      var unit    = (item.type==='manga'||item.type==='manhwa'||item.type==='novel') ? 'chapters' : 'eps'
      var pct     = total > 0 ? Math.min((watched/total)*100,100) : 0

      var addedFmt   = item.addedDate   ? new Date(item.addedDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'
      var droppedFmt = item.graveyardDate ? new Date(item.graveyardDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'

      // Header
      var cardHeader = document.createElement('div')
      cardHeader.className = 'graveyard-card-header'
      cardHeader.innerHTML =
        '<span class="badge" data-type="' + item.type + '" style="filter:saturate(0.4);">' + item.type + '</span>' +
        '<div class="graveyard-title">' + item.title + '</div>' +
        '<span class="graveyard-archived-pill">ARCHIVED</span>'
      card.appendChild(cardHeader)

      // Progress
      var progLabel = document.createElement('div')
      progLabel.className = 'graveyard-progress-label'
      progLabel.textContent = 'Got to ' + watched + ' of ' + total + ' ' + unit
      card.appendChild(progLabel)
      var progWrap = document.createElement('div')
      progWrap.className = 'graveyard-prog-wrap'
      progWrap.innerHTML = '<div class="progress-bar"><div class="progress-bar-fill" style="width:' + pct + '%;"></div></div>'
      card.appendChild(progWrap)

      // Dates + time invested
      var dates = document.createElement('div')
      dates.className = 'graveyard-dates'
      var _timeInvested = item.timerMinutes && item.timerMinutes >= 1 ? '  \u00b7  \u23f1 ' + fmtMins(item.timerMinutes) + ' invested' : ''
      dates.textContent = 'Added: ' + addedFmt + '  \u00b7  Dropped: ' + droppedFmt + _timeInvested
      card.appendChild(dates)

      // Drop reason badge (cause of death)
      if (item.dropReason) {
        var reasonEl = document.createElement('div')
        reasonEl.style.cssText = 'margin-top:6px;'
        reasonEl.innerHTML = '<span style="font:600 9px var(--font-mono);color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;">Cause: </span>' +
          '<span style="font:600 10px var(--font-mono);color:var(--accent-warm);padding:2px 8px;border:1px solid rgba(255,96,64,0.3);border-radius:var(--radius-pill);background:rgba(255,96,64,0.08);">' + item.dropReason + '</span>'
        card.appendChild(reasonEl)
      }

      // Note
      if (item.graveyardNote) {
        var noteEl = document.createElement('div')
        noteEl.className = 'graveyard-note-text'
        noteEl.innerHTML = '<span class="graveyard-note-prefix">Why: </span>' + item.graveyardNote
        card.appendChild(noteEl)
      } else {
        var noteIn = document.createElement('input')
        noteIn.className = 'graveyard-note-input'
        noteIn.type = 'text'
        noteIn.placeholder = 'Why did you drop this? (optional)'
        noteIn.value = ''
        noteIn.addEventListener('blur', function() {
          var val = noteIn.value.trim()
          if (!val) return
          var lib = loadData(KEYS.library, [])
          var it  = lib.find(function(x) { return x.id === item.id })
          if (it) { it.graveyardNote = val; saveData(KEYS.library, lib) }
          // Swap input → styled text display immediately after save
          var noteTextEl = document.createElement('div')
          noteTextEl.className = 'graveyard-note-text'
          noteTextEl.innerHTML = '<span class="graveyard-note-prefix">Why: </span>' + val
          noteIn.replaceWith(noteTextEl)
        })
        card.appendChild(noteIn)
      }

      // Actions
      var actionsRow = document.createElement('div')
      actionsRow.className = 'graveyard-actions'

      var reviveBtn = document.createElement('button')
      reviveBtn.className = 'btn-ghost'
      reviveBtn.dataset.sfx = 'revive'
      reviveBtn.style.fontSize = 'var(--text-xs)'
      reviveBtn.textContent = '\u21a9 REVIVE'
      reviveBtn.addEventListener('click', function() {
        var lib = loadData(KEYS.library, [])
        var it  = lib.find(function(x) { return x.id === item.id })
        // Revive to on-hold (not watching) — user decides when to resume
        if (it) { it.status = 'on-hold'; it.graveyardDate = null; saveData(KEYS.library, lib) }
        logEvent('Revived ' + item.title + ' from the graveyard → on hold')
        navigateTo('library')
      })

      var deleteWrap = document.createElement('div')
      var deleteBtn  = document.createElement('button')
      deleteBtn.className = 'btn-danger'
      deleteBtn.style.fontSize = 'var(--text-xs)'
      deleteBtn.textContent = '\u2715 Delete Forever'
      deleteBtn.addEventListener('click', function() {
        deleteWrap.innerHTML = ''
        var conf = document.createElement('div')
        conf.className = 'graveyard-delete-confirm'
        conf.textContent = 'This removes all data. Sure?'
        var yesBtn = document.createElement('button')
        yesBtn.className = 'btn-danger'
        yesBtn.style.fontSize = 'var(--text-xs)'
        yesBtn.textContent = 'Yes, delete'
        var noBtn = document.createElement('button')
        noBtn.className = 'btn-ghost'
        noBtn.style.fontSize = 'var(--text-xs)'
        noBtn.textContent = 'Never mind'
        yesBtn.addEventListener('click', function() {
          var lib = loadData(KEYS.library, [])
          saveData(KEYS.library, lib.filter(function(x) { return x.id !== item.id }))
          // Clean up schedule entries
          var sched = loadData(KEYS.schedule, {})
          Object.keys(sched).forEach(function(dk) {
            sched[dk] = sched[dk].filter(function(e) { return e.id !== item.id })
            if (sched[dk].length === 0) delete sched[dk]
          })
          saveData(KEYS.schedule, sched)
          logEvent('Permanently deleted ' + item.title)
          card.style.maxHeight = card.scrollHeight + 'px'
          requestAnimationFrame(function() {
            card.classList.add('removing')
            setTimeout(function() { card.remove() }, 320)
          })
        })
        noBtn.addEventListener('click', function() {
          deleteWrap.innerHTML = ''
          deleteWrap.appendChild(deleteBtn)
        })
        conf.appendChild(yesBtn)
        conf.appendChild(noBtn)
        deleteWrap.appendChild(conf)
      })
      deleteWrap.appendChild(deleteBtn)

      actionsRow.appendChild(reviveBtn)
      actionsRow.appendChild(deleteWrap)
      card.appendChild(actionsRow)
      section.appendChild(card)
    })
  }

  /* =================================================================
     PART 5: SESSION LOG — renderSessionLog()
     System event log. Actual procrastination history.
  ================================================================= */
  function renderSessionLog() {
    var main = document.getElementById('app-main')
    renderLogSection(main)
    // Expose global refresh so logEvent() can update live
    window.__refreshLog = function() {
      if (document.getElementById('log-feed-wrap')) {
        renderLogFeed(document.getElementById('log-feed-wrap'))
      }
    }
  }

  function renderLogSection(main) {
    var log = loadData(KEYS.log, [])

    // Header row
    var headerRow = document.createElement('div')
    headerRow.className = 'log-header-row'
    headerRow.innerHTML = '<div class="section-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">SYSTEM LOG</div>'

    var clearWrap = document.createElement('div')
    clearWrap.id = 'log-clear-wrap'
    var clearBtn = document.createElement('button')
    clearBtn.className = 'btn-ghost'
    clearBtn.style.fontSize = 'var(--text-xs)'
    clearBtn.textContent = 'CLEAR LOG'
    var clearConfirmTimeout = null
    var clearPending = false
    clearBtn.addEventListener('click', function() {
      if (!clearPending) {
        // First click — arm the button
        clearPending = true
        clearBtn.textContent = 'CONFIRM CLEAR?'
        clearBtn.style.borderColor = 'rgba(255,59,107,0.6)'
        clearBtn.style.color = '#ff3b6b'
        clearConfirmTimeout = setTimeout(function() {
          // Reset after 3s if not clicked again
          clearPending = false
          clearBtn.textContent = 'CLEAR LOG'
          clearBtn.style.borderColor = ''
          clearBtn.style.color = ''
        }, 3000)
      } else {
        // Second click — actually clear
        clearTimeout(clearConfirmTimeout)
        clearPending = false
        clearBtn.textContent = 'CLEAR LOG'
        clearBtn.style.borderColor = ''
        clearBtn.style.color = ''
        saveData(KEYS.log, [])
        var feed = document.getElementById('log-feed-wrap')
        if (feed) renderLogFeed(feed)
        var flash = document.createElement('span')
        flash.style.cssText = 'font:var(--text-xs) var(--font-mono);color:var(--success);margin-left:var(--space-3);'
        flash.textContent = 'LOG CLEARED.'
        clearWrap.appendChild(flash)
        setTimeout(function() { flash.remove() }, 2000)
      }
    })
    clearWrap.appendChild(clearBtn)
    headerRow.appendChild(clearWrap)
    main.appendChild(headerRow)

    var sep = document.createElement('div')
    sep.style.cssText = 'border-bottom:1px solid var(--border);margin-bottom:var(--space-2);'
    main.appendChild(sep)

    var sub = document.createElement('div')
    sub.className = 'log-sub'
    var _logLocal = loadData(KEYS.log, [])
    var _logToday = _logLocal.filter(function(e){ return e.timestamp.slice(0,10)===localDateStr() }).length
    var _logTotal = _logLocal.length
    var _logWatchedTotal = _logLocal.filter(function(e){ return e.text.indexOf('Watched ep')!==-1||e.text.indexOf('Read ch')!==-1 }).length
    sub.innerHTML = 'EVERY ACTION. AUTOMATICALLY RECORDED. &nbsp;<span style="color:var(--text-3);opacity:0.7;">' + _logTotal + ' events · ' + _logToday + ' today · ' + _logWatchedTotal + ' episodes watched</span>'
    main.appendChild(sub)

    // Log search bar
    var logSrchWrap = document.createElement('div')
    logSrchWrap.style.cssText = 'margin-bottom:var(--space-3);'
    var logSrchIn = document.createElement('input')
    logSrchIn.type = 'text'; logSrchIn.placeholder = 'Filter log...'; logSrchIn.autocomplete = 'off'
    logSrchIn.style.cssText = 'width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);color:var(--text-1);font:400 12px var(--font-mono);padding:7px 16px;outline:none;transition:border-color 200ms;'
    logSrchIn.addEventListener('focus', function(){logSrchIn.style.borderColor='rgba(0,229,255,0.35)'})
    logSrchIn.addEventListener('blur',  function(){logSrchIn.style.borderColor=''})
    logSrchIn.addEventListener('input', function() {
      var q = logSrchIn.value.trim().toLowerCase()
      var fd = document.getElementById('log-feed-wrap'); if (!fd) return
      fd.querySelectorAll('.log-event-row').forEach(function(row) {
        row.style.display = (!q || row.textContent.toLowerCase().includes(q)) ? '' : 'none'
      })
      fd.querySelectorAll('.log-group').forEach(function(grp) {
        grp.style.display = (grp.querySelectorAll('.log-event-row:not([style*="none"])').length===0 && q) ? 'none' : ''
      })
    })
    logSrchWrap.appendChild(logSrchIn)
    main.appendChild(logSrchWrap)

    var feedWrap = document.createElement('div')
    feedWrap.id = 'log-feed-wrap'
    main.appendChild(feedWrap)
    renderLogFeed(feedWrap)
  }

  function renderLogFeed(wrap) {
    wrap.innerHTML = ''
    var log = loadData(KEYS.log, [])
    if (log.length === 0) {
      wrap.innerHTML =
        '<div class="log-empty">' +
          '<div class="log-empty-title">NO EVENTS LOGGED</div>' +
          '<div class="tasks-idle-line" style="margin-top:var(--space-2);">Start watching something.&nbsp;<span class="idle-cursor"></span></div>' +
        '</div>'
      return
    }

    // Group by date (YYYY-MM-DD)
    var groups = {}
    var groupOrder = []
    var now = Date.now()
    var sevenDaysAgo = now - 7 * 24 * 3600 * 1000

    log.forEach(function(evt) {
      var dateKey = evt.timestamp.slice(0,10)
      if (!groups[dateKey]) { groups[dateKey] = []; groupOrder.push(dateKey) }
      groups[dateKey].push(evt)
    })

    // Sort groups newest first
    groupOrder.sort(function(a,b) { return b.localeCompare(a) })

    var feed = document.createElement('div')
    feed.className = 'log-feed'

    groupOrder.forEach(function(dateKey) {
      var events  = groups[dateKey]
      var dateObj = new Date(dateKey + 'T00:00:00')
      var label   = dateObj.toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'}).toUpperCase()
      var groupTs = new Date(dateKey).getTime()
      // Default: collapse groups older than 7 days
      var isOpen  = groupTs >= sevenDaysAgo

      var groupEl = document.createElement('div')
      groupEl.className = 'log-group'

      var headerEl = document.createElement('div')
      headerEl.className = 'log-group-header'
      var chevron = document.createElement('span')
      chevron.className = 'log-group-chevron' + (isOpen ? ' open' : '')
      chevron.textContent = '\u25be'
      headerEl.innerHTML =
        '<span class="log-group-date">' + label + '</span>' +
        '<div class="log-group-sep"></div>' +
        '<span class="log-group-count">[' + events.length + ' EVENT' + (events.length !== 1 ? 'S' : '') + ']</span>'
      headerEl.appendChild(chevron)

      var eventsEl = document.createElement('div')
      eventsEl.className = 'log-events' + (isOpen ? ' open' : '')

      // Lazy render: only build event rows when group is opened
      var eventsRendered = false
      function renderEvents() {
        if (eventsRendered) return
        eventsRendered = true
        var frag = document.createDocumentFragment()
        events.forEach(function(evt) {
          var row = document.createElement('div')
          row.className = 'log-event-row'
          // Change 18: Use actual stored timestamp (already ISO — parse correctly)
          var timeStr = new Date(evt.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
          var color = getLogEventColor(evt.text)
          var timeEl = document.createElement('span')
          timeEl.className = 'log-time'
          timeEl.textContent = timeStr
          var textEl = document.createElement('span')
          // Change 19: Color-coded classes based on text content
          var t = (evt.text || '').toLowerCase()
          var logClass = 'log-text'
          if (t.includes('watched ep') && !t.includes('unwatched')) logClass += ' log-watched'
          else if (t.includes('unwatched ep'))                       logClass += ' log-unwatched'
          else if (t.includes('system') || t.includes('initialized') || t.includes('added') || t.includes('welcome')) logClass += ' log-system'
          textEl.className = logClass
          textEl.style.color = color
          textEl.textContent = evt.text
          row.appendChild(timeEl)
          row.appendChild(textEl)
          frag.appendChild(row)
        })
        eventsEl.appendChild(frag)
      }

      if (isOpen) renderEvents()

      headerEl.addEventListener('click', function() {

      })

      groupEl.appendChild(headerEl)
      groupEl.appendChild(eventsEl)
      feed.appendChild(groupEl)
    })

    if (t.includes('completed ') && !t.includes('task'))            return 'var(--success)'

  /* ── 1. CUSTOM CURSOR ── */
  function initCursor() {
    const dot  = document.getElementById('cursor-dot')
    const ring = document.getElementById('cursor-ring')

    // Skip custom cursor on touch/pointer-coarse devices
    if (window.matchMedia('(hover: none), (pointer: coarse)').matches) {
      if (dot)  dot.style.display  = 'none'
      if (ring) ring.style.display = 'none'
      return
    }

    // Change 32: only hide cursor after confirming elements are in DOM
    if (dot && ring) {
      document.body.style.cursor = 'none'
    }

    // CSS vars drive the transform — JS only sets the vars
    // dot uses --cx/--cy, ring uses --rx/--ry
    // Both start off-screen; CSS default -300px handles that
    let mouseX = -300, mouseY = -300
    let ringX  = -300, ringY  = -300

    // Dot: instant — update CSS var on every mousemove
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX
      mouseY = e.clientY
      dot.style.setProperty('--cx', mouseX + 'px')
      dot.style.setProperty('--cy', mouseY + 'px')
    })

    // Ring: lerp trail — 0.55 = tight follow with subtle trail, matches native cursor speed better
    const LERP = 0.55
    ;(function animateRing() {
      ringX += (mouseX - ringX) * LERP
      ringY += (mouseY - ringY) * LERP
      ring.style.setProperty('--rx', (ringX | 0) + 'px')
      ring.style.setProperty('--ry', (ringY | 0) + 'px')
      requestAnimationFrame(animateRing)
    })()

    // Hover state — CSS handles the scale transition
    const INTERACTIVE_SEL = 'a, button, [role=button], .card, .bn-item, input, select, textarea, label, .btn-primary, .btn-ghost, .btn-danger, .library-card, .ep-tile, .mood-pill, .mq-mood-card, .dash-nav-card, .task-card, .graveyard-card, .manifest-row, .lib-filter-pill, .overview-pill, .detail-day-btn, .detail-season-tab, .detail-arc-header'
    document.addEventListener('mouseover', e => {
      if (e.target.closest(INTERACTIVE_SEL)) ring.classList.add('hovering')
    })
    document.addEventListener('mouseout', e => {
      if (e.target.closest(INTERACTIVE_SEL)) ring.classList.remove('hovering')
    })

    // ── GLITTER SPARKLE PARTICLES ──
    // Spawn tiny glowing particles that drift away from the cursor path
    let lastSparkX = 0, lastSparkY = 0
    const SPARK_DIST = 24 // min px between spawns
    document.addEventListener('mousemove', e => {
      const dx = e.clientX - lastSparkX
      const dy = e.clientY - lastSparkY
      if (dx*dx + dy*dy < SPARK_DIST*SPARK_DIST) return
      lastSparkX = e.clientX
      lastSparkY = e.clientY

      const spark = document.createElement('div')
      spark.style.cssText = `
        position:fixed; pointer-events:none; z-index:2147483647;
        width:2px; height:2px; border-radius:50%;
        left:${e.clientX}px; top:${e.clientY}px;
        background:${Math.random()>0.5 ? 'var(--accent-cool)' : 'var(--accent-violet)'};
        box-shadow: 0 0 4px ${Math.random()>0.5 ? 'rgba(0,229,255,0.6)' : 'rgba(168,85,247,0.6)'};
        opacity:0.7;
        will-change:transform,opacity;
        transition: transform 600ms var(--ease-out), opacity 600ms var(--ease-out);
      `
      document.body.appendChild(spark)
      const angle = Math.random() * Math.PI * 2
      const dist = 15 + Math.random() * 25
      requestAnimationFrame(() => {
        spark.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`
        spark.style.opacity = '0'
      })
      setTimeout(() => spark.remove(), 650)
    }, { passive: true })
  }

  /* ── 2. HEX-GRID BACKGROUND ── */
  function initHexGrid() {
    const svg = document.getElementById('hex-grid')
    const VW  = window.innerWidth
    const VH  = window.innerHeight

    // Flat-top hexagon, circumradius R → visual diameter ~44px
    const R       = 22
    const hexH    = Math.sqrt(3) * R  // flat-to-flat height ≈ 38.1px
    const colStep = R * 1.5           // horizontal center-to-center ≈ 33px
    const rowStep = hexH              // vertical center-to-center ≈ 38.1px

    // Build point string for a flat-top hex centered at (cx, cy)
    function hexPoints(cx, cy) {
      const pts = []
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i  // 0°, 60°, 120°, 180°, 240°, 300°
        pts.push(`${(cx + R * Math.cos(a)).toFixed(1)},${(cy + R * Math.sin(a)).toFixed(1)}`)
      }
      return pts.join(' ')
    }

    const hexData  = []
    const fragment = document.createDocumentFragment()

    // Generate enough columns and rows to cover viewport + one hex margin
    const cols = Math.ceil(VW / colStep) + 3
    const rows = Math.ceil(VH / rowStep) + 3

    for (let c = 0; c < cols; c++) {
      const cx     = c * colStep
      // Odd columns are offset by half a row vertically — standard hex tiling
      const offset = (c % 2 === 1) ? rowStep * 0.5 : 0

      for (let r = 0; r < rows; r++) {
        const cy   = r * rowStep + offset - rowStep  // start one row above viewport
        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon')
        poly.setAttribute('points',       hexPoints(cx, cy))
        poly.setAttribute('fill',         'none')
        poly.setAttribute('stroke',       '#00d4ff')
        poly.setAttribute('stroke-width', '0.8')
        poly.style.strokeOpacity = '0.09'
        poly.style.transition    = 'stroke-opacity 400ms var(--ease-out)'
        hexData.push({ el: poly, cx, cy })
        fragment.appendChild(poly)
      }
    }

    svg.appendChild(fragment)
    // Static hex grid — mousemove handler removed for performance
  }

  /* ── PART 6: 03. WEB AUDIO ENGINE — CINEMATIC REDESIGN ── */
  /*
   * Design philosophy: every sound is dry, low, and textural.
   * No bright ascending melodies. No cartoon beeps.
   * Inspired by: Blade Runner 2049, Control, Cyberpunk 2077 UI, Alien Isolation terminals.
   *
   * Signal chain: all voices → p6MasterOut (gain) → compressor → destination
   * The compressor glues everything together and prevents harshness.
   */
  let p6AudioCtx  = null
  let p6MasterOut = null   // all sounds plug into this
  let p6Muted     = true

  function p6GetCtx() {
    if (!p6AudioCtx) {
      try {
        p6AudioCtx = new (window.AudioContext || window.webkitAudioContext)()

        // Master compressor — gives everything a pro, cohesive loudness
        const comp = p6AudioCtx.createDynamicsCompressor()
        comp.threshold.value = -16
        comp.knee.value      = 8
        comp.ratio.value     = 5
        comp.attack.value    = 0.002
        comp.release.value   = 0.12
        comp.connect(p6AudioCtx.destination)

        // Master volume
        p6MasterOut = p6AudioCtx.createGain()
        p6MasterOut.gain.value = 0.72
        p6MasterOut.connect(comp)
      } catch(e) {}
    }
    if (p6AudioCtx && p6AudioCtx.state === 'suspended') p6AudioCtx.resume()
    return p6AudioCtx
  }

  // Connect any node to master out
  function p6Out() { p6GetCtx(); return p6MasterOut }

  /*
   * Primitive: oscillator with exponential frequency sweep + exp decay envelope.
   * Much more organic than linear ramps.
   */
  function p6Tone(freq, freqEnd, durMs, gain, type = 'sine', delayMs = 0) {
    if (p6Muted) return
    const ctx = p6GetCtx(); const out = p6Out()
    if (!ctx || !out) return
    try {
      const t0  = ctx.currentTime + delayMs / 1000
      const dur = durMs / 1000
      const osc = ctx.createOscillator()
      const g   = ctx.createGain()
      osc.type = type
      osc.frequency.setValueAtTime(freq, t0)
      if (freqEnd && freqEnd !== freq)
        osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), t0 + dur * 0.9)
      // Envelope: near-instant attack, exponential decay to silence
      g.gain.setValueAtTime(0.0001, t0)
      g.gain.linearRampToValueAtTime(gain, t0 + 0.003)
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur)
      osc.connect(g); g.connect(out)
      osc.start(t0); osc.stop(t0 + dur + 0.005)
    } catch(e) {}
  }

  /*
   * Primitive: filtered white noise burst.
   * filterType: 'bandpass' | 'highpass' | 'lowpass'
   */
  function p6Noise(durMs, gain, filterType = 'bandpass', filterFreq = 1200, filterQ = 1.2, delayMs = 0) {
    if (p6Muted) return
    const ctx = p6GetCtx(); const out = p6Out()
    if (!ctx || !out) return
    try {
      const t0        = ctx.currentTime + delayMs / 1000
      const dur       = durMs / 1000
      const bufLen    = Math.ceil(ctx.sampleRate * dur)
      const buf       = ctx.createBuffer(1, bufLen, ctx.sampleRate)
      const data      = buf.getChannelData(0)
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1
      const src       = ctx.createBufferSource()
      src.buffer      = buf
      const flt       = ctx.createBiquadFilter()
      flt.type        = filterType
      flt.frequency.value = filterFreq
      flt.Q.value     = filterQ
      const g         = ctx.createGain()
      g.gain.setValueAtTime(0.0001, t0)
      g.gain.linearRampToValueAtTime(gain, t0 + 0.002)
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur)
      src.connect(flt); flt.connect(g); g.connect(out)
      src.start(t0)
    } catch(e) {}
  }

  /*
   * ══════════════════════════════════════════════════════
   *  SFX LIBRARY — each sound is a layered composition
   * ══════════════════════════════════════════════════════

  /* ── PART 6: 01. CURSOR TRAIL ── */
  function p6InitCursorTrail() {
    if (window.matchMedia('(hover: none), (pointer: coarse)').matches) return
    const TRAIL_COUNT = 8
    const trails = []

    for (let i = 0; i < TRAIL_COUNT; i++) {
      const div = document.createElement('div')
      div.className = 'cursor-trail-dot'
      const size = 3 - (i * 0.26)
      div.style.width  = Math.max(size, 0.8) + 'px'
      div.style.height = Math.max(size, 0.8) + 'px'
      div.style.opacity = (0.4 - i * 0.04).toFixed(2)
      div.style.transform = 'translate(-300px, -300px)'
      div.style.willChange = 'transform'
      document.body.appendChild(div)
      trails.push({ el: div, x: -300, y: -300 })
    }

    let mouseX = -300, mouseY = -300
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY }, { passive: true })

    // Hover color shift — kept because it looked cool
    const INTERACTIVE_SEL = 'a,button,[role=button],.card,.bn-item,input,select,textarea,label,.btn-primary,.btn-ghost,.btn-danger,.library-card,.ep-tile,.mood-pill,.mq-mood-card,.dash-nav-card,.task-card,.graveyard-card,.manifest-row,.lib-filter-pill,.overview-pill,.detail-day-btn,.detail-season-tab,.detail-arc-header'
    let warmTimeout = null
    document.addEventListener('mouseover', e => {
      if (e.target.closest(INTERACTIVE_SEL)) {
        if (warmTimeout) { clearTimeout(warmTimeout); warmTimeout = null }
        trails.forEach(t => t.el.classList.add('warm'))
      }
    })
    document.addEventListener('mouseout', e => {
      if (e.target.closest(INTERACTIVE_SEL)) {
        warmTimeout = setTimeout(() => trails.forEach(t => t.el.classList.remove('warm')), 400)
      }
    })

    ;(function trailLoop() {
      let prevX = mouseX, prevY = mouseY
      for (let i = 0; i < TRAIL_COUNT; i++) {
        const t = trails[i]
        const lerpFactor = 0.45 - i * 0.03
        t.x += (prevX - t.x) * lerpFactor
        t.y += (prevY - t.y) * lerpFactor
        t.el.style.transform = `translate(${(t.x - 1) | 0}px, ${(t.y - 1) | 0}px)`
        prevX = t.x
        prevY = t.y
      }
      requestAnimationFrame(trailLoop)
    })()
  }

  /* ── PART 6: 02. SECTION HEADER GLITCH ── */
  function p6InitGlitch() {
    function scheduleGlitch(el) {
      const delay = 8000 + Math.random() * 12000
      setTimeout(() => {
        if (!document.body.contains(el)) return
        el.classList.remove('glitching')
        void el.offsetWidth // force reflow to restart animation
        el.classList.add('glitching')
        el.addEventListener('animationend', () => {
          el.classList.remove('glitching')
          scheduleGlitch(el)
        }, { once: true })
      }, delay)
    }

    // Observe DOM for section-header elements and schedule glitch
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.section-header:not([data-glitch-init])').forEach(el => {
        el.setAttribute('data-glitch-init', '1')
        el.setAttribute('data-text', el.textContent)
        scheduleGlitch(el)
      })
    })
    observer.observe(document.body, { childList: true, subtree: true })
  }

  /* ── PART 6: 04. STAT CARD NUMBER SCRAMBLE ── */
  function p6ScrambleThenCount(el, target, scrambleDuration=300, countDuration=900) {
    if (!el) return
    const startTs = performance.now()
    const scrambleEnd = startTs + scrambleDuration
    const totalEnd    = startTs + scrambleDuration + countDuration

    function easeOut(t) { return 1 - Math.pow(1 - t, 3) }

    ;(function frame(now) {
      if (now < scrambleEnd) {
        // Phase 1: scramble
        el.textContent = Math.floor(Math.random() * 99)
        el.style.color = 'var(--text-3)'
        requestAnimationFrame(frame)
      } else if (now < totalEnd) {
        // Phase 2: count up with color transition
        const progress = (now - scrambleEnd) / countDuration
        const easedP   = easeOut(Math.min(progress, 1))
        el.textContent = Math.round(target * easedP)
        // Interpolate color: text-3 → accent-cool via opacity trick
        const t = easedP
        el.style.color = `rgba(${Math.round(68 + t*(0-68))}, ${Math.round(68 + t*(212-68))}, ${Math.round(90 + t*(255-90))}, 1)`
        requestAnimationFrame(frame)
      } else {
        el.textContent = target
        el.style.color = 'var(--accent-cool)'
      }
    })(startTs)
  }

  /* ── PART 6: 05. HOLOGRAPHIC SHEEN ON ALL CARDS ── */
  function p6InitHoloSheen() {
    var SHEEN_SELECTORS = '.library-card, .dash-nav-card, .mq-mood-card, .task-card, .ep-tile, .graveyard-card, .stat-card, .bn-item'
    // Use event delegation on document body — app-main is dynamically cleared/refilled
    document.addEventListener('mousemove', e => {
      const card = e.target.closest(SHEEN_SELECTORS)
      if (!card) return
      const rect  = card.getBoundingClientRect()
      const xPct  = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%'
      const yPct  = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%'
      card.style.setProperty('--mouse-x', xPct)
      card.style.setProperty('--mouse-y', yPct)
    }, { passive: true })
  }

  /* ── PART 6: 06. SECTION TRANSITIONS ── */
  // Patch navigateTo to add slide transitions
  let _p6NavInProgress = false
  const _p6OrigNavigateTo = navigateTo
  navigateTo = function(section, detailId = null, skipPush = false) {
    const main = document.getElementById('app-main')
    if (!main) {
      _p6OrigNavigateTo(section, detailId, skipPush)
      return
    }
    // If already animating, cancel and go immediately (prevents stuck state)
    if (_p6NavInProgress) {
      _p6NavInProgress = false
      main.style.transition = ''
      main.style.opacity    = ''
      main.style.transform  = ''
    }
    if (!main.firstChild) {
      _p6OrigNavigateTo(section, detailId, skipPush)
      return
    }
    _p6NavInProgress = true
    // Exit animation on main
    main.style.transition = 'opacity 120ms var(--ease-in), transform 120ms var(--ease-in)'
    main.style.opacity    = '0'
    main.style.transform  = 'translateX(-12px)'
    setTimeout(() => {
      main.style.transition = ''
      main.style.opacity    = ''
      main.style.transform  = ''
      _p6OrigNavigateTo(section, detailId, skipPush)
      // Entry animation directly on main — no wrapper div (preserves sticky context)
      main.style.opacity   = '0'
      main.style.transform = 'translateX(12px)'
      requestAnimationFrame(() => {
        main.style.transition = 'opacity 200ms var(--ease-out), transform 200ms var(--ease-out)'
        main.style.opacity    = '1'
        main.style.transform  = 'translateX(0)'
        setTimeout(() => {
          main.style.transition = ''
          main.style.opacity    = ''
          main.style.transform  = ''
          _p6NavInProgress = false
        }, 220)
      })
    }, 120)
  }

  /* ── PART 6: 09. GRAVEYARD CORRUPTION ── */
  const CORRUPT_CHARS = ['░','▒','▓','█','◆','×']
  const p6CorruptIntervals = new Map()

  function p6ApplyCorruption(el) {
    const titleEl = el.querySelector('.graveyard-title')
    if (!titleEl || titleEl.dataset.corrupted) return
    titleEl.dataset.corrupted = '1'

    const text = titleEl.textContent
    if (text.length < 3) return

    // Pick 1–2 random positions
    const numCorrupt = Math.random() < 0.6 ? 1 : 2
    const positions  = []
    while (positions.length < numCorrupt) {
      const pos = Math.floor(Math.random() * text.length)
      if (!positions.includes(pos)) positions.push(pos)
    }

    // Build new innerHTML with corrupt spans
    let html = ''
    for (let i = 0; i < text.length; i++) {
      if (positions.includes(i)) {
        html += `<span class="corrupt-char" data-orig="${text[i]}">${CORRUPT_CHARS[0]}</span>`
      } else {
        html += text[i].replace(/&/g,'&amp;').replace(/</g,'&lt;')
      }
    }
    titleEl.innerHTML = html

    // Cycle corrupt chars at ~2fps
    const spans = titleEl.querySelectorAll('.corrupt-char')
    const interval = setInterval(() => {
      if (!document.body.contains(titleEl)) { clearInterval(interval); return }
      spans.forEach(span => {
        span.textContent = CORRUPT_CHARS[Math.floor(Math.random() * CORRUPT_CHARS.length)]
      })
    }, 500)
    p6CorruptIntervals.set(titleEl, interval)

    // On card hover: pause corruption
    el.addEventListener('mouseenter', () => {
      spans.forEach(span => { span.textContent = span.dataset.orig })
      clearInterval(p6CorruptIntervals.get(titleEl))
    })
    el.addEventListener('mouseleave', () => {
      const newInterval = setInterval(() => {
        if (!document.body.contains(titleEl)) { clearInterval(newInterval); return }
        spans.forEach(span => {
          span.textContent = CORRUPT_CHARS[Math.floor(Math.random() * CORRUPT_CHARS.length)]
        })
      }, 500)
      p6CorruptIntervals.set(titleEl, newInterval)
    })
  }

  async function p6RunBootSequence() {
    const screen    = document.getElementById('boot-screen')
    const container = document.getElementById('boot-lines')
    const scanlines = document.getElementById('scanlines')
    const sleepFn   = ms => new Promise(r => setTimeout(r, ms))

    // Scanline steps during boot: start at 8%
    const scanOpacities = [0.8, 0.6, 0.5, 0.4, 0.35, 0.3, 0.25]
    if (scanlines) scanlines.style.opacity = '0.8'

    // First interaction gate: ensure AudioContext can start
    let bootAudioReady = false
    const readyAudio = () => { bootAudioReady = true }
    document.addEventListener('click', readyAudio, { once: true })
    document.addEventListener('keydown', readyAudio, { once: true })

    for (let stepIdx = 0; stepIdx < P6_BOOT_SCRIPT.length; stepIdx++) {
      const step = P6_BOOT_SCRIPT[stepIdx]
      const lineEl = document.createElement('div')
      lineEl.className = 'boot-line'

      // Type main text — fast burst typing

        lineEl.insertBefore(document.createTextNode(step.text[i]), cursor)
        await sleepFn(8 + Math.random() * 14)
      }

      // Random pause before suffix (system "checking")
      if (step.pauseBeforeSuffix > 0) {
        const randomPause = step.pauseBeforeSuffix + Math.floor(Math.random() * 120)
        await sleepFn(randomPause)
      }

      // Append suffix
      if (step.suffix) {
        const sfx = document.createElement('span')
        sfx.className   = step.cls
        sfx.textContent = step.suffix
        lineEl.insertBefore(sfx, cursor)
      }

      cursor.remove()

      // Step down scanlines
      if (scanlines && scanOpacities[stepIdx] !== undefined) {
        scanlines.style.transition = 'opacity 300ms cubic-bezier(0.16,1,0.3,1)'
        scanlines.style.opacity    = scanOpacities[stepIdx]
      }

      await sleepFn(step.delay)
    }

    await sleepFn(300)

    // Reset scanlines to ambient
    if (scanlines) {
      scanlines.style.opacity = ''
      scanlines.style.transition = ''
    }

    sessionStorage.setItem('phub_booted', 'true')
    screen.classList.add('hidden')
  }

  /* ── PART 6: WIRE UP AUDIO ON EXISTING INTERACTIONS ── */
  function p6WireAudio() {
    document.addEventListener('click', e => {
      // ── Context-specific sounds via data-sfx attribute ──
      const sfxEl = e.target.closest('[data-sfx]')
      if (sfxEl) {
        const sfx = sfxEl.dataset.sfx
        if      (sfx === 'graveyard') P6SFX.UI_GRAVEYARD()
        else if (sfx === 'revive')    P6SFX.UI_REVIVE()
        else if (sfx === 'success')   P6SFX.UI_SUCCESS()
        else if (sfx === 'complete')  P6SFX.UI_COMPLETE()
        else if (sfx === 'toggle')    P6SFX.UI_TOGGLE()
        else if (sfx === 'error')     P6SFX.UI_ERROR()
        else if (sfx === 'nav')       P6SFX.UI_NAV()
        else                          P6SFX.UI_CLICK()
        return
      }
      // ── Generic button click ──
      const btn = e.target.closest('.btn-primary, .btn-ghost, .btn-danger')
      if (btn) { P6SFX.UI_CLICK(); return }
      // ── Nav item ──
      const navItem = e.target.closest('.bn-item')
      if (navItem) { P6SFX.UI_NAV(); return }
      // ── Episode tile toggle ──
      const epTile = e.target.closest('.ep-tile')
      if (epTile) { P6SFX.UI_TOGGLE(); return }
      // ── Library card open ──
      const libCard = e.target.closest('.library-card')
      if (libCard) { P6SFX.UI_CLICK_LOW(); return }
    }, true)
  }

  /* ─────────────────────────────────────────────────────────────────
     FEATURE 2: PROCRASTINATION DEBT SCORE
     Rises when schedule entries are missed, falls when you watch/complete tasks.
     Displayed on Dashboard as a pulsing score.
  ───────────────────────────────────────────────────────────────── */
  function computeDebtScore() {
    var schedule = loadData(KEYS.schedule, {})
    var log = loadData(KEYS.log, [])
    var tasks = loadData(KEYS.tasks, [])
    var library = loadData(KEYS.library, [])
    var todayKey = localDateStr()
    var score = 0

    // +12 per past missed schedule entry (not completed library item)
    Object.keys(schedule).sort().forEach(function(dk) {
      if (dk >= todayKey) return
      ;(schedule[dk] || []).forEach(function(entry) {
        var libItem = library.find(function(i) { return i.id === entry.id })
        if (libItem && libItem.status !== 'completed' && libItem.status !== 'graveyard') score += 12
      })
    })

    // -5 per episode/chapter watched (from log, last 30 days)
    var cutoff = Date.now() - 30 * 24 * 3600 * 1000
    log.forEach(function(evt) {
      if (new Date(evt.timestamp).getTime() < cutoff) return
      var t = (evt.text || '').toLowerCase()
      if (t.includes('watched ep') || t.includes('read ch')) score -= 5
    })

    // -8 per task completed (last 30 days)
    tasks.forEach(function(t) {
      if (t.completed && t.completedDate) {
        var d = new Date(t.completedDate + 'T12:00:00').getTime()
        if (d > cutoff) score -= 8
      }
    })

    // -15 per series completed ever
    library.filter(function(i) { return i.status === 'completed' }).forEach(function() { score -= 15 })

    return Math.max(0, Math.min(999, Math.round(score)))
  }

  function getDebtLabel(score) {
    if (score === 0) return { text: 'ZERO DEBT', color: 'var(--accent-green)', glow: '0 0 20px rgba(0,255,170,0.6)' }
    if (score < 50)  return { text: 'MANAGEABLE', color: 'var(--accent-cool)', glow: '0 0 20px rgba(0,229,255,0.5)' }
    if (score < 150) return { text: 'BUILDING UP', color: 'var(--accent-yellow)', glow: '0 0 20px rgba(255,225,77,0.5)' }
    if (score < 300) return { text: 'FALLING BEHIND', color: 'var(--accent-warm)', glow: '0 0 20px rgba(255,96,64,0.5)' }
    if (score < 500) return { text: 'IN THE RED', color: 'var(--danger)', glow: '0 0 24px rgba(255,59,107,0.6)' }
    return { text: 'CRITICAL MASS', color: '#ff2222', glow: '0 0 30px rgba(255,34,34,0.8)' }
  }

  /* ─────────────────────────────────────────────────────────────────
     FEATURE 4: VELOCITY TRACKER
     Computed finish date displayed in the detail hero.
     Uses lastActivityAt + watchedEpisodes history from the log.
  ───────────────────────────────────────────────────────────────── */
  function computeVelocity(item) {
    // Gather watch events from log for this item
    var log = loadData(KEYS.log, [])
    var isReading = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel')
    var keyword = isReading ? 'read ch' : 'watched ep'
    var titleLower = (item.title || '').toLowerCase()

    // Get timestamps of watch events for this item in last 60 days
    var cutoff = Date.now() - 60 * 24 * 3600 * 1000
    var watchDates = []
    log.forEach(function(evt) {
      var t = (evt.text || '').toLowerCase()
      var ts = new Date(evt.timestamp).getTime()
      if (ts < cutoff) return
      if (t.includes(keyword) && t.includes(titleLower)) {
        watchDates.push(ts)
      }
    })

    if (watchDates.length < 2) {
      // Check if stalled (nothing in 14 days)
      if (item.lastActivityAt) {
        var lastAct = new Date(item.lastActivityAt).getTime()
        var daysSince = (Date.now() - lastAct) / (24 * 3600 * 1000)
        if (daysSince > 14) return { stalled: true, days: Math.round(daysSince) }
      }
      return null
    }

    // Compute episodes per week
    watchDates.sort()
    var earliest = watchDates[0]
    var latest = watchDates[watchDates.length - 1]
    var weekSpan = Math.max((latest - earliest) / (7 * 24 * 3600 * 1000), 1 / 7)
    var epsPerWeek = watchDates.length / weekSpan

    var remaining = (item.totalEpisodes || 0) - (item.watchedEpisodes || []).length
    if (remaining <= 0) return null
    if (epsPerWeek < 0.05) return { stalled: false, never: true, epsPerWeek: epsPerWeek }

    var weeksLeft = remaining / epsPerWeek
    var finishDate = new Date(Date.now() + weeksLeft * 7 * 24 * 3600 * 1000)
    if (weeksLeft > 52 * 3) return { stalled: false, never: true, epsPerWeek: epsPerWeek }

    return {
      stalled: false,
      never: false,
      epsPerWeek: epsPerWeek,
      finishDate: finishDate,
      weeksLeft: Math.round(weeksLeft)
    }
  }

  function renderVelocityWidget(item, container) {
    var v = computeVelocity(item)
    if (!v) return

    var el = document.createElement('div')
    el.style.cssText = 'margin-top:10px;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);font:400 11px var(--font-mono);color:var(--text-3);'

    if (v.stalled) {
      el.innerHTML = '<span style="color:var(--accent-warm);">⚠ STALLED</span> — no activity in <strong style="color:var(--text-2);">' + v.days + ' days</strong>'
    } else if (v.never) {
      var rateStr = v.epsPerWeek.toFixed(1)
      var isReading = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel')
      el.innerHTML = '<span style="color:var(--danger);">⚠ AT YOUR PACE</span> (' + rateStr + ' ' + (isReading ? 'ch' : 'ep') + '/wk): <strong style="color:var(--danger);">estimated never — be honest</strong>'
    } else {
      var isReading2 = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel')
      var rateStr2 = v.epsPerWeek.toFixed(1)
      var dateStr = v.finishDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      el.innerHTML = '◉ At your pace <span style="color:var(--text-2);">(' + rateStr2 + ' ' + (isReading2 ? 'ch' : 'ep') + '/wk)</span>: done by <strong style="color:var(--accent-cool);">' + dateStr + '</strong>'

  }
