    .detail-notes-textarea::placeholder { color: var(--text-3); }
    .detail-notes-textarea:focus { border-color: rgba(0,200,255,0.3); box-shadow: 0 0 0 3px rgba(0,200,255,0.05); }

    /* Drop to graveyard */
    .detail-graveyard-wrap { margin-top: var(--space-2); }
    .detail-graveyard-confirm {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      animation: slideInResult 200ms var(--ease-out) both;
    }
    .detail-graveyard-confirm-text {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-2);
    }
    .detail-graveyard-confirm-btns {
      display: flex;
      gap: var(--space-2);
    }

    /* Season tabs */
    .detail-season-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-5);
    }
    .detail-season-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-3);
      font: var(--text-sm) var(--font-mono);
      padding: var(--space-2) var(--space-4);
      cursor: none;
      transition: all 150ms var(--ease-snap);
      margin-bottom: -1px;
    }
    .detail-season-tab:hover { color: var(--text-2); }
    .detail-season-tab.active {
      color: var(--text-1);
      border-bottom-color: var(--accent-cool);
    }

    /* Arc accordion */
    .detail-arc-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
      overflow: hidden;
    }
    .detail-arc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      cursor: none;
      background: var(--surface);
      transition: background 150ms var(--ease-snap);
    }
    .detail-arc-header:hover { background: var(--surface-2); }
    .detail-arc-name {
      font: 600 var(--text-sm) var(--font-mono);
      color: var(--text-1);
    }
    .detail-arc-range {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }
    .detail-arc-chevron {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      transition: transform 200ms var(--ease-snap);
    }
    .detail-arc-item.open .detail-arc-chevron { transform: rotate(180deg); }
    .detail-arc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 300ms var(--ease-out);
      padding: 0 var(--space-4);
    }
    .detail-arc-item.open .detail-arc-body { padding: var(--space-4); }

    /* Arc navigation dropdown */
    .arc-nav-select {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: 500 var(--text-sm) var(--font-mono);
      padding: 6px 10px;
      cursor: pointer;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 150ms var(--ease-snap);
    }
    .arc-nav-select:focus { border-color: var(--border-bright); }
    .arc-nav-select option { background: #0d0d1a; }

    /* Chapter tiles — compact when no ratings */
    .ep-tile.chapter-tile { height: 66px; }

    /* Film strip wrapper */
    .detail-filmstrip {
      position: relative;
      padding: var(--space-4) 0;
      margin: var(--space-4) 0;
    }
    .detail-filmstrip::before,
    .detail-filmstrip::after {
      content: '';
      display: block;
      height: 16px;
      background-image: radial-gradient(circle, var(--surface-3) 4px, transparent 4px);
      background-size: 28px 16px;
      background-repeat: repeat-x;
      border: 1px solid var(--border);
    }
    .detail-filmstrip::before { margin-bottom: var(--space-3); }
    .detail-filmstrip::after  { margin-top: var(--space-3); }

    /* Episode grid */
    .detail-ep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 10px;
    }

    /* Episode tile */
    .ep-tile {
      width: 100%;
      height: 80px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: none;
      transition: border-color 150ms var(--ease-snap), background 150ms var(--ease-snap);
      -webkit-user-select: none;
      user-select: none;
    }
    .ep-tile:hover { border-color: var(--border-bright); }
    .ep-tile.watched {
      background: var(--accent-cool-dim);
      border-color: rgba(0,212,255,0.4);
    }
    .ep-tile.watched .ep-num { color: var(--accent-cool); }
    .ep-num {
      font: 700 16px var(--font-mono);
      color: var(--text-3);
    }
    .ep-check {
      position: absolute;
      bottom: 5px;
      right: 6px;
      font-size: 15px;
      color: var(--accent-cool);
      opacity: 0;
      transition: opacity 150ms;
    }
    .ep-tile.watched .ep-check { opacity: 1; }
    /* Timer icon – appears on hover */
    .ep-timer-btn {
      position: absolute;
      bottom: 4px;
      left: 5px;
      font-size: 15px;
      background: transparent;
      border: none;
      color: var(--text-3);
      cursor: none;
      padding: 0;
      opacity: 0;
      transition: opacity 100ms;
      line-height: 1;
    }
    .ep-tile:hover .ep-timer-btn { opacity: 1; }
    .ep-tile:hover .ep-timer-btn:hover { color: var(--accent-cool); }
    /* Flash animation on toggle */
    .ep-tile.tile-flash {
      animation: epFlash 400ms var(--ease-out) both;
    }
    @keyframes epFlash {
      0%   { background: rgba(0,212,255,0.8); }
      100% { background: var(--accent-cool-dim); }
    }
    /* Select mode ring */
    .ep-tile.select-mode { cursor: none; }
    .ep-tile.tile-selected {
      border-color: var(--accent-warm);
      box-shadow: inset 0 0 0 2px var(--accent-warm);
    }

    /* Season panel under episode grid */
    .detail-season-panel {
      margin-top: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .detail-season-stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 16px;
    }

    /* Celebration burst ring */
    .season-burst-ring {
      position: fixed;
      border-radius: 50%;
      border: 2px solid var(--accent-cool);
      pointer-events: none;
      z-index: 8000;
      animation: burstRing 600ms var(--ease-out) forwards;
    }
    @keyframes burstRing {
      from { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      to   { transform: translate(-50%,-50%) scale(3); opacity: 0; }
    }
    /* Season header shine sweep */
    .season-shine {
      position: relative;
      overflow: hidden;
    }
    .season-shine::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.25), transparent);
      transform: translateX(-100%);
      animation: shineSwep 800ms var(--ease-out) forwards;
    }
    @keyframes shineSwep {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Completion banner */
    .completion-banner {
      position: fixed;
      top: 0;
      left: 220px;
      right: 0;
      background: var(--accent-cool-dim);
      border-bottom: 1px solid var(--accent-cool);
      text-align: center;
      padding: var(--space-3);
      font: 600 var(--text-md) var(--font-mono);
      color: var(--accent-cool);
      letter-spacing: 0.08em;
      z-index: 8500;
      transform: translateY(-100%);
      transition: transform 400ms var(--ease-spring);
    }
    .completion-banner.visible { transform: translateY(0); }

    /* Multi-select action bar */
    .detail-select-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8, 8, 22, 0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--border-bright);
      box-shadow: 0 -4px 40px rgba(0,229,255,0.08), 0 -1px 0 rgba(0,229,255,0.15);
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      z-index: 9996;
      transform: translateY(100%);
      transition: transform 300ms var(--ease-spring);
    }
    .detail-select-bar.visible { transform: translateY(0); }
    .detail-select-count {
      font: 600 var(--text-sm) var(--font-mono);
      color: var(--text-2);
      flex: 1;
    }

    /* Empty episode state */
    .detail-ep-empty {
      text-align: center;
      padding: var(--space-10) var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }
    .detail-ep-empty-title {
      font: 600 var(--text-md) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.08em;
    }
    .detail-ep-empty-sub {
      font: var(--text-sm) var(--font-ui);
      color: var(--text-3);
    }
    .detail-ep-empty-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .detail-ep-set-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: var(--text-sm) var(--font-mono);
      padding: var(--space-2) var(--space-3);
      width: 96px;
      outline: none;
      text-align: center;
      transition: border-color 150ms var(--ease-snap);
    }
    .detail-ep-set-input:focus { border-color: var(--accent-cool); }

    /* Error state */
    .detail-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
      gap: var(--space-4);
      text-align: center;
    }
    .detail-error-title {
      font: 600 var(--text-xl) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.08em;
    }


    /* ── PART 5: FINAL SECTIONS STYLES ── */

    /* ── TASKS ── */
    .tasks-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }
    .tasks-active-badge {
      font: var(--text-xs) var(--font-mono);
      color: var(--success);
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: var(--radius-sm);
      padding: 2px var(--space-2);
      letter-spacing: 0.08em;
    }
    .tasks-add-bar {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      align-items: center;
    }
    .tasks-name-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: var(--text-sm) var(--font-mono);
      padding: var(--space-2) var(--space-3);
      outline: none;
      transition: border-color 150ms var(--ease-snap);
    }
    .tasks-name-input::placeholder { color: var(--text-3); }
    .tasks-name-input:focus { border-color: var(--border-bright); }
    .tasks-name-input.flash-error { border-color: var(--danger) !important; animation: flashError 400ms var(--ease-snap); }
    .tasks-dur-input {
      width: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: var(--text-sm) var(--font-mono);
      padding: var(--space-2) var(--space-2);
      outline: none;
      text-align: center;
      transition: border-color 150ms var(--ease-snap);
    }
    .tasks-dur-input::placeholder { color: var(--text-3); }
    .tasks-dur-input:focus { border-color: var(--border-bright); }
    .tasks-day-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font: var(--text-xs) var(--font-mono);
      padding: var(--space-2) var(--space-2);
      outline: none;
      cursor: none;
      transition: border-color 150ms var(--ease-snap);
      appearance: none;
      -webkit-appearance: none;
    }
    .tasks-day-select:focus { border-color: var(--border-bright); }

    /* Task card */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-2);
      
      box-shadow: var(--glow-card);
      transition: all 250ms var(--ease-snap);
    }
    .task-card:hover { border-color: rgba(255,255,255,0.1); box-shadow: var(--glow-card), 0 8px 40px rgba(0,0,0,0.6); }
    .task-card.completing { opacity: 0.35; transform: translateY(4px); }
    .task-card.removing { opacity: 0; transform: translateX(-16px); max-height: 0; margin: 0; padding-top: 0; padding-bottom: 0; overflow: hidden; }
    .task-status-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; width: 40px; }
    .task-status-label { font: 400 11px var(--font-mono); color: var(--success); text-transform: uppercase; letter-spacing: 0.1em; }
    .task-status-label.terminated { color: var(--text-3); }
    .task-center { flex: 1; min-width: 0; }
    .task-name { font: 500 17px var(--font-ui); color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-name.done { text-decoration: line-through; color: var(--text-3); }
    .task-meta { display: flex; align-items: center; gap: var(--space-2); margin-top: 3px; }
    .task-duration { font: 400 13px var(--font-mono); color: var(--text-3); }
    .task-day-pill {
      font: 600 12px var(--font-mono);
      color: var(--accent-cool);
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: var(--radius-pill);
      padding: 1px 8px;
      letter-spacing: 0.08em;
    }
    .task-done-date { font: 400 13px var(--font-mono); color: var(--text-3); }
    .task-timer-display { font: 400 13px var(--font-mono); color: var(--accent-cool); margin-top: 3px; }
    .task-actions { display: flex; gap: var(--space-2); align-items: center; flex-shrink: 0; }
    .task-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-3);
      font: 500 12px var(--font-mono);
      padding: 5px 12px;
      cursor: none;
      white-space: nowrap;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 200ms var(--ease-snap);
    }
    .task-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text-1); }
    .task-btn.timer-running { border-color: rgba(0,200,255,0.4); color: var(--accent-cool); background: rgba(0,200,255,0.06); }
    .task-btn.complete-btn:hover { border-color: rgba(0,255,170,0.4); color: var(--success); background: rgba(0,255,170,0.06); }
    .task-btn.delete-btn:hover { border-color: rgba(255,59,107,0.4); color: var(--danger); background: rgba(255,59,107,0.06); }
    .task-delete-confirm { display: flex; align-items: center; gap: var(--space-2); font: 400 13px var(--font-mono); color: var(--text-2); }

    /* Completed section toggle */
    .tasks-completed-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      cursor: none;
      border-top: 1px solid var(--border);
      margin-top: var(--space-4);
      -webkit-user-select: none;
      user-select: none;
    }
    .tasks-completed-header:hover .tasks-completed-title { color: var(--text-2); }
    .tasks-completed-title {
      font: 600 var(--text-xs) var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 150ms var(--ease-snap);
    }
    .tasks-completed-count {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }
    .tasks-completed-chevron {
      margin-left: auto;
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      transition: transform 200ms var(--ease-snap);
    }
    .tasks-completed-chevron.open { transform: rotate(180deg); }
    .tasks-completed-list {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms var(--ease-out);
    }
    .tasks-completed-list.open { max-height: 4000px; }

    /* Tasks empty state */
    .tasks-empty {
      text-align: center;
      padding: var(--space-12) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
    }
    .tasks-empty-title {
      font: 600 var(--text-md) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.12em;
    }
    .tasks-idle-line {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .idle-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--text-3);
      animation: bootBlink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    /* ── OVERVIEW / MANIFEST ── */
    .overview-filters {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }
    .overview-filter-row {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .overview-pill {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font: var(--text-xs) var(--font-mono);
      padding: 3px var(--space-3);
      cursor: none;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      transition: all 150ms var(--ease-snap);
      -webkit-user-select: none;
      user-select: none;
    }
    .overview-pill:hover { border-color: var(--border-bright); color: var(--text-1); }
    .overview-pill.active { background: var(--accent-cool-dim); border-color: var(--accent-cool); color: var(--accent-cool); }
    .overview-pill.task-pill.active { background: rgba(168,85,247,0.12); border-color: var(--accent-violet); color: var(--accent-violet); }
    .overview-filter-label {
      font: 700 9px var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      align-self: center;
      white-space: nowrap;
      padding-right: 4px;
    }
    /* Manifest table */
    .manifest-table {
      width: 100%;
      border-collapse: collapse;
    }
    .manifest-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-left: 2px solid transparent;
      cursor: none;
      transition: background 100ms var(--ease-snap), border-color 100ms var(--ease-snap);
      opacity: 0;
      transform: translateX(-8px);
    }
    .manifest-row:nth-child(even) { background: var(--surface); }
    .manifest-row:nth-child(odd)  { background: var(--surface-2); }
    .manifest-row:hover {
      background: var(--accent-cool-dim) !important;
      border-left-color: var(--accent-cool);
    }
    .manifest-row.row-entered {
      opacity: 1;
      transform: translateX(0);
      transition: opacity 150ms var(--ease-out), transform 150ms var(--ease-out),
                  background 100ms var(--ease-snap), border-color 100ms var(--ease-snap);
    }
    .manifest-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 90px;
      flex-shrink: 0;
    }
    .manifest-status-label {
      font: 12px var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .manifest-title-cell {
      flex: 1;
      font: var(--text-md) var(--font-ui);
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .manifest-title-cell.task-entry { color: var(--text-2); }
    .manifest-prog-cell {
      width: 96px;
      flex-shrink: 0;
    }
    .manifest-prog-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .manifest-prog-fill {
      height: 100%;
      background: var(--accent-cool);
      border-radius: 2px;
    }
    .manifest-left-cell {
      width: 72px;
      flex-shrink: 0;
      text-align: right;
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }
    .manifest-rating-cell {
      width: 48px;
      flex-shrink: 0;
      font: var(--text-xs) var(--font-mono);
      color: var(--accent-warm);
      text-align: right;
    }
    .manifest-day-cell {
      width: 72px;
      flex-shrink: 0;
      font: var(--text-xs) var(--font-mono);
      color: var(--accent-cool);
    }

    /* ── GRAVEYARD ── */
    .graveyard-section {
      --accent-cool: #4a8fa8;
      --accent-warm: #a06040;
      --text-2: #606080;
    }
    .graveyard-subtitle {
      font: italic var(--text-sm) var(--font-ui);
      color: var(--text-3);
      margin-bottom: var(--space-5);
    }
    .graveyard-header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .graveyard-count {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      opacity: 0.6;
    }
    .graveyard-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-4);
      opacity: 0.85;
      transition: opacity 300ms, max-height 300ms var(--ease-out), margin 300ms;
    }
    .graveyard-card:hover { opacity: 1; }
    .graveyard-card.removing {
      opacity: 0;
      max-height: 0 !important;
      margin: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
    }
    .graveyard-card-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }
    .graveyard-title {
      font: 600 var(--text-lg) var(--font-ui);
      color: var(--text-2);
      flex: 1;
    }
    .graveyard-archived-pill {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1px var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .graveyard-progress-label {
      font: 700 16px var(--font-mono);
      color: var(--text-3);
      margin-bottom: var(--space-1);
      padding-bottom: 3px;
    }
    .graveyard-prog-wrap {
      opacity: 0.3;
      margin-bottom: var(--space-3);
    }
    .graveyard-dates {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      margin-bottom: var(--space-3);
    }
    .graveyard-note-text {
      font: italic var(--text-sm) var(--font-ui);
      color: var(--text-3);
      margin-bottom: var(--space-3);
    }
    .graveyard-note-prefix {
      font-style: normal;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
    }
    .graveyard-note-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-3);
      font: italic var(--text-sm) var(--font-ui);
      padding: var(--space-1) 0;
      outline: none;
      margin-bottom: var(--space-3);
      transition: border-color 150ms var(--ease-snap);
    }
    .graveyard-note-input::placeholder { color: var(--text-3); opacity: 0.5; }
    .graveyard-note-input:focus { border-color: var(--text-3); }
    .graveyard-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }
    .graveyard-delete-confirm {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
    }
    .graveyard-empty {
      text-align: center;
      padding: var(--space-12) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      position: relative;
    }
    .graveyard-empty-bg-deco {
      font-size: 120px;
      opacity: 0.04;
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }
    /* ── SPAWN button variant — violet to pink ── */
    .btn-spawn {
      background: linear-gradient(135deg, #a855f7, #ff2d95) !important;
      box-shadow: 0 0 24px rgba(168,85,247,0.4), 0 0 60px rgba(255,45,149,0.2), 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .btn-spawn:hover {
      box-shadow: 0 0 30px rgba(168,85,247,0.6), 0 0 90px rgba(255,45,149,0.3), 0 6px 20px rgba(0,0,0,0.5) !important;
    }
    /* ── WATCHING status chip for overview ── */
    .manifest-status-watch-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: var(--radius-pill);
      background: rgba(0,255,170,0.1);
      border: 1px solid rgba(0,255,170,0.3);
      font: 500 10px var(--font-mono);
      color: var(--accent-green);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .manifest-status-watch-chip .chip-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 6px var(--accent-green);
      flex-shrink: 0;
    }
    .manifest-status-watch-chip.not-started {
      background: rgba(255,225,77,0.1);
      border-color: rgba(255,225,77,0.3);
      color: var(--accent-yellow);
    }
    .manifest-status-watch-chip.not-started .chip-dot {
      background: var(--accent-yellow);
      box-shadow: 0 0 6px var(--accent-yellow);
    }
    .manifest-status-watch-chip.upcoming {
      background: rgba(0,229,255,0.1);
      border-color: rgba(0,229,255,0.3);
      color: var(--accent-cool);
    }
    .manifest-status-watch-chip.upcoming .chip-dot {
      background: var(--accent-cool);
      box-shadow: 0 0 6px var(--accent-cool);
      animation: upcomingChipPulse 2.5s ease-in-out infinite;
    }
    @keyframes upcomingChipPulse {
      0%,100% { box-shadow: 0 0 6px var(--accent-cool); }
      50%      { box-shadow: 0 0 10px var(--accent-cool), 0 0 16px rgba(0,229,255,0.4); }
    }
    /* ── RESPONSIVE BREAKPOINT ── */
    @media (max-width: 780px) {
      .detail-hero {
        grid-template-columns: 1fr;
      }
      .dash-stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .lib-grid {
        grid-template-columns: 1fr;
      }
    }
    .graveyard-empty-line {
      font: 700 16px var(--font-mono);
      color: var(--text-3);
      opacity: 0;
      transition: opacity 400ms var(--ease-out);
    }
    .graveyard-empty-line.visible { opacity: 1; }

    /* ── SESSION LOG ── */
    .log-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .log-sub {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      margin-bottom: var(--space-5);
      letter-spacing: 0.06em;
    }
    .log-feed { display: flex; flex-direction: column; gap: 0; }
    .log-group { margin-bottom: var(--space-4); }
    .log-group-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      cursor: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .log-group-header:hover .log-group-date { color: var(--text-2); }
    .log-group-date {
      font: 600 var(--text-xs) var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
      transition: color 150ms var(--ease-snap);
    }
    .log-group-sep {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .log-group-count {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      white-space: nowrap;
      opacity: 0.6;
    }
    .log-group-chevron {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      transition: transform 200ms var(--ease-snap);
    }
    .log-group-chevron.open { transform: rotate(180deg); }
    .log-events {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms var(--ease-out);
    }
    .log-events.open { max-height: 9999px; }
    .log-event-row {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      transition: background 100ms var(--ease-snap);
    }
    .log-event-row:hover { background: var(--surface-2); }
    .log-time {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      flex-shrink: 0;
      width: 40px;
    }
    .log-text {
      font: var(--text-sm) var(--font-mono);
      color: var(--text-2);
      flex: 1;
      word-break: break-word;
    }
    .log-empty {
      text-align: center;
      padding: var(--space-12) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
    }
    .log-empty-title {
      font: 600 var(--text-md) var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.12em;
    }


    /* ═══════════════════════════════════════════════════
       FINAL UPGRADE BLOCK — all remaining components
    ═══════════════════════════════════════════════════ */

    /* ── MODAL INPUTS — see Part 2 for full styles ── */
    .modal-title-row { font: 400 24px var(--font-display); color: var(--text-1); margin-bottom: var(--space-6); letter-spacing: 0.04em; }
    .modal-field-label { font: 700 12px var(--font-mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.18em; display: block; margin-bottom: var(--space-1); }
    .modal-input { width: 100%; background: rgba(0,229,255,0.03); border: 1px solid rgba(100,160,255,0.14); border-radius: var(--radius-sm); color: var(--text-1); font: 400 13px var(--font-ui); padding: 10px var(--space-3); outline: none; transition: all 200ms var(--ease-snap); margin-bottom: var(--space-4); }
    .modal-input:focus { border-color: rgba(0,200,255,0.35); box-shadow: 0 0 0 3px rgba(0,200,255,0.06); }
    .modal-input.field-error { border-color: rgba(255,59,107,0.5); }
    .modal-field-error { font: 400 13px var(--font-mono); color: var(--danger); margin-top: calc(-1 * var(--space-3)); margin-bottom: var(--space-3); display: none; }
    .modal-field-error.visible { display: block; }
    .modal-select { width: 100%; background: rgba(0,229,255,0.03); border: 1px solid rgba(100,160,255,0.14); border-radius: var(--radius-sm); color: var(--text-1); font: 400 13px var(--font-ui); padding: 10px var(--space-3); outline: none; cursor: none; margin-bottom: var(--space-4); appearance: none; -webkit-appearance: none; transition: all 200ms var(--ease-snap); }
    .modal-select:focus { border-color: rgba(0,200,255,0.35); }
    .modal-mood-grid { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-4); }
    .modal-mood-toggle { background: rgba(255,255,255,0.03); border: 1px solid rgba(100,160,255,0.15); border-radius: var(--radius-pill); color: var(--text-3); font: 500 14px var(--font-mono); padding: 5px 14px; cursor: none; letter-spacing: 0.1em; text-transform: uppercase; transition: all 200ms var(--ease-snap); }
    .modal-mood-toggle:hover { border-color: rgba(255,255,255,0.14); color: var(--text-1); }
    .modal-mood-toggle.active { background: rgba(0,200,255,0.08); border-color: rgba(0,200,255,0.35); color: var(--accent-cool); }
    .modal-footer { display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-2); }


    /* ── PRESERVED UNIQUE SELECTORS ── */
    .mq-mood-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(0,200,255,0.01) 100%); pointer-events: none; }

    /* ═══════════════════════════════════════════════════════════════
       VISUAL UPGRADE LAYER — Keypad → Smartphone transformation
    ═══════════════════════════════════════════════════════════════ */

    /* ── AMBIENT FLOATING PARTICLES ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* ── ENHANCED SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.015); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(0,229,255,0.25), rgba(168,85,247,0.25));
      border-radius: 99px;
      box-shadow: 0 0 10px rgba(0,229,255,0.15);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(0,229,255,0.5), rgba(168,85,247,0.5));
      box-shadow: 0 0 16px rgba(0,229,255,0.3);
    }

    /* ── SECTION HEADER GLOW LINE ── */
    .section-header::after {
      background: linear-gradient(90deg, rgba(0,200,255,0.4), rgba(139,92,246,0.3), transparent 70%);
    }

    /* ── HOLOGRAPHIC CARD SHEEN UPGRADE ── */
    /* Library card uses ::after for sheen (no conflict) */
    .library-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(168,85,247,0.04) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 300ms;
      pointer-events: none;
      z-index: 10;
    }
    .library-card:hover::after { opacity: 1; }
    /* Other cards: merge sheen into existing ::before via background layering */
    .dash-nav-card:hover::before,
    .mq-mood-card:hover::before,
    .graveyard-card:hover::before {
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(168,85,247,0.04) 0%, transparent 65%);
      opacity: 1;
    }
    /* Cards without ::before conflict — use ::after */
    .task-card::after,
    .ep-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(168,85,247,0.04) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 300ms;
      pointer-events: none;
      z-index: 10;
    }
    .task-card:hover::after,
    .ep-tile:hover::after { opacity: 1; }
    /* Stat card: subtle sheen — no blob, just a light edge shimmer */
    .stat-card:hover::before {
      background:
        radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(0,229,255,0.05) 0%, transparent 55%),
        linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 40%, rgba(0,229,255,0.03) 100%);
    }
    /* Bottom nav item: sheen on hover */
    .bn-item:not(.active):hover::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,229,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LIB CARD TITLE UPGRADE ── */
    .lib-card-title {
      font: 600 18px var(--font-display);
      color: var(--text-1);
      line-height: 1.25;
      letter-spacing: 0.06em;
    }

    /* ── SIDEBAR BUDGET BAR UPGRADE ── */
    .sidebar-budget-bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      background: linear-gradient(90deg, #00e5ff, #a855f7, #ff2d95, #00e5ff);
      background-size: 300% 100%;
      box-shadow: 0 0 10px rgba(0,229,255,0.6), 0 0 30px rgba(168,85,247,0.3);
      transition: width 800ms var(--ease-out);
      
    }

    /* ── MQ RESULT CARD UPGRADE ── */
    .mq-result-card {
      background: linear-gradient(160deg, rgba(80,100,255,0.09) 0%, rgba(0,229,255,0.03) 100%);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-cool);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      display: flex; align-items: flex-start; gap: var(--space-6);
      
      box-shadow: var(--glow-card), -6px 0 40px rgba(0,229,255,0.16), -6px 0 80px rgba(168,85,247,0.06);
    }
    .mq-result-title { font: 700 28px var(--font-display); color: var(--text-1); margin: var(--space-2) 0; letter-spacing: 0.06em; }

    /* ── TASK CARD UPGRADE ── */
    .task-card {
      background: linear-gradient(160deg, rgba(80,100,255,0.08) 0%, rgba(168,85,247,0.05) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-2);

      box-shadow: var(--glow-card), inset 0 1px 0 rgba(130,180,255,0.05);
      transition: all 300ms var(--ease-snap);
      position: relative;
      overflow: hidden;
    }
    .task-card:hover {
      border-color: rgba(0,229,255,0.2);
      box-shadow: var(--glow-card), 0 12px 48px rgba(0,0,0,0.7), 0 0 30px rgba(0,229,255,0.06);
      transform: translateX(3px);
    }

    /* ── GRAVEYARD UPGRADE ── */
    .graveyard-card {
      background: linear-gradient(160deg, rgba(100,80,130,0.05) 0%, rgba(255,59,107,0.02) 100%);
      border: 1px solid rgba(255,59,107,0.08);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
      opacity: 0.6;
      
      transition: all 400ms var(--ease-snap);
      position: relative;
      overflow: hidden;
    }
    .graveyard-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(255,59,107,0.012) 3px, rgba(255,59,107,0.012) 4px);
      pointer-events: none;
      opacity: 0.5;
    }
    .graveyard-card:hover {
      opacity: 1;
      box-shadow: var(--glow-card), 0 0 50px rgba(255,59,107,0.06), 0 0 100px rgba(168,85,247,0.04);
      border-color: rgba(255,59,107,0.2);
    }
    .graveyard-title { font: 700 22px var(--font-display); letter-spacing: 0.06em; }

/* ── COMPLETION BANNER UPGRADE ── */
    .completion-banner {
      background: linear-gradient(90deg, rgba(0,229,255,0.1), rgba(168,85,247,0.07), rgba(255,45,149,0.05), rgba(0,229,255,0.1));
      border-bottom: 1px solid rgba(0,229,255,0.3);
      font: 700 14px var(--font-display);
      letter-spacing: 0.15em;
      text-shadow: 0 1px 8px rgba(0,229,255,0.2);
    }

    /* ── MOOD PILL UPGRADE ── */
    .mood-pill {
      width: 100%; padding: 11px var(--space-4);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font: 500 11px var(--font-mono);
      text-align: left; cursor: none;
      opacity: 0; transform: translateX(-10px);
      transition: all 200ms var(--ease-snap);
      letter-spacing: 0.08em;
      position: relative;
      overflow: hidden;
    }
    .mood-pill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.06), rgba(168,85,247,0.04), transparent);
      transform: translateX(-100%);
      transition: transform 400ms var(--ease-out);
    }
    .mood-pill:hover::after { transform: translateX(100%); }
    .mood-pill:hover { border-color: rgba(0,229,255,0.35); color: var(--text-1); background: rgba(0,229,255,0.07); }
    .mood-pill.selected { background: linear-gradient(90deg, rgba(0,229,255,0.1), rgba(168,85,247,0.06)); border-color: rgba(0,229,255,0.45); color: var(--text-1); box-shadow: inset 0 0 24px rgba(0,229,255,0.06), 0 0 16px rgba(0,229,255,0.08); }

    /* ── FILTER PILL UPGRADE ── */
    .lib-filter-pill {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-3);
      font: 600 11px var(--font-mono);
      padding: 8px 20px;
      cursor: none;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      transition: all 250ms var(--ease-snap);
      -webkit-user-select: none; user-select: none;
    }
    .lib-filter-pill:hover { border-color: rgba(0,229,255,0.25); color: var(--text-1); background: rgba(0,229,255,0.06); }
    .lib-filter-pill.active {
      background: linear-gradient(135deg, rgba(0,229,255,0.16), rgba(168,85,247,0.08));
      border-color: rgba(0,229,255,0.45);
      color: var(--accent-cool);
      box-shadow: 0 0 20px rgba(0,229,255,0.15), 0 0 40px rgba(168,85,247,0.06), inset 0 0 16px rgba(0,229,255,0.05);
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    /* ── SEARCH INPUT UPGRADE ── */
    .lib-search-input:focus {
      border-color: rgba(0,200,255,0.35);
      box-shadow: 0 0 0 4px rgba(0,200,255,0.06), 0 0 20px rgba(0,200,255,0.05);
      background: rgba(255,255,255,0.06);
    }

    /* ── SECTION ENTER UPGRADE ── */
    .section-enter {
      animation: section-in-upgrade 300ms var(--ease-out) both;
    }
    @keyframes section-in-upgrade {
      from { opacity: 0; transform: translateX(20px) scale(0.99); filter: blur(4px); }
      to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    }

    /* ── LIB TOPBAR UPGRADE ── */
    .lib-topbar {
      position: relative;
      z-index: 50;
      padding: 0 0 var(--space-4) 0;
    }

    /* ── DETAIL TIMER CARD UPGRADE ── */
    .detail-timer-card {
      background: linear-gradient(160deg, rgba(80,100,255,0.09) 0%, rgba(0,229,255,0.03) 100%);
      border: 1px solid rgba(100,160,255,0.2);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      
      box-shadow: var(--glow-card), inset 0 1px 0 rgba(100,180,255,0.12);
    }
    .detail-timer-display {
      font: 700 26px var(--font-display);
      color: var(--accent-cool);
      margin-bottom: var(--space-3);
      letter-spacing: 0.1em;
      min-height: 36px;
      text-shadow: 0 1px 8px rgba(0,229,255,0.2);
    }

    /* ── OVERVIEW PILL UPGRADE ── */
    .overview-pill {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-2);
      font: 600 12px var(--font-mono);
      padding: 6px 16px;
      cursor: none;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      transition: all 250ms;
      -webkit-user-select: none; user-select: none;
    }
    .overview-pill.active {
      background: linear-gradient(135deg, rgba(0,229,255,0.16), rgba(168,85,247,0.07));
      border-color: rgba(0,229,255,0.45);
      color: var(--accent-cool);
      box-shadow: 0 0 20px rgba(0,229,255,0.15), 0 0 40px rgba(168,85,247,0.06);
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    /* ── MANIFEST ROW UPGRADE ── */
    .manifest-row:hover {
      background: linear-gradient(90deg, rgba(0,229,255,0.08), rgba(168,85,247,0.06)) !important;
      border-left-color: var(--accent-cool);
      box-shadow: inset 3px 0 16px rgba(0,229,255,0.06);
    }
    .manifest-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #a855f7);
      border-radius: 99px;
      box-shadow: 0 0 8px rgba(0,229,255,0.5);
    }

    /* ── SELECTION HIGHLIGHT ── */
    ::selection {
      background: rgba(168,85,247,0.35);
      color: #fff;
      text-shadow: 0 0 8px rgba(0,229,255,0.3);
    }

    /* ── INPUT FOCUS RING UPGRADE (GLOBAL) ── */
    input:focus, textarea:focus, select:focus {
      border-color: rgba(0,200,255,0.35) !important;
      box-shadow: 0 0 0 3px rgba(0,200,255,0.06), 0 0 16px rgba(0,200,255,0.04) !important;
    }

    /* ── DASH DATE UPGRADE ── */
    .dash-date {
      font: 500 13px var(--font-mono);
      color: var(--text-3);
      margin-top: var(--space-2);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* ── STATUS DOT UPGRADE ── */
    .lib-status-dot.watching {
      background: var(--success);
      box-shadow: 0 0 10px var(--success), 0 0 24px rgba(0,255,170,0.3);
      animation: statusPulseUpgrade 2s ease-in-out infinite;
    }
    @keyframes statusPulseUpgrade {
      0%,100% { box-shadow: 0 0 6px var(--success); }
      50% { box-shadow: 0 0 14px var(--success), 0 0 30px rgba(0,255,170,0.35); }
    }

    /* ── EP TILE INLINE RATING ── */
    .ep-rating-badge {
      position: absolute;
      top: 3px;
      left: 4px;
      font: 700 11px var(--font-mono);
      color: var(--accent-warm);
      text-shadow: 0 0 8px rgba(255,96,64,0.4);
      opacity: 0.9;
      pointer-events: none;
    }
    /* Dual-source rating badges */
    .ep-badge-imdb {
      position: absolute;
      top: 3px;
      left: 4px;
      font: 700 10px var(--font-mono);
      color: #fbbf24;
      text-shadow: 0 0 8px rgba(251,191,36,0.6);
      opacity: 0.95;
      pointer-events: none;
      line-height: 1;
    }
    .ep-badge-mal {
      position: absolute;
      top: 14px;
      left: 4px;
      font: 700 10px var(--font-mono);
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0,229,255,0.5);
      opacity: 0.88;
      pointer-events: none;
      line-height: 1;
    }
    /* Dual aggregate rating row in detail view */
    .detail-ratings-row {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-3);
      align-items: center;
    }
    .detail-rating-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
    }
    .detail-rating-chip .chip-label {
      font: 700 13px var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      opacity: 0.55;
    }
    .detail-rating-chip .chip-val {
      font: 700 20px var(--font-mono);
      line-height: 1;
    }
    .detail-rating-chip.chip-imdb .chip-label { color: #F5C518; font-size:10px; }
    .detail-rating-chip.chip-imdb .chip-val   { color: #F5C518; text-shadow: 0 0 16px rgba(245,197,24,0.5); }
    .detail-rating-chip.chip-mal  .chip-label { color: #5f8fdb; font-size:10px; }
    .detail-rating-chip.chip-mal  .chip-val   { color: #5f8fdb; text-shadow: 0 0 16px rgba(94,143,219,0.4); }
    /* Small brand-colored IMDb/MAL labels in library cards */
    .lib-card-rating-chip.chip-imdb .lib-card-rating-label { color: #F5C518; }
    .lib-card-rating-chip.chip-mal  .lib-card-rating-label { color: #5f8fdb; }
    .ep-rate-btn {
      position: absolute;
      top: 4px;
      right: 5px;
      font-size: 14px;
      background: transparent;
      border: none;
      color: var(--text-3);
      cursor: none;
      padding: 0;
      opacity: 0;
      transition: opacity 100ms;
      line-height: 1;
    }
    .ep-tile:hover .ep-rate-btn { opacity: 1; }
    .ep-tile:hover .ep-rate-btn:hover { color: var(--accent-warm); }
    .ep-rate-popup {
      position: absolute;
      top: -36px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(12,10,30,0.95);
      border: 1px solid rgba(130,160,255,0.2);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      display: flex;
      gap: 2px;
      z-index: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      animation: slideInResult 150ms var(--ease-spring) both;
    }
    .ep-rate-star {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 14px;
      cursor: none;
      padding: 1px;
      transition: color 100ms, transform 100ms;
      line-height: 1;
    }
    .ep-rate-star:hover { color: var(--accent-warm); transform: scale(1.3); }
    .ep-rate-star.filled { color: var(--accent-warm); text-shadow: 0 0 6px rgba(255,96,64,0.4); }
    .ep-rate-star.clear-btn { color: var(--text-3); font-size: 13px; }
    .ep-rate-star.clear-btn:hover { color: var(--danger); }

  /* ════════════════════════════════════════════════════════════════
     SERIES IMMERSIVE THEMES — each series owns its world
     Applied via body.theme-[name] when detail view opens.

     DESIGN RULE: The background stays near-black. Colour lives in
     atmospheric whispers (body::before at very low opacity) and in
     the accent details — tiles, progress bar, timer, tabs, strips.
     No full-page colour washes. Mood lighting, not paint.
  ════════════════════════════════════════════════════════════════ */

  /* ── SHARED TRANSITION — smooth world-swap ── */
  body::before { transition: all 700ms cubic-bezier(0.16,1,0.3,1); }
  #hex-grid polygon { transition: stroke 700ms ease, stroke-opacity 500ms ease; }

  body.theme-parasyte .detail-timer-card {

  /* ════════════════════════════════════════════════════════════════
     MOBILE / TOUCH RESPONSIVE
  ════════════════════════════════════════════════════════════════ */

  /* Restore cursors on touch devices — custom cursor doesn't work on touch */
  @media (hover: none), (pointer: coarse) {
    /* Hide custom cursor elements */
    .cursor-dot, .cursor-ring { display: none !important; }

    /* Restore default cursors */
    *, *::before, *::after { cursor: auto !important; }
    a, button, [role=button], .bn-item, .card,
    input, select, textarea, label,
    .btn-primary, .btn-ghost, .btn-danger,
    [onclick], [data-section], [data-tab] { cursor: pointer !important; }

    /* Ensure minimum touch target sizes */
    .bn-item { min-width: 44px; min-height: 44px; }
    .btn-primary, .btn-ghost, .btn-danger { min-height: 44px; }
    button { min-height: 44px; }

    /* Disable hover-only transforms that feel wrong on touch */
    .card:hover { transform: none; }
    .stat-card:hover { transform: none; }
  }

  /* Small screen layout fixes */
  @media (max-width: 600px) {
    /* Bottom nav: ensure it fits on small screens */
    #bottom-nav {
      bottom: 10px;
      padding: 4px 4px;
      gap: 0;

    /* Overflow: allow body scroll on mobile */

  <script>
  /*
  ╔══════════════════════════════════════════════════════════════════╗
  ║                     T H E   S O U L                             ║
  ║                                                                  ║
  ║  This app should feel like the first time someone used an        ║
  ║  iPhone after years on a keypad phone. That instant —            ║
  ║  "oh, this is what software is supposed to feel like."           ║
  ║                                                                  ║
  ║  A secret command center built for exactly one person:           ║
  ║  someone self-aware about their procrastination, who wants       ║
  ║  to own it intelligently, not be shamed by it.                   ║
  ║                                                                  ║
  ║  The aesthetic: futuristic OS meets premium productivity tool.   ║
  ║  A hacker's dashboard that a designer secretly made beautiful.   ║
  ║  Dark. Precise. Confident.                                       ║
  ║                                                                  ║
  ║  DESIGN PHILOSOPHY — filter every decision through this:         ║
  ║    — Nothing is decorative without also being functional         ║
  ║    — Nothing is functional without also being considered         ║
  ║    — If an element doesn't earn its place, it doesn't exist      ║
  ║    — Empty states are designed, not forgotten                    ║
  ║    — Performance is a feature: smooth at 100+ items, zero jank   ║
  ║                                                                  ║
  ║  Build it like someone opens their laptop just to show           ║
  ║  a friend. Build it like that.                                   ║
  ╚══════════════════════════════════════════════════════════════════╝
  */

  /* ─────────────────────────────────────────────────────────────────
     STORAGE KEYS
  ───────────────────────────────────────────────────────────────── */
  const KEYS = {
    library:    'phub_library',
    tasks:      'phub_tasks',
    log:        'phub_log',
    budget:     'phub_budget',
    settings:   'phub_settings',
    lastMood:   'phub_lastmood',
    mqHistory:  'phub_mq_history',
    schedule:   'phub_schedule',
    suggestIdx: 'phub_suggest_idx'  // round-robin pointer for dashboard suggestion
  }

  const APP_SETTINGS_DEFAULTS = {
    muted: false,
    uiDensity: 'comfortable', // comfortable | compact
    quickConfirmMs: 3500,
    defaultNewContentStatus: 'watching',
    autoShowRecurringForUpcoming: true,
    seasonLineSeparators: ['|', ':', '-'],
    detailConfirmActions: true,
    defaultNewSeasonPrefix: 'Season',
    autoFocusDetailNav: true,
    budgetDefaultWeeklyHours: 10,
    tasksDefaultDurationMin: 45,
    overviewDateLookaheadDays: 14,
    quickAddPlaceholder: 'One Piece | anime | 1122 eps',
    dashboardSuggestionMode: 'oldest' // oldest | newest | random
  }

  function mergeSettingsWithDefaults(raw) {
    return Object.assign({}, APP_SETTINGS_DEFAULTS, (raw && typeof raw === 'object') ? raw : {})
  }

  function getAppSettings() {
    return mergeSettingsWithDefaults(loadData(KEYS.settings, {}))
  }

  function saveAppSettings(next) {
    saveData(KEYS.settings, mergeSettingsWithDefaults(next))
  }

  function updateAppSetting(key, value) {
    var current = getAppSettings()
    current[key] = value
    saveAppSettings(current)
    return current
  }

  /* ─────────────────────────────────────────────────────────────────
     CONTENT ITEM SCHEMA
     AI READING THIS: when adding a new content item,
     follow this exact structure. Every field matters.
  ─────────────────────────────────────────────────────────────────
    {
      id: string,           // slug+timestamp e.g. "oshi-no-ko-1712345678"
      title: string,
      type: string,         // "anime"|"manga"|"manhwa"|"show"|"movie"|"novel"
      totalEpisodes: number,// total episodes OR chapters
      watchedEpisodes: [],  // array of ep/ch numbers marked watched
      theme: string,        // descriptive name e.g. "idol-noir"
      themeStyles: {        // CSS var overrides for detail view
        '--accent-cool': '#color',
        '--accent-warm': '#color',
        // any other CSS vars to override
      },
      moodTags: [],         // "brain-off"|"hype"|"emotional damage"
                            // "cozy"|"chaos"|"slow-burn"
      rating: number,       // 0–10
      seasons: [{
        id: string,         // "s1", "s2", etc.
        name: string,       // "Season 1"
        episodes: [{ number, title, rating }]
      }],
      arcs: [{              // optional — manga/manhwa arc groupings
        id, name, chapterStart, chapterEnd
      }],
      scheduledDay: null,   // "Monday"…"Sunday" or null
      status: string,       // "watching"|"completed"|"graveyard"
      addedDate: string,    // ISO date "YYYY-MM-DD"
      graveyardDate: null,  // ISO date when dropped, or null
      graveyardNote: "",    // optional reason for dropping
      timerMinutes: 0,      // total minutes timed in this app
      notes: ""
    }
  */

  /* ─────────────────────────────────────────────────────────────────
     TASK SCHEMA
  ─────────────────────────────────────────────────────────────────
    {
      id, name,
      duration: null,       // estimated minutes, optional
      scheduledDay: null,   // "Monday"…"Sunday" or null
      completed: false,
      completedDate: null,  // ISO date
      timerMinutes: 0,
      addedDate: string
    }
  */

  /* ─────────────────────────────────────────────────────────────────
     BUDGET SCHEMA
  ─────────────────────────────────────────────────────────────────
    { weeklyHours: 10, usedMinutes: 0, resetDate: "YYYY-MM-DD" }
  */

  /* ─────────────────────────────────────────────────────────────────
     LOG EVENT SCHEMA
  ─────────────────────────────────────────────────────────────────
    { id, timestamp: ISO string, text: string }
  */

  /* ─────────────────────────────────────────────────────────────────
     HELPER FUNCTIONS
  ───────────────────────────────────────────────────────────────── */
  function loadData(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) || fallback }
    catch { return fallback }
  }

  function saveData(key, data) {
    localStorage.setItem(key, JSON.stringify(data))
  }

  function generateId(title) {
    // Date.now() alone can collide on rapid adds — append random hex for uniqueness
    var rand = Math.floor(Math.random() * 0xffff).toString(16).padStart(4, '0')
    return title.toLowerCase()
               .replace(/\s+/g, '-')
               .replace(/[^a-z0-9-]/g, '')
           + '-' + Date.now() + rand
  }

  function logEvent(text) {
    const log = loadData(KEYS.log, [])
    log.unshift({ id: generateId('log'), timestamp: new Date().toISOString(), text })
    saveData(KEYS.log, log)
    if (window.__refreshLog) window.__refreshLog()
  }

  function addTimerMinutes(mins) {
    const budget = loadData(KEYS.budget, getDefaultBudget())
    budget.usedMinutes += mins
    saveData(KEYS.budget, budget)
    if (window.__refreshBudget) window.__refreshBudget()
  }

  function checkBudgetReset() {
    const budget     = loadData(KEYS.budget, getDefaultBudget())
    const lastMonday = getLastMonday(new Date())
    if (budget.resetDate !== lastMonday) {
      budget.usedMinutes = 0
      budget.resetDate   = lastMonday
      saveData(KEYS.budget, budget)
    }
    return budget
  }

  function getLastMonday(date) {
    const d   = new Date(date)
    const day = d.getDay()
    d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day))
    return d.toISOString().split('T')[0]
  }

  function getDefaultBudget() {
    var weekly = parseInt(getAppSettings().budgetDefaultWeeklyHours, 10) || 10
    return { weeklyHours: weekly, usedMinutes: 0, resetDate: getLastMonday(new Date()) }
  }

  function getTodayName() {
    return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()]
  }

  function normalizeStoredData() {
    // Ensure settings always contain defaults (while preserving existing audio setting etc.)
    saveAppSettings(getAppSettings())

    // Defensive migration for legacy library entries.
    var lib = loadData(KEYS.library, [])
    var changed = false
    lib.forEach(function(item) {
      if (!item || typeof item !== 'object') return
      if (!Array.isArray(item.seasons)) { item.seasons = []; changed = true }
      if (!Array.isArray(item.watchedEpisodes)) { item.watchedEpisodes = []; changed = true }
      ;(item.seasons || []).forEach(function(s, sidx) {

  let currentSection  = 'dashboard'
  let currentDetailId = null

  function navigateTo(section, detailId = null, skipPush = false) {
    // Cleanup theme overrides from detail view before any navigation
    if (window.__detailCleanup) { window.__detailCleanup(); window.__detailCleanup = null }
    // Remove multi-select bar if present
    var _sb = document.getElementById('detail-select-bar'); if (_sb) _sb.remove()
    currentSection  = section
    currentDetailId = detailId
    updateSidebarActive(section)
    const main = document.getElementById('app-main')
    main.innerHTML = ''
    main.scrollTop = 0
    window.scrollTo({top: 0, behavior: 'instant'})
    const renderers = {
      dashboard:  renderDashboard,
      library:    renderLibrary,
      moodqueue:  renderMoodQueue,
      tasks:      renderTasks,
      overview:   renderOverview,
      graveyard:  renderGraveyard,
      sessionlog: renderSessionLog,
      detail:     () => renderDetail(detailId)
    }
    renderers[section]?.()

    // Persist last location so refresh restores it
    try {
      localStorage.setItem('phub_last_location', JSON.stringify({ section, detailId }))
    } catch(e) {}

    // Push to browser history so back swipe / back button works
    if (!skipPush) {
      var state = { section: section, detailId: detailId }
      history.pushState(state, '', null)
    }
  }

  // Handle browser back (two-finger swipe on Mac, back button)
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.section) {
      navigateTo(e.state.section, e.state.detailId || null, true)
    } else {
      navigateTo('dashboard', null, true)
    }
  })

  // Set initial history state
  if (!history.state) {
    history.replaceState({ section: 'dashboard', detailId: null }, '', null)
  }

  function updateSidebarActive(section) {
    document.querySelectorAll('.bn-item').forEach(el => {
      el.classList.toggle('active', el.dataset.section === section)
    })

  /* ─────────────────────────────────────────────────────────────────
     PART 2: BUDGET COLOR HELPER
     Shared by sidebar bar, dashboard arc, everywhere.
  ───────────────────────────────────────────────────────────────── */
  function getBudgetColor(pct) {
    if (pct > 1.0) return '#ff3355'        // over budget — danger
    if (pct <= 0.5) return '#00d4ff'       // 0–50% — cyan
    if (pct <= 0.8) {                      // 50–80% — interpolate cyan→orange
      const t  = (pct - 0.5) / 0.3
      const r  = Math.round(0   + t * (255 - 0))
      const g  = Math.round(212 + t * (107 - 212))
      const b  = Math.round(255 + t * (53  - 255))
      return `rgb(${r},${g},${b})`
    }
    return '#ff6b35'                       // 80–100% — orange
  }

  /* ─────────────────────────────────────────────────────────────────
     PART 2: SIDEBAR BUDGET WIDGET
     Exposed as window.__refreshBudget — called by addTimerMinutes.
  ───────────────────────────────────────────────────────────────── */
  function refreshSidebarBudget() {
    const budget    = checkBudgetReset()
    const usedHrs   = budget.usedMinutes / 60
    const totalHrs  = budget.weeklyHours
    const pct       = Math.min(usedHrs / totalHrs, 1.2)
    const color     = getBudgetColor(usedHrs / totalHrs)

    const fill = document.getElementById('sb-bar-fill')
    const text = document.getElementById('sb-bar-text')
    if (!fill || !text) return

    fill.style.width      = (Math.min(pct, 1) * 100) + '%'
    fill.style.background = color
    text.textContent      = `${usedHrs.toFixed(1)} / ${totalHrs}h`
    text.style.color      = usedHrs > totalHrs ? '#ff3355' : ''
  }

  // Wire up global refresh hook immediately (Part 1 calls addTimerMinutes which uses this)
  window.__refreshBudget = function() {
    refreshSidebarBudget()
    // If dashboard is currently rendered, also refresh its arc
    if (typeof window.__refreshDashboardBudget === 'function') {
      window.__refreshDashboardBudget()
    }
  }

  /* ─────────────────────────────────────────────────────────────────
     PART 2: MOOD RECOMMENDATION ALGORITHM
     Shared by dashboard widget and mood queue section.
  ───────────────────────────────────────────────────────────────── */
  function getMoodRecommendation(mood, excludeIds = []) {
    const library  = loadData(KEYS.library, [])
    const lastMood = loadData(KEYS.lastMood, {})
    const autoExclude = lastMood[mood] ? [lastMood[mood]] : []
    const allExclude  = [...new Set([...autoExclude, ...excludeIds])]

    // Only recommend currently-watching items — completed items are done, graveyard is dropped
    const candidates = library
      .filter(i => i.moodTags && i.moodTags.includes(mood) && i.status === 'watching')
      .filter(i => !allExclude.includes(i.id))
      .sort((a, b) => {
        // Sort by fewest episodes remaining — prioritise what you are closest to finishing
        const aLeft = a.totalEpisodes - (a.watchedEpisodes||[]).length
        const bLeft = b.totalEpisodes - (b.watchedEpisodes||[]).length
        if (aLeft !== bLeft) return aLeft - bLeft
        // Tie-break by highest rating (ratingIMDb preferred, fallback to rating)
        const aRat = a.ratingIMDb || a.rating || 0
        const bRat = b.ratingIMDb || b.rating || 0
        return bRat - aRat
      })

    if (candidates.length > 0) {
      const pick = candidates[0]
      lastMood[mood] = pick.id
      saveData(KEYS.lastMood, lastMood)
      return pick
    }
    return null
  }

  function getAllMoodMatches(mood) {
    const library = loadData(KEYS.library, [])
    // Show only watching items — completed and graveyard excluded
    return library.filter(i => i.moodTags && i.moodTags.includes(mood) && i.status === 'watching')
  }

  function renderDashboard() {
    const main    = document.getElementById('app-main')
    const library = loadData(KEYS.library, [])
    const tasks   = loadData(KEYS.tasks, [])
    const today   = getTodayName()
    const budget  = checkBudgetReset()

    // ── Greeting ──
    const hour          = new Date().getHours()
    const timeGreeting  = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening'
    const todayLibrary  = library.filter(i => i.scheduledDay === today && i.status === 'watching').length
    const todayTasks    = tasks.filter(t => t.scheduledDay === today && !t.completed).length
    const totalScheduled = todayLibrary + todayTasks
    let greetText
    if (totalScheduled > 0) {
      greetText = `${timeGreeting} — ${totalScheduled} thing${totalScheduled > 1 ? 's' : ''} on deck for today.`
    } else if (hour < 12) {
      greetText = `Good morning — nothing scheduled. Productive day or tactical avoidance?`
    } else {
      greetText = `${timeGreeting} — nothing scheduled. Either you're ahead, or in denial.`
    }

    const dateStr = new Date().toLocaleDateString('en-US', { weekday:'long', month:'short', day:'2-digit', year:'numeric' })
      .toUpperCase().replace(',', ' ·').replace(',', ' ·')

    // ── Stats ──
    const totalItems      = library.length
    const totalEpsInLib   = library.reduce((acc, i) => acc + (i.totalEpisodes || 0), 0)
    const totalWatched    = library.reduce((acc, i) => acc + (i.watchedEpisodes ? i.watchedEpisodes.length : 0), 0)
    const totalComplete   = library.filter(i => i.status === 'completed').length
    const totalEpsDone    = library.reduce((acc, i) => acc + (i.watchedEpisodes ? i.watchedEpisodes.length : 0), 0)
    const pendingTasks    = tasks.filter(t => !t.completed).length
    // Smart progress label based on what types are in the library
    const _libTypes = new Set(library.map(i => i.type))
    const _hasEpType  = ['anime','show','movie'].some(t => _libTypes.has(t))
    const _hasCHType  = ['manga','manhwa','novel'].some(t => _libTypes.has(t))
    const watchedLabel = (_hasEpType && _hasCHType) ? 'Episodes &amp; Chapters' : _hasCHType ? 'Chapters Read' : 'Episodes Watched'

    // ── Next mission ──
    const DAYS_FULL_DASH = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']
    const tomorrowIdx  = (new Date().getDay() + 6 + 1) % 7
    const tomorrowName = DAYS_FULL_DASH[tomorrowIdx]
    const schedule     = loadData(KEYS.schedule, {})
    const todayDateKey = new Date().toISOString().split('T')[0]
    const todaySchedEntries = schedule[todayDateKey] || []

    let mission = null
    let missionPlan = null  // planned episode string e.g. "ep 5-8"
    let missionIsSuggested = false  // true when fallback #5 fires — no real schedule assigned

    // 1. Check schedule for today first (has explicit episode plan)
    if (todaySchedEntries.length > 0) {
      const firstEntry = todaySchedEntries[0]
      const libItem = library.find(i => i.id === firstEntry.id && i.status === 'watching')
      if (libItem) { mission = libItem; missionPlan = firstEntry.eps || null }
    }

    // 2. Fall back to scheduledDay on the item itself
    if (!mission) {
      mission = library.find(i => i.scheduledDay === today && i.status === 'watching') || null
      if (mission) {
        const schedEntry = (schedule[todayDateKey] || []).find(e => e.id === mission.id)
        if (schedEntry) missionPlan = schedEntry.eps || null
      }
    }

    // 3. Today's task
    if (!mission) {
      const todayTask = tasks.find(t => t.scheduledDay === today && !t.completed)
      if (todayTask) mission = { _isTask: true, ...todayTask }
    }

    // 4. Tomorrow
    if (!mission) {
      mission = library.find(i => i.scheduledDay === tomorrowName && i.status === 'watching') || null
    }

    // 5. Round-robin suggestion — cycles through all watching items in stable order
    if (!mission) {
      const watching = library
        .filter(i => i.status === 'watching')
      const suggestMode = getAppSettings().dashboardSuggestionMode || 'oldest'
      if (suggestMode === 'newest') {
        watching.sort((a, b) => new Date(b.addedDate) - new Date(a.addedDate))
      } else if (suggestMode === 'random') {
        watching.sort(() => Math.random() - 0.5)
      } else {
        watching.sort((a, b) => new Date(a.addedDate) - new Date(b.addedDate))
      }

      if (watching.length > 0) {
        // Load the stored pointer, advance it, wrap around, save back
        const storedIdx = parseInt(loadData(KEYS.suggestIdx, 0), 10) || 0
        const nextIdx   = storedIdx % watching.length  // clamp in case library shrank
        saveData(KEYS.suggestIdx, (nextIdx + 1) % watching.length)

      </div>`

    // [BLOCK 3] Next mission
    const b3 = makeBlock()
    if (mission && !mission._isTask) {
      const remaining = mission.totalEpisodes - (mission.watchedEpisodes ? mission.watchedEpisodes.length : 0)
      const unit      = (mission.type === 'manga' || mission.type === 'manhwa' || mission.type === 'novel') ? 'chapters' : 'episodes'
      const watched   = mission.watchedEpisodes ? mission.watchedEpisodes.length : 0
      // Compute next chapter/episode as the first missing positive integer
      // This handles mixed key formats (e.g. 's0_21', '21', numeric) and gaps
      var nextNum = 1
      if (mission.watchedEpisodes && mission.watchedEpisodes.length > 0) {
        var seen = {}
        mission.watchedEpisodes.forEach(function(x) {
          var s = String(x)
          var m = s.match(/(\d+)$/)
          if (m) {
            seen[parseInt(m[1], 10)] = true
          } else {
            var n = Number(s)
            if (!isNaN(n)) seen[n] = true
          }
        })
        // find first unread from 1..totalEpisodes
        for (var i = 1; i <= (mission.totalEpisodes || 0); i++) {
          if (!seen[i]) { nextNum = i; break }
        }
        // fallback: if none found, use max+1
        if (nextNum === 1 && Object.keys(seen).length > 0 && seen[1]) {
          var keys = Object.keys(seen).map(function(k){ return parseInt(k,10) }).filter(function(n){ return !isNaN(n) })
          if (keys.length) nextNum = Math.max.apply(null, keys) + 1

      // 3D tilt on mousemove — max 6 degrees, instant follow
      card.addEventListener('mousemove', e => {
        const rect   = card.getBoundingClientRect()
        const cx     = rect.left + rect.width  / 2
        const cy     = rect.top  + rect.height / 2
        const dx     = (e.clientX - cx) / (rect.width  / 2)
        const dy     = (e.clientY - cy) / (rect.height / 2)
        const rotY   = dx * 6
        const rotX   = -dy * 6
        card.style.transform    = `perspective(500px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.03)`
        card.style.transition   = 'none'
        card.style.willChange   = 'transform'
      })
      card.addEventListener('mouseleave', () => {
        card.style.transition = 'transform 250ms var(--ease-out), border-color 150ms var(--ease-snap)'
        card.style.transform  = 'perspective(500px) rotateX(0deg) rotateY(0deg) scale(1)'
        // Remove will-change after animation completes
        setTimeout(() => { card.style.willChange = '' }, 260)
      })

      navGrid.appendChild(card)
    })

    const blocks = main.querySelectorAll('.dash-block')
    blocks.forEach((block, i) => {
      setTimeout(() => {
        requestAnimationFrame(() => { block.classList.add('entered') })
      }, i * 60)
    })

    // ── Number animation: only animate cards with data-target ──
    const statEls  = ['stat-0','stat-1','stat-2','stat-3']
      .map(id => document.getElementById(id))
      .filter(el => el && el.dataset.target !== undefined)
    const targets  = statEls.map(el => parseInt(el.dataset.target, 10))
    const DURATION = 900
    const startTs  = performance.now()

    // Ease-out cubic approximation
    function easeOut(t) { return 1 - Math.pow(1 - t, 3) }

    ;(function countLoop(ts) {
      const elapsed = ts - startTs
      const progress = Math.min(elapsed / DURATION, 1)
      const easedP   = easeOut(progress)
      statEls.forEach((el, i) => {
        if (el) el.textContent = Math.round(targets[i] * easedP)
      })
      if (progress < 1) requestAnimationFrame(countLoop)
      else statEls.forEach((el, i) => { if (el) el.textContent = targets[i] })
    })(startTs)

    // ── Mood engine widget ──
    renderMoodWidget('mood-widget-body')

    renderDashboardBudgetArc('dash-budget-body', budget)

      resetBtn.textContent = '×'

      if (result) {

  function renderDashboardBudgetArc(containerId, budget) {
    const container = document.getElementById(containerId)
    if (!container) return

    const SIZE   = 200
    const R      = 80
    const CX     = SIZE / 2
    const CY     = SIZE / 2
    const CIRC   = 2 * Math.PI * R
    const usedHrs = budget.usedMinutes / 60
    const totalHrs = budget.weeklyHours
    const pct      = usedHrs / totalHrs
    const color    = getBudgetColor(pct)
    const remaining = Math.max(totalHrs - usedHrs, 0)

    container.innerHTML = `
      <div class="budget-arc-wrap">
        <svg class="budget-arc-svg" width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">
          <!-- Background track -->
          <circle cx="${CX}" cy="${CY}" r="${R}"
            fill="none" stroke="var(--border)" stroke-width="8"
            stroke-linecap="round"/>
          <!-- Progress arc (starts at top: rotate -90deg) -->
          <circle id="dash-arc-fill" cx="${CX}" cy="${CY}" r="${R}"
            fill="none" stroke="${color}" stroke-width="8"
            stroke-linecap="round"
            stroke-dasharray="${CIRC}"
            stroke-dashoffset="${CIRC}"
            transform="rotate(-90 ${CX} ${CY})"
            style="transition:stroke-dashoffset 800ms cubic-bezier(0.16,1,0.3,1),stroke 400ms cubic-bezier(0.16,1,0.3,1)"/>
          <!-- Center text -->
          <text x="${CX}" y="${CY - 8}" class="budget-arc-center"
            font-family="'Courier New',monospace" font-size="26" fill="var(--text-1)" font-weight="700"
            id="dash-arc-used-label">${usedHrs.toFixed(1)}h</text>
          <text x="${CX}" y="${CY + 12}" class="budget-arc-center"
            font-family="'Courier New',monospace" font-size="14" fill="var(--text-3)"
            id="dash-arc-total-label">of ${totalHrs}h</text>
        </svg>
        <div class="budget-below">
          <div class="budget-remaining" id="dash-arc-remaining">
            ${remaining.toFixed(1)} hours remaining
          </div>
          <div class="budget-reset-note">Budget resets Monday</div>
          <div class="budget-edit-row">
            <span class="budget-hours-display" id="dash-arc-hours-disp">${totalHrs}h weekly</span>
            <button class="budget-edit-btn" id="dash-arc-edit-btn" title="Edit weekly budget">✎</button>
          </div>
        </div>
      </div>`

    // Animate arc: 0 → actual offset after paint
    requestAnimationFrame(() => {
      setTimeout(() => {
        const arcFill = document.getElementById('dash-arc-fill')
        if (arcFill) {
          const offset = CIRC - Math.min(pct, 1) * CIRC
          arcFill.style.strokeDashoffset = offset
          arcFill.style.stroke = color
        }
      }, 60)
    })

    // Edit weekly hours inline
    document.getElementById('dash-arc-edit-btn')?.addEventListener('click', () => {
      const dispEl = document.getElementById('dash-arc-hours-disp')
      const editBtn = document.getElementById('dash-arc-edit-btn')
      const currentVal = budget.weeklyHours
      const input = document.createElement('input')
      input.type      = 'number'
      input.min       = '1'
      input.max       = '168'
      input.value     = currentVal
      input.className = 'budget-hours-input'
      dispEl.replaceWith(input)
      if (editBtn) editBtn.style.display = 'none'
      input.focus()
      input.select()
      const save = () => {
        const newVal = Math.max(1, Math.min(168, parseInt(input.value, 10) || currentVal))
        const b = checkBudgetReset()
        b.weeklyHours = newVal
        saveData(KEYS.budget, b)
        logEvent(`Set weekly budget to ${newVal} hours`)
        // Re-render arc with new data
        renderDashboardBudgetArc(containerId, b)
        refreshSidebarBudget()
      }
      input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') { renderDashboardBudgetArc(containerId, checkBudgetReset()) } })
      input.addEventListener('blur', save)
    })

    // Expose dashboard budget refresh for window.__refreshBudget
    window.__refreshDashboardBudget = () => {
      renderDashboardBudgetArc(containerId, checkBudgetReset())
    }

  // Expose a lightweight dashboard refresher. Updates the three small stat cards
  // in the dashboard if present, without re-rendering the entire page.
  window.__refreshDashboard = function() {
    try {
      const library = loadData(KEYS.library, [])

    const totalEpsInLib   = library.reduce((acc, i) => acc + (i.totalEpisodes || 0), 0)
    
    // FIX: Count items that are explicitly 'completed' OR have 100% progress

      i.status === 'completed' || 
      (i.totalEpisodes > 0 && (i.watchedEpisodes && i.watchedEpisodes.length >= i.totalEpisodes))
    ).length

    const totalEpsDone    = library.reduce((acc, i) => acc + (i.watchedEpisodes ? i.watchedEpisodes.length : 0), 0)
    const pendingTasks    = tasks.filter(t => !t.completed).length

      var el0 = document.getElementById('stat-0')
