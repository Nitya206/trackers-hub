  /* ── P7: VELOCITY TRACKER ──────────────────────────────────
     Computes episodes/chapters per week from lastActivityAt
     and watchedEpisodes count. Displayed in detail hero.
  ─────────────────────────────────────────────────────────── */
  function p7ComputeVelocity(item) {
    if (!item || !item.lastActivityAt) return null
    var watched = (item.watchedEpisodes || []).length
    if (watched === 0) return null
    var addedMs = new Date(item.addedDate + 'T00:00:00').getTime()
    var lastMs  = new Date(item.lastActivityAt).getTime()
    if (isNaN(addedMs) || isNaN(lastMs)) return null
    var nowMs   = Date.now()
    var spanMs  = Math.max(lastMs - addedMs, 7 * 24 * 3600 * 1000) // min 1 week span
    var weeks   = spanMs / (7 * 24 * 3600 * 1000)
    var perWeek = watched / weeks
    if (perWeek <= 0) return null
    var remaining = (item.totalEpisodes || 0) - watched
    if (remaining <= 0) return null
    var weeksLeft  = remaining / perWeek
    var finishDate = new Date(nowMs + weeksLeft * 7 * 24 * 3600 * 1000)
    var isReading  = ['manga','manhwa','novel'].includes(item.type)
    var unit       = isReading ? 'ch' : 'ep'
    var daysSinceActivity = (nowMs - lastMs) / (24 * 3600 * 1000)
    return {
      perWeek: perWeek,
      finishDate: finishDate,
      remaining: remaining,
      unit: unit,
      stalled: daysSinceActivity > 14,
      stalledDays: Math.floor(daysSinceActivity)
    }
  }

  function p7RenderVelocityBadge(item, container) {
    if (!container || !(container instanceof Node)) return
    var v = p7ComputeVelocity(item)
    if (!v) return
    var badge = document.createElement('div')
    badge.style.cssText = 'margin-top:var(--space-2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;'
    if (v.stalled) {
      badge.innerHTML =
        '<span style="font:600 10px var(--font-mono);color:var(--accent-warm);letter-spacing:0.1em;padding:3px 10px;border:1px solid rgba(255,96,64,0.35);border-radius:var(--radius-pill);background:rgba(255,96,64,0.08);">' +
        '⚠ STALLED — no activity in ' + v.stalledDays + ' days</span>'
    } else {
      var rateStr = v.perWeek >= 1 ? v.perWeek.toFixed(1) : (v.perWeek * 7).toFixed(1)
      var rateLabel = v.perWeek >= 1 ? (rateStr + ' ' + v.unit + '/wk') : (rateStr + ' ' + v.unit + '/day')
      var opts = { month: 'short', day: 'numeric' }
      var weeksLeft = v.remaining / v.perWeek
      var finStr = weeksLeft > 365 ? 'never, be honest' : v.finishDate.toLocaleDateString('en-US', opts)
      badge.innerHTML =
        '<span style="font:600 10px var(--font-mono);color:var(--accent-cool);letter-spacing:0.08em;padding:3px 10px;border:1px solid rgba(0,229,255,0.25);border-radius:var(--radius-pill);background:rgba(0,229,255,0.07);">' +
        '▸ ' + rateLabel + ' · done by ' + finStr + '</span>'
    }
    container.appendChild(badge)
  }

     Called from ep-tile click when watchedEpisodes === totalEpisodes.
     Re-uses session overlay infrastructure for a cinematic moment.
  ─────────────────────────────────────────────────────────── */
  function phubFireSeriesComplete(it) {
    // Mark completed in storage
    var lib = loadData(KEYS.library, [])
    var stored = lib.find(function(x) { return x.id === it.id })
    if (stored && stored.status !== 'completed') {
      stored.status = 'completed'
      saveData(KEYS.library, lib)
      logEvent('Completed: ' + it.title)
      if (typeof window.__refreshDashboard === 'function') window.__refreshDashboard()
    }
    // Fire existing confetti + banner
    if (typeof fireCompletionCelebration === 'function') fireCompletionCelebration(it.title)
    // Update progress label
    var progLabel = document.querySelector('.detail-progress-label')
    if (progLabel) {
      var isReading = ['manga','manhwa','novel'].includes(it.type)
      progLabel.textContent = it.totalEpisodes + ' of ' + it.totalEpisodes + ' ' + (isReading ? 'chapters read' : 'eps watched')
    }
    // Update status badge in hero if visible
    var statusBadge = document.querySelector('.detail-status-badge')
    if (statusBadge) { statusBadge.textContent = 'completed'; statusBadge.dataset.status = 'completed' }

  /* ── P7: PROCRASTINATION DEBT SCORE ───────────────────────
     Rises when scheduled items are missed, falls when caught up.
     Dashboard widget: pulsing number. Stored in localStorage.
  ─────────────────────────────────────────────────────────── */
  var DEBT_KEY = 'phub_debt_score'

  function p7ComputeDebt() {
    var sched   = loadData(KEYS.schedule, {})
    var log     = loadData(KEYS.log, [])
    var todayKey = localDateStr()
    // Count missed past schedule entries
    var missed = 0
    Object.keys(sched).forEach(function(dk) {
      if (dk >= todayKey) return
      missed += (sched[dk] || []).length
    })
    // Count log watch/read events in last 14 days
    var cutoff = new Date(Date.now() - 14 * 24 * 3600 * 1000).toISOString()
    var caught = log.filter(function(e) {
      return e.timestamp >= cutoff && (e.text.indexOf('Watched ep') !== -1 || e.text.indexOf('Read ch') !== -1)
    }).length
    // Count tasks completed in last 14 days
    var tasks = loadData(KEYS.tasks, [])
    var tasksDone = tasks.filter(function(t) {
      return t.completed && t.completedDate && (t.completedDate + 'T23:59:59') >= cutoff
    }).length
    var raw = (missed * 10) - (caught * 5) - (tasksDone * 8)
    return Math.max(0, Math.min(999, raw))
  }

  function p7RenderDebtScore(container) {
    if (!container || !(container instanceof Node)) return
    var score = p7ComputeDebt()
    var color = score === 0 ? 'var(--accent-green)' : score < 50 ? 'var(--accent-cool)' : score < 150 ? 'var(--accent-yellow)' : 'var(--danger)'
    var label = score === 0 ? 'ALL CLEAR' : score < 50 ? 'NOMINAL' : score < 150 ? 'BEHIND' : 'CRITICAL'
    var el = document.createElement('div')
    el.className = 'card'
    el.style.cssText = 'padding:var(--space-4);text-align:center;position:relative;overflow:hidden;'
    el.innerHTML =
      '<div style="font:700 9px var(--font-mono);color:var(--text-3);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:8px;">Procrastination Debt</div>' +
      '<div id="p7-debt-number" style="font:900 56px var(--font-display);color:' + color + ';line-height:1;letter-spacing:0.06em;text-shadow:none;background:transparent;box-shadow:none;filter:none;">' + score + '</div>' +
      '<div style="font:600 10px var(--font-mono);color:' + color + ';letter-spacing:0.2em;margin-top:4px;">' + label + '</div>' +
      '<div style="font:400 10px var(--font-mono);color:var(--text-3);margin-top:8px;line-height:1.5;">Missed schedules rise it.<br>Episodes watched lower it.</div>'
    // Pulse animation on high debt
    if (score > 150) {
      var numEl = el.querySelector('#p7-debt-number')
      if (numEl) {
        numEl.style.animation = 'p7DebtPulse 2s ease-in-out infinite'
      }
    }
    container.appendChild(el)
  }

    document.head.appendChild(style)

    // Build overlay
    var overlay = document.createElement('div')
    overlay.id = 'p7-palette-overlay'
    overlay.innerHTML =
      '<div id="p7-palette-box">' +
        '<input id="p7-palette-input" type="text" placeholder="Search library, tasks, sections..." autocomplete="off" spellcheck="false"/>' +
        '<div id="p7-palette-results"></div>' +

          '<span><kbd>↑↓</kbd> navigate</span>' +
          '<span><kbd>Enter</kbd> open</span>' +
          '<span><kbd>Esc</kbd> close</span>' +
        '</div>' +
      '</div>'
    document.body.appendChild(overlay)

    var input   = overlay.querySelector('#p7-palette-input')
    var results = overlay.querySelector('#p7-palette-results')
    var selIdx  = 0

    var TYPE_COLORS = {
      anime:'#c084fc', manga:'#34d399', manhwa:'#fb923c',
      show:'#60a5fa',  movie:'#fbbf24', novel:'#f472b6', social:'#ff4d4d'
    }
    var SECTIONS = [
      { label:'Dashboard',   sub:'Home',           section:'dashboard'  },
      { label:'Library',     sub:'All content',    section:'library'    },
      { label:'Mood Queue',  sub:'Recommendations',section:'moodqueue'  },
      { label:'Tasks',       sub:'Process queue',  section:'tasks'      },
      { label:'Overview',    sub:'Schedule + manifest', section:'overview' },
      { label:'Graveyard',   sub:'Dropped content',section:'graveyard'  },
      { label:'Session Log', sub:'Activity history',section:'sessionlog' },
      { label:'Settings',    sub:'Preferences',    section:'settings'   },
    ]

    function buildItems(q) {
      var lib   = loadData(KEYS.library, [])
      var tasks = loadData(KEYS.tasks, [])
      var items = []
      q = q.toLowerCase().trim()

      // Sections first (when query is short or matches)
      SECTIONS.forEach(function(s) {
        if (!q || s.label.toLowerCase().includes(q) || s.sub.toLowerCase().includes(q)) {
          items.push({ kind:'section', label:s.label, sub:s.sub, section:s.section })
        }
      })
      // Library
      lib.forEach(function(it) {
        if (!q || it.title.toLowerCase().includes(q)) {
          items.push({ kind:'library', label:it.title, sub:it.type + ' · ' + (it.watchedEpisodes||[]).length + ' / ' + (it.totalEpisodes||0) + ' · ' + it.status, id:it.id, type:it.type })
        }
      })
      // Tasks
      tasks.forEach(function(t) {
        if (!q || t.name.toLowerCase().includes(q)) {
          items.push({ kind:'task', label:t.name, sub:'task · ' + (t.completed ? 'done' : 'active'), id:t.id })
        }
      })
      return items.slice(0, 14)
    }

    function render(q) {
      var items = buildItems(q)
      selIdx = 0
      results.innerHTML = ''
      if (items.length === 0) {
        results.innerHTML = '<div style="padding:16px 20px;font:400 12px var(--font-mono);color:var(--text-3);">No results for "' + q + '"</div>'
        return
      }
      items.forEach(function(item, i) {
        var row = document.createElement('div')
        row.className = 'p7-pal-item' + (i === 0 ? ' selected' : '')
        row.dataset.idx = i

        var iconEl = document.createElement('div')
        iconEl.className = 'p7-pal-item-icon'
        if (item.kind === 'section') {
          iconEl.style.cssText = 'background:var(--surface-2);color:var(--text-2);'
          iconEl.textContent = '⊞'
        } else if (item.kind === 'task') {
          iconEl.style.cssText = 'background:rgba(168,85,247,0.15);color:#a855f7;'
          iconEl.textContent = 'TSK'
        } else {
          var tc = TYPE_COLORS[item.type] || '#00e5ff'
          iconEl.style.cssText = 'background:' + tc + '22;color:' + tc + ';font-size:8px;'
          iconEl.textContent = (item.type || 'LIB').toUpperCase().slice(0,3)
        }

        var textEl = document.createElement('div')
        textEl.innerHTML =
          '<div class="p7-pal-item-title">' + item.label + '</div>' +
          '<div class="p7-pal-item-sub">' + item.sub + '</div>'

        row.appendChild(iconEl)
        row.appendChild(textEl)
        row.addEventListener('click', function() { activateItem(item) })
        row.addEventListener('mouseenter', function() {
          results.querySelectorAll('.p7-pal-item').forEach(function(r,j){ r.classList.toggle('selected', j===i) })
          selIdx = i
        })
        results.appendChild(row)
      })
      results._items = items
    }

    function activateItem(item) {
      closeP7Palette()
      if (item.kind === 'section') navigateTo(item.section)
      else if (item.kind === 'library') navigateTo('detail', item.id)
      else if (item.kind === 'task') navigateTo('tasks')
    }

    function move(dir) {
      var rows = results.querySelectorAll('.p7-pal-item')
      if (!rows.length) return
      rows[selIdx] && rows[selIdx].classList.remove('selected')
      selIdx = (selIdx + dir + rows.length) % rows.length
      rows[selIdx] && rows[selIdx].classList.add('selected')
      rows[selIdx] && rows[selIdx].scrollIntoView({ block: 'nearest' })
    }

    function openP7Palette() {
      overlay.classList.add('open')
      input.value = ''
      render('')
      setTimeout(function() { input.focus() }, 80)
    }

    function closeP7Palette() {
      overlay.classList.remove('open')
      input.blur()
    }

    input.addEventListener('input', function() { render(input.value) })
    input.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown') { e.preventDefault(); move(1) }
      else if (e.key === 'ArrowUp') { e.preventDefault(); move(-1) }
      else if (e.key === 'Enter') {
        var items = results._items
        if (items && items[selIdx]) activateItem(items[selIdx])
      }
      else if (e.key === 'Escape') closeP7Palette()
    })
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeP7Palette()
    })
    // NOTE: keydown ⌘X is handled exclusively by the primary palette IIFE above.
    // p7OpenPalette aliased to that palette so external callers still work.
    window.p7OpenPalette = function() {
      if (window.__openCommandPalette) window.__openCommandPalette()
      else openP7Palette()
    }
  }

  /* ── P7: WEEK VIEW IN SESSION LOG ─────────────────────────
     "What did I actually do" — planned vs done, side by side.
     Tab inside Session Log.
  ─────────────────────────────────────────────────────────── */
  function p7RenderWeekView(container) {
    if (!container || !(container instanceof Node)) return
    var log      = loadData(KEYS.log, [])
    var sched    = loadData(KEYS.schedule, {})
    var today    = new Date()
    var days     = []
    for (var i = 6; i >= 0; i--) {
      var d = new Date(today)
      d.setDate(today.getDate() - i)
      days.push(d)
    }

    var wrap = document.createElement('div')
    wrap.style.cssText = 'margin-top:var(--space-4);'

    var grid = document.createElement('div')
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:6px;'

    days.forEach(function(day) {
      var dk      = localDateStr(day)
      var isToday = dk === localDateStr()
      var dayShort = day.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase()
      var dateNum  = day.getDate()

      // Log activity for this day
      var dayLog = log.filter(function(e) { return e.timestamp.slice(0,10) === dk && (e.text.indexOf('Watched ep') !== -1 || e.text.indexOf('Read ch') !== -1) })
      // Schedule for this day
      var dayPlan = (sched[dk] || []).length

      var col = document.createElement('div')
      col.style.cssText = 'border-radius:var(--radius-sm);overflow:hidden;border:1px solid ' + (isToday ? 'var(--accent-cool)' : 'var(--border)') + ';background:var(--surface);'

      // Header
      var hdr = document.createElement('div')
      hdr.style.cssText = 'padding:6px 4px;text-align:center;background:' + (isToday ? 'rgba(0,229,255,0.1)' : 'transparent') + ';border-bottom:1px solid var(--border);'
      hdr.innerHTML = '<div style="font:700 9px var(--font-mono);color:' + (isToday ? 'var(--accent-cool)' : 'var(--text-3)') + ';letter-spacing:0.1em;">' + dayShort + '</div>' +
        '<div style="font:600 14px var(--font-display);color:var(--text-1);">' + dateNum + '</div>'
      col.appendChild(hdr)

      // Body
      var body = document.createElement('div')
      body.style.cssText = 'padding:6px 4px;min-height:60px;'

      if (dayLog.length > 0) {
        // Had activity — group by series
        var seriesMap = {}
        dayLog.forEach(function(e) {
          var m = e.text.match(/of (.+)$/)
          var title = m ? m[1] : 'Unknown'
          seriesMap[title] = (seriesMap[title] || 0) + 1
        })
        Object.keys(seriesMap).forEach(function(title) {
          var dot = document.createElement('div')
          dot.style.cssText = 'font:500 9px var(--font-mono);color:var(--accent-green);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'
          dot.title = title
          dot.textContent = '▸ ' + seriesMap[title] + 'x ' + title.slice(0,12) + (title.length > 12 ? '…' : '')
          body.appendChild(dot)
        })
        // Was there a plan that wasn't fulfilled?
        if (dayPlan > 0 && dayLog.length < dayPlan) {
          var miss = document.createElement('div')
          miss.style.cssText = 'font:500 9px var(--font-mono);color:rgba(255,59,107,0.6);margin-top:3px;'
          miss.textContent = '✕ ' + (dayPlan - dayLog.length) + ' missed'
          body.appendChild(miss)
        }
      } else if (dayPlan > 0 && dk < localDateStr()) {
        // Had a plan, did nothing
        body.innerHTML = '<div style="font:500 9px var(--font-mono);color:rgba(255,59,107,0.5);text-align:center;padding-top:8px;">✕ planned<br>' + dayPlan + ' missed</div>'
      } else if (isToday) {
        body.innerHTML = '<div style="font:400 9px var(--font-mono);color:var(--text-3);text-align:center;padding-top:8px;">today</div>'
      } else {
        body.innerHTML = '<div style="font:400 9px var(--font-mono);color:var(--text-3);text-align:center;padding-top:8px;">—</div>'
      }

      col.appendChild(body)
      grid.appendChild(col)
    })

    wrap.appendChild(grid)

    // Summary row
    var totalDone    = log.filter(function(e) {
      var dk = e.timestamp.slice(0,10)
      var cutoff = localDateStr(new Date(Date.now() - 6*24*3600*1000))
      return dk >= cutoff && (e.text.indexOf('Watched ep') !== -1 || e.text.indexOf('Read ch') !== -1)
    }).length
    var summary = document.createElement('div')
    summary.style.cssText = 'margin-top:10px;font:500 10px var(--font-mono);color:var(--text-3);letter-spacing:0.08em;text-align:center;'
    summary.textContent = totalDone + ' episode' + (totalDone !== 1 ? 's' : '') + ' watched this week'
    wrap.appendChild(summary)
    container.appendChild(wrap)
  }

      if (!mainEl) return
      var _p7DetailObserver = new MutationObserver(function() {
        var progFill = document.getElementById('detail-prog-fill')
        if (!progFill || progFill._p7VeloPatched) return
        progFill._p7VeloPatched = true
        // Find the item being viewed
        if (!currentDetailId) return
        var lib  = loadData(KEYS.library, [])
        var item = lib.find(function(i) { return i.id === currentDetailId })
        if (!item) return
        // Find progress wrap - insert velocity after progress bar
        var progWrap = progFill.closest('.detail-hero-right') || progFill.parentElement
        if (progWrap) p7RenderVelocityBadge(item, progWrap)
      })
      _p7DetailObserver.observe(mainEl, { childList: true, subtree: true })
    }, 200)
  })
