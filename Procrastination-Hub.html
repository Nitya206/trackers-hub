  /* ─────────────────────────────────────────────────────────────────
     HELPER FUNCTIONS
  ───────────────────────────────────────────────────────────────── */
  function loadData(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) || fallback }
    catch { return fallback }
  }

  function saveData(key, data) {
    localStorage.setItem(key, JSON.stringify(data))
  }

  // Always use LOCAL date string to avoid UTC timezone shift
  function localDateStr(d) {
    var dt = d || new Date()
    return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0')
  }

  function generateId(title) {
    // Date.now() alone can collide on rapid adds — append random hex for uniqueness
    var rand = Math.floor(Math.random() * 0xffff).toString(16).padStart(4, '0')
    return title.toLowerCase()
               .replace(/\s+/g, '-')
               .replace(/[^a-z0-9-]/g, '')
           + '-' + Date.now() + rand
  }

  function logEvent(text) {
    const log = loadData(KEYS.log, [])
    // Store full ISO timestamp for time display, but prefix with local date so grouping is correct
    const now = new Date()
    const localPrefix = localDateStr(now)
    const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0')
    log.unshift({ id: generateId('log'), timestamp: localPrefix + 'T' + timeStr + 'Z', text })
    saveData(KEYS.log, log)
    if (window.__refreshLog) window.__refreshLog()
  }

  function addTimerMinutes(mins) {
    const budget = checkBudgetReset()
    budget.usedMinutes = (Number(budget.usedMinutes) || 0) + (Number(mins) || 0)
    saveData(KEYS.budget, budget)
    if (window.__refreshBudget) window.__refreshBudget()
    if (typeof window.__refreshDashboard === 'function') window.__refreshDashboard()
  }

  function checkBudgetReset() {
    const budget = loadData(KEYS.budget, getDefaultBudget())
    // Migrate old weeklyHours key → dailyHours
    if (budget.weeklyHours !== undefined && budget.dailyHours === undefined) {
      budget.dailyHours = budget.weeklyHours
      delete budget.weeklyHours
      saveData(KEYS.budget, budget)
    }
    // Ensure dailyHours is always set
    if (!budget.dailyHours) {
      budget.dailyHours = parseInt(getAppSettings().budgetDefaultDailyHours, 10) || 4
    }
    const today = localDateStr()
    if (budget.resetDate !== today) {
      budget.usedMinutes = 0
      budget.resetDate   = today
      saveData(KEYS.budget, budget)
    }
    return budget
  }

  function getLastMonday(date) {
    const d   = new Date(date)
    const day = d.getDay()
    d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day))
    return localDateStr(d)
  }

  function getDefaultBudget() {
    var daily = parseInt(getAppSettings().budgetDefaultDailyHours, 10) || 4
    return { dailyHours: daily, usedMinutes: 0, resetDate: localDateStr() }
  }

  function getTodayName() {
    return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()]
  }

  function normalizeStoredData() {
    // Ensure settings always contain defaults (while preserving existing audio setting etc.)
    saveAppSettings(getAppSettings())

    // Defensive migration for legacy library entries.
    var lib = loadData(KEYS.library, [])
    var changed = false
    var seenIds = Object.create(null)
    lib.forEach(function(item) {
      if (!item || typeof item !== 'object') return
      if (!item.id || seenIds[item.id]) {
        var newId
        do { newId = generateId(item.title || 'content') } while (seenIds[newId])
        item.id = newId
        changed = true
      }
      seenIds[item.id] = true
      if (!Array.isArray(item.seasons)) { item.seasons = []; changed = true }
      if (!Array.isArray(item.watchedEpisodes)) { item.watchedEpisodes = []; changed = true }
      ;(item.seasons || []).forEach(function(s, sidx) {
        if (!s.id) { s.id = 's' + (sidx + 1); changed = true }
        if (!s.name) { s.name = 'Season ' + (sidx + 1); changed = true }
        if (!Array.isArray(s.episodes)) { s.episodes = []; changed = true }
      })
      if (item.totalEpisodes === undefined || item.totalEpisodes === null) {
        var counted = (item.seasons || []).reduce(function(acc, s) { return acc + ((s.episodes || []).length) }, 0)
        item.totalEpisodes = counted || 0
        changed = true
      }
      if (!item.status) { item.status = 'watching'; changed = true }
      if (!item.addedDate) { item.addedDate = new Date().toISOString().split('T')[0]; changed = true }
      // Only set lastActivityAt if item has been watched
      if (!item.lastActivityAt) {
        var hasWatched = false
        if (item.type === 'social') {
          hasWatched = (item.socialVideos || []).some(function(v) { return v.watched })
        } else {
          hasWatched = (item.watchedEpisodes || []).length > 0
        }
        if (hasWatched) {
          item.lastActivityAt = new Date((item.addedDate || '1970-01-01') + 'T12:00:00').toISOString()
          changed = true
        }
      }
    })
    if (changed) saveData(KEYS.library, lib)
  }

  function touchLibraryItemActivity(it) {
    if (!it || typeof it !== 'object') return
    it.lastActivityAt = new Date().toISOString()
  }

  function libraryRemainingTodo(item) {
    if (!item || item.status === 'graveyard') return -1
    if (item.type === 'social') {
      var v = item.socialVideos || []
      return Math.max(0, v.length - v.filter(function(x) { return x.watched }).length)
    }
    var total = item.totalEpisodes || 0
    if (!total && Array.isArray(item.seasons) && item.seasons.length) {
      total = item.seasons.reduce(function(acc, s) { return acc + ((s.episodes || []).length) }, 0)
    }
    var w = (item.watchedEpisodes || []).length
    return Math.max(0, total - w)
  }

  function libraryWatchedCount(item) {
    if (!item) return 0
    if (item.type === 'social') {
      var v = item.socialVideos || []
      return v.filter(function(x) { return x.watched }).length
    }
    return (item.watchedEpisodes || []).length
  }

  function libraryTotalUnits(item) {
    if (!item) return 0
    if (item.type === 'social') return (item.socialVideos || []).length
    var t = item.totalEpisodes || 0
    if (!t && Array.isArray(item.seasons) && item.seasons.length) {
      t = item.seasons.reduce(function(acc, s) { return acc + ((s.episodes || []).length) }, 0)
    }
    return t
  }

  function libraryProgressRatio(item) {
    if (!item || item.status === 'graveyard') return -1
    var tot = libraryTotalUnits(item)
    var w = libraryWatchedCount(item)
    if (tot <= 0) return w > 0 ? 1 : 0
    return w / tot
  }

  function libraryRatingSortKey(item) {
    if (!item) return 0
    var r = Number(item.rating) || 0
    if (item.ratingIMDb) r = Math.max(r, Number(item.ratingIMDb) || 0)
    if (item.ratingMAL) {
      var m = Number(item.ratingMAL) || 0
      r = Math.max(r, m > 5 ? m : m * 2)
    }
    return r
  }

  function libraryAddedDateMs(item) {
    var d = item && item.addedDate
    if (!d || typeof d !== 'string') return 0
    var m = new Date(d + 'T12:00:00').getTime()
    return isNaN(m) ? 0 : m
  }

  function libraryActivityTs(item) {
    if (item.lastActivityAt) {
      var t = new Date(item.lastActivityAt).getTime()
      if (!isNaN(t)) return t
    }
    // Check if item has any watched content
    var hasActivity = false
    if (item.type === 'social') {
      hasActivity = (item.socialVideos || []).some(function(v) { return v.watched })
    } else {
      hasActivity = (item.watchedEpisodes || []).length > 0
    }
    // If never watched, return 0 (will sort to bottom)
    // Otherwise use addedDate as fallback
    return hasActivity ? libraryAddedDateMs(item) : 0
  }

  var LIBRARY_SORT_OPTIONS = [
    { value: 'activity',         label: 'Latest watching' },
    { value: 'added-desc',      label: 'Newest added' },
    { value: 'added-asc',       label: 'Oldest added' },
    { value: 'most-remaining',  label: 'Most left to do' },
    { value: 'least-remaining', label: 'Least left to do' },
    { value: 'most-progress',   label: 'Most progress' },
    { value: 'least-progress',  label: 'Least progress' },
    { value: 'title-asc',       label: 'Title A–Z' },
    { value: 'title-desc',      label: 'Title Z–A' },
    { value: 'timer-desc',      label: 'Most time logged' },
    { value: 'rating-desc',     label: 'Highest rated' }
  ]
  var LIBRARY_SORT_MODES = LIBRARY_SORT_OPTIONS.reduce(function(acc, o) { acc[o.value] = 1; return acc }, {})

  function normalizeLibrarySortMode(mode) {
    return LIBRARY_SORT_MODES[mode] ? mode : 'added-desc'
  }

  function librarySortOptionLabel(mode) {
    mode = normalizeLibrarySortMode(mode)
    for (var i = 0; i < LIBRARY_SORT_OPTIONS.length; i++) {
      if (LIBRARY_SORT_OPTIONS[i].value === mode) return LIBRARY_SORT_OPTIONS[i].label
    }
    return 'Newest added'
  }

  function sortLibraryItems(items, mode) {
    mode = normalizeLibrarySortMode(mode)
    var arr = (items || []).filter(function(x) { return x && typeof x === 'object' }).slice()
    function cmpAddedDesc(a, b) {
      var ma = libraryAddedDateMs(a)
      var mb = libraryAddedDateMs(b)
      if (mb !== ma) return mb - ma
      return (a.title || '').localeCompare(b.title || '')
    }
    function cmpRemainingAsc(a, b) {
      var ra = libraryRemainingTodo(a)
      var rb = libraryRemainingTodo(b)
      if (ra < 0 && rb < 0) return (a.title || '').localeCompare(b.title || '')
      if (ra < 0) return 1
      if (rb < 0) return -1
      if (ra !== rb) return ra - rb
      return (a.title || '').localeCompare(b.title || '')
    }
    if (mode === 'added-asc') {
      arr.sort(function(a, b) { return -cmpAddedDesc(a, b) })
    } else if (mode === 'most-remaining') {
      arr.sort(function(a, b) {
        var ra = libraryRemainingTodo(a)
        var rb = libraryRemainingTodo(b)
        if (ra < 0 && rb < 0) return (a.title || '').localeCompare(b.title || '')
        if (ra < 0) return 1
        if (rb < 0) return -1
        if (rb !== ra) return rb - ra
        return (a.title || '').localeCompare(b.title || '')
      })
    } else if (mode === 'least-remaining') {
      arr.sort(cmpRemainingAsc)
    } else if (mode === 'activity') {
      arr.sort(function(a, b) {
        var ta = libraryActivityTs(a)
        var tb = libraryActivityTs(b)
        if (tb !== ta) return tb - ta
        return cmpAddedDesc(a, b)
      })
    } else if (mode === 'most-progress') {
      arr.sort(function(a, b) {
        var pa = libraryProgressRatio(a)
        var pb = libraryProgressRatio(b)
        if (pa < 0 && pb < 0) return (a.title || '').localeCompare(b.title || '')
        if (pa < 0) return 1
        if (pb < 0) return -1
        if (pb !== pa) return pb - pa
        return (a.title || '').localeCompare(b.title || '')
      })
    } else if (mode === 'least-progress') {
      arr.sort(function(a, b) {
        var pa = libraryProgressRatio(a)
        var pb = libraryProgressRatio(b)
        if (pa < 0 && pb < 0) return (a.title || '').localeCompare(b.title || '')
        if (pa < 0) return 1
        if (pb < 0) return -1
        if (pa !== pb) return pa - pb
        return (a.title || '').localeCompare(b.title || '')
      })
    } else if (mode === 'title-asc') {
      arr.sort(function(a, b) { return (a.title || '').localeCompare(b.title || '', undefined, { sensitivity: 'base' }) })
    } else if (mode === 'title-desc') {
      arr.sort(function(a, b) { return (b.title || '').localeCompare(a.title || '', undefined, { sensitivity: 'base' }) })
    } else if (mode === 'timer-desc') {
      arr.sort(function(a, b) {
        var ta = (a.timerMinutes || 0)
        var tb = (b.timerMinutes || 0)
        if (tb !== ta) return tb - ta
        return (a.title || '').localeCompare(b.title || '')
      })
    } else if (mode === 'rating-desc') {
      arr.sort(function(a, b) {
        var ra = libraryRatingSortKey(a)
        var rb = libraryRatingSortKey(b)
        if (rb !== ra) return rb - ra
        return (a.title || '').localeCompare(b.title || '')
      })
    } else {
      arr.sort(cmpAddedDesc)
    }
    return arr
  }

  function getLibraryCardItemId(card) {
    if (!card) return ''
    var id = card.dataset.itemId || ''
    if (id) return id
    var btn = card.querySelector('.lib-open-btn')
    return (btn && btn.dataset.itemId) ? btn.dataset.itemId : ''
  }

  function orderLibraryCardsInGrid(gridEl, mode) {
    if (!gridEl) return
    mode = normalizeLibrarySortMode(mode)
    var noRes = gridEl.querySelector('#lib-no-results')
    var empty = gridEl.querySelector('.lib-empty-state')
    var sorted = sortLibraryItems(loadData(KEYS.library, []), mode)
    var rank = Object.create(null)
    sorted.forEach(function(it, i) {
      if (it && it.id) rank[it.id] = i
    })
    var cards = Array.prototype.slice.call(gridEl.querySelectorAll('.library-card'))
    cards.forEach(function(c) {
      var sid = getLibraryCardItemId(c)
      if (sid) c.dataset.itemId = sid
    })
    cards.sort(function(ca, cb) {
      var ida = getLibraryCardItemId(ca)
      var idb = getLibraryCardItemId(cb)
      var ra = rank[ida]
      var rb = rank[idb]
      var unk = 1e9
      if (ra === undefined) ra = unk
      if (rb === undefined) rb = unk
      if (ra !== rb) return ra - rb
      return (ca.dataset.title || '').localeCompare(cb.dataset.title || '')
    })
    if (noRes) gridEl.appendChild(noRes)
    if (empty) gridEl.appendChild(empty)
    cards.forEach(function(c) { gridEl.appendChild(c) })
  }

  let currentSection  = 'dashboard'
  let currentDetailId = null

  function navigateTo(section, detailId = null, skipPush = false) {
    // Cleanup theme overrides from detail view before any navigation
    if (window.__detailCleanup) { window.__detailCleanup(); window.__detailCleanup = null }
    if (window.__libSearchCleanup) { window.__libSearchCleanup(); window.__libSearchCleanup = null }
    document.body.classList.remove('in-graveyard')
    // Remove multi-select bar if present
    var _sb = document.getElementById('detail-select-bar'); if (_sb) _sb.remove()
    currentSection  = section
    currentDetailId = detailId
    updateSidebarActive(section)
    const main = document.getElementById('app-main')
    main.innerHTML = ''
    main.scrollTop = 0
    window.scrollTo({top: 0, behavior: 'instant'})
    const renderers = {
      dashboard:  () => (window.renderDashboard || renderDashboard)(),
      library:    renderLibrary,
      moodqueue:  renderMoodQueue,
      tasks:      renderTasks,
      overview:   renderOverview,
      graveyard:  renderGraveyard,
      sessionlog: () => (window.renderSessionLog || renderSessionLog)(),
      settings:   renderSettings,
      detail:     () => renderDetail(detailId)
    }
    renderers[section]?.()

    // Persist last location so refresh restores it
    try {
      localStorage.setItem('phub_last_location', JSON.stringify({ section, detailId }))
    } catch(e) {}

    // Push to browser history so back swipe / back button works
    if (!skipPush) {
      var state = { section: section, detailId: detailId }
      history.pushState(state, '', null)
    }
  }

  // Handle browser back (two-finger swipe on Mac, back button)
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.section) {
      navigateTo(e.state.section, e.state.detailId || null, true)
    } else {
      navigateTo('dashboard', null, true)
    }
  })

  // Set initial history state
  if (!history.state) {
    history.replaceState({ section: 'dashboard', detailId: null }, '', null)
  }

  function updateSidebarActive(section) {
    document.querySelectorAll('.bn-item').forEach(el => {

  /* ─────────────────────────────────────────────────────────────────
     PART 2: BUDGET COLOR HELPER
     Shared by sidebar bar, dashboard arc, everywhere.
  ───────────────────────────────────────────────────────────────── */
  function getBudgetColor(pct) {
    if (pct > 1.0) return '#ff3355'        // over budget — danger
    if (pct <= 0.5) return '#00d4ff'       // 0–50% — cyan
    if (pct <= 0.8) {                      // 50–80% — interpolate cyan→orange
      const t  = (pct - 0.5) / 0.3
      const r  = Math.round(0   + t * (255 - 0))
      const g  = Math.round(212 + t * (107 - 212))
      const b  = Math.round(255 + t * (53  - 255))
      return `rgb(${r},${g},${b})`
    }
    return '#ff6b35'                       // 80–100% — orange
  }

  /* ─────────────────────────────────────────────────────────────────
     PART 2: SIDEBAR BUDGET WIDGET
     Exposed as window.__refreshBudget — called by addTimerMinutes.
  ───────────────────────────────────────────────────────────────── */
  function refreshSidebarBudget() {
    const budget    = checkBudgetReset()
    const usedHrs   = budget.usedMinutes / 60
    const totalHrs  = budget.dailyHours
    const pct       = Math.min(usedHrs / totalHrs, 1.2)
    const color     = getBudgetColor(usedHrs / totalHrs)

    const fill = document.getElementById('sb-bar-fill')
    const text = document.getElementById('sb-bar-text')
    if (!fill || !text) return

    fill.style.width      = (Math.min(pct, 1) * 100) + '%'
    fill.style.background = color
    text.textContent      = `${fmtMins(budget.usedMinutes) || '0m'} / ${totalHrs}h today`
    text.style.color      = usedHrs > totalHrs ? '#ff3355' : ''
  }

  // Wire up global refresh hook immediately (Part 1 calls addTimerMinutes which uses this)
  window.__refreshBudget = function() {
    if (typeof window.__fixLegacyBudgetTooltips === 'function') window.__fixLegacyBudgetTooltips()
    refreshSidebarBudget()
    // If dashboard is currently rendered, also refresh its arc
    if (typeof window.__refreshDashboardBudget === 'function') {
      window.__refreshDashboardBudget()
    }
  }

  function getMoodRecommendation(mood, excludeIds = []) {
    const library  = loadData(KEYS.library, [])
    const lastMood = loadData(KEYS.lastMood, {})
    const autoExclude = lastMood[mood] ? [lastMood[mood]] : []
    const allExclude  = [...new Set([...autoExclude, ...excludeIds])]

    // Only recommend currently-watching items — completed items are done, graveyard is dropped, social media excluded
    const candidates = library
      .filter(i => i.moodTags && i.moodTags.includes(mood) && i.status === 'watching' && i.type !== 'social')
      .filter(i => !allExclude.includes(i.id))
      .sort((a, b) => {
        // Sort by fewest episodes remaining — prioritise what you are closest to finishing
        const aLeft = a.totalEpisodes - (a.watchedEpisodes||[]).length
        const bLeft = b.totalEpisodes - (b.watchedEpisodes||[]).length
        if (aLeft !== bLeft) return aLeft - bLeft
        // Tie-break by highest rating (ratingIMDb preferred, fallback to rating)
        const aRat = a.ratingIMDb || a.rating || 0
        const bRat = b.ratingIMDb || b.rating || 0
        return bRat - aRat
      })

    if (candidates.length > 0) {
      const pick = candidates[0]
      lastMood[mood] = pick.id
      saveData(KEYS.lastMood, lastMood)
      return pick
    }
    return null
  }

  function getAllMoodMatches(mood) {
    const library = loadData(KEYS.library, [])
    // Show only watching items — completed and graveyard excluded
    return library.filter(i => i.moodTags && i.moodTags.includes(mood) && i.status === 'watching')
  }

    const totalScheduled = todaySchedCountDash + todayTasks
    // Compute 7-day streak from log
    var _streak = 0
    var _log = loadData(KEYS.log, [])
    var _checkDate = new Date(); _checkDate.setHours(0,0,0,0)
    for (var _si = 0; _si < 30; _si++) {

      var _hasActivity = _log.some(function(e) {
        return e.timestamp.slice(0,10) === _dk && (e.text.indexOf('Watched ep') !== -1 || e.text.indexOf('Read ch') !== -1 || e.text.indexOf('Timed') !== -1)
      })
      if (_hasActivity) { _streak++; _checkDate.setDate(_checkDate.getDate()-1) }
      else if (_si === 0) { _checkDate.setDate(_checkDate.getDate()-1); continue } // today might not have activity yet
      else break
    }
    let greetText
    if (totalScheduled > 0) {
      greetText = `${timeGreeting} — ${totalScheduled} thing${totalScheduled > 1 ? 's' : ''} on deck today.`
    } else if (_streak >= 3) {

    } else if (hour < 12) {

      return acc + (i.totalEpisodes || 0)
    }, 0)
    const totalWatched    = library.reduce((acc, i) => {

      const watched   = mission.watchedEpisodes ? mission.watchedEpisodes.length : 0
      // Compute next chapter/episode as the first missing positive integer
      // This handles mixed key formats (e.g. 's0_21', '21', numeric) and gaps
      var nextNum = 1
      if (mission.watchedEpisodes && mission.watchedEpisodes.length > 0) {
        var seen = {}
        mission.watchedEpisodes.forEach(function(x) {
          var s = String(x)
          var m = s.match(/(\d+)$/)
          if (m) {
            seen[parseInt(m[1], 10)] = true
          } else {
            var n = Number(s)
            if (!isNaN(n)) seen[n] = true
          }

        // find first unread from 1..totalEpisodes
        for (var i = 1; i <= (mission.totalEpisodes || 0); i++) {

        // fallback: if none found, use max+1

    navDefs.forEach(def => {

      card.addEventListener('click', () => navigateTo(def.section))

      // 3D tilt on mousemove — max 6 degrees, instant follow
      card.addEventListener('mousemove', e => {
        const rect   = card.getBoundingClientRect()
        const cx     = rect.left + rect.width  / 2
        const cy     = rect.top  + rect.height / 2
        const dx     = (e.clientX - cx) / (rect.width  / 2)
        const dy     = (e.clientY - cy) / (rect.height / 2)
        const rotY   = dx * 6
        const rotX   = -dy * 6
        card.style.transform    = `perspective(500px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.03)`
        card.style.transition   = 'none'
        card.style.willChange   = 'transform'
      })
      card.addEventListener('mouseleave', () => {
        card.style.transition = 'transform 250ms var(--ease-out), border-color 150ms var(--ease-snap)'
        card.style.transform  = 'perspective(500px) rotateX(0deg) rotateY(0deg) scale(1)'

    const statEls  = ['stat-0','stat-1','stat-2','stat-3']
      .map(id => document.getElementById(id))
      .filter(el => el && el.dataset.target !== undefined)
    const targets  = statEls.map(el => parseInt(el.dataset.target, 10))
    const DURATION = 900
    const startTs  = performance.now()

    // Ease-out cubic approximation
    function easeOut(t) { return 1 - Math.pow(1 - t, 3) }

    ;(function countLoop(ts) {
      const elapsed = ts - startTs
      const progress = Math.min(elapsed / DURATION, 1)
      const easedP   = easeOut(progress)
      statEls.forEach((el, i) => {
        if (el) el.textContent = Math.round(targets[i] * easedP)
      })
      if (progress < 1) requestAnimationFrame(countLoop)
      else statEls.forEach((el, i) => { if (el) el.textContent = targets[i] })
    })(startTs)

    container.innerHTML = ''
    if (state === 'idle') {
      container.innerHTML = `
        <div class="mood-widget-idle">
          <button class="btn-primary" id="mw-start-btn">What should I watch?</button>

      resetBtn.textContent = '×'
      resetBtn.addEventListener('click', () => setMoodWidgetState(container, 'idle', null, []))
      wrap.appendChild(resetBtn)

          wrap.appendChild(quickBtn)
        }
      }

      const grid = document.createElement('div')
      grid.className = 'mood-pills-grid'
      // Get counts of available matches per mood for smarter display
      const _lib = loadData(KEYS.library, []).filter(i => i.status==='watching' && i.type!=='social')
      MOOD_DEFS.forEach((m, i) => {

      })

  function renderDashboardBudgetArc(containerId, budget) {
    const container = document.getElementById(containerId)
    if (!container) return

    const SIZE   = 200
    const R      = 80
    const CX     = SIZE / 2
    const CY     = SIZE / 2
    const CIRC   = 2 * Math.PI * R
    const usedHrs = budget.usedMinutes / 60
    const totalHrs = budget.dailyHours
    const pct      = usedHrs / totalHrs
    const _budgetOver = usedHrs > totalHrs
    const color    = _budgetOver ? '#ff3b6b' : getBudgetColor(pct)
    const remaining = Math.max(totalHrs - usedHrs, 0)
    const library = loadData(KEYS.library, [])
    const tasks   = loadData(KEYS.tasks, [])
    const totalTimedMins = library.reduce((acc, i) => acc + (i.timerMinutes || 0), 0)
                        + tasks.reduce((acc, t) => acc + (t.timerMinutes || 0), 0)
    const usedLabel = fmtMins(budget.usedMinutes) || '0m'
    const _overBudget = _budgetOver
    const remLabel = _overBudget
      ? '<span style="color:var(--danger);">⚠ ' + fmtMins(budget.usedMinutes - budget.dailyHours*60) + ' over budget</span>'
      : (remaining >= 1 ? (remaining.toFixed(1) + ' hours remaining today' + (function(){ var _ec=Math.floor(Math.max(0,(budget.dailyHours*60)-budget.usedMinutes)/24); return _ec>1?' <span style="opacity:0.5;font-size:10px;">≈ '+_ec+' ep</span>':'' })()) : (Math.round(remaining * 60) + 'm remaining today' + (function(){ var _ec=Math.floor(Math.max(0,(budget.dailyHours*60)-budget.usedMinutes)/24); return _ec>1?' <span style="opacity:0.5;font-size:10px;">≈ '+_ec+' ep</span>':'' })()))
    container.innerHTML = `
      <div class="budget-arc-wrap">
        <svg class="budget-arc-svg" width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">
          <!-- Background track -->
          <circle cx="${CX}" cy="${CY}" r="${R}"
            fill="none" stroke="var(--border)" stroke-width="8"
            stroke-linecap="round"/>

  // Expose a lightweight dashboard refresher. Updates the three small stat cards
  // in the dashboard if present, without re-rendering the entire page.
  window.__refreshDashboard = function() {
    try {
      const library = loadData(KEYS.library, [])
      const tasks   = loadData(KEYS.tasks, [])
      const totalItems      = library.filter(i => i.status !== 'graveyard' && i.status !== 'on-hold').length
      const totalEpsInLib   = library.reduce((acc, i) => {
        if (i.status === 'graveyard' || i.status === 'on-hold') return acc
        if (i.type === 'social') return acc + (i.socialVideos ? i.socialVideos.length : 0)
        return acc + (i.totalEpisodes || 0)
      }, 0)
      const totalComplete   = library.filter(i =>
        i.status === 'completed' ||
        (i.totalEpisodes > 0 && (i.watchedEpisodes && i.watchedEpisodes.length >= i.totalEpisodes))
      ).length
      const totalEpsDone    = library.reduce((acc, i) => {
        if (i.type === 'social') return acc + (i.socialVideos ? i.socialVideos.filter(v => v.watched).length : 0)
        return acc + (i.watchedEpisodes ? i.watchedEpisodes.length : 0)
      }, 0)
      const pendingTasks    = tasks.filter(t => !t.completed).length

      var el0 = document.getElementById('stat-0')
      if (el0 && el0.closest('.stat-card')) {
        var card = el0.closest('.stat-card')
        card.innerHTML = `<div class="stat-card-number" id="stat-0">${totalItems}</div>` +

                         `<div class="stat-card-label">In Library</div>`

      var el2 = document.getElementById('stat-2')
      if (el2 && el2.closest('.stat-card')) {
        var card2 = el2.closest('.stat-card')
        card2.innerHTML = `<div class="stat-card-number" id="stat-2" data-target="${totalComplete}">${totalComplete}</div>` +
                          `<div style="font:500 11px var(--font-mono);color:var(--text-3);letter-spacing:0.08em;margin-top:-4px;margin-bottom:2px;">${totalEpsDone} entries done</div>` +
                          `<div class="stat-card-label">Completed</div>`

      if (el3 && el3.closest('.stat-card')) {
        var card3 = el3.closest('.stat-card')
        card3.innerHTML = `<div class="stat-card-number" data-target="${pendingTasks}" id="stat-3">${pendingTasks === 0 ? '<span style="color:var(--text-3)">0</span>' : pendingTasks}</div>` +
                          `<div style="font:500 11px var(--font-mono);color:var(--text-3);letter-spacing:0.08em;margin-top:-4px;margin-bottom:2px;">${tasks.filter(t=>t.completed).length} done</div>` +
                          `<div class="stat-card-label">Pending Tasks</div>`
      }

      // Update time-spent leaderboard block
      var leaderWrap = document.getElementById('dash-time-leaderboard')
      if (leaderWrap) {
        var timed2 = library.filter(function(i) { return i.timerMinutes && i.timerMinutes >= 1 })

            '<div style="display:flex;flex-direction:column;gap:8px;">' +
            top2.map(function(item) {
              var pct2 = Math.round((item.timerMinutes / maxMins2) * 100)
              var ac2 = (item.themeStyles && item.themeStyles['--accent-cool']) ? item.themeStyles['--accent-cool'] : 'var(--accent-cool)'
              return '<div style="cursor:none;" onclick="navigateTo(\'detail\',\'' + item.id + '\')">' +
                '<div style="display:flex;justify-content:space-between;margin-bottom:3px;">' +
                  '<span style="font:600 11px var(--font-mono);color:var(--text-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;">' + item.title + '</span>' +

  function renderMQResult(mood, excludeIds) {

    const allMatches = getAllMoodMatches(mood)
    const seen       = excludeIds

    // Find next unseen result
    const result = (() => {
      const candidates = allMatches.filter(i => !seen.includes(i.id))
        .sort((a, b) => (b.totalEpisodes - b.watchedEpisodes.length) - (a.totalEpisodes - a.watchedEpisodes.length))
      return candidates[0] || null
    })()

    const suggestionN = excludeIds.length + 1
    const totalMatches = allMatches.length

    const wrap = document.createElement('div')
    wrap.className = 'mq-result-wrap'

    if (result) {

      const unit       = (result.type === 'manga' || result.type === 'manhwa' || result.type === 'novel') ? 'chapters' : 'episodes'

  const MQ_HISTORY_KEY = KEYS.mqHistory

  function saveMQHistory(mood, title) {
    const hist = loadData(MQ_HISTORY_KEY, [])
    // Remove any existing entry for the same title so it moves to top
    const deduped = hist.filter(e => e.title !== title)
    deduped.unshift({ mood, title, ts: new Date().toISOString() })
    saveData(MQ_HISTORY_KEY, deduped.slice(0, 10))
  }

  function renderMQHistory(container) {
    const raw  = loadData(MQ_HISTORY_KEY, [])
    // Deduplicate by title in case old dupes exist in storage
    const seen = new Set()
    const hist = raw.filter(e => { if (seen.has(e.title)) return false; seen.add(e.title); return true })
    if (hist.length === 0) return

    const headerEl = document.createElement('div')
    headerEl.className   = 'mq-history-header'
    headerEl.textContent = 'RECENT RECOMMENDATIONS'
    container.appendChild(headerEl)

    const listEl  = document.createElement('div')
    listEl.className = 'mq-history-list'

    const recent = hist.slice(0, 5)
    recent.forEach(entry => {
      const item = document.createElement('div')
      item.className = 'mq-history-item'
      const age  = getRelativeTime(entry.ts)
      item.innerHTML = `
        <span class="mq-history-mood">${entry.mood}</span>
        <span class="mq-history-title">${entry.title}</span>
        <span class="mq-history-time">${age}</span>`
      listEl.appendChild(item)
    })
    container.appendChild(listEl)
  }

  function getRelativeTime(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime()
    const mins = Math.floor(diff / 60000)
    if (mins < 2)   return 'just now'
    if (mins < 60)  return `${mins} min ago`
    const hrs = Math.floor(mins / 60)
    if (hrs  < 24)  return `${hrs} hr${hrs > 1 ? 's' : ''} ago`
    const days = Math.floor(hrs / 24)
    if (days < 7)   return `${days} day${days > 1 ? 's' : ''} ago`
    return `${Math.floor(days / 7)} week${Math.floor(days / 7) > 1 ? 's' : ''} ago`
  }

    function makeSegBtn(label, isActive, color) {
      var btn = document.createElement('button')
      btn.style.cssText = 'font:700 9px var(--font-mono);letter-spacing:0.14em;text-transform:uppercase;padding:5px 14px;border-radius:var(--radius-pill);border:none;cursor:none;transition:all 150ms var(--ease-snap);white-space:nowrap;'
      btn.textContent = label
      function setActive(on) {
        btn.style.background = on ? (color || 'rgba(0,229,255,0.15)') : 'transparent'
        btn.style.color = on ? (color ? color.replace(/0\.\d+\)/, '1)').replace('rgba','rgb').replace(',1)','') : 'var(--accent-cool)') : 'var(--text-3)'
        btn.style.boxShadow = on ? ('0 0 10px ' + (color || 'rgba(0,229,255,0.15)')) : 'none'
      }
      btn._setActive = setActive
      setActive(isActive)
      return btn
    }

    var btnWatching = makeSegBtn('▶ WATCHING', !showOnHold, 'rgba(0,229,255,0.15)')
    var btnOnHold   = makeSegBtn('⏸ ON HOLD', showOnHold,  'rgba(249,115,22,0.15)')

    btnWatching.addEventListener('click', function() {

    // Search + quick-add row

    searchWrap.appendChild(searchInput)

    const qaWrap = document.createElement('div')

    const confirmEl = document.createElement('div')

    confirmEl.id = 'lib-qa-confirm'

    var sortPanel = document.createElement('div')

    sortPanel.className = 'lib-sort-panel'

    main.appendChild(topbar)

    // ---- GRID ----
    const grid = document.createElement('div')
    grid.className = 'lib-grid'
    grid.id = 'lib-grid'

    const noResults = document.createElement('div')
    noResults.className = 'lib-no-results'
    noResults.id = 'lib-no-results'
    noResults.textContent = 'NO FILES MATCH THIS QUERY'
    grid.appendChild(noResults)

    if (library.length === 0) {
      const empty = document.createElement('div')
      empty.style.gridColumn = '1 / -1'
      empty.innerHTML =
        '<div class="lib-empty-state">' +
          '<div class="lib-empty-icon">\u25c8</div>' +
          '<div class="lib-empty-title">CONTENT MATRIX EMPTY</div>' +
          '<div class="lib-empty-sub">No files on record. Add your first mission.</div>' +
        '</div>'
      grid.appendChild(empty)
    } else {
      // Build all cards into a DocumentFragment -- append once
      const frag = document.createDocumentFragment()
      library.forEach(function(item, idx) {
        frag.appendChild(buildLibraryCard(item, idx, MOOD_CHIP_COLORS))
      })
      grid.appendChild(frag)

      // Intersection Observer -- entrance animations, never animate offscreen cards
      const cardObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return
          const card  = entry.target
          const delay = Math.min(parseInt(card.dataset.idx, 10) * 50, 400)
          setTimeout(function() {
            requestAnimationFrame(function() {
              card.style.transition =
                'opacity 360ms ' + delay + 'ms var(--ease-out), ' +
                'transform 400ms ' + delay + 'ms var(--ease-spring)'
              card.classList.add('lib-card-entered')
              cardObserver.unobserve(card)
              setTimeout(function() { card.style.willChange = '' }, 450 + delay)
            })
          }, 0)
        })
      }, { threshold: 0.1 })

      grid.querySelectorAll('.library-card').forEach(function(card) {
        cardObserver.observe(card)
      })

      // 3D tilt -- single delegated mousemove on grid, rAF-gated
      var tiltCard    = null
      var tiltFrameId = null

      grid.addEventListener('mousemove', function(e) {
        var card = e.target.closest('.library-card')
        if (!card || card.style.display === 'none') {
          if (tiltCard && tiltCard !== card) resetTilt(tiltCard)
          tiltCard = null
          return
        }
        if (tiltCard && tiltCard !== card) resetTilt(tiltCard)
        tiltCard = card
        if (tiltFrameId) cancelAnimationFrame(tiltFrameId)
        tiltFrameId = requestAnimationFrame(function() {
          var rect = card.getBoundingClientRect()
          var x    = (e.clientX - rect.left)  / rect.width  - 0.5
          var y    = (e.clientY - rect.top)   / rect.height - 0.5
          card.style.transform  = 'perspective(600px) rotateX(' + (-y * 8) + 'deg) rotateY(' + (x * 8) + 'deg) scale(1.02)'
          card.style.transition = 'none'
          card.style.willChange = 'transform'
        })
      })

      grid.addEventListener('mouseleave', function() {
        if (tiltCard) resetTilt(tiltCard)
        tiltCard = null
        if (tiltFrameId) { cancelAnimationFrame(tiltFrameId); tiltFrameId = null }
      })

      function resetTilt(card) {
        card.style.transition = 'transform 300ms var(--ease-snap)'
        card.style.transform  = ''
        setTimeout(function() { card.style.willChange = '' }, 310)
      }
    }

    main.appendChild(grid)

    // ---- FILTER -- never re-creates DOM, just toggles display ----
    function filterCards() {
      var cards   = grid.querySelectorAll('.library-card')
      var visible = 0
      var q       = searchQuery.toLowerCase()
      cards.forEach(function(card) {
        var typeOk   = activeType === 'all' || card.dataset.type === activeType
        var titleOk  = !q || (card.dataset.title || '').toLowerCase().includes(q)
        var notGrave = card.dataset.status !== 'graveyard'
        var isOnHold = card.dataset.status === 'on-hold'
        var show     = typeOk && titleOk && notGrave && (showOnHold ? isOnHold : !isOnHold)
        card.style.display = show ? '' : 'none'
        if (show) visible++
      })
      noResults.style.display = (library.length > 0 && visible === 0) ? 'block' : 'none'
      if (library.length > 0 && visible === 0) {
        noResults.innerHTML = '<div style="color:var(--text-3);font:400 12px var(--font-mono);">No results for <span style="color:var(--text-2);">&ldquo;' + searchQuery + '&rdquo;</span>' + (activeType!=='all'?' in '+activeType:'') + '</div>'
        var _clrBtn = document.createElement('button')
        _clrBtn.textContent = 'Clear search'
        _clrBtn.style.cssText = 'margin-top:8px;background:transparent;border:1px solid var(--border);color:var(--text-3);font:600 10px var(--font-mono);padding:4px 12px;border-radius:var(--radius-pill);cursor:none;letter-spacing:0.1em;text-transform:uppercase;'
        _clrBtn.addEventListener('click', function() {
          var si = document.getElementById('lib-search')
          if (si) si.value = ''
          searchQuery = ''
          _libState.q = ''; _saveLibState()
          filterCards()
        })
        noResults.appendChild(_clrBtn)
      }
    }

    // Restore search query if persisted
    if (searchQuery) { searchInput.value = searchQuery }

    // Keyboard shortcut: press / to focus search
    var _libKeyHandler = function(e) {
      if (e.key === '/' && document.activeElement !== searchInput && !e.ctrlKey && !e.metaKey) {
        e.preventDefault()
        searchInput.focus()
        searchInput.select()
      }
      if (e.key === 'Escape' && document.activeElement === searchInput) {
        searchInput.blur()
        searchInput.value = ''
        searchQuery = ''
        _libState.q = ''; _saveLibState()
        filterCards()
      }
    }
    document.addEventListener('keydown', _libKeyHandler)
    // Cleanup on nav away
    var _origDetailCleanup = window.__detailCleanup
    window.__libSearchCleanup = function() { document.removeEventListener('keydown', _libKeyHandler) }

    // Search -- debounced 60ms
    searchInput.addEventListener('input', function(e) {
      if (searchTimer) clearTimeout(searchTimer)
      searchTimer = setTimeout(function() {
        searchQuery = e.target.value
        _libState.q = searchQuery; _saveLibState()
        filterCards()
      }, 60)
    })

    // Quick-add -- parse on Enter
    qaInput.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return
      var raw = e.target.value.trim()
      if (!raw) { flashInputError(e.target); return }
      var parts = raw.split('|').map(function(s) { return s.trim() })
      var title = parts[0]
      if (!title) { flashInputError(e.target); return }
      var VALID_TYPES = ['anime','manga','manhwa','show','movie','novel']
      var type  = VALID_TYPES.includes((parts[1] || '').toLowerCase())
        ? parts[1].toLowerCase() : 'anime'
      var total = parseInt(parts[2], 10) || 0
      var newItem = buildNewItem(title, type, total)
      var lib = loadData(KEYS.library, [])
      lib.unshift(newItem)
      saveData(KEYS.library, lib)
      logEvent('Added ' + title + ' to library')
      if (typeof window.__refreshDashboard === 'function') window.__refreshDashboard()
      e.target.value = ''
      showQuickConfirmWithUndo('CONTENT CREATED: ' + title.toUpperCase(), newItem.id)
      // Inject card directly
      var grid2 = document.getElementById('lib-grid')
      if (grid2) {
        var existingEmpty = grid2.querySelector('.lib-empty-state')
        if (existingEmpty) existingEmpty.parentElement.remove()
        grid2.querySelectorAll('.library-card').forEach(function(c) { c.dataset.idx = parseInt(c.dataset.idx || 0, 10) + 1 })
        var newCard = buildLibraryCard(newItem, 0, MOOD_CHIP_COLORS)
        var noRes = grid2.querySelector('#lib-no-results')
        if (noRes && noRes.nextSibling) grid2.insertBefore(newCard, noRes.nextSibling)
        else grid2.insertBefore(newCard, grid2.firstChild)
        requestAnimationFrame(function() {
          newCard.style.transition = 'opacity 300ms var(--ease-out), transform 300ms var(--ease-out)'
          newCard.classList.add('lib-card-entered')
        })
        var badge = document.getElementById('lib-file-count')
        if (badge) badge.textContent = '[' + lib.length + ' FILES]'
        library = lib
        filterCards()
        orderLibraryCardsInGrid(grid2, normalizeLibrarySortMode(getAppSettings().librarySortMode))
      } else { renderLibrary() }
    })

    // New File button
    document.getElementById('lib-new-btn').addEventListener('click', function() {
      openAddModal(function(newItem) {
        // Inject new card at top of grid without full re-render
        var grid2 = document.getElementById('lib-grid')
        if (!grid2) { renderLibrary(); return }
        var existingEmpty = grid2.querySelector('.lib-empty-state')
        if (existingEmpty) existingEmpty.parentElement.remove()
        var lib2 = loadData(KEYS.library, [])
        var newCard = buildLibraryCard(newItem, 0, MOOD_CHIP_COLORS)
        // Update data-idx on all existing cards
        grid2.querySelectorAll('.library-card').forEach(function(c) {
          c.dataset.idx = parseInt(c.dataset.idx || 0, 10) + 1
        })
        // Insert after the noResults div
        var noRes = grid2.querySelector('#lib-no-results')
        if (noRes && noRes.nextSibling) grid2.insertBefore(newCard, noRes.nextSibling)
        else grid2.insertBefore(newCard, grid2.firstChild)
        // Animate entrance
        requestAnimationFrame(function() {
          newCard.style.transition = 'opacity 300ms var(--ease-out), transform 300ms var(--ease-out)'
          newCard.classList.add('lib-card-entered')
        })
        // Update file count badge
        var badge = document.getElementById('lib-file-count')
        if (badge) badge.textContent = '[' + lib2.length + ' FILES]'
        library = lib2
        filterCards()
        orderLibraryCardsInGrid(grid2, normalizeLibrarySortMode(getAppSettings().librarySortMode))
      })
    })
    document.getElementById('lib-settings-btn').addEventListener('click', function() {
      openAppSettingsModal(function() { renderLibrary() })
    })

    wireLibrarySortDropdown(filterCards)
    filterCards()
  }

  function wireLibrarySortDropdown(onReordered) {
    var root = document.getElementById('lib-sort-root')
    var trigger = document.getElementById('lib-sort-trigger')
    var labelEl = document.getElementById('lib-sort-trigger-label')
    var panel = document.getElementById('lib-sort-panel')
    if (!root || !trigger || !labelEl || !panel) return

    var appScroll = document.getElementById('app-main')
    var currentMode = normalizeLibrarySortMode(getAppSettings().librarySortMode)

    function syncLabel() {
      labelEl.textContent = librarySortOptionLabel(currentMode)
    }
    function setSelectedStyles() {
      panel.querySelectorAll('.lib-sort-option').forEach(function(btn) {
        var on = btn.dataset.sortValue === currentMode
        btn.classList.toggle('is-selected', on)
        btn.setAttribute('aria-selected', on ? 'true' : 'false')
      })
    }
    function positionPanel() {
      if (!panel.classList.contains('is-open')) return
      var r = root.getBoundingClientRect()
      var gap = 6
      var vw = window.innerWidth
      var w = r.width
      var left = r.left
      if (left + w > vw - 12) left = Math.max(12, vw - w - 12)
      if (left < 12) left = 12
      panel.style.left = left + 'px'
      panel.style.top = (r.bottom + gap) + 'px'
      panel.style.width = w + 'px'
    }
    function closePanel() {
      panel.classList.remove('is-open')
      root.classList.remove('is-open')
      trigger.setAttribute('aria-expanded', 'false')
      document.removeEventListener('click', docCapture, true)
      document.removeEventListener('keydown', onKey, true)
      if (appScroll) appScroll.removeEventListener('scroll', positionPanel)
      window.removeEventListener('resize', positionPanel)
    }
    function openPanel() {
      setSelectedStyles()
      syncLabel()
      panel.classList.add('is-open')
      root.classList.add('is-open')
      trigger.setAttribute('aria-expanded', 'true')
      positionPanel()
      document.removeEventListener('click', docCapture, true)
      document.removeEventListener('keydown', onKey, true)
      setTimeout(function() {
        document.addEventListener('click', docCapture, true)
        document.addEventListener('keydown', onKey, true)
      }, 0)
      if (appScroll) appScroll.addEventListener('scroll', positionPanel, { passive: true })
      window.addEventListener('resize', positionPanel)
    }
    function togglePanel() {
      if (panel.classList.contains('is-open')) closePanel()
      else openPanel()
    }
    function docCapture(e) {
      if (!panel.isConnected) {
        document.removeEventListener('click', docCapture, true)
        document.removeEventListener('keydown', onKey, true)
        return
      }
      if (root.contains(e.target) || panel.contains(e.target)) return
      closePanel()
    }
    function onKey(e) {
      if (!panel.isConnected) {
        document.removeEventListener('click', docCapture, true)
        document.removeEventListener('keydown', onKey, true)
        return
      }
      if (e.key === 'Escape') {
        closePanel()
        trigger.focus()
      }
    }
    function applyMode(v) {
      currentMode = normalizeLibrarySortMode(v)
      updateAppSetting('librarySortMode', currentMode)
      syncLabel()
      setSelectedStyles()
      orderLibraryCardsInGrid(document.getElementById('lib-grid'), currentMode)
      if (typeof onReordered === 'function') onReordered()
      closePanel()
    }

    syncLabel()
    setSelectedStyles()
    trigger.addEventListener('click', function(e) {
      e.stopPropagation()
      togglePanel()
    })
    panel.querySelectorAll('.lib-sort-option').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation()
        applyMode(btn.dataset.sortValue)
      })
    })
  }

  /* -----------------------------------------------------------------
     PART 3: BUILD SINGLE LIBRARY CARD
  ----------------------------------------------------------------- */
  function buildLibraryCard(item, idx, moodColors) {
    const card = document.createElement('div')
    card.className     = 'library-card'
    card.dataset.itemId = item.id
    card.dataset.type   = item.type
    card.dataset.title  = (item.title || '').toLowerCase()
    card.dataset.status = item.status || 'watching'
    card.dataset.idx   = idx

    const accentColor = (item.themeStyles && item.themeStyles['--accent-cool'])
      ? item.themeStyles['--accent-cool'] : 'var(--accent-cool)'
    card.style.borderLeftColor = accentColor

    // Apply per-series themed background
    const accentWarm = (item.themeStyles && item.themeStyles['--accent-warm']) ? item.themeStyles['--accent-warm'] : 'rgba(168,85,247,1)'
    const accentR = parseInt(accentColor.replace('#','').slice(0,2)||'00',16)
    const accentG = parseInt(accentColor.replace('#','').slice(2,4)||'e5',16)
    const accentB = parseInt(accentColor.replace('#','').slice(4,6)||'ff',16)
    card.style.background = 'linear-gradient(135deg, rgba('+accentR+','+accentG+','+accentB+',0.13) 0%, rgba('+accentR+','+accentG+','+accentB+',0.05) 50%, rgba(10,10,28,0.6) 100%)'
    card.style.borderColor = 'rgba('+accentR+','+accentG+','+accentB+',0.3)'
    card.style.setProperty('--card-accent', accentColor)

    const watched = item.watchedEpisodes ? item.watchedEpisodes.length : 0
    const total   = item.totalEpisodes || 0
    const pct     = total > 0 ? (watched / total) * 100 : 0
    const unit    = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'ch' : 'eps'

    // Social media: use video list instead of episode progress
    var socialVideos = item.type === 'social' ? (item.socialVideos || []) : null
    var socialWatched = socialVideos ? socialVideos.filter(function(v){return v.watched}).length : 0
    var socialTotal   = socialVideos ? socialVideos.length : 0
    var socialPct     = socialTotal > 0 ? (socialWatched / socialTotal) * 100 : 0

    const moodChipsHTML = (item.moodTags || []).map(function(tag) {
      const color = moodColors[tag] || 'var(--text-3)'
      return '<span class="lib-mood-chip" data-mood="' + tag + '" style="color:' + color + ';">' + tag + '</span>'
    }).join('')

    const statusClass = item.status || 'watching'
    var ratingHTML = ''
    if (item.ratingIMDb && item.ratingMAL) {
      ratingHTML =
        '<span class="lib-card-rating-chip chip-imdb"><span class="lib-card-rating-label">IMDb</span><span class="lib-card-rating-value">' + Number(item.ratingIMDb).toFixed(1) + '</span></span>' +
        '<span class="lib-card-rating-chip chip-mal"><span class="lib-card-rating-label">MAL</span><span class="lib-card-rating-value">' + Number(item.ratingMAL).toFixed(1) + '</span></span>'
    } else if (item.ratingIMDb) {
      ratingHTML = '<span class="lib-card-rating-chip chip-imdb"><span class="lib-card-rating-label">IMDb</span><span class="lib-card-rating-value">' + Number(item.ratingIMDb).toFixed(1) + '</span></span>'
    } else if (item.ratingMAL) {
      ratingHTML = '<span class="lib-card-rating-chip chip-mal"><span class="lib-card-rating-label">MAL</span><span class="lib-card-rating-value">' + Number(item.ratingMAL).toFixed(1) + '</span></span>'
    } else if (item.rating) {
      ratingHTML = '<span class="lib-card-rating-chip chip-single">\u2605 ' + Number(item.rating).toFixed(1) + '</span>'
    }
    // Calculate personal rating from season averages if available
    var personalRating = item.personalRating
    if (item.seasons && item.seasons.length > 0) {
      var seasonsWithPersonal = item.seasons.filter(function(s) { return s.personalRating })
      if (seasonsWithPersonal.length > 0) {
        var avgPersonal = seasonsWithPersonal.reduce(function(sum, s) { return sum + Number(s.personalRating) }, 0) / seasonsWithPersonal.length
        personalRating = avgPersonal.toFixed(1)
      }
    }
    // Add personal rating chip if it exists
    if (personalRating) {
      ratingHTML += '<span class="lib-card-rating-chip chip-personal"><span class="lib-card-rating-label">MY</span><span class="lib-card-rating-value">' + personalRating + '</span></span>'
    }
    // Schedule-aware pill: check if item is on today or tomorrow's schedule
    var _todayKey2 = localDateStr()
    var _tomorrowDate = new Date(); _tomorrowDate.setDate(_tomorrowDate.getDate()+1)
    var _tomorrowKey = localDateStr(_tomorrowDate)
    var _sched2 = loadData(KEYS.schedule, {})
    var _isToday = (_sched2[_todayKey2]||[]).some(function(e){return e.id===item.id})
    var _isTomorrow = !_isToday && (_sched2[_tomorrowKey]||[]).some(function(e){return e.id===item.id})
    var dayHTML = _isToday
      ? '<span class="lib-card-schedule-pill">TODAY</span>'
      : _isTomorrow
        ? '<span class="lib-card-schedule-pill tomorrow">TOMORROW</span>'
        : (item.scheduledDay ? '<span class="lib-card-day">\u25b8 ' + item.scheduledDay + '</span>' : '')

    card.innerHTML =
      '<div class="lib-card-header">' +
        '<span class="badge" data-type="' + item.type + '">' + item.type + '</span>' +
        (ratingHTML ? '<div class="lib-card-rating">' + ratingHTML + '</div>' : '') +
      '</div>' +
      '<div class="lib-card-title">' + item.title + '</div>' +
      '<div>' +
        '<div class="progress-bar">' +

  function buildNewItem(title, type, total, extras) {

  // Parse line format: "Season 1 | 12" (or ":" / "-") for per-season counts.
  function parseSeasonLine(rawLine) {
    var line = (rawLine || '').trim()
    if (!line) return null
    var seps = (getAppSettings().seasonLineSeparators || ['|', ':', '-'])
      .map(function(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&') })
      .join('|')
    var rx = new RegExp('^(.*?)\\s*(?:' + seps + ')\\s*(\\d+)\\s*$')
    var match = line.match(rx)
    if (match) {
      return { name: (match[1] || '').trim(), count: parseInt(match[2], 10) || 0 }
    }
    return { name: line, count: null }
  }

  // Build season objects with optional per-season counts.
  function buildSeasonPlanFromInput(seasonLines, totalCount) {
    var parsed = (seasonLines || [])
      .map(parseSeasonLine)
      .filter(function(x) { return x && x.name })
    if (!parsed.length) return { seasons: [], resolvedTotal: (parseInt(totalCount, 10) || 0) }

    var total = parseInt(totalCount, 10) || 0
    var explicitSum = parsed.reduce(function(s, p) { return s + (p.count !== null ? p.count : 0) }, 0)
    var openCount = parsed.filter(function(p) { return p.count === null }).length
    var remaining = Math.max(0, total - explicitSum)

    // If total is unknown but user provided per-season counts, use their sum.
    var resolvedTotal = total > 0 ? total : explicitSum

    var base = openCount > 0 ? Math.floor(remaining / openCount) : 0
    var rem = openCount > 0 ? (remaining % openCount) : 0
    var epNumber = 1
    var seasons = parsed.map(function(p) {
      var seasonCount = p.count
      if (seasonCount === null) {
        seasonCount = (total > 0) ? (base + (rem > 0 ? 1 : 0)) : 0
        if (rem > 0) rem--
      }
      var episodes = []
      for (var i = 0; i < seasonCount; i++) {
        episodes.push({ number: epNumber, title: '' })
        epNumber++
      }
      return { name: p.name, episodes: episodes }
    })

    return { seasons: seasons, resolvedTotal: resolvedTotal }
  }

    box.querySelector('#modal-submit-btn').addEventListener('click', function() {

      var recEpStart = parseInt(box.querySelector('#modal-rec-ep-start').value, 10) || 1

      // Build themeStyles from selected colour
      var themeStyles = {}
      var themeClass  = ''
      if (selectedThemeHex) {
        var rgb = hexToRgb(selectedThemeHex)
        // Derive a warm complement (rotate hue ~160°) for --accent-warm
        var r = parseInt(selectedThemeHex.slice(1,3),16)
        var g = parseInt(selectedThemeHex.slice(3,5),16)
        var b = parseInt(selectedThemeHex.slice(5,7),16)
        // Simple warm: swap dominant channel to create contrast
        var wR = Math.min(255, b + 80), wG = Math.max(0, r - 40), wB = Math.max(0, g - 80)
        var warmHex = '#' + [wR,wG,wB].map(function(v){ return ('0'+Math.round(v).toString(16)).slice(-2) }).join('')
        themeStyles = {
          '--accent-cool':     selectedThemeHex,
          '--accent-warm':     warmHex,
          '--accent-cool-dim': 'rgba(' + rgb + ',0.18)',
          '--tc-rgb':          rgb,
          '--surface':         'rgba(' + rgb + ',0.05)',
          '--surface-2':       'rgba(' + rgb + ',0.09)',
          '--surface-3':       'rgba(' + rgb + ',0.14)',
          '--border':          'rgba(' + rgb + ',0.16)',
          '--border-bright':   'rgba(' + rgb + ',0.35)',
          '--border-glow':     'rgba(' + rgb + ',0.52)'
        }
        themeClass = 'theme-custom'
      }

      var newItem = buildNewItem(title, type, finalTotal, {
        moodTags:    selectedMoods.slice(),
        rating:      0,
        ratingIMDb:  ratingIMDb > 0 ? Math.min(10, Math.max(0, ratingIMDb)) : undefined,
        ratingMAL:   ratingMAL  > 0 ? Math.min(10, Math.max(0, ratingMAL))  : undefined,
        seasons:     seasonsData,
        themeClass:  themeClass,
        themeStyles: themeStyles
      })
      newItem.status = status || 'watching'
      const lib = loadData(KEYS.library, [])
      lib.unshift(newItem)
      saveData(KEYS.library, lib)
      if (releaseDate) {
        var sched = loadData(KEYS.schedule, {})
        if (!sched[releaseDate]) sched[releaseDate] = []
        var existingIdx = sched[releaseDate].findIndex(function(x) { return x.id === newItem.id })
        var schedEntry = { id: newItem.id, title: newItem.title, type: newItem.type, eps: 'Releases' }
        if (existingIdx >= 0) sched[releaseDate][existingIdx] = schedEntry
        else sched[releaseDate].push(schedEntry)
        saveData(KEYS.schedule, sched)
        logEvent('Scheduled release of ' + title + ' on ' + releaseDate)
      }
      if (recDay && recStart && recEnd) {
        var isReadingType = (newItem.type === 'manga' || newItem.type === 'manhwa' || newItem.type === 'novel')
        var recDates = getWeeklyDates(recDay, recStart, recEnd)
        if (recDates.length > 0) {
          var sched2 = loadData(KEYS.schedule, {})
          recDates.forEach(function(dk, idx) {
            if (!sched2[dk]) sched2[dk] = []
            var epLabel = isReadingType ? ('Ch. ' + (recEpStart + idx)) : ('Ep. ' + (recEpStart + idx))
            var recIdx = sched2[dk].findIndex(function(x) { return x.id === newItem.id && x.eps === epLabel })
            if (recIdx === -1) sched2[dk].push({ id: newItem.id, title: newItem.title, type: newItem.type, eps: epLabel })
          })
          saveData(KEYS.schedule, sched2)
          logEvent('Auto-scheduled ' + recDates.length + ' weekly entries for ' + newItem.title + ' every ' + recDay)
        }
      }
      logEvent('Added ' + title + ' to library')
      if (typeof window.__refreshDashboard === 'function') window.__refreshDashboard()
      closeModal()
      if (onSuccess) onSuccess(newItem)
      setTimeout(function() { showQuickConfirmWithUndo('CONTENT CREATED: ' + title.toUpperCase(), newItem.id) }, 100)
    })

  /* -----------------------------------------------------------------
     PART 3.5: SOCIAL MEDIA DETAIL VIEW -- renderSocialDetail(id)
     Custom detail for YouTube / social media channels.
     Videos are stored in item.socialVideos = [{id, title, watched, addedDate}]
  ----------------------------------------------------------------- */
  function renderSocialDetail(id) {
    var main    = document.getElementById('app-main')
    var library = loadData(KEYS.library, [])
    var item    = library.find(function(i) { return i.id === id })
    if (!item) {
      main.innerHTML = '<div class="detail-error"><div class="detail-error-title">FILE NOT FOUND</div><button class="btn-ghost" onclick="navigateTo(\'library\')">Back to Library</button></div>'
      return
    }

    // Theme
    var _cssOriginals = {}
    if (item.themeStyles && Object.keys(item.themeStyles).length > 0) {
      Object.keys(item.themeStyles).forEach(function(key) {
        _cssOriginals[key] = document.documentElement.style.getPropertyValue(key)
        document.documentElement.style.setProperty(key, item.themeStyles[key])
      })
    }
    var _themeClass = item.themeClass || null
    if (_themeClass) {
      var _stale = document.body.className.split(' ').filter(function(c) { return c.startsWith('theme-') })
      _stale.forEach(function(c) { document.body.classList.remove(c) })
      document.body.classList.add(_themeClass)
    }

    // Timer state
    var timerInterval = null
    var timerStart    = null
    function getElapsedStr(start) {
      var e = Math.floor((Date.now() - start) / 1000)
      var h = Math.floor(e / 3600), m = Math.floor((e % 3600) / 60), s = e % 60
      return (h > 0 ? String(h).padStart(2,'0') + ':' : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
    }
    function startSocialTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null }
      timerStart = Date.now()
      
      // Update activity timestamp when session starts
      var lib = loadData(KEYS.library, [])
      var it = lib.find(function(i) { return i.id === id })
      if (it) {
        touchLibraryItemActivity(it)
        saveData(KEYS.library, lib)
        // Re-order library grid if using activity sort
        var libGrid = document.getElementById('lib-grid')
        if (libGrid) {
          var currentSortMode = normalizeLibrarySortMode(getAppSettings().librarySortMode)
          if (currentSortMode === 'activity') {
            orderLibraryCardsInGrid(libGrid, currentSortMode)
          }
        }
      }
      
      var dispEl = document.getElementById('social-timer-display')
      var btn    = document.getElementById('social-timer-btn')
      if (dispEl) dispEl.style.display = 'block'
      if (btn)   { btn.textContent = '\u25a0 END SESSION'; btn.className = 'btn-danger'; btn.style.cssText = 'font-size:11px;padding:7px 16px;letter-spacing:0.08em;width:100%;' }
      var accentCol = (item.themeStyles && item.themeStyles['--accent-cool']) ? item.themeStyles['--accent-cool'] : 'var(--accent-cool)'
      var overlay = document.getElementById('session-overlay')
      if (overlay) {
        var overlaySeries = document.getElementById('session-overlay-series')
        if (overlaySeries) { overlaySeries.textContent = item.title; overlaySeries.style.color = accentCol; overlaySeries.style.textShadow = '0 0 30px ' + accentCol + ', 0 0 60px ' + accentCol }
        var subEl = overlay.querySelector('.session-overlay-sub')
        if (subEl) subEl.textContent = 'Initiating scroll protocol'
        var ringArc = document.getElementById('session-ring-arc')
        if (ringArc) { ringArc.style.stroke = accentCol; ringArc.style.filter = 'drop-shadow(0 0 10px ' + accentCol + ')' }
        overlay.classList.add('active')
        var stopBtn = document.getElementById('session-overlay-stop-btn')
        if (stopBtn) stopBtn.onclick = function() { stopSocialTimer(); overlay.classList.remove('active') }
      }
      timerInterval = setInterval(function() {
        var el = getElapsedStr(timerStart)
        var dispEl2 = document.getElementById('social-timer-display')
        if (dispEl2) dispEl2.textContent = el
        var ot = document.getElementById('session-overlay-time')
        if (ot) ot.textContent = el
      }, 1000)
    }
    function stopSocialTimer() {
      if (!timerInterval) return
      clearInterval(timerInterval); timerInterval = null
      var elapsed = (Date.now() - timerStart) / 60000; timerStart = null
      var lib2 = loadData(KEYS.library, [])
      var it2  = lib2.find(function(i) { return i.id === id })
      if (it2) { it2.timerMinutes = (it2.timerMinutes || 0) + elapsed; saveData(KEYS.library, lib2) }
      addTimerMinutes(elapsed)
      logEvent('Timed ' + Math.round(elapsed) + ' min on ' + item.title)
      var dispEl = document.getElementById('social-timer-display')
      var btn    = document.getElementById('social-timer-btn')
      if (dispEl) { dispEl.textContent = ''; dispEl.style.display = 'none' }
      if (btn)   { btn.textContent = '\u25b6 START SESSION'; btn.className = 'btn-primary'; btn.style.cssText = 'font-size:11px;padding:7px 16px;letter-spacing:0.08em;width:100%;' }
      var tl = document.getElementById('social-total-time')
      if (tl && it2) { tl.textContent = '\u23f1 ' + (fmtMins(it2.timerMinutes) || '0m') + ' total'; tl.style.display = '' }
      if (typeof window.__refreshDashboard === 'function') window.__refreshDashboard()
      var overlay = document.getElementById('session-overlay')
      if (overlay) overlay.classList.remove('active')
    }

    window.__detailCleanup = function() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; if (timerStart) { var _e = (Date.now()-timerStart)/60000; timerStart=null; var _l=loadData(KEYS.library,[]); var _it=_l.find(function(i){return i.id===id}); if(_it){_it.timerMinutes=(_it.timerMinutes||0)+_e;saveData(KEYS.library,_l)} addTimerMinutes(_e); logEvent('Session ended (navigated away) — '+Math.round(_e)+' min on '+item.title) } }

  /* -----------------------------------------------------------------
     PART 4: DETAIL VIEW -- renderDetail(id)
     Full-page transformation. The app becomes the content.
  ----------------------------------------------------------------- */
  function renderDetail(id) {
    const main    = document.getElementById('app-main')
    const library = loadData(KEYS.library, [])
    const item    = library.find(function(i) { return i.id === id })
    // Route social media items to their own detail view
    if (item && item.type === 'social') { renderSocialDetail(id); return }

    // -- File not found --
    if (!item) {
      main.innerHTML =
        '<div class="detail-error">' +
          '<div class="detail-error-title">FILE NOT FOUND</div>' +
          '<button class="btn-ghost" onclick="navigateTo(\'library\')">Back to Library</button>' +
        '</div>'
      return
    }

    // -- MIGRATE: Renumber episodes per season (one-time migration) --
    if (item.seasons && item.seasons.length > 0 && !item._episodesRenumbered) {
      var needsMigration = false
      // Check if episodes are numbered continuously across seasons
      var lastNum = 0
      item.seasons.forEach(function(s) {
        if (s.episodes && s.episodes.length > 0) {
          if (s.episodes[0].number > 1 && s.episodes[0].number === lastNum + 1) {
            needsMigration = true
          }
          lastNum = s.episodes[s.episodes.length - 1].number
        }
      })
      
      if (needsMigration) {
        // Renumber episodes: each season starts from 1
        item.seasons.forEach(function(season) {
          if (season.episodes) {
            season.episodes.forEach(function(ep, idx) {
              ep.number = idx + 1
            })
          }
        })
        item._episodesRenumbered = true
        // Save back to library
        var lib = loadData(KEYS.library, [])
        var it = lib.find(function(i) { return i.id === id })
        if (it) {
          it.seasons = item.seasons
          it._episodesRenumbered = true
          saveData(KEYS.library, lib)
        }
      }
    }

    // -- THEME TRANSFORMATION --
    // 1. Apply CSS variable overrides (accent colours etc.)
    var _cssOriginals = {}
    if (item.themeStyles && Object.keys(item.themeStyles).length > 0) {
      Object.keys(item.themeStyles).forEach(function(key) {
        _cssOriginals[key] = document.documentElement.style.getPropertyValue(key)
        document.documentElement.style.setProperty(key, item.themeStyles[key])
      })
    }
    // 2. Apply immersive body-class atmosphere (background, glows, hex, tiles…)
    var _themeClass = item.themeClass || null
    if (_themeClass) {
