   * HOW arcs[] WORKS:
   *   Used for manga/manhwa without season structure.
   *   Each arc: { id, name, chapterStart, chapterEnd }
   *   Detail view renders arc accordion instead of season tabs.
   *   Chapter tiles work identically to episode tiles.
   *   watchedEpisodes[] stores chapter numbers (same array, different semantics).
   *
   * DESIGN RULES (never violate these):
   *   -- Nothing decorative without being functional
   *   -- All spacing: var(--space-*) multiples of 4px
   *   -- All font sizes: var(--text-*) scale only
   *   -- All easing: var(--ease-*) -- never linear, never default
   *   -- All new components: built from existing base classes
   *   -- Performance: DocumentFragment for bulk DOM, rAF for animations

      tip.className   = 'bn-tip'
      tip.textContent = item.label

      // Persistent active label
      const activeLabel = document.createElement('div')
      activeLabel.className   = 'bn-active-label'
      activeLabel.textContent = item.label

      // Clone svg and resize to 15px
      const wrap = document.createElement('div')
      wrap.innerHTML = item.icon
      const svg = wrap.firstElementChild
      if (svg) { svg.setAttribute('width','15'); svg.setAttribute('height','15'); }

      // Icon wrap — contains ripple so it stays clipped inside the button
      const iconWrap = document.createElement('div')
      iconWrap.className = 'bn-icon-wrap'
      if (svg) iconWrap.appendChild(svg)

      el.appendChild(tip)
      el.appendChild(activeLabel)
      el.appendChild(iconWrap)

        rip.className = 'bn-ripple'
        iconWrap.appendChild(rip)

  ───────────────────────────────────────────────────────────────── */
  const BOOT_SCRIPT = [
    { text: '> INITIALIZING PROCRASTINATION HUB...',          suffix: '',           cls: '',           delay: 450 },
    { text: '> LOADING CONTENT MATRIX..............',          suffix: '  OK',       cls: 'boot-ok',    delay: 350 },

  const sleep = ms => new Promise(r => setTimeout(r, ms))

  async function typeLine(lineEl, text) {
    const cursor = document.createElement('span')
    cursor.className = 'boot-cursor'
    lineEl.appendChild(cursor)

    for (let i = 0; i < text.length; i++) {
      lineEl.insertBefore(document.createTextNode(text[i]), cursor)
      await sleep(8 + Math.random() * 14)
    }

    return cursor
  }

  async function runBootSequence() {
    const screen    = document.getElementById('boot-screen')
    const container = document.getElementById('boot-lines')

    for (const step of BOOT_SCRIPT) {
      const lineEl = document.createElement('div')
      lineEl.className = 'boot-line'

      const cursor = await typeLine(lineEl, step.text)

      if (step.suffix) {

        sfx.className   = step.cls
        sfx.textContent = step.suffix
        lineEl.insertBefore(sfx, cursor)

  /* ── 1. CUSTOM CURSOR ── */
  function initCursor() {
    const dot  = document.getElementById('cursor-dot')
    const ring = document.getElementById('cursor-ring')

    // Skip custom cursor on touch/pointer-coarse devices
    if (window.matchMedia('(hover: none), (pointer: coarse)').matches) {
      if (dot)  dot.style.display  = 'none'
      if (ring) ring.style.display = 'none'
      return
    }

    // Change 32: only hide cursor after confirming elements are in DOM
    if (dot && ring) {
      document.body.style.cursor = 'none'
    }

    // CSS vars drive the transform — JS only sets the vars
    // dot uses --cx/--cy, ring uses --rx/--ry
    // Both start off-screen; CSS default -300px handles that
    let mouseX = -300, mouseY = -300
    let ringX  = -300, ringY  = -300

    // Dot: instant — update CSS var on every mousemove
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX
      mouseY = e.clientY
      dot.style.setProperty('--cx', mouseX + 'px')
      dot.style.setProperty('--cy', mouseY + 'px')
    })

    // Ring: lerp trail — 0.55 = tight follow with subtle trail, matches native cursor speed better
    const LERP = 0.55
    ;(function animateRing() {
      ringX += (mouseX - ringX) * LERP
      ringY += (mouseY - ringY) * LERP
      ring.style.setProperty('--rx', (ringX | 0) + 'px')
      ring.style.setProperty('--ry', (ringY | 0) + 'px')
      requestAnimationFrame(animateRing)
    })()

    // Hover state — CSS handles the scale transition
    const INTERACTIVE_SEL = 'a, button, [role=button], .card, .bn-item, input, select, textarea, label, .btn-primary, .btn-ghost, .btn-danger, .library-card, .ep-tile, .mood-pill, .mq-mood-card, .dash-nav-card, .task-card, .graveyard-card, .manifest-row, .lib-filter-pill, .overview-pill, .detail-day-btn, .detail-season-tab, .detail-arc-header'
    document.addEventListener('mouseover', e => {
      if (e.target.closest(INTERACTIVE_SEL)) ring.classList.add('hovering')
    })
    document.addEventListener('mouseout', e => {
      if (e.target.closest(INTERACTIVE_SEL)) ring.classList.remove('hovering')
    })

    // ── GLITTER SPARKLE PARTICLES ──
    // Spawn tiny glowing particles that drift away from the cursor path
    let lastSparkX = 0, lastSparkY = 0
    const SPARK_DIST = 24 // min px between spawns
    document.addEventListener('mousemove', e => {
      const dx = e.clientX - lastSparkX
      const dy = e.clientY - lastSparkY
      if (dx*dx + dy*dy < SPARK_DIST*SPARK_DIST) return
      lastSparkX = e.clientX
      lastSparkY = e.clientY

      const spark = document.createElement('div')
      spark.style.cssText = `
        position:fixed; pointer-events:none; z-index:20000;
        width:2px; height:2px; border-radius:50%;
        left:${e.clientX}px; top:${e.clientY}px;
        background:${Math.random()>0.5 ? 'var(--accent-cool)' : 'var(--accent-violet)'};
        box-shadow: 0 0 4px ${Math.random()>0.5 ? 'rgba(0,229,255,0.6)' : 'rgba(168,85,247,0.6)'};
        opacity:0.7;
        will-change:transform,opacity;
        transition: transform 600ms var(--ease-out), opacity 600ms var(--ease-out);
      `
      document.body.appendChild(spark)
      const angle = Math.random() * Math.PI * 2
      const dist = 15 + Math.random() * 25
      requestAnimationFrame(() => {
        spark.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`
        spark.style.opacity = '0'
      })
      setTimeout(() => spark.remove(), 650)
    }, { passive: true })
  }

  /* ── 2. HEX-GRID BACKGROUND ── */
  function initHexGrid() {
    const svg = document.getElementById('hex-grid')
    const VW  = window.innerWidth
    const VH  = window.innerHeight

    // Flat-top hexagon, circumradius R → visual diameter ~44px
    const R       = 22
    const hexH    = Math.sqrt(3) * R  // flat-to-flat height ≈ 38.1px
    const colStep = R * 1.5           // horizontal center-to-center ≈ 33px
    const rowStep = hexH              // vertical center-to-center ≈ 38.1px

    // Build point string for a flat-top hex centered at (cx, cy)
    function hexPoints(cx, cy) {
      const pts = []
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i  // 0°, 60°, 120°, 180°, 240°, 300°
        pts.push(`${(cx + R * Math.cos(a)).toFixed(1)},${(cy + R * Math.sin(a)).toFixed(1)}`)
      }
      return pts.join(' ')
    }

    const hexData  = []
    const fragment = document.createDocumentFragment()

    // Generate enough columns and rows to cover viewport + one hex margin
    const cols = Math.ceil(VW / colStep) + 3
    const rows = Math.ceil(VH / rowStep) + 3

    for (let c = 0; c < cols; c++) {
      const cx     = c * colStep
      // Odd columns are offset by half a row vertically — standard hex tiling
      const offset = (c % 2 === 1) ? rowStep * 0.5 : 0

      for (let r = 0; r < rows; r++) {
        const cy   = r * rowStep + offset - rowStep  // start one row above viewport
        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon')
        poly.setAttribute('points',       hexPoints(cx, cy))
        poly.setAttribute('fill',         'none')
        poly.setAttribute('stroke',       '#00d4ff')
        poly.setAttribute('stroke-width', '0.8')
        poly.style.strokeOpacity = '0.09'
        poly.style.transition    = 'stroke-opacity 400ms var(--ease-out)'
        hexData.push({ el: poly, cx, cy })
        fragment.appendChild(poly)
      }
    }

    svg.appendChild(fragment)
    // Static hex grid — mousemove handler removed for performance
  }

  /* ── PART 6: 03. WEB AUDIO ENGINE — CINEMATIC REDESIGN ── */
  /*
   * Design philosophy: every sound is dry, low, and textural.
   * No bright ascending melodies. No cartoon beeps.
   * Inspired by: Blade Runner 2049, Control, Cyberpunk 2077 UI, Alien Isolation terminals.
   *
   * Signal chain: all voices → p6MasterOut (gain) → compressor → destination
   * The compressor glues everything together and prevents harshness.
   */
  let p6AudioCtx  = null
  let p6MasterOut = null   // all sounds plug into this
  let p6Muted     = true

  function p6GetCtx() {
    if (!p6AudioCtx) {
      try {
        p6AudioCtx = new (window.AudioContext || window.webkitAudioContext)()

        // Master compressor — gives everything a pro, cohesive loudness
        const comp = p6AudioCtx.createDynamicsCompressor()
        comp.threshold.value = -16
        comp.knee.value      = 8
        comp.ratio.value     = 5
        comp.attack.value    = 0.002
        comp.release.value   = 0.12
        comp.connect(p6AudioCtx.destination)

        // Master volume
        p6MasterOut = p6AudioCtx.createGain()
        p6MasterOut.gain.value = 0.72
        p6MasterOut.connect(comp)
      } catch(e) {}
    }
    if (p6AudioCtx && p6AudioCtx.state === 'suspended') p6AudioCtx.resume()
    return p6AudioCtx
  }

  // Connect any node to master out
  function p6Out() { p6GetCtx(); return p6MasterOut }

  /*
   * Primitive: oscillator with exponential frequency sweep + exp decay envelope.
   * Much more organic than linear ramps.
   */
  function p6Tone(freq, freqEnd, durMs, gain, type = 'sine', delayMs = 0) {
    if (p6Muted) return
    const ctx = p6GetCtx(); const out = p6Out()
    if (!ctx || !out) return
    try {
      const t0  = ctx.currentTime + delayMs / 1000
      const dur = durMs / 1000
      const osc = ctx.createOscillator()
      const g   = ctx.createGain()
      osc.type = type
      osc.frequency.setValueAtTime(freq, t0)
      if (freqEnd && freqEnd !== freq)
        osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), t0 + dur * 0.9)
      // Envelope: near-instant attack, exponential decay to silence
      g.gain.setValueAtTime(0.0001, t0)
      g.gain.linearRampToValueAtTime(gain, t0 + 0.003)
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur)
      osc.connect(g); g.connect(out)
      osc.start(t0); osc.stop(t0 + dur + 0.005)
    } catch(e) {}
  }

  /*
   * Primitive: filtered white noise burst.
   * filterType: 'bandpass' | 'highpass' | 'lowpass'
   */
  function p6Noise(durMs, gain, filterType = 'bandpass', filterFreq = 1200, filterQ = 1.2, delayMs = 0) {
    if (p6Muted) return
    const ctx = p6GetCtx(); const out = p6Out()
    if (!ctx || !out) return
    try {
      const t0        = ctx.currentTime + delayMs / 1000
      const dur       = durMs / 1000
      const bufLen    = Math.ceil(ctx.sampleRate * dur)
      const buf       = ctx.createBuffer(1, bufLen, ctx.sampleRate)
      const data      = buf.getChannelData(0)
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1
      const src       = ctx.createBufferSource()
      src.buffer      = buf
      const flt       = ctx.createBiquadFilter()
      flt.type        = filterType
      flt.frequency.value = filterFreq
      flt.Q.value     = filterQ
      const g         = ctx.createGain()
      g.gain.setValueAtTime(0.0001, t0)
      g.gain.linearRampToValueAtTime(gain, t0 + 0.002)
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur)
      src.connect(flt); flt.connect(g); g.connect(out)
      src.start(t0)
    } catch(e) {}
  }

  /* ── PART 6: 01. CURSOR TRAIL ── */
  function p6InitCursorTrail() {
    const TRAIL_COUNT = 8
    const trails = []

    for (let i = 0; i < TRAIL_COUNT; i++) {
      const div = document.createElement('div')
      div.className = 'cursor-trail-dot'
      const size = 3 - (i * 0.26)
      div.style.width  = Math.max(size, 0.8) + 'px'
      div.style.height = Math.max(size, 0.8) + 'px'
      div.style.opacity = (0.4 - i * 0.04).toFixed(2)
      div.style.transform = 'translate(-300px, -300px)'
      div.style.willChange = 'transform'
      document.body.appendChild(div)
      trails.push({ el: div, x: -300, y: -300 })
    }

    let mouseX = -300, mouseY = -300
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY }, { passive: true })

    // Hover color shift — kept because it looked cool
    const INTERACTIVE_SEL = 'a,button,[role=button],.card,.bn-item,input,select,textarea,label,.btn-primary,.btn-ghost,.btn-danger,.library-card,.ep-tile,.mood-pill,.mq-mood-card,.dash-nav-card,.task-card,.graveyard-card,.manifest-row,.lib-filter-pill,.overview-pill,.detail-day-btn,.detail-season-tab,.detail-arc-header'
    let warmTimeout = null
    document.addEventListener('mouseover', e => {
      if (e.target.closest(INTERACTIVE_SEL)) {
        if (warmTimeout) { clearTimeout(warmTimeout); warmTimeout = null }
        trails.forEach(t => t.el.classList.add('warm'))
      }
    })
    document.addEventListener('mouseout', e => {
      if (e.target.closest(INTERACTIVE_SEL)) {
        warmTimeout = setTimeout(() => trails.forEach(t => t.el.classList.remove('warm')), 400)
      }
    })

    ;(function trailLoop() {
      let prevX = mouseX, prevY = mouseY
      for (let i = 0; i < TRAIL_COUNT; i++) {
        const t = trails[i]
        const lerpFactor = 0.45 - i * 0.03
        t.x += (prevX - t.x) * lerpFactor
        t.y += (prevY - t.y) * lerpFactor
        t.el.style.transform = `translate(${(t.x - 1) | 0}px, ${(t.y - 1) | 0}px)`
        prevX = t.x
        prevY = t.y
      }
      requestAnimationFrame(trailLoop)
    })()
  }

  /* ── PART 6: 02. SECTION HEADER GLITCH ── */
  function p6InitGlitch() {
    function scheduleGlitch(el) {
      const delay = 8000 + Math.random() * 12000
      setTimeout(() => {
        if (!document.body.contains(el)) return
        el.classList.remove('glitching')
        void el.offsetWidth // force reflow to restart animation
        el.classList.add('glitching')
        el.addEventListener('animationend', () => {
          el.classList.remove('glitching')
          scheduleGlitch(el)
        }, { once: true })
      }, delay)
    }

    // Observe DOM for section-header elements and schedule glitch
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.section-header:not([data-glitch-init])').forEach(el => {
        el.setAttribute('data-glitch-init', '1')
        el.setAttribute('data-text', el.textContent)
        scheduleGlitch(el)
      })
    })
    observer.observe(document.body, { childList: true, subtree: true })
  }

  /* ── PART 6: 04. STAT CARD NUMBER SCRAMBLE ── */
  function p6ScrambleThenCount(el, target, scrambleDuration=300, countDuration=900) {
    if (!el) return
    const startTs = performance.now()
    const scrambleEnd = startTs + scrambleDuration
    const totalEnd    = startTs + scrambleDuration + countDuration

    function easeOut(t) { return 1 - Math.pow(1 - t, 3) }

    ;(function frame(now) {
      if (now < scrambleEnd) {
        // Phase 1: scramble
        el.textContent = Math.floor(Math.random() * 99)
        el.style.color = 'var(--text-3)'
        requestAnimationFrame(frame)
      } else if (now < totalEnd) {
        // Phase 2: count up with color transition
        const progress = (now - scrambleEnd) / countDuration
        const easedP   = easeOut(Math.min(progress, 1))
        el.textContent = Math.round(target * easedP)
        // Interpolate color: text-3 → accent-cool via opacity trick
        const t = easedP
        el.style.color = `rgba(${Math.round(68 + t*(0-68))}, ${Math.round(68 + t*(212-68))}, ${Math.round(90 + t*(255-90))}, 1)`
        requestAnimationFrame(frame)
      } else {
        el.textContent = target
        el.style.color = 'var(--accent-cool)'
      }
    })(startTs)
  }

  /* ── PART 6: 05. HOLOGRAPHIC SHEEN ON ALL CARDS ── */
  function p6InitHoloSheen() {
    var SHEEN_SELECTORS = '.library-card, .dash-nav-card, .mq-mood-card, .task-card, .ep-tile, .graveyard-card, .stat-card, .bn-item'
    // Use event delegation on document body — app-main is dynamically cleared/refilled
    document.addEventListener('mousemove', e => {
      const card = e.target.closest(SHEEN_SELECTORS)
      if (!card) return
      const rect  = card.getBoundingClientRect()
      const xPct  = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%'
      const yPct  = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%'
      card.style.setProperty('--mouse-x', xPct)
      card.style.setProperty('--mouse-y', yPct)
    }, { passive: true })
  }

  /* ── PART 6: 06. SECTION TRANSITIONS ── */
  // Patch navigateTo to add slide transitions
  let _p6NavInProgress = false
  const _p6OrigNavigateTo = navigateTo
  navigateTo = function(section, detailId = null, skipPush = false) {
    const main = document.getElementById('app-main')
    if (!main) {
      _p6OrigNavigateTo(section, detailId, skipPush)
      return
    }
    // If already animating, cancel and go immediately (prevents stuck state)
    if (_p6NavInProgress) {
      _p6NavInProgress = false
      main.style.transition = ''
      main.style.opacity    = ''
      main.style.transform  = ''
    }
    if (!main.firstChild) {
      _p6OrigNavigateTo(section, detailId, skipPush)
      return
    }
    _p6NavInProgress = true
    // Exit animation on main
    main.style.transition = 'opacity 120ms var(--ease-in), transform 120ms var(--ease-in)'
    main.style.opacity    = '0'
    main.style.transform  = 'translateX(-12px)'
    setTimeout(() => {
      main.style.transition = ''
      main.style.opacity    = ''
      main.style.transform  = ''
      _p6OrigNavigateTo(section, detailId, skipPush)
      // Entry animation directly on main — no wrapper div (preserves sticky context)
      main.style.opacity   = '0'
      main.style.transform = 'translateX(12px)'
      requestAnimationFrame(() => {
        main.style.transition = 'opacity 200ms var(--ease-out), transform 200ms var(--ease-out)'
        main.style.opacity    = '1'
        main.style.transform  = 'translateX(0)'
        setTimeout(() => {
          main.style.transition = ''
          main.style.opacity    = ''
          main.style.transform  = ''
          _p6NavInProgress = false
        }, 220)
      })
    }, 120)
  }

  /* ── PART 6: 08. SESSION LOG TYPING EFFECT ── */
  const p6SessionStart = (() => {
    let t = sessionStorage.getItem('phub_session_start')
    if (!t) {
      t = new Date().toISOString()
      sessionStorage.setItem('phub_session_start', t)
    }
    return new Date(t).getTime()
  })()

  function p6IsLiveEvent(timestampISO) {
    return new Date(timestampISO).getTime() >= p6SessionStart
  }

  async function p6TypeLogRow(row, timeStr, text, color) {
    row.innerHTML = ''
    const timeEl = document.createElement('span')
    timeEl.className = 'log-time'
    const textEl = document.createElement('span')
    textEl.className = 'log-text'
    if (color) textEl.style.color = color
    const cursor = document.createElement('span')
    cursor.className = 'log-typing-cursor'
    row.appendChild(timeEl)
    row.appendChild(textEl)
    row.appendChild(cursor)

    // Type timestamp first
    for (let i = 0; i < timeStr.length; i++) {
      timeEl.textContent = timeStr.slice(0, i+1)
      await new Promise(r => setTimeout(r, 12))
    }
    // Then type event text
    const fullText = text
    for (let i = 0; i < fullText.length; i++) {
      textEl.textContent = fullText.slice(0, i+1)
      await new Promise(r => setTimeout(r, 12))
    }
    cursor.remove()
    // Fade color to normal
    textEl.style.color = 'var(--accent-cool)'
    setTimeout(() => {
      textEl.style.transition = 'color 500ms var(--ease-out)'
      textEl.style.color = color || 'var(--text-2)'
    }, 50)
  }

  /* ── PART 6: 09. GRAVEYARD CORRUPTION ── */
  const CORRUPT_CHARS = ['░','▒','▓','█','◆','×']
  const p6CorruptIntervals = new Map()

  function p6ApplyCorruption(el) {
    const titleEl = el.querySelector('.graveyard-title')
    if (!titleEl || titleEl.dataset.corrupted) return
    titleEl.dataset.corrupted = '1'

    const text = titleEl.textContent
    if (text.length < 3) return

    // Pick 1–2 random positions
    const numCorrupt = Math.random() < 0.6 ? 1 : 2
    const positions  = []
    while (positions.length < numCorrupt) {
      const pos = Math.floor(Math.random() * text.length)
      if (!positions.includes(pos)) positions.push(pos)
    }

    // Build new innerHTML with corrupt spans
    let html = ''
    for (let i = 0; i < text.length; i++) {
      if (positions.includes(i)) {
        html += `<span class="corrupt-char" data-orig="${text[i]}">${CORRUPT_CHARS[0]}</span>`
      } else {
        html += text[i].replace(/&/g,'&amp;').replace(/</g,'&lt;')
      }
    }
    titleEl.innerHTML = html

    // Cycle corrupt chars at ~2fps
    const spans = titleEl.querySelectorAll('.corrupt-char')
    const interval = setInterval(() => {
      if (!document.body.contains(titleEl)) { clearInterval(interval); return }
      spans.forEach(span => {
        span.textContent = CORRUPT_CHARS[Math.floor(Math.random() * CORRUPT_CHARS.length)]
      })
    }, 500)
    p6CorruptIntervals.set(titleEl, interval)

    // On card hover: pause corruption
    el.addEventListener('mouseenter', () => {
      spans.forEach(span => { span.textContent = span.dataset.orig })
      clearInterval(p6CorruptIntervals.get(titleEl))
    })
    el.addEventListener('mouseleave', () => {
      const newInterval = setInterval(() => {
        if (!document.body.contains(titleEl)) { clearInterval(newInterval); return }
        spans.forEach(span => {
          span.textContent = CORRUPT_CHARS[Math.floor(Math.random() * CORRUPT_CHARS.length)]
        })
      }, 500)
      p6CorruptIntervals.set(titleEl, newInterval)
    })
  }

  /* ── PART 6: 10. KONAMI CODE EASTER EGG ── */
  function p6InitKonami() {
    const SEQUENCE = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a']
    let pos = 0

    document.addEventListener('keydown', e => {
      if (e.key === SEQUENCE[pos]) {
        pos++
        if (pos === SEQUENCE.length) {
          pos = 0
          p6TriggerKonami()
        }
      } else {
        pos = e.key === SEQUENCE[0] ? 1 : 0
      }

  async function p6TriggerKonami() {
    logEvent('Konami code activated. You know what you\'re doing.')

    // Scanline surge
    const scanlines = document.getElementById('scanlines')
    if (scanlines) {
      scanlines.style.transition = 'opacity 200ms cubic-bezier(0.23,1,0.32,1)'
      scanlines.style.opacity = '0.3'
      setTimeout(() => { scanlines.style.opacity = '' }, 300)
    }

    // Create overlay
    const overlay = document.createElement('div')
    overlay.id = 'konami-overlay'
    document.body.appendChild(overlay)

    const linesContainer = document.createElement('div')
    overlay.appendChild(linesContainer)

    const SCRIPT = [
      '> UNAUTHORIZED ACCESS DETECTED',
      '> TRACING SOURCE...',
      '> ...',
      '> ...just kidding.',
      '> you found it.',
      '> shame sensors: still bypassed.',
      '> carry on.',
      '>',
    ]

    const sleep = ms => new Promise(r => setTimeout(r, ms))

    async function konamiTypeLine(text) {
      const lineEl = document.createElement('div')
      lineEl.className = 'konami-line'
      const cursor = document.createElement('span')
      cursor.className = 'konami-blink'
      lineEl.appendChild(cursor)
      linesContainer.appendChild(lineEl)

      for (let i = 0; i < text.length; i++) {
        lineEl.insertBefore(document.createTextNode(text[i]), cursor)
        await sleep(15 + Math.random() * 20)
      }
      cursor.remove()
      await sleep(120)
    }

    for (const line of SCRIPT) {
      await konamiTypeLine(line)
    }

    // Blinking press any key
    const pressLine = document.createElement('div')
    pressLine.className = 'konami-line konami-press-key'
    pressLine.textContent = '> [press any key]'
    linesContainer.appendChild(pressLine)

    // Dismiss on any key
    function dismiss() {
      overlay.remove()
      document.removeEventListener('keydown', dismiss)
      document.removeEventListener('click', dismiss)
    }
    setTimeout(() => {
      document.addEventListener('keydown', dismiss, { once: true })
      document.addEventListener('click', dismiss, { once: true })
    }, 200)
  }

  /* ── PART 6: 11. OVERVIEW HEARTBEAT PULSES ── */
  function p6OverviewHeartbeat() {
    const GOLDEN_MS = 137

    function applyHeartbeat() {
      const dots = document.querySelectorAll('.manifest-row .lib-status-dot.watching')
      dots.forEach((dot, i) => {
        dot.style.animation = 'none'
        dot.style.animation = `heartbeat-pulse 2.4s ${i * GOLDEN_MS}ms cubic-bezier(0.17, 0.67, 0.35, 1) infinite`
      })
    }

    // Activity spike: every 12 seconds, flash one random WATCH row's progress
    function activitySpike() {
      const rows = document.querySelectorAll('.manifest-row')
      const watchRows = Array.from(rows).filter(r => r.querySelector('.lib-status-dot.watching'))
      if (watchRows.length > 0) {
        const target = watchRows[Math.floor(Math.random() * watchRows.length)]
        const fill   = target.querySelector('.manifest-prog-fill')
        if (fill) {
          const orig = fill.style.width
          fill.style.transition = 'width 100ms cubic-bezier(0.23,1,0.32,1)'
          fill.style.width = '100%'
          setTimeout(() => {
            fill.style.transition = 'width 300ms cubic-bezier(0.16,1,0.3,1)'
            fill.style.width = orig
          }, 200)
        }
      }
      setTimeout(activitySpike, 12000)
    }

    // Watch for overview renders
    const observer = new MutationObserver(() => {
      if (document.getElementById('manifest-wrap')) {
        setTimeout(applyHeartbeat, 100)
      }
    })
    observer.observe(document.getElementById('app-main') || document.body, { childList: true, subtree: true })

    setTimeout(activitySpike, 12000)
  }

  const P6_BOOT_SCRIPT = [
    { text: '> INITIALIZING PROCRASTINATION HUB...',    suffix: '',          cls: '',            delay: 450, pauseBeforeSuffix: 0,   cursorClass: null,      sfx: 'BOOT' },
    { text: '> LOADING CONTENT MATRIX..............',    suffix: '  OK',      cls: 'boot-ok',     delay: 350, pauseBeforeSuffix: 50,  cursorClass: null,      sfx: 'BOOT' },
    { text: '> CALIBRATING MOOD ENGINE..............',   suffix: '  OK',      cls: 'boot-ok',     delay: 380, pauseBeforeSuffix: 40,  cursorClass: null,      sfx: 'BOOT' },

    { text: '> SYSTEM READY.',                           suffix: '',          cls: '',            delay: 300, pauseBeforeSuffix: 0,   cursorClass: 'success', sfx: 'SUCCESS' },
  ]

  async function p6RunBootSequence() {
    const screen    = document.getElementById('boot-screen')
    const container = document.getElementById('boot-lines')
    const scanlines = document.getElementById('scanlines')
    const sleepFn   = ms => new Promise(r => setTimeout(r, ms))

    // Scanline steps during boot: start at 8%
    const scanOpacities = [0.8, 0.6, 0.5, 0.4, 0.35, 0.3, 0.25]
    if (scanlines) scanlines.style.opacity = '0.8'

    // First interaction gate: ensure AudioContext can start
    let bootAudioReady = false
    const readyAudio = () => { bootAudioReady = true }
    document.addEventListener('click', readyAudio, { once: true })
    document.addEventListener('keydown', readyAudio, { once: true })

    for (let stepIdx = 0; stepIdx < P6_BOOT_SCRIPT.length; stepIdx++) {
      const step = P6_BOOT_SCRIPT[stepIdx]
      const lineEl = document.createElement('div')
      lineEl.className = 'boot-line'
      container.appendChild(lineEl)

      // Create cursor with possible color class
      const cursor = document.createElement('span')
      cursor.className = 'boot-cursor' + (step.cursorClass ? ' ' + step.cursorClass : '')
      lineEl.appendChild(cursor)

      // Play sound for this boot line (click-style)
      if (step.sfx === 'BOOT')           P6SFX.UI_BOOT()
      else if (step.sfx === 'ERROR')     P6SFX.UI_ERROR()
      else if (step.sfx === 'SUCCESS')   P6SFX.UI_SUCCESS()
      else if (step.sfx === 'GRAVEYARD_LOW') p6Tone(200, 90, 130, 0.028, 'sine')

      // Type main text — fast burst typing
      for (let i = 0; i < step.text.length; i++) {
        lineEl.insertBefore(document.createTextNode(step.text[i]), cursor)
        await sleepFn(8 + Math.random() * 14)
      }

      // Random pause before suffix (system "checking")
      if (step.pauseBeforeSuffix > 0) {
        const randomPause = step.pauseBeforeSuffix + Math.floor(Math.random() * 120)
        await sleepFn(randomPause)
      }

      // Append suffix
      if (step.suffix) {
        const sfx = document.createElement('span')
        sfx.className   = step.cls
        sfx.textContent = step.suffix
        lineEl.insertBefore(sfx, cursor)
      }

      cursor.remove()

      // Step down scanlines
      if (scanlines && scanOpacities[stepIdx] !== undefined) {
        scanlines.style.transition = 'opacity 300ms cubic-bezier(0.16,1,0.3,1)'
        scanlines.style.opacity    = scanOpacities[stepIdx]
      }

      await sleepFn(step.delay)
    }

    await sleepFn(300)

    // Reset scanlines to ambient
    if (scanlines) {
      scanlines.style.opacity = ''
      scanlines.style.transition = ''
    }

    sessionStorage.setItem('phub_booted', 'true')
    screen.classList.add('hidden')
  }

  /* ── PART 6: WIRE UP AUDIO ON EXISTING INTERACTIONS ── */
  function p6WireAudio() {
    document.addEventListener('click', e => {
      // ── Context-specific sounds via data-sfx attribute ──
      const sfxEl = e.target.closest('[data-sfx]')
      if (sfxEl) {
        const sfx = sfxEl.dataset.sfx
        if      (sfx === 'graveyard') P6SFX.UI_GRAVEYARD()
        else if (sfx === 'revive')    P6SFX.UI_REVIVE()
        else if (sfx === 'success')   P6SFX.UI_SUCCESS()
        else if (sfx === 'complete')  P6SFX.UI_COMPLETE()
        else if (sfx === 'toggle')    P6SFX.UI_TOGGLE()
        else if (sfx === 'error')     P6SFX.UI_ERROR()
        else if (sfx === 'nav')       P6SFX.UI_NAV()
        else                          P6SFX.UI_CLICK()
        return
      }
      // ── Generic button click ──
      const btn = e.target.closest('.btn-primary, .btn-ghost, .btn-danger')
      if (btn) { P6SFX.UI_CLICK(); return }
      // ── Nav item ──
      const navItem = e.target.closest('.bn-item')
      if (navItem) { P6SFX.UI_NAV(); return }
      // ── Episode tile toggle ──
      const epTile = e.target.closest('.ep-tile')
      if (epTile) { P6SFX.UI_TOGGLE(); return }
      // ── Library card open ──
      const libCard = e.target.closest('.library-card')
      if (libCard) { P6SFX.UI_CLICK_LOW(); return }
    }, true)
  }

      const firstRow = rows[0]

      firstRow.dataset.p6Typed = '1'
      const timeStr = new Date(newest.timestamp).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})
      const color   = getLogEventColor(newest.text)
      p6TypeLogRow(firstRow, timeStr, newest.text, color)
