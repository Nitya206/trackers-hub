<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PROC//HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
        /* Remove focus/hover/active border from parent content area of arc/season navigation */
        #detail-content-area:focus,
        #detail-content-area:active,
        #detail-content-area:hover {
          outline: none !important;
          box-shadow: none !important;
          border-color: var(--border) !important;
        }
    /* Remove focus/hover/active border from arc/season navigation and dropdown */
    .detail-season-tabs:focus,
    .detail-season-tabs:active,
    .detail-season-tabs:hover,
    .detail-season-tabs select:focus,
    .detail-season-tabs select:active,
    .detail-season-tabs select:hover,
    .arc-nav-select:focus,
    .arc-nav-select:active,
    .arc-nav-select:hover {
      outline: none !important;
      box-shadow: none !important;
      border-color: var(--border) !important;
    }

    /* ════════════════════════════════════════════════════════════════
       DESIGN SYSTEM — single source of truth
       Parts 2–5 reference these custom property names EXACTLY.
    ════════════════════════════════════════════════════════════════ */
    :root {
      /* ── CORE PALETTE ── */
      --bg:              #06060f;
      --surface:         rgba(100,120,255,0.07);
      --surface-2:       rgba(100,120,255,0.11);
      --surface-3:       rgba(100,120,255,0.16);
      --border:          rgba(100,160,255,0.16);
      --border-bright:   rgba(100,200,255,0.35);
      --border-glow:     rgba(0,220,255,0.5);

      /* ── ACCENT SYSTEM — VIBRANT NEONS ── */
      --accent-cool:     #00e5ff;
      --accent-warm:     #ff6040;
      --accent-violet:   #a855f7;
      --accent-green:    #00ffaa;
      --accent-pink:     #ff2d95;
      --accent-yellow:   #ffe14d;
      --accent-cool-dim: rgba(0,229,255,0.18);
      --accent-warm-dim: rgba(255,96,64,0.18);
      --accent-violet-dim: rgba(168,85,247,0.18);

      /* ── GLOW TOKENS ── */
      --glow-cyan:   0 0 30px rgba(0,229,255,0.5), 0 0 80px rgba(0,229,255,0.15), 0 0 160px rgba(0,229,255,0.06);
      --glow-warm:   0 0 30px rgba(255,96,64,0.5), 0 0 80px rgba(255,96,64,0.15);
      --glow-violet: 0 0 30px rgba(168,85,247,0.5), 0 0 80px rgba(168,85,247,0.12);
      --glow-card:   0 4px 30px rgba(0,0,0,0.5), 0 1px 0 rgba(100,160,255,0.12) inset, 0 -1px 0 rgba(0,0,0,0.3) inset;

      /* ── TYPE BADGE COLORS — PUMPED UP ── */
      --type-anime:   #c084fc;
      --type-manga:   #34d399;
      --type-manhwa:  #fb923c;
      --type-show:    #60a5fa;
      --type-movie:   #fbbf24;
      --type-novel:   #f472b6;
      --type-social:  #ff4d4d;

      /* ── TYPOGRAPHY ── */
      --font-display: 'Orbitron', 'Bebas Neue', 'Impact', sans-serif;
      --font-ui:      'Syne', 'Inter', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'Fira Code', monospace;

      /* ── TEXT — MUCH BRIGHTER ── */
      --text-1: #eef0ff;
      --text-2: rgba(200,210,255,0.75);
      --text-3: rgba(150,170,255,0.45);
      --success: #00ffaa;
      --danger:  #ff3b6b;

      /* ── SIZE SCALE ── */
      --text-xs:   12px;
      --text-sm:   14px;
      --text-md:   16px;
      --text-lg:   20px;
      --text-xl:   26px;
      --text-2xl:  38px;

      /* ── SPACING ── */
      --space-1:   5px;
      --space-2:   10px;
      --space-3:  14px;
      --space-4:  20px;
      --space-5:  26px;
      --space-6:  30px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;

      /* ── EASING ── */
      --ease-snap:   cubic-bezier(0.23, 1, 0.32, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in:     cubic-bezier(0.7, 0, 0.84, 0);

      /* ── RADIUS ── */
      --radius-sm: 10px;
      --radius-md: 18px;
      --radius-lg: 28px;
      --radius-pill: 999px;
    }

    /* ════════════════════════════════════════════════════════════════
       RESET & BASE
    ════════════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      cursor: default;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      background-image: 
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(168,85,247,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 0% 0%, rgba(0,229,255,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 100% 50%, rgba(255,96,64,0.05) 0%, transparent 50%);
      color: var(--text-1);
      font-family: var(--font-ui);
      font-size: 16px;
      font-weight: 400;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── CINEMATIC ATMOSPHERE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 55% 45% at 10% 0%, rgba(0,229,255,0.16) 0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 92% 85%, rgba(168,85,247,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 35% 28% at 78% 12%, rgba(255,96,64,0.12) 0%, transparent 50%),
        radial-gradient(ellipse 40% 35% at 35% 55%, rgba(0,255,170,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 30% 25% at 55% 92%, rgba(255,45,149,0.1) 0%, transparent 50%);
    }

    /* ── GRAIN TEXTURE ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* All interactive elements use custom cursor */
    a, button, [role=button], .bn-item, .card,
    input, select, textarea, label { cursor: none; }

    /* ════════════════════════════════════════════════════════════════
       BASE COMPONENT LIBRARY
       Every visual element across all parts uses these classes.
       No one-off styling anywhere.
    ════════════════════════════════════════════════════════════════ */

    /* ── .card ── */
    .card {
      background: linear-gradient(135deg, rgba(80,100,255,0.09) 0%, rgba(168,85,247,0.05) 50%, rgba(0,229,255,0.06) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      
      box-shadow: var(--glow-card);
      transition: border-color 300ms var(--ease-snap), box-shadow 400ms var(--ease-snap), transform 300ms var(--ease-out);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 40%, rgba(0,229,255,0.03) 100%);
      pointer-events: none;
    }
    .card:hover {
      border-color: rgba(0,229,255,0.3);
      box-shadow: var(--glow-card), 0 12px 56px rgba(0,0,0,0.8), 0 0 30px rgba(0,229,255,0.08);
      transform: translateY(-2px);
    }

    /* ── .badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .badge[data-type="anime"]  { background: rgba(167,139,250,0.15); color: var(--type-anime);  border: 1px solid rgba(167,139,250,0.3); box-shadow: 0 0 12px rgba(167,139,250,0.15), inset 0 0 12px rgba(167,139,250,0.05); text-shadow: 0 0 8px rgba(167,139,250,0.4); }
    .badge[data-type="manga"]  { background: rgba(52,211,153,0.12);  color: var(--type-manga);  border: 1px solid rgba(52,211,153,0.3);  box-shadow: 0 0 12px rgba(52,211,153,0.15), inset 0 0 12px rgba(52,211,153,0.05); text-shadow: 0 0 8px rgba(52,211,153,0.4); }
    .badge[data-type="manhwa"] { background: rgba(251,146,60,0.15);  color: var(--type-manhwa); border: 1px solid rgba(251,146,60,0.3);  box-shadow: 0 0 12px rgba(251,146,60,0.15), inset 0 0 12px rgba(251,146,60,0.05); text-shadow: 0 0 8px rgba(251,146,60,0.4); }
    .badge[data-type="show"]   { background: rgba(96,165,250,0.12);  color: var(--type-show);   border: 1px solid rgba(96,165,250,0.3);  box-shadow: 0 0 12px rgba(96,165,250,0.15), inset 0 0 12px rgba(96,165,250,0.05); text-shadow: 0 0 8px rgba(96,165,250,0.4); }
    .badge[data-type="movie"]  { background: rgba(251,191,36,0.12);  color: var(--type-movie);  border: 1px solid rgba(251,191,36,0.3);  box-shadow: 0 0 12px rgba(251,191,36,0.15), inset 0 0 12px rgba(251,191,36,0.05); text-shadow: 0 0 8px rgba(251,191,36,0.4); }
    .badge[data-type="novel"]  { background: rgba(244,114,182,0.12);  color: var(--type-novel);  border: 1px solid rgba(244,114,182,0.3);  box-shadow: 0 0 12px rgba(244,114,182,0.15), inset 0 0 12px rgba(244,114,182,0.05); text-shadow: 0 0 8px rgba(244,114,182,0.4); }
    .badge[data-type="social"] { background: rgba(255,77,77,0.12);    color: var(--type-social); border: 1px solid rgba(255,77,77,0.3);    box-shadow: 0 0 12px rgba(255,77,77,0.15),  inset 0 0 12px rgba(255,77,77,0.05);  text-shadow: 0 0 8px rgba(255,77,77,0.4); }

    /* ── .btn-primary ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: linear-gradient(135deg, #00e5ff 0%, #a855f7 55%, #ff2d95 100%);
      background-size: 220% 220%;
      background-position: 0% 0%;
      color: #000;
      padding: 11px 26px;
      border-radius: var(--radius-pill);
      font: 800 12px var(--font-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      cursor: none;
      text-decoration: none;
      box-shadow: 0 0 28px rgba(0,229,255,0.45), 0 0 70px rgba(168,85,247,0.22), 0 4px 24px rgba(0,0,0,0.55);
      transition: all 250ms var(--ease-snap), background-position 400ms var(--ease-out);
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover { background-position: 100% 100%; }
    .btn-primary::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-20deg);
      transition: left 500ms var(--ease-out);
    }
    .btn-primary:hover::after { left: 130%; }
    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(0,200,255,0.7), 0 0 90px rgba(0,200,255,0.3), 0 6px 20px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:not(:active) { transition: transform 300ms var(--ease-spring), box-shadow 200ms var(--ease-snap); }

    /* ── .btn-ghost ── */
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: rgba(80,100,255,0.09);
      border: 1px solid rgba(130,160,255,0.15);
      color: var(--text-2);
      padding: 9px 18px;
      border-radius: var(--radius-pill);
      font: 500 13px var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: none;
      white-space: nowrap;
      flex-shrink: 0;
      
      transition: all 200ms var(--ease-snap);
      -webkit-user-select: none;
      user-select: none;
    }
    .btn-ghost:hover {
      border-color: rgba(0,229,255,0.45);
      color: var(--text-1);
      background: rgba(0,229,255,0.1);
      box-shadow: 0 0 20px rgba(0,229,255,0.16), inset 0 0 20px rgba(0,229,255,0.04);
    }
    .btn-ghost:active { transform: scale(0.97); }

    /* ── .btn-danger ── */
    .btn-danger {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,59,107,0.2);
      color: rgba(255,59,107,0.6);
      padding: 9px 18px;
      border-radius: var(--radius-pill);
      font: 500 13px var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: none;
      
      transition: all 200ms var(--ease-snap);
      -webkit-user-select: none;
      user-select: none;
    }
    .btn-danger:hover {
      border-color: rgba(255,59,107,0.5);
      color: var(--danger);
      background: rgba(255,59,107,0.08);
      box-shadow: 0 0 16px rgba(255,59,107,0.15);
    }
    .btn-danger:active { transform: scale(0.97); }

    /* ── .progress-bar ── */
    .progress-bar {
      height: 5px;
      background: rgba(80,120,255,0.08);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #a855f7, #ff2d95, #00e5ff);
      background-size: 300% 100%;
      border-radius: 99px;
      box-shadow: 0 0 12px rgba(0,229,255,0.7), 0 0 30px rgba(168,85,247,0.3), 0 0 60px rgba(0,229,255,0.1);
      transition: width 700ms var(--ease-out);
      position: relative;
      
    }
    .progress-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      animation: shimmer-travel 700ms var(--ease-out) 650ms forwards;
      transform: translateX(-100%);
    }

    /* ── .stat-card ── */
    .stat-card {
      background: linear-gradient(160deg, rgba(100,140,255,0.07) 0%, rgba(168,85,247,0.04) 100%);
      border: 1px solid rgba(100,160,255,0.2);
      border-radius: var(--radius-md);
      padding: 24px var(--space-4) 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      text-align: center;
      backdrop-filter: blur(40px) saturate(220%);
      -webkit-backdrop-filter: blur(40px) saturate(220%);
      box-shadow: var(--glow-card), inset 0 1px 0 rgba(130,180,255,0.1);
      transition: all 350ms var(--ease-out);
      position: relative;
      overflow: clip;
      overflow-clip-margin: 4px;
      min-width: 0;
    }
    /* Per-card accent bottom borders + number tint */
    .stat-card:nth-child(1) { border-bottom: 2px solid rgba(168,85,247,0.5); }
    .stat-card:nth-child(1) .stat-card-number { color: #a855f7; text-shadow: none; }
    .stat-card:nth-child(1) .stat-card-number::after { background: linear-gradient(90deg,transparent,#a855f7,transparent); }
    .stat-card:nth-child(2) { border-bottom: 2px solid rgba(0,229,255,0.5); }
    .stat-card:nth-child(3) { border-bottom: 2px solid rgba(0,255,170,0.5); }
    .stat-card:nth-child(3) .stat-card-number { color: #00ffaa; text-shadow: none; }
    .stat-card:nth-child(3) .stat-card-number::after { background: linear-gradient(90deg,transparent,#00ffaa,transparent); }
    .stat-card:nth-child(4) { border-bottom: 2px solid rgba(255,96,64,0.5); }
    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 40%, rgba(0,229,255,0.05) 100%);
      pointer-events: none;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), rgba(168,85,247,0.3), transparent);
      border-radius: 2px;
      opacity: 0;
      transition: opacity 350ms var(--ease-out);
    }
    .stat-card:hover {
      border-color: rgba(0,229,255,0.3);
      box-shadow: var(--glow-card), 0 0 50px rgba(0,229,255,0.1), 0 0 100px rgba(168,85,247,0.05), 0 20px 60px rgba(0,0,0,0.7);
      transform: translateY(-5px) scale(1.02);
    }
    .stat-card:hover::after { opacity: 1; }
    .stat-card-number {
      font: 700 52px var(--font-display);
      color: var(--accent-cool);
      line-height: 0.85;
      letter-spacing: 0.06em;
      text-shadow: none;
      background: transparent;
      box-shadow: none;
      filter: none;
      position: relative;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (max-width: 600px) {
      .stat-card-number {
        font-size: clamp(20px, 7vw, 38px);
        white-space: normal;
        word-break: break-word;
        line-height: 1;
        letter-spacing: 0.03em;
      }
      .stat-card-label {
        font-size: 11px;
      }
      .stat-card {
        padding: 16px 10px 20px;
        gap: 6px;
      }
    }
    /* Keep stat numbers clean: no decorative backplate/underline. */
    .stat-card-number::after {
      content: none;
      display: none;
    }
    .stat-card-label {
      font: 500 13px var(--font-mono);
      color: var(--text-1);
      letter-spacing: 0.01em;
      padding-bottom: 4px;
    }

    /* ── .modal-overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4,4,12,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9998;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 280ms var(--ease-out);
    }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    /* inner wrapper handles centering */
    .modal-overlay::before {
      content: '';
      display: block;
      height: max(32px, calc((100vh - 820px) / 2));
    }
    .modal-overlay::after {
      content: '';
      display: block;
      height: 32px;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }

    /* ── .modal-box ── */
    .modal-box {
      background: linear-gradient(160deg, rgba(18,16,40,0.98) 0%, rgba(10,9,26,0.99) 100%);
      border: 1px solid rgba(100,160,255,0.18);
      border-radius: var(--radius-lg);
      padding: 36px 36px 28px;
      width: min(500px, calc(100% - 48px));
      margin: 0 auto;
      transform: translateY(20px) scale(0.96);
      transition: transform 350ms var(--ease-spring);
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.04) inset,
        0 2px 0 rgba(0,229,255,0.12) inset,
        0 24px 80px rgba(0,0,0,0.85),
        0 0 60px rgba(0,229,255,0.06),
        0 0 120px rgba(100,80,255,0.08);
      position: relative;
      z-index: 9999;
    }
    .modal-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(0,229,255,0.03) 0%, transparent 40%, rgba(168,85,247,0.03) 100%);
      pointer-events: none;
    }
    .modal-overlay.visible .modal-box { transform: translateY(0) scale(1); }

    /* ── .tooltip ── */
    .tooltip {
      position: absolute;
      background: var(--surface-3);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      padding: var(--space-2) var(--space-3);
      font: var(--text-xs) var(--font-mono);
      color: var(--text-1);
      pointer-events: none;
      z-index: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 150ms var(--ease-out) 150ms;
    }
    .tooltip.visible { opacity: 1; }

    /* ── .section-header ── */
    .section-header {
      font: 700 11px var(--font-mono);
      color: rgba(100,200,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.28em;
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-5);
      position: relative;
    }
    .section-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 48px; height: 1px;
      background: var(--accent-cool);
      opacity: 0.6;
      box-shadow: 0 0 8px var(--accent-cool);
    }

    /* ════════════════════════════════════════════════════════════════
       CUSTOM CURSOR
    ════════════════════════════════════════════════════════════════ */
    .cursor-dot {
      position: fixed;
      top: 0; left: 0;
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2147483647;
      will-change: transform;
      transform: translate(calc(var(--cx, -300px) - 1.5px), calc(var(--cy, -300px) - 1.5px));
      box-shadow: 0 0 6px #fff, 0 0 14px var(--accent-cool), 0 0 30px rgba(168,85,247,0.3);
    }
    .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      width: 26px; height: 26px;
      border: 1px solid rgba(0,229,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2147483647;
      will-change: transform;
      transform: translate(calc(var(--rx, -300px) - 13px), calc(var(--ry, -300px) - 13px)) scale(1);
      transition: transform 0ms, border-color 150ms var(--ease-snap), width 200ms var(--ease-spring), height 200ms var(--ease-spring);
      animation: ringPulse 3s ease-in-out infinite;
    }
    .cursor-ring.hovering {
      border-color: var(--accent-cool);
      transform: translate(calc(var(--rx, -300px) - 13px), calc(var(--ry, -300px) - 13px)) scale(1.5);
      animation-play-state: paused;
      box-shadow: 0 0 16px rgba(0,229,255,0.25), 0 0 32px rgba(168,85,247,0.1);
    }
    @keyframes ringPulse {
      0%,100% { opacity: 0.35; box-shadow: 0 0 0 0 rgba(0,229,255,0); }
      50% { opacity: 0.85; box-shadow: 0 0 10px rgba(0,229,255,0.25), 0 0 20px rgba(168,85,247,0.1); }
    }

    /* ════════════════════════════════════════════════════════════════
       HEX-GRID BACKGROUND  — SVG filled by JS
    ════════════════════════════════════════════════════════════════ */
    #hex-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* ════════════════════════════════════════════════════════════════
       SCANLINE OVERLAY  — CSS-only, permanent
    ════════════════════════════════════════════════════════════════ */
    #scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
    }

    /* ── SESSION FULLSCREEN OVERLAY ── */
    #session-overlay {
      position: fixed;
      inset: 0;
      z-index: 15000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #03030a;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0ms;
    }
    #session-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .session-overlay-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,229,255,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(168,85,247,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 80% 20%, rgba(255,45,149,0.08) 0%, transparent 50%);
      animation: sessionBgPulse 4s ease-in-out infinite;
    }
    @keyframes sessionBgPulse {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    .session-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent 0px, transparent 3px,
        rgba(0,229,255,0.012) 3px, rgba(0,229,255,0.012) 4px
      );
      pointer-events: none;
      animation: sessionScanDrift 0.12s linear infinite;
    }
    @keyframes sessionScanDrift {
      from { transform: translateY(0); }
      to   { transform: translateY(4px); }
    }
    .session-overlay-corner {
      position: absolute;
      width: 60px; height: 60px;
      pointer-events: none;
    }
    .session-overlay-corner.tl { top: 32px; left: 32px; border-top: 2px solid rgba(0,229,255,0.5); border-left: 2px solid rgba(0,229,255,0.5); }
    .session-overlay-corner.tr { top: 32px; right: 32px; border-top: 2px solid rgba(0,229,255,0.5); border-right: 2px solid rgba(0,229,255,0.5); }
    .session-overlay-corner.bl { bottom: 32px; left: 32px; border-bottom: 2px solid rgba(0,229,255,0.5); border-left: 2px solid rgba(0,229,255,0.5); }
    .session-overlay-corner.br { bottom: 32px; right: 32px; border-bottom: 2px solid rgba(0,229,255,0.5); border-right: 2px solid rgba(0,229,255,0.5); }
    .session-init-label {
      font: 600 11px var(--font-mono);
      color: var(--accent-cool);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      margin-bottom: 24px;
      text-shadow: 0 0 20px rgba(0,229,255,0.7);
    }
    #session-overlay.active .session-init-label {
      animation: sessionFadeUp 400ms 200ms var(--ease-out) forwards;
    }
    .session-overlay-title {
      font: 800 72px var(--font-display);
      color: var(--text-1);
      letter-spacing: 0.12em;
      text-align: center;
      opacity: 0;
      transform: scale(0.88) translateY(20px);
      text-shadow: 0 0 24px rgba(0,229,255,0.2), 0 0 48px rgba(168,85,247,0.1);
      line-height: 1;
    }
    #session-overlay.active .session-overlay-title {
      animation: sessionZoomIn 600ms 400ms var(--ease-spring) forwards;
    }
    .session-overlay-sub {
      font: 400 14px var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(8px);
    }
    #session-overlay.active .session-overlay-sub {
      animation: sessionFadeUp 400ms 700ms var(--ease-out) forwards;
    }
    .session-overlay-series {
      font: 600 18px var(--font-display);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 28px;
      opacity: 0;
      transform: translateY(8px);
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #session-overlay.active .session-overlay-series {
      animation: sessionFadeUp 400ms 900ms var(--ease-out) forwards;
    }
    .session-overlay-timer-ring {
      margin-top: 48px;
      width: 340px; height: 340px;
      position: relative;
      opacity: 0;
    }
    #session-overlay.active .session-overlay-timer-ring {
      animation: sessionFadeUp 400ms 1100ms var(--ease-out) forwards;
    }
    .session-ring-svg {
      transform: rotate(-90deg);
      overflow: visible;
    }
    .session-ring-track {
      stroke: rgba(0,229,255,0.1);
      fill: none;
    }
    .session-ring-fill {
      stroke: var(--accent-cool);
      fill: none;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(0,229,255,0.8));
      animation: sessionRingPulse 2s ease-in-out infinite;
    }
    @keyframes sessionRingPulse {
      0%,100% { filter: drop-shadow(0 0 8px rgba(0,229,255,0.8)); }
      50%      { filter: drop-shadow(0 0 20px rgba(0,229,255,1)) drop-shadow(0 0 40px rgba(168,85,247,0.5)); }
    }
    .session-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .session-ring-time {
      font: 700 40px var(--font-mono);
      color: var(--text-1);
      letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(0,229,255,0.6);
    }
    .session-ring-label {
      font: 500 11px var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .session-ep-label {
      font: 500 11px var(--font-mono);
      color: var(--text-2);
      letter-spacing: 0.15em;
      margin-top: 6px;
      max-width: 240px;
      text-align: center;
      padding: 0 10px;
      word-break: break-word;
      line-height: 1.5;
    }
    .session-overlay-stop-btn {
      margin-top: 40px;
      opacity: 0;
      transform: translateY(8px);
    }
    .session-overlay-pause-btn {
      margin-top: 12px;
      opacity: 0;
      transform: translateY(8px);
      font-size: 11px;
      letter-spacing: 0.12em;
      min-width: 140px;
    }
    #session-overlay.active .session-overlay-stop-btn {
      animation: sessionFadeUp 400ms 1300ms var(--ease-out) forwards;
    }
    #session-overlay.active .session-overlay-pause-btn {
      animation: sessionFadeUp 400ms 1450ms var(--ease-out) forwards;
    }
    @keyframes sessionFadeUp {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes sessionZoomIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ════════════════════════════════════════════════════════════════
       BOOT SCREEN
    ════════════════════════════════════════════════════════════════ */


    /* ════════════════════════════════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════════════════════════════════ */
    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 2px;
      z-index: 200;
      /* More elevated backdrop */
      background: rgba(6,6,18,0.75);
      border: 1px solid rgba(100,160,255,0.12);
      border-top-color: rgba(140,200,255,0.16);
      border-radius: var(--radius-pill);
      padding: 5px 6px;
      backdrop-filter: blur(48px) saturate(220%);
      -webkit-backdrop-filter: blur(48px) saturate(220%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 12px 40px rgba(0,0,0,0.8),
        0 4px 12px rgba(0,0,0,0.5);
      animation: bn-rise 700ms var(--ease-spring) 150ms both;
    }
    @keyframes bn-rise {
      from { opacity: 0; transform: translateX(-50%) translateY(24px) scale(0.93); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }

    .bn-item {
      position: relative;
      width: 42px;
      height: 42px;
      border-radius: var(--radius-pill);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
      -webkit-user-select: none;
      user-select: none;
      transition: transform 240ms var(--ease-spring), background 180ms var(--ease-snap);
      animation: bn-item-in 500ms var(--ease-spring) both;
      overflow: visible;
    }
    /* Inner clip so ripple stays contained inside the button */
    .bn-icon-wrap {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .bn-item:nth-child(1) { animation-delay: 200ms; }
    .bn-item:nth-child(2) { animation-delay: 240ms; }
    .bn-item:nth-child(3) { animation-delay: 280ms; }
    .bn-item:nth-child(4) { animation-delay: 320ms; }
    .bn-item:nth-child(5) { animation-delay: 360ms; }
    .bn-item:nth-child(6) { animation-delay: 400ms; }
    .bn-item:nth-child(7) { animation-delay: 440ms; }
    .bn-item:nth-child(8) { animation-delay: 480ms; }
    @keyframes bn-item-in {
      from { opacity: 0; transform: translateY(12px) scale(0.76); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .bn-item svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: rgba(110,150,255,0.32);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 180ms var(--ease-snap), filter 180ms var(--ease-snap);
      position: relative;
      z-index: 1;
    }
    .bn-item:hover {
      transform: translateY(-3px) scale(1.08);
      background: rgba(0,229,255,0.07);
    }
    .bn-item:hover svg {
      stroke: rgba(0,229,255,0.85);
      filter: drop-shadow(0 0 5px rgba(0,229,255,0.6));
    }
    .bn-item:active { transform: scale(0.93); }

    /* Tooltip — shows on hover, above the pill */
    .bn-tip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(5px) scale(0.92);
      background: rgba(4,4,20,0.96);
      border: 1px solid rgba(0,229,255,0.22);
      color: var(--accent-cool);
      font: 700 9px var(--font-mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 7px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms var(--ease-snap), transform 150ms var(--ease-spring);
      box-shadow:
        0 0 12px rgba(0,229,255,0.18),
        0 6px 24px rgba(0,0,0,0.7);
      z-index: 9999;
    }
    .bn-tip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(0,229,255,0.22);
    }
    .bn-tip::before {
      content: '';
      position: absolute;
      top: calc(100% - 1px);
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: rgba(4,4,20,0.96);
      z-index: 1;
    }
    .bn-item:hover .bn-tip {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /* Active label — hidden, exists for JS compat only */
    .bn-active-label { display: none; }

    /* Active state — glowing icon + subtle bg + inner dot */
    .bn-item.active {
      background: rgba(0,229,255,0.13);
      box-shadow: inset 0 1px 0 rgba(0,229,255,0.18);
    }
    .bn-item.active svg {
      stroke: #00e5ff;
      filter: drop-shadow(0 0 7px rgba(0,229,255,0.85));
    }
    /* Small dot at bottom edge inside the item */
    .bn-item.active::after {
      content: '';
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 2px;
      border-radius: 99px;
      background: var(--accent-cool);
      box-shadow: 0 0 8px rgba(0,229,255,0.9);
    }

    /* Click ripple */
    .bn-ripple {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(0,229,255,0.14);
      transform: scale(0);
      opacity: 1;
      animation: bn-ripple-out 480ms var(--ease-out) forwards;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes bn-ripple-out {
      to { transform: scale(2.6); opacity: 0; }
    }

    /* ════════════════════════════════════════════════════════════════
       MAIN CONTENT AREA
    ════════════════════════════════════════════════════════════════ */
    #app-main {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 36px 48px 120px;
      z-index: 1;
    }

    /* Fade cards out at the very top edge when scrolling — purely decorative, doesn't affect modals */
        #scroll-fade-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, var(--bg) 0%, rgba(6,6,15,0.6) 60%, transparent 100%);
      pointer-events: none;
      z-index: 50;
    }

    /* ════════════════════════════════════════════════════════════════
       SCROLLBAR STYLING
    ════════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar               { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track         { background: transparent; }
    ::-webkit-scrollbar-thumb         { background: rgba(255,255,255,0.06); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover   { background: rgba(0,200,255,0.3); }

    /* ── PART 6: IMMERSION LAYER ── */

    /* ── 01. CURSOR TRAIL ── */
    .cursor-trail-dot {
      position: fixed;
      top: 0;
      left: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 20000;
      background: var(--accent-cool);
      transition: background 400ms var(--ease-out);
      will-change: transform;
    }
    .cursor-trail-dot.warm { background: var(--accent-warm); }

    /* ── 02. SECTION HEADER GLITCH ── */
    .section-header {
      position: relative;
    }
    .section-header::before,
    .section-header::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      overflow: hidden;
      pointer-events: none;
    }
    .section-header::before {
      color: var(--accent-warm);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      left: -3px;
      opacity: 0;
    }
    .section-header::after {
      color: var(--accent-cool);
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      left: 2px;
      opacity: 0;
    }
    @keyframes glitch-main {
      0%   { transform: none; clip-path: none; }
      20%  { transform: translateX(2px); clip-path: polygon(0 15%, 100% 15%, 100% 35%, 0 35%); }
      40%  { transform: translateX(-1px); clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%); }
      60%  { transform: translateX(1px) skewX(0.5deg); }
      100% { transform: none; clip-path: none; }
    }
    @keyframes glitch-before {
      0%, 19%   { opacity: 0; transform: none; }
      20%, 39%  { opacity: 0.7; transform: translateX(-3px); clip-path: polygon(0 20%, 100% 20%, 100% 38%, 0 38%); }
      40%, 100% { opacity: 0; }
    }
    @keyframes glitch-after {
      0%, 39%   { opacity: 0; transform: none; }
      40%, 59%  { opacity: 0.6; transform: translateX(2px); clip-path: polygon(0 60%, 100% 60%, 100% 78%, 0 78%); }
      60%, 100% { opacity: 0; }
    }
    .section-header.glitching {
      animation: glitch-main 400ms steps(1) forwards;
    }
    .section-header.glitching::before {
      animation: glitch-before 400ms steps(1) forwards;
    }
    .section-header.glitching::after {
      animation: glitch-after 400ms steps(1) forwards;
    }

    /* ── 03. MUTE BUTTON ── */
    #p6-mute-btn {
      background: transparent;
      border: none;
    }

    /* ── 05. HOLOGRAPHIC CARD SHEEN ── */
    .library-card {
      position: relative;
      overflow: hidden;
    }
    .library-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(
        circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(0,212,255,0.08) 0%,
        rgba(255,107,53,0.04) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 200ms var(--ease-out);
    }
    .library-card:hover::before { opacity: 1; }

    /* ── 06. SECTION TRANSITION ── */
    .section-enter {
      animation: section-in 200ms var(--ease-out) both;
    }
    @keyframes section-in {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── 07. PROGRESS BAR SHIMMER ── */
    .progress-bar-fill {
      position: relative;
      overflow: hidden;
    }
    .progress-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.28) 50%, transparent 100%);
      pointer-events: none;
      animation: shimmer-travel 700ms var(--ease-out) 650ms forwards;
      transform: translateX(-100%);
    }
    @keyframes shimmer-travel {
      from { transform: translateX(-100%); }
      to   { transform: translateX(350%); }
    }

    /* ── 08. LOG TYPING CURSOR ── */
    .log-typing-cursor {
      display: inline-block;
      width: 7px;
      height: 1em;
      background: var(--accent-cool);
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: bootBlink 0.6s step-end infinite;
    }

    /* ── 09. GRAVEYARD CORRUPTION ── */
    .graveyard-section .progress-bar-fill,
    .graveyard-section .progress-bar {
      filter: grayscale(0.75) contrast(0.75) brightness(0.85);
      transition: filter 300ms var(--ease-out);
    }
    .graveyard-card:hover .progress-bar-fill,
    .graveyard-card:hover .progress-bar {
      filter: grayscale(0.1) contrast(0.95) brightness(1);
    }
    .graveyard-card {
      transition: border-color 300ms var(--ease-snap), box-shadow 300ms var(--ease-snap), opacity 300ms var(--ease-out), filter 300ms var(--ease-out) !important;
      filter: saturate(0.55) brightness(0.9);
    }
    .graveyard-card:hover {
      filter: saturate(1) brightness(1) !important;
      border-color: rgba(255,59,107,0.3) !important;
    }
    .corrupt-char {
      display: inline-block;
      color: var(--danger);
      opacity: 0.7;
      font-family: var(--font-mono);
    }

    /* ── 10. KONAMI TERMINAL OVERLAY ── */
    #konami-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      z-index: 20000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10vh 15vw;
      font-family: 'Courier New', monospace;
    }
    #konami-overlay.hidden { display: none; }
    .konami-line {
      font-size: 14px;
      line-height: 2.2;
      color: var(--accent-cool);
      white-space: pre;
      min-height: 31px;
    }
    .konami-blink {
      display: inline-block;
      width: 9px;
      height: 1.05em;
      background: var(--accent-cool);
      vertical-align: text-bottom;
      animation: bootBlink 0.55s step-end infinite;
    }
    .konami-press-key {
      animation: bootBlink 0.8s step-end infinite;
    }

    /* ── 11. OVERVIEW GOLDEN ANGLE PULSE ── */
    @keyframes heartbeat-pulse {
      0%   { transform: scale(1);   opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
      25%  { transform: scale(1.4); opacity: 1; box-shadow: 0 0 0 4px rgba(0,255,136,0); }
      100% { transform: scale(1);   opacity: 0.55; box-shadow: 0 0 0 0 rgba(0,255,136,0); }
    }

    /* ── 12. BOOT UPGRADE — cursor flash colors ── */
    .boot-cursor.warm    { background: var(--accent-warm) !important; }
    .boot-cursor.danger  { background: var(--danger) !important; }
    .boot-cursor.success { background: var(--success) !important; }

    /* ═══ END PART 6 CSS ═══ */

    /* ── PART 2: DASHBOARD + MOOD QUEUE STYLES ── */

    /* Dashboard entrance animation base state */
    .dash-block {
      opacity: 0;
      transform: translateY(20px);
      /* transition applied via JS after block is inserted */
    }
    .dash-block.entered {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 350ms var(--ease-out), transform 350ms var(--ease-out);
    }

    /* Greeting block */
    .dash-greeting {
      font: 800 clamp(32px, 4vw, 56px) var(--font-display);
      color: var(--text-1);
      line-height: 1.1;
      letter-spacing: 0.07em;
      text-shadow: 0 2px 24px rgba(0,200,255,0.12), 0 0 60px rgba(168,85,247,0.07);
      background: linear-gradient(135deg, var(--text-1) 0%, rgba(200,220,255,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-date {
      font: 500 11px var(--font-mono);
      color: var(--text-3);
      margin-top: var(--space-2);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* Stat grid */
    .dash-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* Next mission card */
    .next-mission-card {
      background: linear-gradient(135deg, rgba(255,96,64,0.07) 0%, rgba(168,85,247,0.06) 50%, rgba(100,130,255,0.04) 100%);
      border: 1px solid rgba(255,96,64,0.1);
      border-left: 3px solid var(--accent-warm);
      border-radius: var(--radius-md);
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      
      box-shadow: var(--glow-card), -6px 0 40px rgba(255,96,64,0.12), -6px 0 80px rgba(168,85,247,0.05);
      transition: all 350ms var(--ease-snap);
      position: relative;
      overflow: hidden;
    }
    .next-mission-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent-warm), var(--accent-violet), var(--accent-pink), transparent 80%);
      opacity: 0.6;
    }
    .next-mission-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 100px;
      background: linear-gradient(90deg, rgba(255,96,64,0.08), rgba(168,85,247,0.06), transparent);
      pointer-events: none;
    }
    .next-mission-card:hover {
      border-color: rgba(255,96,64,0.18);
      border-left-color: var(--accent-warm);
      box-shadow: var(--glow-card), -6px 0 60px rgba(255,96,64,0.2), -6px 0 120px rgba(168,85,247,0.08), 0 16px 60px rgba(0,0,0,0.7);
      transform: translateY(-2px);
    }
    .next-mission-label {
      font: 700 12px var(--font-mono);
      color: var(--accent-warm);
      text-transform: uppercase;
      letter-spacing: 0.28em;
      margin-bottom: var(--space-3);
      text-shadow: 0 1px 6px rgba(255,87,34,0.25);
    }
    .next-mission-title {
      font: 800 clamp(24px, 3.2vw, 36px) var(--font-display);
      color: var(--text-1);
      margin-bottom: var(--space-2);
      letter-spacing: 0.06em;
      line-height: 1.1;
      text-shadow: 0 0 30px rgba(255,96,64,0.12);
    }
    .next-mission-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }
    .next-mission-day {
      font: var(--text-xs) var(--font-mono);
      color: var(--accent-cool);
    }
    .next-mission-empty {
      text-align: center;
      width: 100%;
    }
    .next-mission-empty-icon {
      font-size: 48px;
      color: var(--text-3);
      margin-bottom: var(--space-4);
    }

    /* Two-column row */
    .dash-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* Mood engine widget */
    .mood-widget-header {
      font: 700 12px var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: var(--space-5);
    }
    .mood-widget-idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) 0;
    }
    .mood-widget-idle-sub {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      text-align: center;
    }
    .mood-pills-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .mood-pill {
      width: 100%;
      padding: 7px var(--space-3);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-2);
      font: 500 12px var(--font-mono);
      text-align: left;
      cursor: none;
      letter-spacing: 0.06em;
      transition: all 150ms var(--ease-snap);
      opacity: 0;
      transform: translateX(-8px);
    }
    .mood-pill.entered {
      opacity: 1;
      transform: translateX(0);
      transition: opacity 200ms var(--ease-out), transform 200ms var(--ease-out),
                  background 150ms var(--ease-snap), border-color 150ms var(--ease-snap), color 150ms var(--ease-snap);
    }
    .mood-pill:hover {
      border-color: var(--accent-cool);
      color: var(--text-1);
      background: rgba(0,229,255,0.06);
      transform: translateX(4px);
    }
    .mood-pill.selected {
      background: var(--accent-cool-dim);
      border-color: var(--accent-cool);
      color: var(--accent-cool);
      box-shadow: 0 0 14px rgba(0,229,255,0.12);
    }
    .mood-reset-btn {
      position: absolute;
      top: 0; right: 0;
      background: transparent;
      border: none;
      color: var(--text-3);
      font: var(--text-lg) var(--font-mono);
      cursor: none;
      padding: 0;
      line-height: 1;
      transition: color 150ms var(--ease-snap);
    }
    .mood-reset-btn:hover { color: var(--text-1); }
    .mood-result-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-3);
      animation: slideInResult 200ms var(--ease-out) both;
    }
    @keyframes slideInResult {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .mood-result-title {
      font: 600 var(--text-md) var(--font-ui);
      color: var(--text-1);
      margin: var(--space-1) 0;
    }
    .mood-result-remaining {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-3);
      margin-bottom: var(--space-3);
    }
    .mood-result-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .mood-link {
      background: none;
      border: none;
      color: var(--accent-cool);
      font: var(--text-xs) var(--font-mono);
      cursor: none;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity 150ms;
    }
    .mood-link:hover { opacity: 0.7; }
    .mood-back-link {
      background: none;
      border: none;
      color: var(--text-3);
      font: var(--text-xs) var(--font-mono);
      cursor: none;
      padding: 0;
      margin-top: var(--space-3);
      display: block;
      transition: color 150ms var(--ease-snap);
    }
    .mood-back-link:hover { color: var(--text-2); }

    /* Budget arc widget */
    .budget-arc-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      padding: 6px 0 2px;
    }
    .budget-arc-svg { overflow: visible; }
    .budget-arc-center {
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .budget-below {
      text-align: center;
      width: min(280px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .budget-remaining {
      font: 600 13px var(--font-mono);
      color: var(--text-2);
      letter-spacing: 0.04em;
    }
    .budget-reset-note {
      font: 500 10px var(--font-mono);
      color: var(--text-3);
      margin-top: 0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.88;
    }
    .budget-alltime {
      font: 600 11px var(--font-mono);
      color: var(--accent-cool);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
    .budget-edit-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      justify-content: center;
      margin-top: 8px;
      padding-top: 8px;
      width: 100%;
      border-top: 1px dashed rgba(120,140,255,0.2);
    }
    .budget-hours-display {
      font: 600 10px var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .budget-edit-btn {
      background: transparent;
      border: none;
      color: var(--text-3);
      cursor: none;
      padding: 0;
      font-size: 14px;
      line-height: 1;
      transition: color 150ms var(--ease-snap);
    }
    .budget-edit-btn:hover { color: var(--accent-cool); }
    .budget-hours-input {
      background: var(--surface-2);
      border: 1px solid var(--accent-cool);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: var(--text-xs) var(--font-mono);
      padding: 2px var(--space-2);
      width: 48px;
      text-align: center;
      outline: none;
    }



    /* Nav cards grid */
    .dash-nav-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }
    .dash-nav-card {
      background: linear-gradient(160deg, rgba(80,100,255,0.09) 0%, rgba(168,85,247,0.1) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-6) var(--space-5);
      cursor: none;
      
      box-shadow: var(--glow-card), inset 0 1px 0 rgba(100,180,255,0.13);
      transition: all 350ms var(--ease-out);
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .dash-nav-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,229,255,0.15) 0%, rgba(168,85,247,0.06) 40%, transparent 60%);
      opacity: 0;
      transition: opacity 400ms var(--ease-snap);
      pointer-events: none;
    }
    .dash-nav-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    .dash-nav-card:hover {
      border-color: rgba(0,229,255,0.3);
      transform: translateY(-6px) scale(1.01);
      box-shadow: var(--glow-card), 0 24px 70px rgba(0,0,0,0.7), 0 0 40px rgba(0,229,255,0.08), 0 0 80px rgba(168,85,247,0.04);
    }
    .dash-nav-card:hover::before { opacity: 1; }
    .dash-nav-card-icon {
      color: var(--accent-cool);
      margin-bottom: var(--space-4);
      opacity: 0.6;
      transition: all 250ms var(--ease-spring);
      width: 24px;
      height: 24px;
      overflow: hidden;
    }
    .dash-nav-card:hover .dash-nav-card-icon {
      opacity: 1;
      transform: scale(1.15);
      filter: drop-shadow(0 0 12px rgba(0,229,255,0.7)) drop-shadow(0 0 30px rgba(168,85,247,0.3));
    }
    .dash-nav-card-name {
      font: 600 16px var(--font-display);
      color: var(--text-1);
      margin-bottom: var(--space-1);
      letter-spacing: 0.1em;
    }
    .dash-nav-card-desc {
      font: 400 11px var(--font-ui);
      color: var(--text-3);
      line-height: 1.6;
    }
    /* Hover arrow for dash nav cards */
    .dash-nav-card-arrow {
      position: absolute;
      bottom: var(--space-4);
      right: var(--space-4);
      font: 500 16px var(--font-mono);
      color: var(--accent-cool);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 200ms var(--ease-snap), transform 200ms var(--ease-snap);
      pointer-events: none;
    }
    .dash-nav-card:hover .dash-nav-card-arrow {
      opacity: 1;
      transform: translateX(0);
    }
    /* Tasks empty state terminal blink */
    @keyframes bootBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .tasks-terminal-prompt {
      font: 500 14px var(--font-mono);
      color: var(--accent-cool);
      opacity: 0.3;
      animation: bootBlink 0.8s step-end infinite;
      margin-top: var(--space-4);
      display: block;
      text-align: center;
    }
    /* Log color coding */
    .log-text.log-watched  { color: #00ffaa !important; }
    .log-text.log-unwatched { color: rgba(255,96,64,0.8) !important; }
    .log-text.log-system   { color: var(--text-3) !important; }

    /* ── MOOD QUEUE SECTION (standalone) ── */
    .mq-mood-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .mq-mood-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-6) var(--space-5);
      cursor: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      text-align: center;
      transition: border-color 200ms var(--ease-snap), transform 200ms var(--ease-out), box-shadow 250ms var(--ease-out), background 200ms var(--ease-snap);
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    /* Per-mood gradient tints */
    .mq-mood-card[data-mood-key="brain-off"]       { --mood-clr: #a855f7; --mood-glow: rgba(168,85,247,0.3); }
    .mq-mood-card[data-mood-key="hype"]            { --mood-clr: #00e5ff; --mood-glow: rgba(0,229,255,0.3); }
    .mq-mood-card[data-mood-key="emotional damage"]{ --mood-clr: #60a5fa; --mood-glow: rgba(96,165,250,0.3); }
    .mq-mood-card[data-mood-key="cozy"]            { --mood-clr: #fbbf24; --mood-glow: rgba(251,191,36,0.3); }
    .mq-mood-card[data-mood-key="chaos"]           { --mood-clr: #00ffaa; --mood-glow: rgba(0,255,170,0.3); }
    .mq-mood-card[data-mood-key="slow-burn"]       { --mood-clr: #ff6040; --mood-glow: rgba(255,96,64,0.3); }
    .mq-mood-card[data-mood-key="dark"]            { --mood-clr: #9333ea; --mood-glow: rgba(147,51,234,0.3); }
    .mq-mood-card[data-mood-key="psychological"]   { --mood-clr: #ec4899; --mood-glow: rgba(236,72,153,0.3); }
    .mq-mood-card[data-mood-key="action"]          { --mood-clr: #ef4444; --mood-glow: rgba(239,68,68,0.3); }
    .mq-mood-card[data-mood-key="thriller"]        { --mood-clr: #14b8a6; --mood-glow: rgba(20,184,166,0.3); }
    .mq-mood-card[data-mood-key="binge-worthy"]    { --mood-clr: #f97316; --mood-glow: rgba(249,115,22,0.3); }
    .mq-mood-card[data-mood-key="aesthetic"]       { --mood-clr: #e879f9; --mood-glow: rgba(232,121,249,0.3); }
    .mq-mood-card[data-mood-key="horror"]          { --mood-clr: #be123c; --mood-glow: rgba(190,18,60,0.3); }

    .mq-mood-card:hover {
      border-color: var(--mood-clr, var(--accent-cool));
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px var(--mood-glow, rgba(0,229,255,0.2));
      background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    }
    .mq-mood-card.selected {
      border-color: var(--mood-clr, var(--accent-cool));
      background: linear-gradient(160deg, color-mix(in srgb, var(--mood-clr, #00e5ff) 12%, transparent) 0%, transparent 70%);
      box-shadow: 0 0 30px var(--mood-glow, rgba(0,229,255,0.15));
    }
    /* Mood card selected pulse animation */
    @keyframes moodCardPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .mq-mood-card.pulse-anim {
      animation: moodCardPulse 300ms var(--ease-spring);
    }
    /* 14th mood card — comfort-rewatch */
    .mq-mood-card[data-mood-key="comfort-rewatch"] { --mood-clr: #00ffaa; --mood-glow: rgba(0,255,170,0.3); }
    /* Mood pill colored backgrounds */
    .lib-mood-chip[data-mood="psychological"] { background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.2); }
    .lib-mood-chip[data-mood="hype"]          { background: rgba(0,229,255,0.10);  border-color: rgba(0,229,255,0.18); }
    .lib-mood-chip[data-mood="action"]        { background: rgba(255,96,64,0.12);  border-color: rgba(255,96,64,0.2); }
    .lib-mood-chip[data-mood="dark"]          { background: rgba(168,85,247,0.10); border-color: rgba(168,85,247,0.18); }
    .lib-mood-chip[data-mood="horror"]        { background: rgba(255,45,149,0.12); border-color: rgba(255,45,149,0.2); }
    .lib-mood-chip[data-mood="emotional damage"] { background: rgba(96,165,250,0.10); border-color: rgba(96,165,250,0.18); }
    .lib-mood-chip[data-mood="cozy"]          { background: rgba(251,191,36,0.10); border-color: rgba(251,191,36,0.18); }
    .lib-mood-chip[data-mood="chaos"]         { background: rgba(0,255,170,0.09);  border-color: rgba(0,255,170,0.15); }
    .lib-mood-chip[data-mood="slow-burn"]     { background: rgba(255,96,64,0.10);  border-color: rgba(255,96,64,0.18); }
    .lib-mood-chip[data-mood="thriller"]      { background: rgba(20,184,166,0.10); border-color: rgba(20,184,166,0.18); }
    .lib-mood-chip[data-mood="binge-worthy"]  { background: rgba(249,115,22,0.10); border-color: rgba(249,115,22,0.18); }
    .lib-mood-chip[data-mood="aesthetic"]     { background: rgba(232,121,249,0.10); border-color: rgba(232,121,249,0.18); }
    .lib-mood-chip[data-mood="brain-off"]     { background: rgba(168,85,247,0.10); border-color: rgba(168,85,247,0.18); }
    .mq-mood-icon {
      font-size: 32px;
      line-height: 1;
      transition: transform 250ms var(--ease-spring), filter 250ms;
    }
    .mq-mood-card:hover .mq-mood-icon {
      transform: scale(1.25) rotate(-3deg);
      filter: drop-shadow(0 0 8px var(--mood-glow, rgba(0,229,255,0.5)));
    }
    .mq-mood-card.selected .mq-mood-icon {
      transform: scale(1.1);
      filter: drop-shadow(0 0 12px var(--mood-glow, rgba(0,229,255,0.6)));
    }
    .mq-mood-name {
      font: 600 var(--text-lg) var(--font-mono);
      color: var(--mood-clr, var(--text-1));
      text-shadow: 0 0 16px var(--mood-glow, transparent);
      transition: color 200ms var(--ease-snap);
    }
    .mq-mood-desc {
      font: var(--text-xs) var(--font-ui);
      color: var(--text-3);
      line-height: 1.5;
    }

    /* MQ result card — full width, large */
    .mq-result-wrap {
      animation: slideInResult 250ms var(--ease-spring) both;
    }
    .mq-result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-cool);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      display: flex;
      align-items: flex-start;
      gap: var(--space-6);
    }
    .mq-result-left { flex: 1; min-width: 0; }
    .mq-result-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
    .mq-result-title {
      font: 600 var(--text-xl) var(--font-ui);
      color: var(--text-1);
      margin: var(--space-2) 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mq-result-rating {

    .modal-select {

      font: 400 14px var(--font-mono);
      padding: 11px 14px;

    .modal-mood-grid {

    }
    .modal-mood-toggle {

      font: 600 10px var(--font-mono);
      padding: 5px 12px;

      transition: all 150ms var(--ease-snap);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .modal-mood-toggle:hover {

    }
    .modal-mood-toggle.active {
      background: rgba(0,229,255,0.1);

      text-shadow: 0 0 8px rgba(0,229,255,0.4);
    }
    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
      padding-top: 20px;
      border-top: 1px solid rgba(100,160,255,0.1);
    }
    .modal-title-row {
      font: 800 clamp(20px, 3.5vw, 28px) var(--font-display);
      color: var(--text-1);
      margin-bottom: 28px;
      letter-spacing: 0.1em;
      line-height: 1.1;
    }
    .modal-title-row::after {
      content: '';
      display: block;
      height: 2px;
      width: 48px;
      background: linear-gradient(90deg, var(--accent-cool), transparent);
      margin-top: 10px;
      border-radius: 2px;
    }
    .modal-section-card {
      border: 1px solid rgba(100,160,255,0.14);
      background: rgba(100,120,255,0.04);
      border-radius: 12px;
      padding: 12px 12px 4px;
      margin-bottom: 10px;
    }
    .modal-section-title {
      font: 700 10px var(--font-mono);
      color: var(--accent-cool);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .modal-helper-text {
      font: 400 10px var(--font-mono);
      color: var(--text-3);
      margin-top: -8px;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
      line-height: 1.45;
    }

    /* ── PART 4: DETAIL VIEW STYLES ── */

    /* ── SOCIAL MEDIA DETAIL VIEW ── */
    .social-detail-wrap {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      margin-top: var(--space-6);
    }
    .social-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) 320px;
      gap: clamp(16px, 2vw, 28px);
      align-items: start;
    }
    .social-left-col {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .social-hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: start;
      margin-bottom: 0;
      min-width: 0;
    }
    .social-hero > :first-child {
      background: color-mix(in srgb, var(--surface-2) 82%, transparent);
      border: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
      border-radius: var(--radius-md);
      padding: clamp(14px, 2vw, 24px);
      min-height: 180px;
    }
    @supports not (background: color-mix(in srgb, red 50%, transparent)) {
      .social-hero > :first-child {
        background: var(--surface-2);
        border: 1px solid var(--border);
      }
    }
    @media (max-width: 980px) {
      .social-layout { grid-template-columns: 1fr; }
      .social-sidebar { position: static; top: auto; }
    }

    /* Hero LEFT */
    .social-platform-label {
      font: 700 10px var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--type-social); margin-bottom: var(--space-2);
    }
    .social-title {
      font: 800 clamp(24px, 3.3vw, 36px) var(--font-mono); color: var(--text-1);
      letter-spacing: 0.01em; line-height: 1.08; margin-bottom: var(--space-4);
      text-wrap: balance;
    }
    .social-stats-row {
      display: flex; gap: var(--space-5); flex-wrap: wrap; margin-bottom: var(--space-4);
    }
    .social-stat { display: flex; flex-direction: column; gap: 3px; }
    .social-stat-val { font: 700 clamp(18px, 2.1vw, 24px) var(--font-mono); color: var(--accent-cool); }
    .social-stat-lbl { font: 500 10px var(--font-mono); color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; }
    .social-progress-bar { height: 7px; background: var(--border); border-radius: 99px; margin-bottom: 0; overflow: hidden; }
    .social-progress-fill { height: 100%; border-radius: 99px; transition: width 600ms var(--ease-out); }

    /* Hero RIGHT — sidebar column */
    .social-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      position: sticky;
      top: var(--space-4);
    }
    .social-timer-card {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-2);
    }
    .social-timer-label { font: 700 10px var(--font-mono); color: var(--text-3); letter-spacing: 0.14em; text-transform: uppercase; }
    .social-timer-display {
      font: 700 28px var(--font-mono); color: var(--accent-cool); letter-spacing: 0.04em;
      text-shadow: none; display: none;
    }

    /* Video list area */
    .social-section-header {
      font: 700 11px var(--font-mono); color: var(--text-3); letter-spacing: 0.14em;
      text-transform: uppercase; padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--border); margin-bottom: var(--space-2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .social-video-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 2px 0;
    }
    .social-video-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: color-mix(in srgb, var(--surface-2) 92%, transparent);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: none; transition: border-color 150ms, background 150ms;
      position: relative;
    }
    @supports not (background: color-mix(in srgb, red 50%, transparent)) {
      .social-video-row { background: var(--surface-2); }
    }
    .social-video-row:hover { border-color: var(--border-bright); background: var(--surface-3); }
    .social-video-row.watched { opacity: 0.72; }
    .social-video-idx {
      font: 700 10px var(--font-mono); color: var(--text-3); min-width: 24px; text-align: center;
    }
    .social-video-title {
      font: 500 13px var(--font-mono); color: var(--text-1); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .social-video-check {
      width: 20px; height: 20px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; cursor: none; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; font-size: 12px; color: var(--success);
      transition: all 150ms;
    }
    .social-video-check.done { background: rgba(0,255,136,0.12); border-color: var(--success); }
    .social-video-del {
      background: transparent; border: none; color: var(--text-3); font-size: 13px;
      cursor: none; padding: 2px 4px; transition: color 150ms; flex-shrink: 0;
    }
    .social-video-del:hover { color: var(--danger); }
    .social-add-row {
      display: flex;
      gap: 10px;
      margin: 0 0 var(--space-2);
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
    }
    @supports not (background: color-mix(in srgb, red 50%, transparent)) {
      .social-add-row { background: transparent; }
    }
    .social-add-input {
      flex: 1; background: color-mix(in srgb, var(--surface-2) 72%, rgba(8,10,20,0.86)); border: 1px solid color-mix(in srgb, var(--border) 90%, transparent);
      border-radius: var(--radius-sm); color: var(--text-1); font: 500 13px var(--font-mono);
      padding: 10px 14px; outline: none; transition: border-color 150ms;
    }
    .social-add-input:focus { border-color: var(--accent-cool); }
    .social-add-input::placeholder { color: var(--text-3); }
    .social-rec-wrap {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px; background: var(--surface);
    }
    .social-rec-header {
      font: 700 10px var(--font-mono); color: var(--accent-cool); letter-spacing: 0.14em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    /* Sidebar action buttons */
    .social-sidebar-actions {
      display: flex; flex-direction: column; gap: var(--space-2);
    }
    .social-sidebar-actions .btn-danger {
      opacity: 0.92;
      text-align: left;
      padding-left: 14px;
    }

    /* Back button row */
    .detail-back-row {
      margin-bottom: var(--space-6);
    }

    /* Hero two-column layout */
    .detail-hero {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 40px;
      margin-bottom: 0;
      align-items: start;
    }
    .detail-hero-left,
    #detail-content-area {
      min-width: 0;
    }

    /* .detail-hero-left {} removed: empty ruleset */

        .detail-title {
      font: 900 clamp(30px, 4.5vw, 58px) var(--font-display);
      color: var(--accent-cool);
      letter-spacing: 0.07em;
      line-height: 1.03;
      margin-bottom: var(--space-3);
      text-shadow: 0 0 40px rgba(0,200,255,0.4), 0 0 90px rgba(0,200,255,0.15);
    }
    .detail-personal-rating-wrap {
      margin: var(--space-3) 0;
    }
    .detail-personal-rating-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      cursor: none;
      transition: border-color 150ms;
    }
    .detail-personal-rating-btn:hover {
      border-color: var(--border-bright);
    }
    .detail-personal-rating-btn .rating-label {
      font: 700 11px var(--font-mono);
      color: var(--text-3);
      letter-spacing: 0.08em;
    }
    .detail-personal-rating-btn .rating-stars {
      font-size: 14px;
      color: var(--accent-warm);
      letter-spacing: 2px;
    }
    .detail-rating {
      font: 600 16px var(--font-mono);
      color: var(--accent-warm);
      margin-bottom: var(--space-3);
      text-shadow: 0 0 20px rgba(255,87,34,0.4);
    }
    .detail-mood-row { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-4); }
    .detail-mood-pill {
      font: 400 12px var(--font-mono);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.1em;
    }
    .detail-progress-label { font: 500 11px var(--font-mono); color: var(--text-3); margin-top: var(--space-1); letter-spacing: 0.05em; }
    .detail-progress-bar-wrap { margin-bottom: var(--space-5); }
    .detail-day-label { font: 700 12px var(--font-mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: var(--space-2); }
    .detail-day-row { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .detail-day-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-2);
      font: 500 14px var(--font-mono);
      padding: 5px 12px;
      cursor: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 200ms var(--ease-snap);
    }
    .detail-day-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text-1); }
    .detail-day-btn.active {
      background: rgba(0,200,255,0.08);
      border-color: rgba(0,200,255,0.35);
      color: var(--accent-cool);
      box-shadow: 0 0 10px rgba(0,200,255,0.1);
    }

    /* Right sticky column */
    .detail-hero-right {
      position: sticky;
      top: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* Session timer card */
    .detail-timer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      box-shadow: var(--glow-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .detail-timer-label {
      font: 700 11px var(--font-mono);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: var(--space-3);
    }
    .detail-timer-display {
      font: 700 48px var(--font-display);
      color: var(--accent-cool);
      margin-bottom: var(--space-2);
      letter-spacing: 0.06em;
      text-shadow: 0 0 20px rgba(0,200,255,0.4);
    }
    .detail-timer-ep-label { font: 400 13px var(--font-mono); color: var(--text-3); margin-bottom: var(--space-2); }

    /* Notes */
    .detail-notes-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 28px;
      box-shadow: var(--glow-card);
    }
    /* More compact notes card inside social sidebar */
    .social-sidebar .detail-notes-card {
      padding: var(--space-3) var(--space-4);
      background: var(--surface-2);
    }
    .social-sidebar .detail-notes-textarea {
      min-height: 80px;
      max-height: 140px;
    }
    .social-sidebar .detail-notes-label {
      font-size: 11px;
      margin-bottom: var(--space-1);
    }
    .social-schedule-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      padding: 10px 14px 10px;
      margin: 4px 0 2px;
      min-width: 0;
      width: calc(100% - 10px);
      margin-right: auto;
    }
    .social-schedule-card .social-section-header {
      margin-bottom: var(--space-2);
      padding-bottom: var(--space-2);
    }
    .social-schedule-scroll {
      border: 1px solid color-mix(in srgb, var(--border) 88%, transparent);
      border-radius: var(--radius-sm);
      padding: 6px;
      background: color-mix(in srgb, var(--surface-3) 40%, transparent);
      max-height: min(26vh, 180px);
      overflow-y: auto;
    }
    .social-schedule-card.is-empty .social-schedule-scroll {
      max-height: none;
      overflow: visible;
      border: none;
      background: transparent;
      padding: 0;
    }
    @supports not (background: color-mix(in srgb, red 50%, transparent)) {
      .social-schedule-scroll {
        border: 1px solid var(--border);
        background: var(--surface-3);
      }
    }
    #social-sched-entries {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 0;
      max-height: none;
      overflow: visible;
    }
    .social-sched-empty {
      font: 500 11px var(--font-mono);
      color: var(--text-3);
      text-align: center;
      padding: 10px 8px;
      border: 1px dashed color-mix(in srgb, var(--border) 70%, transparent);
      border-radius: var(--radius-sm);
      background: transparent;
      letter-spacing: 0.03em;
      max-width: 72%;
      margin: 0 auto;
    }
    #social-sched-btns {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    #social-sched-btns .sched-add-btn {
      margin-top: 0;
      width: auto;
      flex: 1;
      padding: 6px 10px;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .detail-notes-label { font: 700 14px var(--font-mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: var(--space-2); }
    .detail-notes-textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font: 400 13px var(--font-ui);
      padding: var(--space-3);
      resize: vertical;
      min-height: 110px;
      max-height: 260px;
      outline: none;
      transition: border-color 200ms var(--ease-snap);
      line-height: 1.6;
    }
    .detail-notes-textarea::placeholder { color: var(--text-3); }
    .detail-notes-textarea:focus { border-color: rgba(0,200,255,0.3); box-shadow: 0 0 0 3px rgba(0,200,255,0.05); }

    /* Drop to graveyard */
    .detail-graveyard-wrap { margin-top: var(--space-2); }
    .detail-graveyard-confirm {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      animation: slideInResult 200ms var(--ease-out) both;
    }
    .detail-graveyard-confirm-text {
      font: var(--text-xs) var(--font-mono);
      color: var(--text-2);
    }
    .detail-graveyard-confirm-btns {
      display: flex;
      gap: var(--space-2);
    }

    /* Season tabs */
    .detail-season-tabs {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
      align-items: center;
      row-gap: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-5);
    }
    .detail-bulk-select-row {

      gap: var(--space-2);
      margin: calc(var(--space-3) * -1) 0 var(--space-4);
      flex-wrap: wrap;
