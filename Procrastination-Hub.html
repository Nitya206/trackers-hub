  const MQ_HISTORY_KEY = KEYS.mqHistory

  function saveMQHistory(mood, title) {
    const hist = loadData(MQ_HISTORY_KEY, [])
    // Remove any existing entry for the same title so it moves to top
    const deduped = hist.filter(e => e.title !== title)
    deduped.unshift({ mood, title, ts: new Date().toISOString() })
    saveData(MQ_HISTORY_KEY, deduped.slice(0, 10))
  }

  function renderMQHistory(container) {
    const raw  = loadData(MQ_HISTORY_KEY, [])
    // Deduplicate by title in case old dupes exist in storage
    const seen = new Set()
    const hist = raw.filter(e => { if (seen.has(e.title)) return false; seen.add(e.title); return true })
    if (hist.length === 0) return

    const headerEl = document.createElement('div')
    headerEl.className   = 'mq-history-header'
    headerEl.textContent = 'RECENT RECOMMENDATIONS'
    container.appendChild(headerEl)

    const listEl  = document.createElement('div')
    listEl.className = 'mq-history-list'

    const recent = hist.slice(0, 5)
    recent.forEach(entry => {
      const item = document.createElement('div')
      item.className = 'mq-history-item'
      const age  = getRelativeTime(entry.ts)
      item.innerHTML = `
        <span class="mq-history-mood">${entry.mood}</span>
        <span class="mq-history-title">${entry.title}</span>
        <span class="mq-history-time">${age}</span>`
      listEl.appendChild(item)
    })
    container.appendChild(listEl)
  }

  function getRelativeTime(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime()
    const mins = Math.floor(diff / 60000)
    if (mins < 2)   return 'just now'
    if (mins < 60)  return `${mins} min ago`
    const hrs = Math.floor(mins / 60)
    if (hrs  < 24)  return `${hrs} hr${hrs > 1 ? 's' : ''} ago`
    const days = Math.floor(hrs / 24)
    if (days < 7)   return `${days} day${days > 1 ? 's' : ''} ago`
    return `${Math.floor(days / 7)} week${Math.floor(days / 7) > 1 ? 's' : ''} ago`
  }

    // ---- GRID ----
    const grid = document.createElement('div')
    grid.className = 'lib-grid'

        '</div>'

    } else {
      // Build all cards into a DocumentFragment -- append once
      const frag = document.createDocumentFragment()
      library.forEach(function(item, idx) {
        frag.appendChild(buildLibraryCard(item, idx, MOOD_CHIP_COLORS))
      })
      grid.appendChild(frag)

      // Intersection Observer -- entrance animations, never animate offscreen cards
      const cardObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return
          const card  = entry.target
          const delay = Math.min(parseInt(card.dataset.idx, 10) * 50, 400)
          setTimeout(function() {
            requestAnimationFrame(function() {
              card.style.transition =
                'opacity 300ms ' + delay + 'ms var(--ease-out), ' +
                'transform 300ms ' + delay + 'ms var(--ease-out)'
              card.classList.add('lib-card-entered')
              cardObserver.unobserve(card)
              setTimeout(function() { card.style.willChange = '' }, 300 + delay + 50)
            })
          }, 0)
        })
      }, { threshold: 0.1 })

      grid.querySelectorAll('.library-card').forEach(function(card) {
        cardObserver.observe(card)
      })

      // 3D tilt -- single delegated mousemove on grid, rAF-gated
      var tiltCard    = null
      var tiltFrameId = null

      grid.addEventListener('mousemove', function(e) {
        var card = e.target.closest('.library-card')
        if (!card || card.style.display === 'none') {
          if (tiltCard && tiltCard !== card) resetTilt(tiltCard)
          tiltCard = null
          return
        }
        if (tiltCard && tiltCard !== card) resetTilt(tiltCard)
        tiltCard = card
        if (tiltFrameId) cancelAnimationFrame(tiltFrameId)
        tiltFrameId = requestAnimationFrame(function() {
          var rect = card.getBoundingClientRect()
          var x    = (e.clientX - rect.left)  / rect.width  - 0.5
          var y    = (e.clientY - rect.top)   / rect.height - 0.5
          card.style.transform  = 'perspective(600px) rotateX(' + (-y * 8) + 'deg) rotateY(' + (x * 8) + 'deg) scale(1.02)'
          card.style.transition = 'none'
          card.style.willChange = 'transform'
        })
      })

      grid.addEventListener('mouseleave', function() {
        if (tiltCard) resetTilt(tiltCard)
        tiltCard = null
        if (tiltFrameId) { cancelAnimationFrame(tiltFrameId); tiltFrameId = null }
      })

      function resetTilt(card) {
        card.style.transition = 'transform 300ms var(--ease-snap)'
        card.style.transform  = ''
        setTimeout(function() { card.style.willChange = '' }, 310)
      }
    }

    main.appendChild(grid)

    // ---- FILTER -- never re-creates DOM, just toggles display ----
    function filterCards() {
      var cards   = grid.querySelectorAll('.library-card')
      var visible = 0
      var q       = searchQuery.toLowerCase()
      cards.forEach(function(card) {
        var typeOk  = activeType === 'all' || card.dataset.type === activeType
        var titleOk = !q || card.dataset.title.includes(q)
        var show    = typeOk && titleOk
        card.style.display = show ? '' : 'none'
        if (show) visible++

      noResults.style.display = (library.length > 0 && visible === 0) ? 'block' : 'none'

    // Search -- debounced 60ms
    searchInput.addEventListener('input', function(e) {
      if (searchTimer) clearTimeout(searchTimer)
      searchTimer = setTimeout(function() {

    // Quick-add -- parse on Enter
    qaInput.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return
      var raw = e.target.value.trim()
      if (!raw) { flashInputError(e.target); return }
      var parts = raw.split('|').map(function(s) { return s.trim() })
      var title = parts[0]
      if (!title) { flashInputError(e.target); return }
      var VALID_TYPES = ['anime','manga','manhwa','show','movie','novel']
      var type  = VALID_TYPES.includes((parts[1] || '').toLowerCase())
        ? parts[1].toLowerCase() : 'anime'
      var total = parseInt(parts[2], 10) || 0
      var newItem = buildNewItem(title, type, total)
      var lib = loadData(KEYS.library, [])
      lib.unshift(newItem)

      e.target.value = ''

      // Inject card directly
      var grid2 = document.getElementById('lib-grid')
      if (grid2) {
        var existingEmpty = grid2.querySelector('.lib-empty-state')
        if (existingEmpty) existingEmpty.parentElement.remove()
        grid2.querySelectorAll('.library-card').forEach(function(c) { c.dataset.idx = parseInt(c.dataset.idx || 0, 10) + 1 })
        var newCard = buildLibraryCard(newItem, 0, MOOD_CHIP_COLORS)
        var noRes = grid2.querySelector('#lib-no-results')
        if (noRes && noRes.nextSibling) grid2.insertBefore(newCard, noRes.nextSibling)
        else grid2.insertBefore(newCard, grid2.firstChild)
        requestAnimationFrame(function() {
          newCard.style.transition = 'opacity 300ms var(--ease-out), transform 300ms var(--ease-out)'
          newCard.classList.add('lib-card-entered')
        })
        var badge = document.getElementById('lib-file-count')
        if (badge) badge.textContent = '[' + lib.length + ' FILES]'
        library = lib
        filterCards()
      } else { renderLibrary() }
    })

    // New File button
    document.getElementById('lib-new-btn').addEventListener('click', function() {
      openAddModal(function(newItem) {
        // Inject new card at top of grid without full re-render
        var grid2 = document.getElementById('lib-grid')

        var existingEmpty = grid2.querySelector('.lib-empty-state')
        if (existingEmpty) existingEmpty.parentElement.remove()
        var lib2 = loadData(KEYS.library, [])
        var newCard = buildLibraryCard(newItem, 0, MOOD_CHIP_COLORS)
        // Update data-idx on all existing cards
        grid2.querySelectorAll('.library-card').forEach(function(c) {
          c.dataset.idx = parseInt(c.dataset.idx || 0, 10) + 1
        })
        // Insert after the noResults div
        var noRes = grid2.querySelector('#lib-no-results')
        if (noRes && noRes.nextSibling) grid2.insertBefore(newCard, noRes.nextSibling)
        else grid2.insertBefore(newCard, grid2.firstChild)
        // Animate entrance
        requestAnimationFrame(function() {
          newCard.style.transition = 'opacity 300ms var(--ease-out), transform 300ms var(--ease-out)'
          newCard.classList.add('lib-card-entered')
        })
        // Update file count badge
        var badge = document.getElementById('lib-file-count')
        if (badge) badge.textContent = '[' + lib2.length + ' FILES]'
        library = lib2
        filterCards()
        '<div id="modal-upcoming-wrap" style="display:none;margin-top:8px;">' +
  '<label class="modal-field-label">Release / Air Date</label>' +
  '<input class="modal-input" id="modal-upcoming-date" type="date" autocomplete="off"/>' +
  '<div style="font:400 10px var(--font-mono);color:var(--text-3);margin-top:4px;">' +
    'Will auto-schedule this release to your Overview calendar.' +
  '</div>' +
'</div>'
      })
    })

      openAppSettingsModal(function() { renderLibrary() })
    })
  }

  /* -----------------------------------------------------------------
     PART 3: BUILD SINGLE LIBRARY CARD
  ----------------------------------------------------------------- */
  function buildLibraryCard(item, idx, moodColors) {
    const card = document.createElement('div')
    card.className     = 'library-card'
    card.dataset.type  = item.type
    card.dataset.title = (item.title || '').toLowerCase()
    card.dataset.idx   = idx

    const accentColor = (item.themeStyles && item.themeStyles['--accent-cool'])
      ? item.themeStyles['--accent-cool'] : 'var(--accent-cool)'
    card.style.borderLeftColor = accentColor

    // Apply per-series themed background
    const accentWarm = (item.themeStyles && item.themeStyles['--accent-warm']) ? item.themeStyles['--accent-warm'] : 'rgba(168,85,247,1)'
    const accentR = parseInt(accentColor.replace('#','').slice(0,2)||'00',16)
    const accentG = parseInt(accentColor.replace('#','').slice(2,4)||'e5',16)
    const accentB = parseInt(accentColor.replace('#','').slice(4,6)||'ff',16)
    card.style.background = 'linear-gradient(135deg, rgba('+accentR+','+accentG+','+accentB+',0.13) 0%, rgba('+accentR+','+accentG+','+accentB+',0.05) 50%, rgba(10,10,28,0.6) 100%)'
    card.style.borderColor = 'rgba('+accentR+','+accentG+','+accentB+',0.3)'
    card.style.setProperty('--card-accent', accentColor)

    const watched = item.watchedEpisodes ? item.watchedEpisodes.length : 0
    const total   = item.totalEpisodes || 0
    const pct     = total > 0 ? (watched / total) * 100 : 0
    const unit    = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'ch' : 'eps'

    const moodChipsHTML = (item.moodTags || []).map(function(tag) {
      const color = moodColors[tag] || 'var(--text-3)'
      return '<span class="lib-mood-chip" data-mood="' + tag + '" style="color:' + color + ';">' + tag + '</span>'
    }).join('')

    const statusClass = item.status || 'watching'
    var ratingHTML = ''
    if (item.ratingIMDb && item.ratingMAL) {
      ratingHTML =
        '<span class="lib-card-rating-chip chip-imdb"><span class="lib-card-rating-label">IMDb</span>' + Number(item.ratingIMDb).toFixed(1) + '</span>' +
        '<span class="lib-card-rating-chip chip-mal"><span class="lib-card-rating-label">MAL</span>' + Number(item.ratingMAL).toFixed(1) + '</span>'
    } else if (item.ratingIMDb) {
      ratingHTML = '<span class="lib-card-rating-chip chip-imdb"><span class="lib-card-rating-label">IMDb</span>' + Number(item.ratingIMDb).toFixed(1) + '</span>'
    } else if (item.ratingMAL) {
      ratingHTML = '<span class="lib-card-rating-chip chip-mal"><span class="lib-card-rating-label">MAL</span>' + Number(item.ratingMAL).toFixed(1) + '</span>'
    } else if (item.rating) {
      ratingHTML = '<span class="lib-card-rating-chip chip-single">\u2605 ' + Number(item.rating).toFixed(1) + '</span>'
    }
    const dayHTML     = item.scheduledDay
      ? '<span class="lib-card-day">\u25b8 ' + item.scheduledDay + '</span>' : ''

    card.innerHTML =
      '<div class="lib-card-header">' +
        '<span class="badge" data-type="' + item.type + '">' + item.type + '</span>' +
        (ratingHTML ? '<div class="lib-card-rating">' + ratingHTML + '</div>' : '') +
      '</div>' +
      '<div class="lib-card-title">' + item.title + '</div>' +
      '<div>' +
        '<div class="progress-bar">' +
          '<div class="progress-bar-fill" style="width:' + pct + '%;background:' + accentColor + ';"></div>' +
        '</div>' +
        '<div class="lib-card-progress-text">' + watched + ' of ' + total + ' ' + unit + '</div>' +
      '</div>' +
      (moodChipsHTML ? '<div class="lib-card-moods">' + moodChipsHTML + '</div>' : '') +
      '<div class="lib-card-footer">' +
        '<div class="lib-card-footer-left">' +
          '<span class="lib-status-dot ' + (statusClass === 'watching' && watched === 0 ? 'not-started' : statusClass) + '"></span>' +
          '<span class="lib-status-label ' + (statusClass === 'watching' && watched === 0 ? 'not-started' : statusClass) + '">' + (statusClass === 'watching' ? (watched === 0 ? 'NOT STARTED' : (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'READING' : 'WATCHING') : statusClass === 'completed' ? 'DONE' : statusClass.toUpperCase()) + '</span>' +
          dayHTML +
        '</div>' +
        '<button class="lib-open-btn" data-item-id="' + item.id + '">Open File \u2192</button>' +
      '</div>'

    // Entire card is clickable
    card.style.cursor = 'none'
    card.addEventListener('click', function(e) {
      // Don't navigate if clicking a button inside the card
      if (e.target.closest('button')) return
      navigateTo('detail', item.id)
    })

    card.querySelector('.lib-open-btn').addEventListener('click', function(e) {
      e.stopPropagation()
      navigateTo('detail', item.id)
    })

    return card
  }

  /* -----------------------------------------------------------------
     PART 3: BUILD NEW ITEM OBJECT (shared: quick-add and modal)
  ----------------------------------------------------------------- */
  function buildNewItem(title, type, total, extras) {
    extras = extras || {}
    var item = {
      id:              generateId(title),
      title:           title,
      type:            type || 'anime',
      totalEpisodes:   total || 0,
      watchedEpisodes: [],
      theme:           extras.themeClass || '',
      themeClass:      extras.themeClass || '',
      themeStyles:     extras.themeStyles || {},
      moodTags:        extras.moodTags || [],
      rating:          extras.rating   || 0,
      seasons:         extras.seasons  || [],
      arcs:            [],
      scheduledDay:    null,
      status:          'watching',
      addedDate:       new Date().toISOString().split('T')[0],
      graveyardDate:   null,
      graveyardNote:   '',
      timerMinutes:    0,
      notes:           ''
    }
    if (extras.ratingIMDb) item.ratingIMDb = extras.ratingIMDb
    if (extras.ratingMAL)  item.ratingMAL  = extras.ratingMAL
    return item
  }

  // Parse line format: "Season 1 | 12" (or ":" / "-") for per-season counts.
  function parseSeasonLine(rawLine) {
    var line = (rawLine || '').trim()
    if (!line) return null
    var seps = (getAppSettings().seasonLineSeparators || ['|', ':', '-'])
      .map(function(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&') })
      .join('|')
    var rx = new RegExp('^(.*?)\\s*(?:' + seps + ')\\s*(\\d+)\\s*$')
    var match = line.match(rx)
    if (match) {
      return { name: (match[1] || '').trim(), count: parseInt(match[2], 10) || 0 }
    }
    return { name: line, count: null }
  }

  // Build season objects with optional per-season counts.
  function buildSeasonPlanFromInput(seasonLines, totalCount) {
    var parsed = (seasonLines || [])
      .map(parseSeasonLine)
      .filter(function(x) { return x && x.name })
    if (!parsed.length) return { seasons: [], resolvedTotal: (parseInt(totalCount, 10) || 0) }

    var total = parseInt(totalCount, 10) || 0
    var explicitSum = parsed.reduce(function(s, p) { return s + (p.count !== null ? p.count : 0) }, 0)
    var openCount = parsed.filter(function(p) { return p.count === null }).length
    var remaining = Math.max(0, total - explicitSum)

    // If total is unknown but user provided per-season counts, use their sum.
    var resolvedTotal = total > 0 ? total : explicitSum

    var base = openCount > 0 ? Math.floor(remaining / openCount) : 0
    var rem = openCount > 0 ? (remaining % openCount) : 0
    var epNumber = 1
    var seasons = parsed.map(function(p) {
      var seasonCount = p.count
      if (seasonCount === null) {
        seasonCount = (total > 0) ? (base + (rem > 0 ? 1 : 0)) : 0
        if (rem > 0) rem--
      }
      var episodes = []
      for (var i = 0; i < seasonCount; i++) {
        episodes.push({ number: epNumber, title: '' })
        epNumber++
      }
      return { name: p.name, episodes: episodes }
    })

    return { seasons: seasons, resolvedTotal: resolvedTotal }
  }

  function flashInputError(input) {
    input.classList.remove('flash-error')
    requestAnimationFrame(function() {

  function showQuickConfirmWithUndo(msg, itemId) {
    const el = document.getElementById('lib-qa-confirm')
    if (!el) return
    el.innerHTML = ''
    var txt = document.createElement('span')
    txt.textContent = msg + '  '
    var undoBtn = document.createElement('button')
    undoBtn.textContent = '↩ UNDO'
    undoBtn.style.cssText = 'background:rgba(255,96,64,0.18);border:1px solid rgba(255,96,64,0.4);color:var(--accent-warm);font:700 10px var(--font-mono);letter-spacing:0.08em;border-radius:6px;padding:2px 8px;cursor:none;margin-left:8px;transition:all 120ms;'
    undoBtn.addEventListener('click', function() {
      var lib = loadData(KEYS.library, [])
      var idx = lib.findIndex(function(i) { return i.id === itemId })
      if (idx !== -1) lib.splice(idx, 1)
      saveData(KEYS.library, lib)
      // Remove card from DOM
      var card = document.querySelector('.library-card[data-item-id="' + itemId + '"]')
      // Try by open btn
      var openBtn = document.querySelector('.lib-open-btn[data-item-id="' + itemId + '"]')
      if (openBtn) { var c2 = openBtn.closest('.library-card'); if (c2) c2.remove() }
      var badge = document.getElementById('lib-file-count')
      if (badge) badge.textContent = '[' + lib.length + ' FILES]'
      library = lib
      el.classList.remove('visible')
      el.innerHTML = ''
      logEvent('Undid adding item ' + itemId)
    })
    el.appendChild(txt)
    el.appendChild(undoBtn)
    el.classList.add('visible')
    var hideTimer = setTimeout(function() { el.classList.remove('visible'); el.innerHTML = '' }, getAppSettings().quickConfirmMs || 3500)
    undoBtn.addEventListener('click', function() { clearTimeout(hideTimer) })

        ratingMAL:   ratingMAL  > 0 ? Math.min(10, Math.max(0, ratingMAL))  : undefined,

      })
      newItem.status = status || 'watching'

      lib.unshift(newItem)
      saveData(KEYS.library, lib)
      if (newItem.status === 'upcoming' && releaseDate) {
        var sched = loadData(KEYS.schedule, {})
        if (!sched[releaseDate]) sched[releaseDate] = []
        var existingIdx = sched[releaseDate].findIndex(function(x) { return x.id === newItem.id })
        var schedEntry = { id: newItem.id, title: newItem.title, type: newItem.type, eps: 'Releases' }
        if (existingIdx >= 0) sched[releaseDate][existingIdx] = schedEntry
        else sched[releaseDate].push(schedEntry)
        saveData(KEYS.schedule, sched)
        logEvent('Scheduled release of ' + title + ' on ' + releaseDate)
      }
      if (newItem.status === 'upcoming' && recDay && recStart && recEnd) {

  /* -----------------------------------------------------------------
     PART 4: DETAIL VIEW -- renderDetail(id)

  function renderDetail(id) {
    const main    = document.getElementById('app-main')

    // -- File not found --

      main.innerHTML =

          '<button class="btn-ghost" onclick="navigateTo(\'library\')">Back to Library</button>' +
        '</div>'

    }

    // -- THEME TRANSFORMATION --
    // 1. Apply CSS variable overrides (accent colours etc.)
    var _cssOriginals = {}
    if (item.themeStyles && Object.keys(item.themeStyles).length > 0) {
      Object.keys(item.themeStyles).forEach(function(key) {
        _cssOriginals[key] = document.documentElement.style.getPropertyValue(key)
        document.documentElement.style.setProperty(key, item.themeStyles[key])
      })
    }
    // 2. Apply immersive body-class atmosphere (background, glows, hex, tiles…)
    var _themeClass = item.themeClass || null
    if (_themeClass) {
      // Remove any stale theme class first
      var _staleClasses = document.body.className.split(' ').filter(function(c) { return c.startsWith('theme-') })
      _staleClasses.forEach(function(c) { document.body.classList.remove(c) })
      document.body.classList.add(_themeClass)
    }
    window.__detailCleanup = function() {
      // Stop any running timer and save elapsed time before leaving
      if (timerInterval) {
        clearInterval(timerInterval)
        timerInterval = null
        if (timerStart) {
          var _elapsed = (Date.now() - timerStart) / 60000
          timerStart = null
          var _lib = loadData(KEYS.library, [])
          var _it  = _lib.find(function(i) { return i.id === id })
          if (_it) { _it.timerMinutes = (_it.timerMinutes || 0) + _elapsed; saveData(KEYS.library, _lib) }
          addTimerMinutes(_elapsed)
          logEvent('Session ended (navigated away) — ' + Math.round(_elapsed) + ' min on ' + item.title)
        }
      }
      // Restore CSS variables
      Object.keys(_cssOriginals).forEach(function(key) {
        if (_cssOriginals[key]) {
          document.documentElement.style.setProperty(key, _cssOriginals[key])
        } else {
          document.documentElement.style.removeProperty(key)
        }
      })
      // Remove body theme class
      if (_themeClass) document.body.classList.remove(_themeClass)
    }

    // -- TIMER STATE (module-level for this detail render) --
    var timerInterval  = null
    var timerStart     = null
    var timerEpLabel   = null

    function getElapsedStr(start) {
      var elapsed = Math.floor((Date.now() - start) / 1000)
      var h = Math.floor(elapsed / 3600)
      var m = Math.floor((elapsed % 3600) / 60)
      var s = elapsed % 60
      return (h > 0 ? String(h).padStart(2,'0') + ':' : '') +
             String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
    }

    function startTimer(epLabel) {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null }
      timerStart   = Date.now()
      timerEpLabel = epLabel || null
      var dispEl   = document.getElementById('detail-timer-display')
      var epEl     = document.getElementById('detail-timer-ep')
      var btn      = document.getElementById('detail-timer-btn')
      if (epEl) { epEl.textContent = timerEpLabel ? ('\u25b6 ' + timerEpLabel) : ''; epEl.style.display = timerEpLabel ? 'block' : 'none' }
      if (dispEl) dispEl.style.display = 'block'

      if (overlay) {
        if (overlaySeries) {

          overlaySeries.style.textShadow = '0 0 30px ' + accentCol + ', 0 0 60px ' + accentCol
        }
        if (overlayEp && timerEpLabel) overlayEp.textContent = timerEpLabel
        // Adjust overlay subtext depending on content type
        var subEl = overlay.querySelector('.session-overlay-sub')
        if (subEl) {
          if (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') subEl.textContent = 'Initiating read protocol'
          else subEl.textContent = 'Initiating watch protocol'

        // Apply theme accent to ring
        var ringArc = document.getElementById('session-ring-arc')
        if (ringArc) { ringArc.style.stroke = accentCol; ringArc.style.filter = 'drop-shadow(0 0 10px ' + accentCol + ')'; }
        overlay.classList.add('active')
        // Wire stop btn in overlay
        var stopBtn = document.getElementById('session-overlay-stop-btn')
        if (stopBtn) {
          stopBtn.onclick = function() { stopTimer(); overlay.classList.remove('active') }
        }
      }

      timerInterval = setInterval(function() {
        var elapsed = getElapsedStr(timerStart)
        if (dispEl) dispEl.textContent = elapsed
        // Update overlay time if still open
        if (overlayTime) overlayTime.textContent = elapsed
      }, 1000)
    }

    function stopTimer() {
      if (!timerInterval) return
      clearInterval(timerInterval)
      timerInterval = null
      var elapsed   = (Date.now() - timerStart) / 60000   // minutes
      timerStart    = null
      // Save to item
      var lib2  = loadData(KEYS.library, [])
      var item2 = lib2.find(function(i) { return i.id === id })
      if (item2) {
        item2.timerMinutes = (item2.timerMinutes || 0) + elapsed

      // Dismiss overlay if visible
      var overlay = document.getElementById('session-overlay')
      if (overlay) overlay.classList.remove('active')
    }

        logEvent('Deleted ' + item.title + ' from library')
        navigateTo('library')
        showQuickConfirmWithUndo('DELETED: ' + item.title.toUpperCase(), null)
      }
    })
    deleteWrap.appendChild(deleteBtn)
    gravWrap.appendChild(deleteWrap)

    // Add Season button
    var addSeasonWrap = document.createElement('div')
    addSeasonWrap.style.cssText = 'margin-bottom:8px;'
    var addSeasonBtn = document.createElement('button')
    addSeasonBtn.className = 'btn-ghost'
    addSeasonBtn.style.cssText = 'width:100%;font-size:11px;letter-spacing:0.08em;'
    addSeasonBtn.textContent = '+ Add New Season'
    addSeasonBtn.addEventListener('click', function() {
      openAddSeasonModal(item, id, function(updatedItem) {
        var lib6 = loadData(KEYS.library, [])
        var it6 = lib6.find(function(i) { return i.id === id })
        if (!it6) return
        item.seasons = it6.seasons
        item.totalEpisodes = it6.totalEpisodes
        contentArea.innerHTML = ''
        renderSeasonTabs(contentArea, item, item.seasons.length - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      })
    })
    addSeasonWrap.appendChild(addSeasonBtn)
    var manageSeasonBtn = document.createElement('button')
    manageSeasonBtn.className = 'btn-ghost'
    manageSeasonBtn.style.cssText = 'width:100%;font-size:11px;letter-spacing:0.08em;margin-top:6px;'
    manageSeasonBtn.textContent = 'Manage Seasons'
    manageSeasonBtn.addEventListener('click', function() {
      openManageSeasonsModal(item, id, function() {
        var lib6 = loadData(KEYS.library, [])
        var it6 = lib6.find(function(i) { return i.id === id })
        if (!it6) return
        item.seasons = it6.seasons || []
        item.totalEpisodes = it6.totalEpisodes || 0
        item.watchedEpisodes = it6.watchedEpisodes || []
        contentArea.innerHTML = ''
        if (item.seasons && item.seasons.length) renderSeasonTabs(contentArea, item, 0, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        else renderFlatGrid(contentArea, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      })
    })
    addSeasonWrap.appendChild(manageSeasonBtn)
    heroRight.appendChild(addSeasonWrap)

    heroRight.appendChild(gravWrap)
    hero.appendChild(heroRight)

    // -- Timer button listener --
    setTimeout(function() {
      var btn = document.getElementById('detail-timer-btn')
      if (btn) {
        btn.addEventListener('click', function() {
          if (timerInterval) { stopTimer() }
          else { startTimer(null) }
        })
      }
      // Notes autosave on blur
      var ta = document.getElementById('detail-notes')
      if (ta) {
        ta.addEventListener('blur', function() {
          var lib4 = loadData(KEYS.library, [])
          var it4  = lib4.find(function(i) { return i.id === id })
          if (it4) { it4.notes = ta.value; item.notes = ta.value; saveData(KEYS.library, lib4) }
        })
      }
    }, 0)

    // -- Graveyard button --
    gravBtn.addEventListener('click', function() {
      gravWrap.innerHTML =
        '<div class="detail-graveyard-confirm">' +
          '<div class="detail-graveyard-confirm-text">Drop this? Your honesty is noted.</div>' +
          '<div class="detail-graveyard-confirm-btns">' +
            '<button class="btn-danger" data-sfx="graveyard" id="grav-confirm">Confirm</button>' +
            '<button class="btn-ghost" id="grav-cancel">Never mind</button>' +
          '</div>' +
        '</div>'
      document.getElementById('grav-confirm').addEventListener('click', function() {
        if (timerInterval) stopTimer()
        var lib5 = loadData(KEYS.library, [])
        var it5  = lib5.find(function(i) { return i.id === id })
        if (it5) {
          it5.status = 'graveyard'
          it5.graveyardDate = new Date().toISOString().split('T')[0]
          saveData(KEYS.library, lib5)
          logEvent('Dropped ' + item.title + ' to graveyard')
        }
        window.__detailCleanup && window.__detailCleanup()
        window.__detailCleanup = null
        navigateTo('library')
      })
      document.getElementById('grav-cancel').addEventListener('click', function() {
        gravWrap.innerHTML = ''
        gravWrap.appendChild(gravBtn)
      })
    })

    // ============================================================
    // CONTENT NAVIGATION + EPISODE GRID
    // ============================================================
    var contentArea = document.createElement('div')
    contentArea.id = 'detail-content-area'
    heroLeft.appendChild(contentArea)

    var hasSeasonsData = item.seasons && item.seasons.length > 0
    var hasArcsData    = item.arcs    && item.arcs.length    > 0

    if (hasSeasonsData) {
      renderSeasonTabs(contentArea, item, 0, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
    } else if (hasArcsData) {
      renderArcAccordion(contentArea, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
    } else {
      renderFlatGrid(contentArea, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
    }

    // -- Select mode toggle --
    selectBtn.addEventListener('click', function() {
      selectMode    = !selectMode
      selectedEps   = []
      if (selectMode) {
        selectBtn.textContent = '✕ CANCEL'
        selectBtn.style.borderColor = 'var(--accent-warm)'
        selectBtn.style.color       = 'var(--accent-warm)'
      } else {
        selectBtn.textContent = 'SELECT'
        selectBtn.style.borderColor = ''
        selectBtn.style.color       = ''
      }
      selectCountBadge.style.display = 'none'
      updateSelectBar(selectMode, selectedEps, id, item.title, selectBtn, selectCountBadge)
      // Re-render content area to apply/remove select-mode class on tiles
      contentArea.innerHTML = ''
      if (hasSeasonsData) {
        renderSeasonTabs(contentArea, item, 0, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      } else if (hasArcsData) {
        renderArcAccordion(contentArea, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      } else {
        renderFlatGrid(contentArea, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      }
    })
  }

  /* -----------------------------------------------------------------
     PART 4: SEASON TABS RENDERER
  ----------------------------------------------------------------- */
  function renderSeasonTabs(container, item, activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    // Tab row with arrow buttons
    var navRow = document.createElement('div')
    navRow.className = 'detail-season-tabs'
    // Hide arrow buttons for anime and show types
    var hideArrows = (item.type === 'anime' || item.type === 'show')
    var prevBtn = null
    if (!hideArrows) {
      prevBtn = document.createElement('button')
      prevBtn.className = 'btn-ghost'
      prevBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
      prevBtn.textContent = '\u2190'
      prevBtn.disabled = activeIdx === 0
      prevBtn.style.opacity = activeIdx === 0 ? '0.3' : '1'
      prevBtn.addEventListener('click', function() {
        if (activeIdx > 0) {
          container.innerHTML = ''
          renderSeasonTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      })
      navRow.appendChild(prevBtn)
    }

    item.seasons.forEach(function(season, i) {
      var tab = document.createElement('button')
      tab.className = 'detail-season-tab' + (i === activeIdx ? ' active' : '')
      tab.textContent = season.name
      tab.addEventListener('click', function() {
        container.innerHTML = ''
        renderSeasonTabs(container, item, i, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      })
      navRow.appendChild(tab)
    })

    if (!hideArrows) {
      var nextBtn = document.createElement('button')
      nextBtn.className = 'btn-ghost'
      nextBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
      nextBtn.textContent = '\u2192'
      nextBtn.disabled = activeIdx === item.seasons.length - 1
      nextBtn.style.opacity = activeIdx === item.seasons.length - 1 ? '0.3' : '1'
      nextBtn.addEventListener('click', function() {
        if (activeIdx < item.seasons.length - 1) {
          container.innerHTML = ''
          renderSeasonTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      })
      navRow.appendChild(nextBtn)
    }

    container.appendChild(navRow)

    // Keyboard navigation for seasons (ensure only one handler exists)
    if (container._seasonKeyHandler) container.removeEventListener('keydown', container._seasonKeyHandler)
    container.tabIndex = 0
    container._seasonKeyHandler = function(e) {
      if (e.key === 'ArrowLeft' && activeIdx > 0) {
        container.innerHTML = ''
        renderSeasonTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      } else if (e.key === 'ArrowRight' && activeIdx < item.seasons.length - 1) {
        container.innerHTML = ''
        renderSeasonTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      }
    }
    container.addEventListener('keydown', container._seasonKeyHandler)
    if (getAppSettings().autoFocusDetailNav) setTimeout(function() { try { container.focus() } catch (e) {} }, 100)

    // Active season
    var season = item.seasons[activeIdx]
    if (!season) return

    // Episode grid
    var gridWrap = buildFilmstrip(item, season.episodes || [], activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer)
    container.appendChild(gridWrap)

    // Season panel
    var panel = buildSeasonPanel(item, season, activeIdx, container, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
    container.appendChild(panel)
  }

  /* -----------------------------------------------------------------
     PART 4: ARC ACCORDION RENDERER
  ----------------------------------------------------------------- */
  function renderArcAccordion(container, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    renderArcTabs(container, item, 0, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
  }

  function renderArcTabs(container, item, activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    // Use tab row for ≤6 arcs, dropdown select for more (e.g. manhwa with 31 arcs)
    var useDropdown = item.arcs.length > 6
    var hideArrows = (item.type === 'anime' || item.type === 'show')

    if (useDropdown) {
      var navRow = document.createElement('div')
      navRow.style.cssText = 'display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5);border-bottom:1px solid var(--border);padding-bottom:var(--space-4);'

      var prevBtn = null
      if (!hideArrows) {
        prevBtn = document.createElement('button')
        prevBtn.className = 'btn-ghost'
        prevBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        prevBtn.textContent = '\u2190'
        prevBtn.disabled = activeIdx === 0
        prevBtn.style.opacity = activeIdx === 0 ? '0.3' : '1'
      }

      var sel = document.createElement('select')
      sel.className = 'arc-nav-select'
      sel.tabIndex = -1; // Prevent select from stealing focus
      item.arcs.forEach(function(arc, i) {
        var opt = document.createElement('option')
        opt.value = i
        opt.textContent = arc.name + '  (Ch. ' + arc.chapterStart + '\u2013' + arc.chapterEnd + ')'
        if (i === activeIdx) opt.selected = true
        sel.appendChild(opt)
      })

      var nextBtn = null
      if (!hideArrows) {
        nextBtn = document.createElement('button')
        nextBtn.className = 'btn-ghost'
        nextBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        nextBtn.textContent = '\u2192'
        nextBtn.disabled = activeIdx === item.arcs.length - 1
        nextBtn.style.opacity = activeIdx === item.arcs.length - 1 ? '0.3' : '1'
      }

      sel.addEventListener('change', function() {
        container.innerHTML = ''
        renderArcTabs(container, item, parseInt(sel.value, 10), selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
      })
      if (prevBtn) {
        prevBtn.addEventListener('click', function() {
          if (activeIdx > 0) { container.innerHTML = ''; renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) }
        })
      }
      if (nextBtn) {
        nextBtn.addEventListener('click', function() {
          if (activeIdx < item.arcs.length - 1) { container.innerHTML = ''; renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) }
        })
      }

      if (prevBtn) navRow.appendChild(prevBtn)
      navRow.appendChild(sel)
      if (nextBtn) navRow.appendChild(nextBtn)
      container.appendChild(navRow)

      // Keyboard navigation for arcs (dropdown mode) — single handler
      if (container._arcKeyHandler) container.removeEventListener('keydown', container._arcKeyHandler)
      container.tabIndex = 0
      container._arcKeyHandler = function(e) {
        if (e.key === 'ArrowLeft' && activeIdx > 0) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        } else if (e.key === 'ArrowRight' && activeIdx < item.arcs.length - 1) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      }
      container.addEventListener('keydown', container._arcKeyHandler)
      if (getAppSettings().autoFocusDetailNav) setTimeout(function() { try { container.focus() } catch (e) {} }, 100)
    } else {
      // Tab row for small arc counts with arrow buttons
      var navRow = document.createElement('div')
      navRow.className = 'detail-season-tabs'

      if (!hideArrows) {
        var prevBtn = document.createElement('button')
        prevBtn.className = 'btn-ghost'
        prevBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        prevBtn.textContent = '\u2190'
        prevBtn.disabled = activeIdx === 0
        prevBtn.style.opacity = activeIdx === 0 ? '0.3' : '1'
        prevBtn.addEventListener('click', function() {
          if (activeIdx > 0) {
            container.innerHTML = ''
            renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
          }
        })
        navRow.appendChild(prevBtn)
      }

      item.arcs.forEach(function(arc, i) {
        var tab = document.createElement('button')
        tab.className = 'detail-season-tab' + (i === activeIdx ? ' active' : '')
        tab.textContent = arc.name
        tab.title = 'Ch. ' + arc.chapterStart + '\u2013' + arc.chapterEnd
        tab.style.cssText = 'white-space:nowrap;flex-shrink:0;'
        tab.addEventListener('click', function() {
          container.innerHTML = ''
          renderArcTabs(container, item, i, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        })
        navRow.appendChild(tab)
      })

      if (!hideArrows) {
        var nextBtn = document.createElement('button')
        nextBtn.className = 'btn-ghost'
        nextBtn.style.cssText = 'padding:4px 10px;font-size:16px;line-height:1;flex-shrink:0;'
        nextBtn.textContent = '\u2192'
        nextBtn.disabled = activeIdx === item.arcs.length - 1
        nextBtn.style.opacity = activeIdx === item.arcs.length - 1 ? '0.3' : '1'
        nextBtn.addEventListener('click', function() {
          if (activeIdx < item.arcs.length - 1) {
            container.innerHTML = ''
            renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
          }
        })
        navRow.appendChild(nextBtn)
      }

      container.appendChild(navRow)

      // Keyboard navigation for arcs (tab mode) — single handler
      if (container._arcKeyHandler) container.removeEventListener('keydown', container._arcKeyHandler)
      container.tabIndex = 0
      container._arcKeyHandler = function(e) {
        if (e.key === 'ArrowLeft' && activeIdx > 0) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx - 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        } else if (e.key === 'ArrowRight' && activeIdx < item.arcs.length - 1) {
          container.innerHTML = ''
          renderArcTabs(container, item, activeIdx + 1, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
        }
      }
      container.addEventListener('keydown', container._arcKeyHandler)
      if (getAppSettings().autoFocusDetailNav) setTimeout(function() { try { container.focus() } catch (e) {} }, 100)
    }

    var arc = item.arcs[activeIdx]
    if (!arc) return

    // Chapter grid
    var chapters = []
    for (var n = arc.chapterStart; n <= arc.chapterEnd; n++) {
      chapters.push({ number: n, title: 'Ch. ' + n, rating: 0, isChapter: true })
    }
    var gridWrap = buildFilmstrip(item, chapters, activeIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer)
    container.appendChild(gridWrap)

    // Reuse exact season panel: mark all watched + stats cards
    var arcAsSeason = { episodes: chapters, name: arc.name }
    var panel = buildSeasonPanel(item, arcAsSeason, activeIdx, container, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
    container.appendChild(panel)
  }

  /* -----------------------------------------------------------------
     PART 4: FLAT EPISODE GRID (no seasons, no arcs)
  ----------------------------------------------------------------- */
  function renderFlatGrid(container, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    if (!item.totalEpisodes || item.totalEpisodes === 0) {
      // Empty episode state
      var emptyDiv = document.createElement('div')
      emptyDiv.className = 'detail-ep-empty'
      emptyDiv.innerHTML =
        '<div class="detail-ep-empty-title">NO EPISODE DATA ON FILE</div>' +
        '<div class="detail-ep-empty-sub">Set total count to track progress:</div>' +
        '<div class="detail-ep-empty-row">' +
          '<input class="detail-ep-set-input" id="ep-total-input" type="number" min="1" placeholder="0"/>' +
          '<button class="btn-ghost" id="ep-total-set">Set Total</button>' +
        '</div>'
      container.appendChild(emptyDiv)
      setTimeout(function() {
        var setBtn = document.getElementById('ep-total-set')
        var setIn  = document.getElementById('ep-total-input')
        if (setBtn && setIn) {
          setBtn.addEventListener('click', function() {
            var n = parseInt(setIn.value, 10)
            if (!n || n < 1) return
            var lib = loadData(KEYS.library, [])
            var it  = lib.find(function(i) { return i.id === item.id })
            if (it) { it.totalEpisodes = n; item.totalEpisodes = n; saveData(KEYS.library, lib) }
            container.innerHTML = ''
            renderFlatGrid(container, item, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer)
          })
        }
      }, 0)
      return
    }

    // Build episode list from totalEpisodes
    var episodes = []
    for (var n = 1; n <= item.totalEpisodes; n++) {
      episodes.push({ number: n, title: 'Episode ' + n, rating: 0 })
    }
    var gridWrap = buildFilmstrip(item, episodes, null, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer)
    container.appendChild(gridWrap)
  }

  /* -----------------------------------------------------------------
     PART 4: EPISODE KEY HELPER
     Season-qualified keys prevent S1E1 and S2E1 from colliding.
  ----------------------------------------------------------------- */
  function makeEpKey(seasonIdx, epNum) {
    return (seasonIdx !== null && seasonIdx !== undefined) ? ('s' + seasonIdx + '_' + epNum) : epNum
  }

  /* -----------------------------------------------------------------
     PART 4: FILMSTRIP + EPISODE GRID BUILDER
     Returns the full filmstrip wrapper DOM element.
  ----------------------------------------------------------------- */
  function buildFilmstrip(item, episodes, seasonId, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer) {
    var filmstrip = document.createElement('div')
    filmstrip.className = 'detail-filmstrip'

    var grid = document.createElement('div')
    grid.className = 'detail-ep-grid'

    episodes.forEach(function(ep) {
      var tile = buildEpTile(item, ep, seasonId, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer)
      grid.appendChild(tile)
    })

    filmstrip.appendChild(grid)
    return filmstrip
  }

  /* -----------------------------------------------------------------
     PART 4: SINGLE EPISODE TILE BUILDER
  ----------------------------------------------------------------- */
  function buildEpTile(item, ep, seasonIdx, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer) {
    var tile = document.createElement('div')
    tile.className = 'ep-tile'
    if (ep.isChapter) tile.classList.add('chapter-tile')
    if (selectMode) tile.classList.add('select-mode')

    var epKey = makeEpKey(seasonIdx, ep.number)
    var isWatched = item.watchedEpisodes && item.watchedEpisodes.includes(epKey)
    if (isWatched) tile.classList.add('watched')

    tile.innerHTML =
      (ep.ratingIMDb ? '<span class="ep-badge-imdb">' + ep.ratingIMDb + '</span>' : (ep.rating ? '<span class="ep-rating-badge">\u2605' + ep.rating + '</span>' : '')) +
      (ep.ratingMAL  ? '<span class="ep-badge-mal">'  + ep.ratingMAL  + '/5</span>' : '') +
      '<span class="ep-num">' + ep.number + '</span>' +
      '<span class="ep-check">\u2713</span>' +
      '<button class="ep-rate-btn" title="Rate this episode">\u2605</button>' +
      '<button class="ep-timer-btn" title="Start timer for this episode">\u23f1</button>'

    // Tooltip
    if (ep.title && ep.title !== 'Episode ' + ep.number) {
      var ratingTip = ep.ratingIMDb ? ' · IMDb ' + ep.ratingIMDb + (ep.ratingMAL ? ' · MAL ' + ep.ratingMAL + '/5' : '') : (ep.rating ? ' \u00b7 \u2605' + ep.rating : '')
      tile.title = ep.title + ratingTip
    }

    // Rate button — opens star popup
    var rateBtn = tile.querySelector('.ep-rate-btn')
    if (rateBtn) {
      rateBtn.addEventListener('click', function(e) {
        e.stopPropagation()
        // Remove any existing popups
        document.querySelectorAll('.ep-rate-popup').forEach(function(p) { p.remove() })
        var popup = document.createElement('div')
        popup.className = 'ep-rate-popup'
        for (var s = 1; s <= 10; s++) {
          var star = document.createElement('button')
          star.className = 'ep-rate-star' + (ep.rating >= s ? ' filled' : '')
          star.textContent = s <= 5 ? '\u2605' : (s <= 10 ? String(s) : '')
          // Use numbers 6-10 as text for compact display
          if (s > 5) {
            star.style.fontSize = '10px'
            star.style.fontFamily = 'var(--font-mono)'
            star.className = 'ep-rate-star' + (ep.rating >= s ? ' filled' : '')
          }
          star.dataset.val = s
          star.addEventListener('click', function(ev) {
            ev.stopPropagation()
            var val = parseInt(this.dataset.val)
            ep.rating = val
            // Save to localStorage
            var lib = loadData(KEYS.library, [])
            var it = lib.find(function(i) { return i.id === item.id })
            if (it) {
              // Find this ep in seasons or arcs
              var found = false
              ;(it.seasons || []).forEach(function(season) {
                ;(season.episodes || []).forEach(function(e) {
                  if (e.number === ep.number) { e.rating = val; found = true }
                })
              })
              if (!found) {
                // flat episodes — create in first season
                if (it.seasons && it.seasons.length > 0) {
                  var sEp = it.seasons[0].episodes.find(function(e) { return e.number === ep.number })
                  if (sEp) sEp.rating = val
                }
              }
              saveData(KEYS.library, lib)
            }
            popup.remove()
            // Update badge on tile
            var existingBadge = tile.querySelector('.ep-rating-badge')
            if (existingBadge) existingBadge.remove()
            var badge = document.createElement('span')
            badge.className = 'ep-rating-badge'
            badge.textContent = '\u2605' + val
            tile.insertBefore(badge, tile.firstChild)
          })
          popup.appendChild(star)
        }
        // Clear button
        if (ep.rating) {
          var clearBtn = document.createElement('button')
          clearBtn.className = 'ep-rate-star clear-btn'
          clearBtn.textContent = '\u2715'
          clearBtn.title = 'Clear rating'
          clearBtn.addEventListener('click', function(ev) {
            ev.stopPropagation()
            ep.rating = 0
            var lib = loadData(KEYS.library, [])
            var it = lib.find(function(i) { return i.id === item.id })
            if (it) {
              ;(it.seasons || []).forEach(function(season) {
                ;(season.episodes || []).forEach(function(e) {
                  if (e.number === ep.number) e.rating = 0
                })
              })
              saveData(KEYS.library, lib)
            }
            popup.remove()
            var existingBadge = tile.querySelector('.ep-rating-badge')
            if (existingBadge) existingBadge.remove()
          })
          popup.appendChild(clearBtn)
        }
        tile.appendChild(popup)
        // Close on outside click
        setTimeout(function() {
          document.addEventListener('click', function closePopup() {
            popup.remove()
            document.removeEventListener('click', closePopup)
          }, { once: true })
        }, 10)
      })
    }

    // Click: select mode vs toggle watched
    tile.addEventListener('click', function(e) {
      if (e.target.classList.contains('ep-timer-btn')) return

      if (selectMode) {
        tile.classList.toggle('tile-selected')
        var idx = selectedEps.indexOf(ep.number)
        if (idx === -1) selectedEps.push(ep.number)
        else selectedEps.splice(idx, 1)
        var n = selectedEps.length
        selectCountBadge.textContent = n + ' SELECTED'
        selectCountBadge.style.display = n > 0 ? 'inline' : 'none'
        updateSelectBar(true, selectedEps, item.id, item.title, selectBtn, selectCountBadge)
        return
      }

      // Toggle watched
      tile.classList.add('tile-flash')
      setTimeout(function() { tile.classList.remove('tile-flash') }, 420)

      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (!it) return

      var wasWatched    = it.watchedEpisodes && it.watchedEpisodes.includes(epKey)
      var beforeCount   = it.watchedEpisodes ? it.watchedEpisodes.length : 0

      if (!it.watchedEpisodes) it.watchedEpisodes = []
      if (wasWatched) {
        it.watchedEpisodes = it.watchedEpisodes.filter(function(n) { return n !== epKey })
        tile.classList.remove('watched')
        logEvent((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel' ? 'Unread ch ' : 'Unwatched ep ') + ep.number + ' of ' + item.title)
      } else {
        it.watchedEpisodes.push(epKey)
        tile.classList.add('watched')
        logEvent((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel' ? 'Read ch ' : 'Watched ep ') + ep.number + ' of ' + item.title)
      }

      // Sync back to the live item reference
      item.watchedEpisodes = it.watchedEpisodes.slice()
      saveData(KEYS.library, lib)

      // Update hero progress bar live (no re-render)
      var fill       = document.getElementById('detail-prog-fill')
      var progLabel  = document.querySelector('.detail-progress-label')
      var newWatched = it.watchedEpisodes.length
      var newPct     = it.totalEpisodes > 0
        ? Math.min((newWatched / it.totalEpisodes) * 100, 100) : 0
      if (fill)      fill.style.width = newPct + '%'
      if (progLabel) progLabel.textContent = newWatched + ' of ' + it.totalEpisodes + ' ' +
        ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'chapters' : 'eps') + ' ' + ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'read' : 'watched')
      checkSeasonCompletion(it, beforeCount, tile)
      // Notify season panel to refresh its stat cards
      document.dispatchEvent(new CustomEvent('ep-toggled', { detail: { itemId: item.id, watchedEpisodes: it.watchedEpisodes } }))
    })

    // Timer button on tile
    var timerBtn = tile.querySelector('.ep-timer-btn')
    if (timerBtn) {
      timerBtn.addEventListener('click', function(e) {
        e.stopPropagation()
        var label = ((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel') ? 'Ch.' : 'Ep.') + ' ' + ep.number
        startTimer(label)
      })
    }

    return tile
  }

  /* -----------------------------------------------------------------
     PART 4: SEASON PANEL (mark all + stats + ratings table)
  ----------------------------------------------------------------- */
  function buildSeasonPanel(item, season, seasonIdx, container, selectMode, selectedEps, selectBtn, selectCountBadge, startTimer, stopTimer) {
    var panel = document.createElement('div')
    panel.className = 'detail-season-panel'

    var eps     = season.episodes || []
    var epNums  = eps.map(function(e) { return makeEpKey(seasonIdx, e.number) })
    var watched = item.watchedEpisodes ? item.watchedEpisodes.filter(function(n) { return epNums.includes(n) }).length : 0
    var isReadingType = (item.type && ['manga','manhwa','novel'].includes(String(item.type).toLowerCase()))
    // MAL episode ratings are 0-5 scale; overall/movie MAL ratings are 0-10.
    // Rule: if ratingMAL > 5 it is already on the 0-10 scale (movie/overall) — use as-is.
    //       if ratingMAL <= 5 it is an episode rating on the 0-5 scale — multiply by 2.
    function normalizeMALEpRating(val) { var v = Number(val); return v > 5 ? v : v * 2 }

    var completePct = eps.length > 0 ? Math.round((watched / eps.length) * 100) : 0

    // Mark all watched button
    var markAllBtn = document.createElement('button')
    markAllBtn.className = 'btn-ghost'
    markAllBtn.dataset.sfx = 'success'
    markAllBtn.style.cssText = 'flex:1;'
    markAllBtn.textContent = isReadingType ? 'MARK ALL READ' : 'MARK ALL WATCHED'
    markAllBtn.addEventListener('click', function() {
      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (!it) return
      if (!it.watchedEpisodes) it.watchedEpisodes = []
      var beforeCount  = it.watchedEpisodes.length
      var allInSeason  = epNums.filter(function(n) { return !it.watchedEpisodes.includes(n) })
      it.watchedEpisodes = it.watchedEpisodes.concat(allInSeason)
      item.watchedEpisodes = it.watchedEpisodes.slice()
      saveData(KEYS.library, lib)

      // Cascade flash on tiles
      var tiles = container.querySelectorAll('.ep-tile')
      tiles.forEach(function(tile, i) {
        setTimeout(function() {
          tile.classList.add('watched', 'tile-flash')
          setTimeout(function() { tile.classList.remove('tile-flash') }, 420)
        }, i * 50)
      })

      // Update progress bar
      var fill      = document.getElementById('detail-prog-fill')
      var progLabel = document.querySelector('.detail-progress-label')
      var newPct    = it.totalEpisodes > 0
        ? Math.min((it.watchedEpisodes.length / it.totalEpisodes) * 100, 100) : 0
      if (fill) fill.style.width = newPct + '%'
      if (progLabel) progLabel.textContent = it.watchedEpisodes.length + ' of ' + it.totalEpisodes +
        ' ' + ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'chapters' : 'eps') + ' ' + ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'read' : 'watched')

      checkSeasonCompletion(it, beforeCount, markAllBtn)
      refreshStats(it.watchedEpisodes)
    })

    // Mark all unwatched button
    var unmarkAllBtn = document.createElement('button')
    unmarkAllBtn.className = 'btn-danger'
    unmarkAllBtn.dataset.sfx = 'toggle'
    unmarkAllBtn.style.cssText = 'flex:1;'
    unmarkAllBtn.textContent = isReadingType ? 'MARK ALL UNREAD' : 'MARK ALL UNWATCHED'
    unmarkAllBtn.addEventListener('click', function() {
      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (!it) return
      // Remove all episodes in this season from watchedEpisodes
      it.watchedEpisodes = (it.watchedEpisodes || []).filter(function(n) { return !epNums.includes(n) })
      item.watchedEpisodes = it.watchedEpisodes.slice()
      saveData(KEYS.library, lib)

      // Cascade unflash on tiles
      var tiles = container.querySelectorAll('.ep-tile')
      tiles.forEach(function(tile, i) {
        setTimeout(function() {
          tile.classList.remove('watched')
          tile.classList.add('tile-flash')
          setTimeout(function() { tile.classList.remove('tile-flash') }, 420)
        }, i * 40)
      })

      // Update progress bar
      var fill      = document.getElementById('detail-prog-fill')
      var progLabel = document.querySelector('.detail-progress-label')
      var newPct    = it.totalEpisodes > 0
        ? Math.min((it.watchedEpisodes.length / it.totalEpisodes) * 100, 100) : 0
      if (fill) fill.style.width = newPct + '%'
      if (progLabel) progLabel.textContent = it.watchedEpisodes.length + ' of ' + it.totalEpisodes +
        ' ' + ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'chapters' : 'eps') + ' ' + ((it.type === 'manga' || it.type === 'manhwa' || it.type === 'novel') ? 'read' : 'watched')

      logEvent((item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel' ? 'Unread all of ' : 'Unwatched all of ') + item.title)
      refreshStats(it.watchedEpisodes)
    })

    // Wrap both buttons in a flex row
    var btnRow = document.createElement('div')
    btnRow.style.cssText = 'display:flex;gap:8px;width:100%;'
    btnRow.appendChild(markAllBtn)
    btnRow.appendChild(unmarkAllBtn)
    panel.appendChild(btnRow)

    // Season stats
    var stats = document.createElement('div')
    stats.className = 'detail-season-stats'
    stats.id = 'season-stats-' + (season.id || seasonIdx)
    function getAvgRatingDisplay() {
      if (!eps.length) return null
      var ratedEps = eps.filter(function(e) { return e.ratingIMDb || e.ratingMAL || e.rating })
      if (!ratedEps.length) return null
      var sum = ratedEps.reduce(function(s, e) {
        var count = 0
        var total = 0
        if (e.ratingIMDb) { total += Number(e.ratingIMDb); count++ }
        if (e.ratingMAL)  { total += normalizeMALEpRating(e.ratingMAL); count++ }
        if (count === 0 && e.rating) { total = Number(e.rating); count = 1 }
        return s + (count > 0 ? total / count : 0)
      }, 0)
      return (sum / ratedEps.length).toFixed(1)
    }
    function refreshStats(watchedEps) {
      var newWatched = watchedEps ? watchedEps.filter(function(n) { return epNums.includes(n) }).length : 0
      var newPct = eps.length > 0 ? Math.round((newWatched / eps.length) * 100) : 0
      // For reading types (manga/manhwa/novel) we omit Avg Rating and show only 2 stat cards
      var isReadingType = (item.type === 'manga' || item.type === 'manhwa' || item.type === 'novel')
      var avgRating = getAvgRatingDisplay()
      if (isReadingType || !avgRating) {
        stats.style.cssText = 'display:grid;grid-template-columns:repeat(2,1fr);gap:16px;'
        stats.innerHTML =
          '<div class="stat-card"><div class="stat-card-number">' + newWatched + ' / ' + eps.length + '</div><div class="stat-card-label">' + (isReadingType ? 'Read' : 'Watched') + '</div></div>' +
          '<div class="stat-card"><div class="stat-card-number">' + newPct + '%</div><div class="stat-card-label">Complete</div></div>'
      } else {
        stats.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:16px;'
        stats.innerHTML =
          '<div class="stat-card"><div class="stat-card-number">' + avgRating + '</div><div class="stat-card-label">Avg Rating</div></div>' +
          '<div class="stat-card"><div class="stat-card-number">' + newWatched + ' / ' + eps.length + '</div><div class="stat-card-label">Watched</div></div>' +
          '<div class="stat-card"><div class="stat-card-number">' + newPct + '%</div><div class="stat-card-label">Complete</div></div>'
      }
    }
    refreshStats(item.watchedEpisodes)
    panel.appendChild(stats)

    // Refresh stats when any tile is toggled
    function onEpToggled(e) {
      if (e.detail.itemId === item.id) refreshStats(e.detail.watchedEpisodes)
    }
    document.addEventListener('ep-toggled', onEpToggled)
    // Clean up listener when panel is removed from DOM
    var observer = new MutationObserver(function() {
      if (!panel.isConnected) { document.removeEventListener('ep-toggled', onEpToggled); observer.disconnect() }
    })
    observer.observe(document.body, { childList: true, subtree: true })

    // Episode ratings are now inline on each tile — no separate table needed

    return panel
  }

  /* -----------------------------------------------------------------
     PART 4: SEASON / SERIES COMPLETION CHECK + CELEBRATIONS
  ----------------------------------------------------------------- */
  function checkSeasonCompletion(item, beforeCount, triggerEl) {
    var allWatched = item.watchedEpisodes ? item.watchedEpisodes.length : 0

    // Series complete?
    if (item.totalEpisodes > 0 && allWatched >= item.totalEpisodes && item.status !== 'completed') {
      var lib = loadData(KEYS.library, [])
      var it  = lib.find(function(i) { return i.id === item.id })
      if (it) {
        it.status = 'completed'
        item.status = 'completed'
        saveData(KEYS.library, lib)
        logEvent('Completed ' + item.title)
      }
      fireCompletionCelebration(item.title)
      return
    }

    // Season complete check — look for a newly-completed season
    if (!item.seasons || item.seasons.length === 0) return
    item.seasons.forEach(function(season, sIdx) {
      var epNums  = (season.episodes || []).map(function(e) { return makeEpKey(sIdx, e.number) })
      if (epNums.length === 0) return
      var nowComplete   = epNums.every(function(n) { return item.watchedEpisodes && item.watchedEpisodes.includes(n) })
      var hadAllBefore  = epNums.every(function(n) {
        // Approximate: if count before >= all in season AND all nums ≤ beforeCount
        return n <= beforeCount
      })
      if (nowComplete && !hadAllBefore) {
        fireSeasonCelebration(season.name, item.title, triggerEl)
      }
    })
  }

  function fireSeasonCelebration(seasonName, title, triggerEl) {
    logEvent('Completed ' + seasonName + ' of ' + title)
    // Play season complete sound
    if (typeof P6SFX !== 'undefined') P6SFX.UI_SUCCESS()
    // Burst ring from trigger element
    var rect = triggerEl ? triggerEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 }
    var ring = document.createElement('div')
    ring.className = 'season-burst-ring'
    ring.style.cssText = 'width:60px;height:60px;left:' + (rect.left + rect.width/2) + 'px;top:' + (rect.top + rect.height/2) + 'px;'
    document.body.appendChild(ring)
    setTimeout(function() { ring.remove() }, 650)
    // Shine on any active tab
    var activeTab = document.querySelector('.detail-season-tab.active')
    if (activeTab) {
      activeTab.classList.add('season-shine')
      setTimeout(function() { activeTab.classList.remove('season-shine') }, 900)
    }
  }

  function fireCompletionCelebration(title) {
    // Play cinematic completion sound
    if (typeof P6SFX !== 'undefined') P6SFX.UI_COMPLETE()
    // Canvas confetti
    var canvas = document.createElement('canvas')
    canvas.style.cssText = 'position:fixed;inset:0;z-index:9000;pointer-events:none;'
    canvas.width  = window.innerWidth
    canvas.height = window.innerHeight
    document.body.appendChild(canvas)
    var ctx = canvas.getContext('2d')
    var COLORS = ['#00d4ff','#ff6b35','#00ff88','#ff3355','#ffd700','#9b59ff']
    var particles = []
    for (var i = 0; i < 200; i++) {
      particles.push({
        x:  Math.random() * canvas.width,
        y: -Math.random() * 200,
        vx: (Math.random() - 0.5) * 4,
        vy:  Math.random() * 3 + 1,
        size: Math.random() * 6 + 3,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: 1
      })
    }
    var startTs = performance.now()
    var DURATION = 3000
    function confettiFrame(ts) {
      var elapsed = ts - startTs
      ctx.clearRect(0, 0, canvas.width, canvas.height)
      particles.forEach(function(p) {
        p.x  += p.vx
        p.y  += p.vy
        p.vy += 0.3
        p.vx += (Math.random() - 0.5) * 0.2
        p.alpha = Math.max(0, 1 - (elapsed / DURATION))
        ctx.globalAlpha = p.alpha
        ctx.fillStyle = p.color
        ctx.fillRect(p.x, p.y, p.size, p.size * 0.6)
      })
      ctx.globalAlpha = 1
      if (elapsed < DURATION) requestAnimationFrame(confettiFrame)
      else canvas.remove()
    }
    requestAnimationFrame(confettiFrame)

    // Banner
    var banner = document.createElement('div')
    banner.className = 'completion-banner'
    banner.textContent = 'YOU FINISHED ' + title.toUpperCase() + '. RESPECT.'
    document.body.appendChild(banner)
    setTimeout(function() { banner.classList.add('visible') }, 50)
    setTimeout(function() {
      banner.classList.remove('visible')
      setTimeout(function() { banner.remove() }, 450)
    }, 4000)
  }
