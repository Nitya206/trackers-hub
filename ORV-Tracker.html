  26: `<b>🔖 Story so far:</b> Picture the loneliest reader in the world. <b>Kim Dokja</b>, a twenty-eight-year-old contract employee at a software company called Mino Soft, spent over a decade as the sole audience of a web novel titled <i>Three Ways to Survive in a Ruined World</i> — 3,149 chapters written by an author who went only by <b>tls123</b>, averaging 1.9 hits and 1.08 comments per chapter. That extra 0.08 was Dokja talking to himself. Nobody else read it. Nobody else cared. On the day the novel finally concluded, tls123 sent Dokja a personal message — thank you for being my only reader; you won a competition; I will send you something special — and at 6:55 PM, the full text arrived as an email attachment. Five minutes later, the subway Dokja was riding ground to a halt, every screen flickered, and a system announcement informed the planet that the free service of planetary system 8612 had been terminated. The main scenario had started.<br><br>The world had been converted into something called the <b>Star Stream</b>: a cosmic broadcast system run by goblin-like beings called <b>Dokkaebis</b>, watched by godlike entities known as <b>Constellations</b> — mythological and legendary figures from across the universe who paid in coins to observe humans survive lethal challenges called scenarios. Every human was now an incarnation, a contestant in a game where failure meant death and success meant currency to buy stats, skills, and another day alive. In carriage 3807, a small dokkaebi named <b>Bihyung</b> materialized and announced, with terrible cheer, that everyone had thirty minutes to kill at least one living thing or their heads would explode.<br><br>Dokja already knew. He had read the script — the entire novel, every character, every hidden scenario, every monster, every trick. While the carriage dissolved into screaming mob violence, he grabbed a boy's insect net, killed a clutch of grasshopper eggs (each egg counted as a separate kill), and tossed the net across the train so others could survive too. Five people walked out of carriage 3807: Dokja himself; <b>Yoo Sangah</b>, his quiet, perceptive coworker; <b>Lee Hyunsung</b>, a broad-shouldered army lieutenant who froze during the violence and carried the shame of it afterward; <b>Lee Gilyoung</b>, a ten-year-old boy with an insect catcher and no surviving parents; and <b>Han Myungoh</b>, the cowardly finance head who would later betray them all and then, much later, find his missing daughter in the rubble. <b>Kim Namwoon</b>, the teenage thug who had beaten an elderly woman to death, ran out of things to kill. His head exploded. Dokja bookmarked his skills before it happened.<br><br>Then the actual protagonist of the novel showed up. <b>Yoo Joonghyuk</b>, a regressor who had lived through this apocalypse before and reset, was absurdly powerful and immediately suspicious of the stranger who knew things he should not know. His solution to Dokja's impossible foreknowledge was to grab him by the throat, punch him twice, and throw him off a collapsing bridge into the mouth of a sea monster. Dokja had predicted this. He spent three days inside the ichthyosaur's stomach, killed it from the inside, and used the spectacle to negotiate a soul-pledged broadcasting contract with Bihyung — all coin revenue to Dokja, zero to the dokkaebi, in exchange for making Bihyung's channel the most-watched stream in the Star Stream. It was an impossible deal. Bihyung signed it anyway.<br><br>Yoo Joonghyuk was, to put it plainly, the most difficult person alive. A man who communicated primarily through violence, silence, and the occasional grudging glance that passed for approval in his vocabulary. His relationship with Dokja was built on mutual incomprehension — a regressor who could not understand how a sponsorless human kept surviving, and a reader who could not stop himself from caring about the character he had spent a decade watching fail and reset. On a Seoul rooftop during the Salvation Church crisis, while Yoo Joonghyuk teetered on the edge of regression depression — a condition that worsened with each cycle and threatened to make him abandon the timeline entirely — Dokja told him not to imagine he would get better by throwing away this round, that maybe this was the round where he would see the end of the world as a human. Joonghyuk did not regress. When <b>Nirvana Moebius</b>'s 108 Worries attacked his mind during the final confrontation, the memory of Dokja's voice was what pulled him back from the edge.<br><br>Dokja's tools were unlike anything the system had modelled. <b>Omniscient Reader's Viewpoint</b> let him read the inner thoughts and stats of anyone he understood deeply enough. The <b>Fourth Wall</b> blocked every form of detection, analysis, and precognition — which meant not even Yoo Joonghyuk's godlike Sage's Eye could figure out what Dokja actually was. <b>Bookmark</b> let him temporarily borrow the skills of anyone he had memorized. <b>Character List</b> pulled up detailed information sheets on anyone who existed in the original novel. He refused every Constellation sponsor, stayed alone, and in doing so made himself the most interesting person on any channel.<br><br>From carriage 3807, a company formed. <b>Jung Heewon</b>, a woman who carried a sword and an exclusive attribute born from the trauma of male violence — Demon Slayer, later <b>Judge of Destruction</b> — became the group's deadliest blade. She cut through everything the scenario put in front of her and only ever hesitated when it came to the man she kept watching on replay screens when she thought nobody was looking. <b>Han Sooyoung</b>, a phenomenally successful webnovel author who had once plagiarized excerpts of <i>Ways of Survival</i> and sold corrupted spoilers to a network of Prophets, arrived as an enemy and remained as the person who understood Dokja's mind more precisely than anyone alive. She read ninety-nine chapters of the novel and became the <b>Abyssal Black Flame Dragon</b>'s chosen, wielding the black flames of an apocalyptic Constellation. <b>Lee Jihye</b>, a young maritime commander sponsored by the legendary Yi Sunsin, grew from a hot-headed teenager into someone whose Instant Kill technique annihilated entire fleets. <b>Shin Yoosung</b>, a girl Dokja found surviving alone during the Disasters arc, had been destined in the original novel to become the Fourth Disaster; Dokja made her his first incarnation and gave her a different future. Her <b>Beast Lord</b> attribute awakened fully during the Journey to the West, when she ran across the surface of a battlefield river to grab Kim Dokja's hand before his consciousness dissolved into an Outer God. <b>Gong Pildu</b>, a middle-aged man who hated everything except his turrets, became the Armed Fortress Master and the grumpy, coin-obsessed backbone of every siege. Lee Gilyoung grew from a child clutching an insect net into the Ruler of the Deepest Pit, whose locusts could darken a sky.<br><br>Dokja died three times in the first eight arcs alone. The first death came fighting a thousand-year-old version of Shin Yoosung from the forty-first regression, a Disaster of Floods who did not recognize any of them. He used the resurrection granted by his <b>King of No Killing</b> attribute and climbed back up. The second death arrived on the same battlefield when <b>Uriel</b>'s Hell Flames Ignition — channelled through Dokja via Bookmark — destroyed the disaster's soul contract and freed her spirit. The third death closed the Salvation Church arc: Dokja entered Yoo Joonghyuk's body through Omniscient Reader's Viewpoint to fight Nirvana Moebius, a reincarnator who had lived hundreds of lives as everything from a diving beetle to a cult leader and wanted only to die for real. The Fourth Wall consumed Nirvana's soul inside Joonghyuk's inner world and then informed Dokja, in a sentence that appeared on its own surface, that someday it might eat him too. Dokja's physical body bled out from a wound Han Sooyoung had inflicted as part of the plan. Two days later, his funeral began. He came back. He always came back. That was the problem — it taught him that his own death was an acceptable price, and the people who loved him could not make him unlearn it.<br><br>On Peace Land, a miniature planet that served as the Abandoned World scenario, Dokja killed for the first time. He drove his blade through a possessed incarnation whose body housed an eight-headed snake god, and the attribute King of No Killing vanished permanently. He had sacrificed it deliberately. The replacement — <b>Eight Lives</b> — required a killer's hands to germinate. In the Underworld beneath Seoul, <b>Persephone</b>, the queen of the dead who wore Yoo Sangah's face in a black dress just to annoy him, told him the truth about souls: there was no such thing. A soul was a story. The dead were accumulated narratives. What humans called resurrection was impossible unless you could rewrite the narrative itself.<br><br>Yoo Sangah, the woman who had taken Dokja's hand on a train platform without looking at him while he talked about his mother killing his father, was eventually destroyed by a disease that dissolved stories — her body disintegrating into the Fourth Wall, where she became the library's new guardian. Dokja punched a hole in the Wall to preserve her. Later, at the Reincarnation Island during the Great War of Saints and Demons, the Mandala's Guardian designated her as the new Arahat — a seeker of truth free to reincarnate across all worlds. She returned wearing the form of Sakyamuni's Successor and removed the headband from the <b>Great Sage</b>'s skull, freeing the Monkey King entirely.<br><br><b>Lee Sookyung</b>, Dokja's mother, was a convicted murderer. She had killed his abusive, gambling father with her own hands and gone to prison, where Dokja visited her every week for years. He never brought conversation. He brought chapters of <i>Ways of Survival</i> and read them aloud until visiting hours ended. Her bestselling prison essay about the killing had turned young Dokja into a target for reporters, classmates, and relatives who passed him between households like an inconvenient parcel. The convenience-store kimbap he survived on for years, the bruises from school gangs, the aunt who dragged him to Seoul — these memories were the raw material from which the <b>Oldest Dream</b> would eventually be built, though nobody in the company knew that yet.<br><br><b>Kim Dokja's Company</b> became a registered Nebula following the Constellation Banquet, backed by four sponsors: Persephone of the Underworld, the Prisoner of the Golden Headband (<b>Sun Wukong</b>), the Demon-like Judge of Fire (Uriel), and the shadowy <b>Secretive Plotter</b>. During the Demon King Selection, Dokja won the title of the 73rd Demon King and triggered his first <b>Giant Story</b> — <b>Demon Realm's Spring</b> — while the Star Stream marked him as a "character" rather than just an incarnation for the first time, a distinction that unsettled him deeply. During the Gigantomachia that followed, the Company fought Olympus by building giant soldiers from human souls, debunking the fake myth of Heracles, and earning the Giant Story <b>Torch That Swallowed the Myth</b> — a story whose moral alignment could not be determined by the system, born entirely outside the scheduled competition between Good and Evil. The Duet Between Good and Evil ended in an unprecedented neutral result, forcing the early activation of the Great War of Saints and Demons. Yoo Sangah, who had been preserved inside the Fourth Wall after a disease dissolved her story-body, could now push fabricated revelations through the hole Dokja had punched in the wall — a tool the Company weaponised ruthlessly. Kim Dokja told his companions the truth about <i>Ways of Survival</i> — that they were characters in a novel he had read — and the disclosure nearly broke the company apart. Lee Jihye could not reconcile the word "character" with a man who had died for them repeatedly. Jung Heewon told her firmly that Dokja had not written the novel and every choice he had made within the scenario belonged entirely to him. The comfort accumulated quietly enough not to feel like comfort.<br><br>The Great War of Saints and Demons unfolded across the Isle of Reincarnators. Before the main battle, the company passed through the <b>Kaizenix Archipelago</b> — a medieval-maritime sub-world where each companion inhabited a native character's body. Dokja woke as a poisoned prince; Yoo Joonghyuk as a coldly brilliant first prince; Han Sooyoung merged with the world's female protagonist, a woman named <b>Yuri di Aristel</b> who was politically astute enough to draw her own conclusions about the strangers wearing her neighbours' skins. The sub-world's genre kept updating as they fought and when it resolved, the result was "Kim Dokja's Company" — a genre that had never existed before. Before entering the portal to the Great War, Han Sooyoung stopped Dokja with unusual seriousness and asked him to promise that when all scenarios had ended, he would read the novel she intended to write — possibly over three thousand chapters, possibly boring. He agreed without hesitation. She stared at him with disbelief. He told her it would be right up his alley. It was the first promise between them entirely disconnected from survival.<br><br>On the main battlefield, Lee Hyunsung was killed at Gate 117. Dokja summoned the Indescribable Distance itself to turn the tide and nearly ceased to exist when the accumulated karma tried to erase him. The Secretive Plotter — an entity of incomprehensible power who had been manipulating events from the shadows — stole him from the battlefield and carried him toward the Great Hole at the edge of the world. Kim Dokja was not on the Ark when it departed. The company reached toward the closing sky as the island disappeared. The Giant Story <b>Season of Light and Darkness</b> was born.<br><br>Three arcs later, the truth emerged: the Secretive Plotter was the 1863rd-turn Yoo Joonghyuk. A version of the man who had survived so many apocalypse cycles he forgot his own name, been reborn as an Outer God, and crossed back into this world-line carrying a half-remembered promise. The current Yoo Joonghyuk was not the third-turn protagonist Dokja had read about. He was the 1864th — a regression that should not have been possible, enabled by a world-line that should not exist, created when the end result of the story interfered with its own cause. The gift tls123 had mentioned sending was this man.<br><br>During the Journey to the West Remake, Dokja transformed into an Outer God to seize the sacred texts and nearly lost himself. Shin Yoosung ran across a battlefield river to grab his hand, activating the Constrictive Headband and pulling him back. Four composite Sun Wukongs descended. Yoo Sangah removed the headband from the Great Sage's head entirely, and the Seven Great Sages fought their final war. The company won. They qualified for the <b>Final Scenario</b>.<br><br>After a mandatory rest day on a mountain campsite imposed by Han Sooyoung, Lee Hyunsung's soul wandered to planet Oz — a derelict theme park running experiential re-enactments of his own life as its last tourist attraction. The company recovered him. He walked out with the name <b>Emperor of Steelsword</b>, given by the true Master of Steel. Then the <b>Great Apocalypse</b> arrived. Four beings who had survived the 999th regression turn as <b>Outer God Kings</b> converged: the <b>Living Flame</b>, who was the 999th-turn Uriel; the <b>Master of the Sunken Island</b>, who was Lee Jihye; the <b>Monarch of the Great Abyss</b>, who was Kim Namwoon; and the <b>King of the Silver Heart</b>, who was Lee Hyunsung. They carried forty thousand years of grief. Dokja stood in the Pacific holding a White Flag of Complete Surrender and talked instead of fighting. This world-line's Yoo Joonghyuk delivered the dead man's final words to beings who had waited millennia to hear them. The Kings relinquished the position of calamity. The hidden scenario <b>One Single Story</b> reached its Conclusion. A fifth Giant Story awakened. Yoo Joonghyuk, standing before a crowd of survivors and cameras, declared he would not die and would not regress. This was his final turn.<br><br>In the Final Scenario, the company arrived at the Gate of Star Stream and were told to board the <b>Final Ark</b> — a massive ship designed to carry seeds to a new world-line, continuing the same migration cycle every prior world had followed. Kim Dokja refused. He threw the Unbroken Faith into the sparking storm of Probability, activated all five Giant Stories simultaneously, and wrecked the Ark's hull. The scenario rewrote itself: Kim Dokja became the <b>Enemy of the Story</b>, an Outer God King the entire Star Stream was instructed to kill. He had volunteered to absorb the company's accumulated Probability debt — the impossible luck of never losing a single companion across hundreds of scenarios — by becoming the structural villain whose existence generated enough conflict to sustain the narrative. Nameless Ones from abandoned world-lines gained faces and fought beside him. Han Sooyoung spent every hoarded coin on Probability. Uriel inherited Eden and became the Great Good. The Great Sage held off an empire. The Abyssal Black Flame Dragon and the Indescribable Distance collided. Companions fought through the Ark's recreated Nebula cabins — Asgard, Olympus, Hot Naraka — and reached the Prop Storage, where Korean Peninsula Constellations descended through the Shindansu in a recreation of Gaecheon.<br><br>The company breached the <b>Final Wall</b>. It was composed of five thematic fragments — Impossible Communication, Good and Evil, Samsara, the Fourth Wall, and a fifth — and when the companions slotted each fragment into place, the wall collapsed. The <b>Dokkaebi King</b>, the oldest existence in the world who had once been human, then Demon King, then Eden's messiah, then Pangu, then Cronus, offered Kim Dokja the succession of Star Stream. Kim Dokja refused. The 999th-turn Outer God Kings intervened and fought the Dokkaebi King. Yoo Joonghyuk's Black Heavenly Demon Sword pierced the King's throat. Beyond the wall, in a Seoul subway station that was the origin point of all world-lines, the companions found a bruised schoolchild scribbling a power-balance chart. The Oldest Dream was the younger Kim Dokja — a bullied, abused child whose desperate imaginings of Yoo Joonghyuk's indestructible protagonist had spawned reality itself. Every regression had been a wish. Every scenario a detail invented while being beaten. The Secretive Plotter walked toward the child alone, raised the Splitting the Sky Sword — a blade forged from 1864 lifetimes — and chose mercy. He sliced away the boy's painful memories instead of ending the dream by force, announced his own name, and the dream ended.<br><br>The companions woke on a moving subway in the real Seoul. Station names reappeared one by one. <b>Biyoo</b>, Kim Dokja's small dokkaebi streamer who had hidden her full intelligence for the entire story, spoke in a complete sentence for the first time and explained that the world-line survived as a last miracle. The children argued about oceans and fried chicken. Han Sooyoung complained that Dokja had bankrupted the Nebula. At Jongro 3rd Street, most companions stepped off the train. Only Kim Dokja, Han Sooyoung, and Yoo Joonghyuk remained. Lie Detection confirmed Kim Dokja's promise that they were getting off together. He slapped both their backs, and they stumbled onto the platform. The doors closed. Han Sooyoung and Yoo Joonghyuk looked back with uncertain expressions. Kim Dokja did not look back.<br><br>He had used the sixth Bookmark — registered to the 1863rd-turn Han Sooyoung — combined with an Avatar skill received from the Secretive Plotter, to split himself. The avatar, carrying forty-nine percent of his memories, would live among his companions with full free will, never knowing it was not the original. It would go to the ocean with Gilyoung, eat pizza with Yoosung, attend Lee Jihye's university admission, house-hunt with Yoo Sangah, search for tls123 with Yoo Joonghyuk, and read Han Sooyoung's novel. The real Kim Dokja, transparent and half-remembered, floated above the departing train. The Fourth Wall asked if this was really alright. He said that at least he had not lied — a part of him did exit the train. He could still see them, just like a very long time ago.<br><br>The identity of tls123 remains unsolved. The Oldest Dream is a reader, not an author. Han Sooyoung and Yoo Joonghyuk both looked back as the doors closed, which suggests they sensed something was wrong. The world-line's time has resumed, Star Stream is crumbling over a timeline of thousands of years, and Constellations including Uriel, the Black Flame Dragon, and the Great Sage survived in diminished states. Whether the avatar will ever realize its own nature is an open question. The Fourth Wall's status since separating from its owner is unknown.<br><br>Kim Dokja is now somewhere above that city — transparent, carrying fifty-one percent of his memories, separated from the avatar walking among his friends. The <b>Demon King of Salvation</b> reached his ■■: Eternity, and became the new Oldest Dream. What that means for the world-lines, for the slowly collapsing Star Stream, for the companions who do not know they are living with a copy, and for the man who chose to leave rather than lie — none of that has been answered yet.`,

const RM_STATE_KEY='rmState2';

function rmGetProgress(){

function rmSaveReaderState(extra={}){

    pageIdx:extra.pageIdx!==undefined?extra.pageIdx:_rmIdx,

function rmClearReaderState(){
  _rmSessionIdx=null;

}

function rmLoadReaderState(){
  try{
    const raw=localStorage.getItem(RM_STATE_KEY);
    if(!raw)return null;
    const state=JSON.parse(raw);
    if(!state||!state.open)return null;
    const sessionIdx=Number(state.sessionIdx);
    if(!Number.isInteger(sessionIdx)||sessionIdx<0||sessionIdx>=SESSIONS.length)return null;
    return {
      sessionIdx,
      pageIdx:Number.isFinite(state.pageIdx)?state.pageIdx:0,

  strip.style.transition=instant?'none':'transform .85s cubic-bezier(.16,1,.3,1)';
  strip.style.transform = 'translateX(' + (-idx * _rmPageW) + 'px)';
  if(num){num.textContent=_rmTotal>1?`${idx+1} / ${_rmTotal}`:'';num.style.color=rmGetResolvedTheme().muted;}
  if(_rmSessionIdx!==null)rmSaveReaderState();
}

function rmPrefersLight(){
  return _rmPrefs.mode==='light'||(_rmPrefs.mode==='auto'&&!window.matchMedia('(prefers-color-scheme:dark)').matches);
}

function rmGetResolvedTheme(themeName=_rmTheme){
  const baseTheme=RM_THEMES[themeName]?themeName:RM_DEFAULTS.t;
  const variant=rmPrefersLight()?'light':'dark';
  const family=RM_THEMES[baseTheme]||RM_THEMES[RM_DEFAULTS.t];
  return family[variant]||family.dark;
}

  const cfgCard=document.querySelector('.rm-cfg-card');
  if(cfgCard){

    if(cfgTitle){cfgTitle.style.color=isLight?'#6a6460':'#888';cfgTitle.style.borderColor=isLight?'rgba(0,0,0,.08)':'rgba(255,255,255,.08)';}
    cfgCard.querySelectorAll('.rm-cfg-fs-btn').forEach(b=>b.style.color=isLight?'#3a3632':'#ccc');

// ── Touch swipe (mobile) ──
let _tx=0,_ty=0;
document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(!document.getElementById('rm'))return;
  if(document.querySelector('.rm-cfg.show'))return;
  const dx=e.changedTouches[0].clientX-_tx;
  const dy=e.changedTouches[0].clientY-_ty;
  // Swipe left/right → flip page
  if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)){rmFlip(dx<0?1:-1);return;}
  // Tap in center third of screen (not swipe, not on bar/buttons) → toggle bar
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<12){
    const target=e.target;
    // Don't toggle if tapping a button or the bar itself
    if(target.closest('.rm-bar,.rm-bar-cfg,.rm-bar-x,.rm-cfg'))return;
    const cx=e.changedTouches[0].clientX;
    const W=window.innerWidth;
    // Only toggle if tap is in the middle 40% of screen width
    if(cx>W*0.3&&cx<W*0.7){rmToggleBar();}
  }
},{passive:true});
// ── Scroll wheel (just flips pages like arrow keys) ──
document.addEventListener('wheel',e=>{
  if(!document.getElementById('rm'))return;
  if(document.querySelector('.rm-cfg.show'))return;
  e.preventDefault();
  const delta=Math.abs(e.deltaY)>Math.abs(e.deltaX)?e.deltaY:e.deltaX;
  if(Math.abs(delta)<5)return;
  rmFlip(delta>0?1:-1);
},{passive:false});

})();

// SCROLL PROGRESS RIBBON
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function(){
  const ribbon = document.getElementById('scroll-ribbon');
  if(!ribbon) return;
  function upd(){
    // On desktop the main-col scrolls, not window
    const mc = document.querySelector('.main-col');
    if(mc && mc.scrollHeight > mc.clientHeight){
      ribbon.style.width = Math.round(mc.scrollTop / (mc.scrollHeight - mc.clientHeight) * 100) + '%';
    } else {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      ribbon.style.width = total > 0 ? Math.round(window.scrollY / total * 100) + '%' : '0%';
    }
  }
  window.addEventListener('scroll', upd, {passive:true});
  // also hook into main-col scroll
  setTimeout(()=>{
    const mc = document.querySelector('.main-col');
    if(mc) mc.addEventListener('scroll', upd, {passive:true});
  }, 300);
  upd();
})();
